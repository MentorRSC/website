<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MilanDev - Cosmic Portfolio</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    overflow-x: hidden;
    background: #05070f;
    color: white;
}

/* ===== CANVAS BACKGROUND ===== */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* ===== CUSTOM CURSOR (PLANET) ===== */
.cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: radial-gradient(circle, #00e5ff, #3a7bd5);
    box-shadow: 0 0 20px #00e5ff, 0 0 60px #3a7bd5;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    transition: transform 0.08s ease;
}

.cursor-trail {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(0,229,255,0.5);
    pointer-events: none;
    z-index: 9998;
}

/* ===== NAVBAR ===== */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(10, 12, 25, 0.4);
    backdrop-filter: blur(12px);
    z-index: 10;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #00e5ff;
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.nav-links a {
    text-decoration: none;
    color: #ddd;
    font-size: 14px;
    position: relative;
    transition: 0.3s;
}

.nav-links a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background: #00e5ff;
    transition: 0.3s;
}

.nav-links a:hover {
    color: white;
}

.nav-links a:hover::after {
    width: 100%;
}

/* ===== SECTIONS ===== */
.section {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 2;
}

/* ===== CENTER CARD ===== */
.card {
    padding: 40px;
    width: 420px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 60px rgba(0,229,255,0.08);
    animation: float 4s ease-in-out infinite;
}

h1 {
    font-size: 42px;
    background: linear-gradient(90deg, #00e5ff, #ffffff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

h2 {
    font-size: 16px;
    margin-top: 5px;
    color: #ccc;
}

.info {
    margin-top: 20px;
    font-size: 13px;
    color: #aaa;
    line-height: 1.8;
}

/* ===== BUTTONS ===== */
.buttons {
    margin-top: 25px;
}

button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    background: linear-gradient(90deg, #00e5ff, #3a7bd5);
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
    box-shadow: 0 0 20px rgba(0,229,255,0.5);
}

/* ===== FLOAT ANIMATION ===== */
@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
}

/* ===== TITLES ===== */
.title {
    font-size: 40px;
    color: #00e5ff;
    text-shadow: 0 0 20px rgba(0,229,255,0.3);
}

/* ===== TRAIL GLOW PULSE ===== */
@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(3); opacity: 0; }
}
</style>
</head>

<body>

<canvas id="space"></canvas>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">MilanDev</div>
    <ul class="nav-links">
        <li><a href="#home">Home</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>
</nav>

<!-- HOME -->
<section id="home" class="section">
    <div class="card">
        <h1>MilanDev</h1>
        <h2>Astrophysicist & Space Explorer</h2>

        <div class="info">
            📞 9539266388 <br>
            📧 pmilandev@gamil.com <br><br>
            Exploring universe through physics & imagination.
        </div>

        <div class="buttons">
            <button>Download CV</button>
            <button>Contact Me</button>
        </div>
    </div>
</section>

<section id="projects" class="section">
    <h2 class="title">Projects</h2>
</section>

<section id="about" class="section">
    <h2 class="title">About Me</h2>
</section>

<section id="contact" class="section">
    <h2 class="title">Contact</h2>
</section>

<script>
/* ======================
   SPACE BACKGROUND
====================== */
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

let stars = Array.from({ length: 400 }, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5
}));

let angle = 0;

function draw() {
    ctx.fillStyle = "#05070f";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // stars
    ctx.fillStyle = "white";
    stars.forEach(s => {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
    });

    let cx = canvas.width / 2;
    let cy = canvas.height / 2;

    // galaxy spiral
    for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.strokeStyle = "rgba(0,229,255,0.06)";
        ctx.lineWidth = 2;

        for (let a = 0; a < Math.PI * 6; a += 0.2) {
            let r = a * 18 + i * 30;
            let x = cx + Math.cos(a + angle) * r;
            let y = cy + Math.sin(a + angle) * r;
            ctx.lineTo(x, y);
        }
        ctx.stroke();
    }

    angle += 0.002;
    requestAnimationFrame(draw);
}
draw();

/* ======================
   PLANET CURSOR SYSTEM
====================== */
const cursor = document.getElementById("cursor");

let mouse = { x: 0, y: 0 };
let planet = { x: 0, y: 0 };

window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
});

// smooth follow + gravity feel
function animateCursor() {
    planet.x += (mouse.x - planet.x) * 0.12;
    planet.y += (mouse.y - planet.y) * 0.12;

    cursor.style.left = planet.x + "px";
    cursor.style.top = planet.y + "px";

    requestAnimationFrame(animateCursor);
}
animateCursor();

/* ======================
   CLICK ENERGY BURST
====================== */
window.addEventListener("click", (e) => {
    for (let i = 0; i < 10; i++) {
        let dot = document.createElement("div");
        dot.className = "cursor-trail";
        document.body.appendChild(dot);

        dot.style.left = e.clientX + "px";
        dot.style.top = e.clientY + "px";

        let angle = Math.random() * 360;
        let speed = Math.random() * 80;

        let x = 0, y = 0;

        let move = setInterval(() => {
            x += Math.cos(angle) * 3;
            y += Math.sin(angle) * 3;
            dot.style.transform = `translate(${x}px, ${y}px)`;

            dot.style.opacity -= 0.03;

            if (dot.style.opacity <= 0) {
                clearInterval(move);
                dot.remove();
            }
        }, 16);
    }
});

/* ======================
   SMOOTH SCROLL
====================== */
document.querySelectorAll("a[href^='#']").forEach(link => {
    link.addEventListener("click", e => {
        e.preventDefault();
        document.querySelector(link.getAttribute("href"))
            .scrollIntoView({ behavior: "smooth" });
    });
});
</script>

</body>
</html>
