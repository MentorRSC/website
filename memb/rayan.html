<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rayanharris | Cosmic Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      cursor: none;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at center, #0f1021 0%, #05060f 70%, #000 100%);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    /* ---------- STARS ---------- */
    .stars {
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(2px 2px at 20px 30px, rgba(255,255,255,0.8), transparent),
        radial-gradient(2px 2px at 80px 120px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1.5px 1.5px at 140px 60px, rgba(255,255,255,0.6), transparent),
        radial-gradient(2px 2px at 220px 180px, rgba(255,255,255,0.8), transparent);
      background-size: 300px 300px;
      animation: twinkle 8s linear infinite;
      opacity: 0.7;
      z-index: 0;
    }

    @keyframes twinkle {
      from { transform: translateY(0); }
      to { transform: translateY(-60px); }
    }

    /* ---------- FLOATING PLANETS ---------- */
    .planet {
      position: absolute;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
      box-shadow: 0 0 40px rgba(255,255,255,0.15);
      z-index: 0;
    }

    .planet.one {
      width: 140px;
      height: 140px;
      top: 8%;
      left: 7%;
      background: radial-gradient(circle at 30% 30%, #7df9ff, #2a2a72, #090979);
    }

    .planet.two {
      width: 90px;
      height: 90px;
      top: 16%;
      right: 10%;
      background: radial-gradient(circle at 30% 30%, #ffd6ff, #9d4edd, #240046);
      animation-delay: 2s;
    }

    .planet.three {
      width: 180px;
      height: 180px;
      bottom: 5%;
      right: 18%;
      background: radial-gradient(circle at 35% 35%, #ffe29a, #ff8c42, #7a3b00);
      animation-delay: 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-18px); }
    }

    /* ---------- PROFILE CARD ---------- */
    .profile-card {
      position: relative;
      z-index: 2;
      width: 460px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 32px;
      border-radius: 28px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(18px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      text-align: center;
    }

    .avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #9d4edd, #7df9ff);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 42px;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(125,249,255,0.35);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      color: rgba(255,255,255,0.82);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 28px;
      margin-bottom: 14px;
      font-size: 1.2rem;
    }

    .tags,
    .projects {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .tag,
    .project-btn {
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 0.92rem;
      transition: 0.3s ease;
    }

    .project-btn:hover {
      transform: translateY(-3px);
      background: rgba(168,85,247,0.25);
      box-shadow: 0 10px 25px rgba(168,85,247,0.18);
    }

    /* ---------- POPUP ---------- */
    .popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

    .popup-content {
      width: 440px;
      padding: 22px;
      border-radius: 24px;
      background: rgba(18,18,35,0.96);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      position: relative;
      text-align: center;
      animation: popupShow 0.3s ease;
    }

    @keyframes popupShow {
      from {
        opacity: 0;
        transform: scale(0.92);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .popup img {
      width: 100%;
      border-radius: 16px;
      margin-bottom: 16px;
      object-fit: cover;
    }

    .popup h3 {
      margin-bottom: 10px;
    }

    .close {
      position: absolute;
      top: 12px;
      right: 18px;
      font-size: 28px;
      cursor: pointer;
    }

    /* ---------- CUSTOM CURSOR ---------- */
    .hollow-purple {
      position: fixed;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      background:
        radial-gradient(circle at 35% 35%, #ffffff, #d8b4fe 20%, #a855f7 45%, #3b0764 75%, transparent 78%);
      box-shadow:
        0 0 25px #c084fc,
        0 0 55px #9333ea,
        0 0 85px rgba(168,85,247,0.7);
      transform: translate(-50%, -50%);
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.15); }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="planet one"></div>
  <div class="planet two"></div>
  <div class="planet three"></div>

  <div class="profile-card">
    <div class="avatar">G</div>

    <h1>rayanharris</h1>

    <p>
      Six Eyes awakened. Walking cosmic chaos with unmatched style.<br>
      2 Stage Water Rocket. Infinite intelligence. Infinite confidence.
    </p>

    <div class="tags">
      <div class="tag">Arduino</div>
      <div class="tag">HTML</div>
      <div class="tag">LEGO</div>
      <div class="tag">Robotics</div>
    </div>

    <h2>Featured Projects</h2>

    <div class="projects">
      <button class="project-btn" onclick="openPopup('rocket')">Water Rocket</button>
      <button class="project-btn" onclick="openPopup('robot')">Arduino Robot</button>
      <button class="project-btn" onclick="openPopup('lego')">LEGO Machine</button>
    </div>
  </div>

  <!-- POPUP -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">×</span>
      <img id="popup-img" src="" alt="Project Image">
      <h3 id="popup-title"></h3>
      <p id="popup-text"></p>
    </div>
  </div>

  <!-- CURSOR -->
  <div class="hollow-purple" id="cursor"></div>

  <script>
    const cursor = document.getElementById("cursor");
    const popup = document.getElementById("popup");
    const popupImg = document.getElementById("popup-img");
    const popupTitle = document.getElementById("popup-title");
    const popupText = document.getElementById("popup-text");

    const projects = {
      rocket: {
        title: "2 Stage Water Rocket",
        text: "High-pressure launch system with stage separation, aerodynamic balance, and advanced experimental testing.",
        image: "https://images.unsplash.com/photo-1446776811953-b23d57bd21aa?w=1000"
      },

      robot: {
        title: "Arduino Smart Robot",
        text: "Obstacle-avoiding autonomous robot using Arduino, ultrasonic sensors, and smart movement control.",
        image: "https://images.unsplash.com/photo-1535378917042-10a22c95931a?w=1000"
      },

      lego: {
        title: "Mechanical LEGO Machine",
        text: "Custom LEGO engineering project using gears, motion transfer systems, and mechanical precision.",
        image: "https://images.unsplash.com/photo-1587654780291-39c9404d746b?w=1000"
      }
    };

    function openPopup(projectKey) {
      const project = projects[projectKey];

      popupImg.src = project.image;
      popupTitle.textContent = project.title;
      popupText.textContent = project.text;
      popup.style.display = "flex";
    }

    function closePopup() {
      popup.style.display = "none";
    }

    popup.addEventListener("click", function (e) {
      if (e.target === popup) {
        closePopup();
      }
    });

    window.addEventListener("mousemove", function (e) {
      cursor.style.left = e.clientX + "px";
      cursor.style.top = e.clientY + "px";
    });
  </script>

</body>
</html>
