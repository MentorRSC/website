<!DOCTYPE html>
<html>
<head>
    <title>Safar World</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, black, #0f0f2e);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
            font-size: 50px;
            animation: glow 2s infinite alternate;
        }

        p {
            font-size: 20px;
        }

        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background: purple;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: cyan;
            transform: scale(1.1);
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px purple;
            }
            to {
                text-shadow: 0 0 30px cyan;
            }
        }

        /* Black hole animation */
        #blackhole {
            position: absolute;
            width: 0;
            height: 0;
            background: black;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: 1s;
        }

        .consume {
            transform: scale(0);
            opacity: 0;
            transition: 1s;
        }
    </style>
</head>

<body>

<h1 id="title">🌌 SAFAR WORLD</h1>
<p id="text">Click below to enter a new world...</p>

<button onclick="enterWorld()">ENTER MY WORLD</button>

<div id="blackhole"></div>

<script>
    function enterWorld() {
        document.getElementById("title").classList.add("consume");
        document.getElementById("text").classList.add("consume");

        let hole = document.getElementById("blackhole");
        hole.style.width = "2000px";
        hole.style.height = "2000px";

        setTimeout(() => {
            window.location.href = "world.html"; // next page
        }, 1200);
    }
</script>

</body>
</html>
