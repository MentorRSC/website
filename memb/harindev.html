<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harindev M | Premium Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
@keyframes loadBar{
from{
  width:0;
  opacity:0.4;
}
to{
  opacity:1;
}
}

@keyframes shimmer{
0%{transform:translateX(-100%);}
100%{transform:translateX(200%);}
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins','Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  background:#050816;
  color:white;
  overflow:hidden;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:url('https://images.unsplash.com/photo-1515879218367-8466d910aaa4?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
  opacity:0.28;
  z-index:-2;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(5,8,22,0.78);
  z-index:-1;
}

.mouse-glow{
position:fixed;
width:300px;
height:300px;
border-radius:50%;
pointer-events:none;
background:radial-gradient(circle, rgba(99,102,241,0.12), transparent 70%);
filter:blur(20px);
z-index:0;
transform:translate(-50%,-50%);
}

.hero{
  min-height:100vh;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  align-items:center;
  gap:40px;
  padding:0 7%;
}

.solar-system{
  position:relative;
  width:700px;
  height:700px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.orbit{
  position:absolute;
  border:1px solid rgba(255,255,255,.08);
  border-radius:50%;
  animation:spin linear infinite;
}

.o1{width:180px;height:180px;animation-duration:8s;}
.o2{width:280px;height:280px;animation-duration:12s;animation-direction:reverse;}
.o3{width:380px;height:380px;animation-duration:18s;}
.o4{width:500px;height:500px;animation-duration:24s;}
.o5{width:620px;height:620px;animation-duration:30s;animation-direction:reverse;}

.planet{
  position:absolute;
  top:-12px;
  left:50%;
  transform:translateX(-50%);
  border-radius:50%;
}

.mercury{width:12px;height:12px;background:#c7c7c7;}
.mars{width:18px;height:18px;background:#ef4444;}
.earth{width:22px;height:22px;background:#3b82f6;}
.jupiter{width:34px;height:34px;background:#d6a76a;}

.saturn{
  width:28px;
  height:28px;
  background:#d8b98a;
  position:absolute;
  top:-14px;
  left:50%;
  transform:translateX(-50%);
  border-radius:50%;
}

.saturn::before{
  content:"";
  position:absolute;
  width:52px;
  height:16px;
  border:2px solid rgba(255,215,0,.6);
  border-radius:50%;
  top:6px;
  left:-12px;
  transform:rotate(-20deg);
}

.name-box{
  text-align:center;
  z-index:5;
}

.name-box h1{
  font-size:5rem;
  font-weight:800;
  text-transform:uppercase;
  text-shadow:0 0 20px rgba(255,255,255,.2), 3px 0 #3b82f6, -3px 0 #8b5cf6;
  animation:glitch 2.5s infinite;
}

.name-box p{
  margin-top:12px;
  color:#cbd5e1;
  letter-spacing:3px;
}

.right-panel{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.08);
  border-radius:30px;
  padding:32px;
  backdrop-filter:blur(16px);
}

.right-panel h2{
  font-size:2.8rem;
  margin-bottom:14px;
}

.portal-wrapper{
transition:all 0.5s ease;
}

.portal-wrapper:hover{
transform:translateY(-10px) scale(1.05);
filter:drop-shadow(0 0 35px rgba(168,85,247,0.45));
}

.portal-wrapper{
  margin-top:20px;
  position:relative;
  width:220px;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.portal-core{
  width:180px;
  height:180px;
  border-radius:50%;
  background:radial-gradient(circle at center,
  rgba(255,255,255,.95) 0%,
  rgba(59,130,246,.9) 18%,
  rgba(168,85,247,.8) 42%,
  rgba(236,72,153,.55) 60%,
  rgba(15,23,42,.25) 78%,
  transparent 100%);
  box-shadow:0 0 25px rgba(59,130,246,.45), 0 0 80px rgba(168,85,247,.25);
  animation:portalPulse 3s ease-in-out infinite, spin 8s linear infinite;
}

.portal-label{
  position:absolute;
  font-weight:700;
  z-index:2;
}

@keyframes spin{
  from{transform:rotate(0deg);}to{transform:rotate(360deg);} }
@keyframes glitch{
  0%,100%{transform:translate(0);}20%{transform:translate(-2px,1px);}40%{transform:translate(2px,-1px);}60%{transform:translate(-1px,2px);}80%{transform:translate(1px,-2px);} }
@keyframes portalPulse{
  0%,100%{transform:scale(1);}50%{transform:scale(1.05);} }

@media(max-width:1000px){
  body{overflow:auto;}
  .hero{grid-template-columns:1fr;padding:40px 20px;justify-items:center;}
  .solar-system{width:360px;height:360px;}
  .name-box h1{font-size:2.4rem;}
}
</style>
</head>

const text = "Hello, I'm Harindev M.";
let i = 0;
function typeEffect(){
  const el = document.getElementById('typingText');
  if(el && i < text.length){
    el.innerHTML = text.substring(0, i + 1);
    i++;
    setTimeout(typeEffect, 80);
  }
}
window.addEventListener('load', typeEffect);

document.addEventListener('mousemove', function(e){
 const glow = document.querySelector('.mouse-glow');
 if(glow){
  glow.style.left = e.clientX + 'px';
  glow.style.top = e.clientY + 'px';

});
