<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Member Validation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.container {
  padding: 50px;
}

#status {
  font-size: 32px;
  margin-top: 20px;
}

.valid { color: #00ffae; }
.invalid { color: #ff4d4d; }

.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.green { background: rgba(0,255,100,0.4); }
.red { background: rgba(255,0,0,0.4); }
</style>
</head>

<body>

<div class="container">
  <h1>Member Validation</h1>
  <div id="status">Checking...</div>
</div>

<div id="flash" class="flash"></div>
<div id="debugMsg" style="
  margin-top:20px;
  font-size:14px;
  color:yellow;
">
DEBUG: waiting...
</div>
<script>

function debug(msg) {
  console.log(msg);
  document.getElementById("debugMsg").innerText = "DEBUG: " + msg;
}
// 🔗 YOUR SHEET
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1CLmhUxbgZrdlFAs_lLxYv1e6Gqikyo7MEUDSjUxnReM/gviz/tq";

// 📥 FETCH DATA
async function fetchSheetData() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  return json.table.rows;
}

// 🔊 SPEAK
  function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

// 🎨 FLASH
function flashScreen(color) {
  const flash = document.getElementById("flash");
  flash.className = "flash " + color;
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 500);
}

// 📅 CONVERT "March 2026" → Date
function parseExpiry(text) {
  if (!text) return null;

  const parts = text.split(" ");
  const monthName = parts[0];
  const year = parseInt(parts[1]);
  debug("ID from URL = " + parts,monthName,year);

  const months = {
    january: 0, february: 1, march: 2, april: 3,
    may: 4, june: 5, july: 6, august: 7,
    september: 8, october: 9, november: 10, december: 11
  };

  const month = months[monthName.toLowerCase()];

  return new Date(year, month + 1, 0); // end of month
}

// 🔍 GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const memberId = params.get("id");

const statusEl = document.getElementById("status");

if (!memberId) {
  statusEl.innerText = "Invalid QR Code";
  statusEl.className = "invalid";
} else {

  fetchSheetData().then(rows => {

    let found = false;

    for (let i = 1; i < rows.length; i++) {

      const row = rows[i];
      if (!row.c[0]) continue;

      const id = row.c[0]?.v;
      const name = row.c[1]?.v;
      const expiryText = row.c[7]?.v; // 🔥 COLUMN H

      if (String(id) === String(memberId)) {
        found = true;

        const expiryDate = parseExpiry(expiryText);
        const now = new Date();

        console.log("Expiry:", expiryDate);
        console.log("Now:", now);

        if (!expiryDate) {
          statusEl.innerText = name + " ❌ No Expiry Data";
          statusEl.className = "invalid";
          flashScreen("red");
          return;
        }

        if (now <= expiryDate) {
          statusEl.innerText = name + " ✅ VALID MEMBER";
          statusEl.className = "valid";
          flashScreen("green");
          speak("Member Verified");
        } else {
          statusEl.innerText = name + " ❌ EXPIRED";
          statusEl.className = "invalid";
          flashScreen("red");
        }

        return;
      }
    }

    if (!found) {
      statusEl.innerText = "Member Not Found";
      statusEl.className = "invalid";
      flashScreen("red");
    }

  }).catch(err => {
    console.error(err);
    statusEl.innerText = "Error loading data";
    statusEl.className = "invalid";
  });
}
</script>

</body>
</html>
