<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Member Validation</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}

.container {
  padding: 50px;
}

#status {
  font-size: 32px;
  margin-top: 20px;
}

.valid { color: #00ffae; }
.invalid { color: #ff4d4d; }

.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
}

.green { background: rgba(0,255,100,0.4); }
.red { background: rgba(255,0,0,0.4); }

#debugMsg {
  margin-top: 20px;
  font-size: 13px;
  color: yellow;
  max-height: 200px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
  <h1>Member Validation</h1>
  <div id="status">Checking...</div>
</div>

<div id="flash" class="flash"></div>

<div id="debugMsg">DEBUG:</div>

<script>

// ✅ DEBUG FUNCTION (MULTI-LINE)
function debug(msg) {
  console.log(msg);
  const el = document.getElementById("debugMsg");
  el.innerHTML += "<br>• " + msg;
}

// 🔗 GOOGLE SHEET
const SHEET_URL = "https://docs.google.com/spreadsheets/d/1CLmhUxbgZrdlFAs_lLxYv1e6Gqikyo7MEUDSjUxnReM/gviz/tq";

// 📥 FETCH DATA
async function fetchSheetData() {
  debug("Fetching sheet...");
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const json = JSON.parse(text.substr(47).slice(0, -2));
  debug("Sheet loaded successfully");
  return json.table.rows;
}

// 🔊 SPEAK
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  speechSynthesis.speak(msg);
}

// 🎨 FLASH
function flashScreen(color) {
  const flash = document.getElementById("flash");
  flash.className = "flash " + color;
  flash.style.opacity = 1;
  setTimeout(() => flash.style.opacity = 0, 500);
}

// 📅 PARSE "March 2026"
function parseExpiry(text) {
  if (!text) {
    debug("No expiry text found");
    return null;
  }

  const parts = text.trim().split(" ");
  if (parts.length < 2) {
    debug("Invalid format: " + text);
    return null;
  }

  let monthName = parts[0].toLowerCase();
  const year = parseInt(parts[1]);

  debug("Raw expiry: " + text);

  // ✅ SUPPORT SHORT + FULL MONTHS
  const months = {
    jan: 0, january: 0,
    feb: 1, february: 1,
    mar: 2, march: 2,
    apr: 3, april: 3,
    may: 4,
    jun: 5, june: 5,
    jul: 6, july: 6,
    aug: 7, august: 7,
    sep: 8, september: 8,
    oct: 9, october: 9,
    nov: 10, november: 10,
    dec: 11, december: 11
  };

  const month = months[monthName];

  if (month === undefined) {
    debug("Invalid month: " + monthName);
    return null;
  }

  const expiryDate = new Date(year, month + 1, 0);

  debug("Parsed expiry → " + expiryDate);

  return expiryDate;
}

// 🔍 GET ID FROM URL
//debug("Script started");

const params = new URLSearchParams(window.location.search);
const memberId = params.get("id");

debug("URL ID = " + memberId);

const statusEl = document.getElementById("status");

if (!memberId) {
  statusEl.innerText = "Invalid QR Code";
  statusEl.className = "invalid";
  debug("No ID in URL");
} else {

  fetchSheetData().then(rows => {

    debug("Total rows = " + rows.length);

    let found = false;

    for (let i = 1; i < rows.length; i++) {

      const row = rows[i];
      if (!row.c[8]) continue;

      const id = row.c[8]?.v;
      const name = row.c[3]?.v;
      const expiryText = row.c[7]?.v; // COLUMN H

      debug("Row " + i + " → ID: " + id + " | Name: " + name + " | Expiry: " + expiryText);

      if (String(id) === String(memberId)) {
 debug("Row " + i + " → ID: " + id + " | Name: " + name + " | Expiry: " + expiryText);
        debug("MATCH FOUND at row " + i);

        found = true;

        const expiryDate = parseExpiry(expiryText);
        const now = new Date();

        debug("Expiry Date = " + expiryDate);
        debug("Current Date = " + now);

        if (!expiryDate) {
          statusEl.innerText = name + " ❌ No Expiry Data";
          statusEl.className = "invalid";
          flashScreen("red");
          return;
        }

        if (now <= expiryDate) {
          statusEl.innerText = name + " ✅ VALID MEMBER";
          statusEl.className = "valid";
          flashScreen("green");
          speak("Member Verified");
        } else {
          debug("No matching ID found"+name);
          statusEl.innerText = name + " ❌ EXPIRED";
          statusEl.className = "invalid";
          flashScreen("red");
        }

        return;
      }
    }

    if (!found) {
      debug("No matching ID found");
      
      statusEl.innerText = "Member Not Found";
      statusEl.className = "invalid";
      flashScreen("red");
    }

  }).catch(err => {
    console.error(err);
    debug("Error loading sheet");
    statusEl.innerText = "Error loading data";
    statusEl.className = "invalid";
  });
}
</script>

</body>
</html>
