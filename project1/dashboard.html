<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<script src="app.js"></script>
</head>

<body>

<h2>Members Dashboard</h2>
<table border="1" id="table"></table>

<script>
fetchSheetData().then(rows => {
  let html = "<tr><th>ID</th><th>Name</th><th>Status</th></tr>";

  rows.forEach(r => {
    html += `<tr>
      <td>${r.c[0]?.v}</td>
      <td>${r.c[1]?.v}</td>
      <td>${r.c[2]?.v}</td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
});
</script>

</body>
</html>
