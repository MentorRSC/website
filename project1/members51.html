<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Innovation Hub | Digital ID Card</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (free icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0b2b3b 0%, #1a4a5f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* subtle animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-particles span {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: floatBg 12s infinite ease-in-out;
        }

        @keyframes floatBg {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* main card container */
        .card-wrapper {
            position: relative;
            z-index: 10;
            perspective: 1200px;
        }

        /* popup animation card */
        .id-card {
            max-width: 460px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 35px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.2) inset;
            overflow: hidden;
            backdrop-filter: blur(0px);
            transition: all 0.3s ease;
            animation: cardFloatIn 0.65s cubic-bezier(0.23, 1, 0.32, 1) forwards, softGlow 3s infinite alternate;
            transform-origin: center;
        }

        @keyframes cardFloatIn {
            0% {
                opacity: 0;
                transform: scale(0.85) translateY(50px) rotateX(-5deg);
                filter: blur(6px);
            }
            40% {
                opacity: 0.9;
                transform: scale(1.02) translateY(-5px) rotateX(1deg);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0) rotateX(0);
                filter: blur(0);
            }
        }

        @keyframes softGlow {
            0% {
                box-shadow: 0 25px 45px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(231, 198, 98, 0.2);
            }
            100% {
                box-shadow: 0 35px 55px rgba(0, 0, 0, 0.35), 0 0 0 2px rgba(255, 215, 120, 0.5);
            }
        }

        /* header section with name, id, year */
        .card-header {
            background: linear-gradient(135deg, #0f2c33 0%, #1c5a6e 100%);
            padding: 1.4rem 1.8rem;
            color: white;
            border-bottom: 3px solid #ffcd7e;
        }

        .badge-icon {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            padding: 0.3rem 1rem;
            border-radius: 60px;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            width: fit-content;
        }

        .badge-icon i {
            font-size: 0.8rem;
        }

        .name-section {
            margin-top: 0.2rem;
        }

        .full-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: space-between;
        }

        .full-name span:first-child {
            background: linear-gradient(120deg, #fff, #ffe0a3);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .id-badge {
            font-family: monospace;
            background: #00000040;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            margin-top: 0.7rem;
            flex-wrap: wrap;
            gap: 12px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,240,0.12);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .meta-item i {
            font-size: 0.8rem;
            color: #ffcd7e;
        }

        /* Image container with premium effect */
        .image-container {
            padding: 1.8rem 1.8rem 1rem 1.8rem;
            background: #fefaf0;
            display: flex;
            justify-content: center;
            position: relative;
        }

        .card-image {
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.15);
            transition: transform 0.25s ease;
            display: inline-block;
            max-width: 100%;
            overflow: hidden;
            border: 2px solid rgba(255,205,126,0.5);
        }

        .card-image img {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            background: #fff;
            transition: all 0.3s;
        }

        .card-image:hover {
            transform: scale(1.01);
        }

        /* additional details footer */
        .card-footer {
            padding: 1rem 1.8rem 1.8rem 1.8rem;
            background: white;
            border-top: 1px solid #eee6dc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .org-name {
            font-weight: 600;
            font-size: 0.8rem;
            color: #4a5b66;
            letter-spacing: 0.3px;
        }

        .org-name i {
            color: #d4a373;
            margin-right: 5px;
        }

        .qr-symbol {
            font-size: 1.2rem;
            color: #1c5a6e;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .qr-symbol i {
            font-size: 1.3rem;
        }

        /* responsive touch */
        @media (max-width: 500px) {
            .full-name {
                font-size: 1.45rem;
            }
            .card-header {
                padding: 1.2rem;
            }
            .image-container {
                padding: 1.2rem;
            }
            .meta-item {
                font-size: 0.7rem;
            }
        }

        /* floating close hint (just for style) */
        .hint-tip {
            text-align: center;
            margin-top: 1.8rem;
            color: rgba(255,255,240,0.7);
            font-size: 0.75rem;
            font-weight: 400;
            backdrop-filter: blur(4px);
            background: rgba(0,0,0,0.2);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="bg-particles" id="particles"></div>

<div class="card-wrapper">
    <div class="id-card">
        <!-- Top section: name, id, year above the image (as required) -->
        <div class="card-header">
            <div class="badge-icon">
                <i class="fas fa-id-card"></i> 
                <span>INNOVATION HUB · MEMBERSHIP</span>
            </div>
            <div class="name-section">
                <div class="full-name">
                    <span>Dr. Arjun Nair</span>
                    <span class="id-badge"><i class="fas fa-qrcode"></i> ID: IN23-0872</span>
                </div>
                <div class="meta-row">
                    <div class="meta-item">
                        <i class="fas fa-calendar-alt"></i> 
                        <span>Year: 2025</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-rocket"></i> 
                        <span>Innovation Fellow</span>
                    </div>
                    <div class="meta-item">
                        <i class="fas fa-map-marker-alt"></i> 
                        <span>Calicut Hub</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Image area: showing the provided PNG (IH_ID_Card.png) -->
        <div class="image-container">
            <div class="card-image">
                <!-- IMPORTANT: The PNG file is loaded from the given filename "IH_ID_Card.png" 
                     Make sure the image file is present in the same directory as this HTML.
                     If you have a different path, update src accordingly. -->
                <img src="https://drive.google.com/file/d/1kQm1BE8F6ZXDQk-Alrj-5jv036hqx_vZ/view?usp=drive_link" alt="Regional Science Centre and Planetarium ID Card" onerror="this.onerror=null; this.src='https://placehold.co/600x400/1a4a5f/white?text=ID+Card+Preview'; this.alt='Fallback: ID Card image not found';">
            </div>
        </div>

        <!-- Footer with extra credentials matching the theme -->
        <div class="card-footer">
            <div class="org-name">
                <i class="fas fa-university"></i> Regional Science Centre & Planetarium, Calicut
            </div>
            <div class="qr-symbol">
                <i class="fas fa-fingerprint"></i> <span style="font-size: 0.7rem; font-family: monospace;">NCSM | INNOVATION</span>
            </div>
        </div>
    </div>
    <div class="hint-tip">
        <i class="fas fa-magic"></i> digital membership · powered by innovation hub
    </div>
</div>

<script>
    // Generate floating particle effect to enhance popup ambiance
    (function createParticles() {
        const container = document.getElementById('particles');
        if (!container) return;
        const particleCount = 35;
        for (let i = 0; i < particleCount; i++) {
            const particle = document.createElement('span');
            const size = Math.random() * 28 + 5;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = Math.random() * 12 + 8 + 's';
            particle.style.opacity = Math.random() * 0.4 + 0.1;
            particle.style.background = `radial-gradient(circle, rgba(255,215,130,0.5) 0%, rgba(255,180,80,0.2) 100%)`;
            container.appendChild(particle);
        }
    })();

    // Optional: Add a subtle micro-interaction: hover zoom for the image container (already via css)
    // Additional JS to ensure that if the image fails to load, we display a friendly text
    const idImg = document.querySelector('.card-image img');
    if (idImg) {
        idImg.addEventListener('error', function(e) {
            // fallback already set inline, but we can also log
            console.log("ID Card image not found. Ensure IH_ID_Card.png is in the same directory as this HTML file.");
            // we can add a dynamic badge if needed
            const container = document.querySelector('.image-container');
            if (container && !container.querySelector('.fallback-note')) {
                const note = document.createElement('div');
                note.className = 'fallback-note';
                note.style.marginTop = '12px';
                note.style.fontSize = '0.75rem';
                note.style.backgroundColor = '#ffeedd';
                note.style.padding = '6px 12px';
                note.style.borderRadius = '40px';
                note.style.color = '#b45f2b';
                note.innerHTML = '<i class="fas fa-image"></i> Please place "IH_ID_Card.png" in the same folder.';
                container.appendChild(note);
                setTimeout(() => {
                    if(note) note.style.opacity = '0.7';
                }, 200);
            }
        });
    }
</script>

<!-- Additional style to support fallback message gracefully -->
<style>
    .fallback-note {
        transition: opacity 0.2s;
        text-align: center;
        font-weight: 500;
    }
    .card-image img {
        transition: transform 0.2s ease, filter 0.2s;
    }
    .id-card {
        transition: all 0.2s;
    }
    /* micro-animation for the popup inner elements */
    .card-header, .image-container, .card-footer {
        animation: fadeSlideUp 0.5s ease backwards;
    }
    .card-header { animation-delay: 0.05s; }
    .image-container { animation-delay: 0.15s; }
    .card-footer { animation-delay: 0.25s; }

    @keyframes fadeSlideUp {
        from {
            opacity: 0;
            transform: translateY(12px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    /* ensure image container keeps ratio */
    .card-image img {
        max-width: 100%;
        height: auto;
        border-radius: 20px;
    }
</style>
</body>
</html>
