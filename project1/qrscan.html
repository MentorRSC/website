<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Scanner with Camera Switch</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 20px;
    }
    #reader {
      width: 300px;
      margin: auto;
    }
    select {
      margin: 10px;
      padding: 5px;
    }
    #resultModal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }
    #modalContent {
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>QR Code Scanner</h2>

<label>Select Camera:</label>
<select id="cameraSelect"></select>

<div id="reader"></div>

<!-- Modal -->
<div id="resultModal">
  <div id="modalContent">
    <h3>Scan Result</h3>
    <p id="qrResult"></p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
  let html5QrCode;
  let currentCameraId = null;

  function showModal(text) {
    document.getElementById("qrResult").innerText = text;
    document.getElementById("resultModal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("resultModal").style.display = "none";
  }

  function onScanSuccess(decodedText) {
    showModal(decodedText);
  }

  function startScanner(cameraId) {
    if (html5QrCode) {
      html5QrCode.stop().then(() => {
        html5QrCode.clear();
        initScanner(cameraId);
      });
    } else {
      initScanner(cameraId);
    }
  }

  function initScanner(cameraId) {
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      onScanSuccess
    );
    currentCameraId = cameraId;
  }

  function populateCameraList(devices) {
    const select = document.getElementById("cameraSelect");
    select.innerHTML = "";

    devices.forEach(device => {
      const option = document.createElement("option");
      option.value = device.id;
      option.text = device.label || `Camera ${select.length + 1}`;
      select.appendChild(option);
    });

    // Auto start first camera
    if (devices.length > 0) {
      startScanner(devices[0].id);
    }

    select.onchange = function () {
      startScanner(this.value);
    };
  }

  Html5Qrcode.getCameras().then(devices => {
    if (devices && devices.length) {
      populateCameraList(devices);
    } else {
      alert("No cameras found.");
    }
  }).catch(err => {
    alert("Camera permission denied or not available.");
  });
</script>

</body>
</html>
