<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Innovation Hub - Verification</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="app.js"></script>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  overflow: hidden;
}

/* Fullscreen camera */
#reader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

/* Header */
.header {
  position: fixed;
  top: 10px;
  width: 100%;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
  z-index: 2;
}

/* Toggle button */
.toggle-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #1e293b;
  border: none;
  color: white;
  padding: 12px 16px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  z-index: 2;
}

/* Flash */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
}

.green { background: rgba(0,255,100,0.4); }
.red { background: rgba(255,0,0,0.4); }

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.6);
  z-index: 5;
}

.popup-content {
  background: #1e293b;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  min-width: 250px;
}

.popup-content button {
  margin-top: 15px;
  padding: 8px 15px;
  border: none;
  border-radius: 8px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Innovation Hub - Verification</div>

<div id="reader"></div>

<button class="toggle-btn" onclick="toggleCamera()">🔄 Camera</button>

<div id="flash" class="flash"></div>

<!-- Popup -->
<div id="popup" class="popup">
  <div class="popup-content">
    <h3 id="popupText"></h3>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<script>
let rowsData = [];
let html5QrCode;
let currentCamera = "environment";
let popupTimer;
let scanningPaused = false;

/* Fetch data */
fetchSheetData().then(rows => rowsData = rows);

/* Start scanner */
function startScanner(cameraFacing) {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: cameraFacing },
    { fps: 10, qrbox: 250 },
    handleScan
  ).catch(err => console.error(err));
}

/* Toggle camera */
function toggleCamera() {
  html5QrCode.stop().then(() => {
    currentCamera = currentCamera === "environment" ? "user" : "environment";
    startScanner(currentCamera);
  });
}

/* Handle scan */
function handleScan(decodedText) {
  if (scanningPaused) return;
  scanningPaused = true;

  try {
    const url = new URL(decodedText);
    const memberId = url.searchParams.get("id");

    if (!memberId) throw "Invalid";

    const res = checkMember(rowsData, memberId);

    if (!res.found) {
      show("❌ Not Found", false);
    } else if (res.status === "Active") {
      show(res.name + " ✅ Active", true);
    } else {
      show(res.name + " ❌ Expired", false);
    }

  } catch {
    show("❌ Invalid QR", false);
  }

  setTimeout(() => {
    scanningPaused = false;
  }, 5000);
}

/* Popup */
function show(msg, success) {
  showPopup(msg);

  if (success) {
    flashScreen("green");
    speak("Member Verified");
  } else {
    flashScreen("red");

  }
}

function showPopup(message) {
  const popup = document.getElementById("popup");
  const text = document.getElementById("popupText");

  text.innerText = message;
  popup.style.display = "flex";

  clearTimeout(popupTimer);
  popupTimer = setTimeout(closePopup, 5000);
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

/* Flash effect */
function flashScreen(color) {
  const flash = document.getElementById("flash");
  flash.className = "flash " + color;
  flash.style.opacity = 1;

  setTimeout(() => {
    flash.style.opacity = 0;
  }, 300);
}

/* Voice */
function speak(text) {
  const speech = new SpeechSynthesisUtterance(text);
  speech.lang = "en-US";
  speechSynthesis.speak(speech);
}

/* Start with back camera */
startScanner(currentCamera);

/* PWA */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
