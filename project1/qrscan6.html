<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovation Hub | Where Ideas Become Reality</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/common.css">
   
</head>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Poppins', 'SF Pro Text', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050b);
      color: #f0f3fa;
      min-height: 100vh;
    }

    /* custom scroll */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b;
    }
    ::-webkit-scrollbar-thumb {
      background: #3b82f6;
      border-radius: 12px;
    }

    /* modern glass header/footer */
    .site-header {
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(59, 130, 246, 0.25);
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      box-shadow: 0 8px 20px rgba(59,130,246,0.3);
    }

    .brand {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(120deg, #fff, #a5f3fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .badge {
      background: rgba(59,130,246,0.2);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 0.8rem;
      font-weight: 500;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(59,130,246,0.4);
      color: #b9e2ff;
    }

    .site-footer {
      background: rgba(2, 6, 23, 0.7);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(59,130,246,0.2);
      text-align: center;
      padding: 20px 24px;
      font-size: 0.85rem;
      color: #94a3b8;
      letter-spacing: 0.3px;
    }

    .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 140px);
      padding: 2rem 1.5rem;
    }

    /* premium card – glassmorphism + dynamic glow */
    .card {
      background: rgba(17, 24, 39, 0.75);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 1100px;
      border: 1px solid rgba(59, 130, 246, 0.3);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(59,130,246,0.1) inset;
      transition: all 0.3s ease;
      animation: cardFloat 0.6s ease-out;
    }

    @keyframes cardFloat {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      font-size: 2.7rem;
      font-weight: 700;
      background: linear-gradient(145deg, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      letter-spacing: -0.5px;
      display: inline-block;
      border-left: 5px solid #3b82f6;
      padding-left: 24px;
    }

    .status {
      font-size: 3rem;
      font-weight: 800;
      margin: 25px 0 20px;
      text-align: center;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.3);
      transition: 0.2s;
    }

    .valid {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px rgba(34,197,94,0.4);
    }

    .invalid {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* info grid – modern layout */
    .info {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      margin-top: 30px;
      padding: 20px 0;
      border-radius: 32px;
      background: rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(4px);
    }

    .info-left {
      flex: 2;
      min-width: 220px;
      padding: 16px 28px;
    }

    .info-right {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .detail-card {
      background: rgba(255,255,255,0.03);
      border-radius: 28px;
      padding: 6px 0;
    }

    .label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      font-weight: 600;
      color: #7e8bae;
      margin-top: 18px;
    }

    .label:first-of-type {
      margin-top: 0;
    }

    .value {
      font-size: 1.7rem;
      font-weight: 600;
      background: linear-gradient(120deg, #f1f5f9, #cbd5e6);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      word-break: break-word;
      line-height: 1.3;
    }

    .member-badge {
      display: inline-block;
      background: rgba(59,130,246,0.2);
      border-radius: 60px;
      padding: 6px 18px;
      font-size: 0.9rem;
      font-weight: 500;
      border: 1px solid #3b82f650;
      margin-top: 12px;
    }

    #memberImage {
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 32px;
      box-shadow: 0 20px 35px -12px black;
      border: 3px solid rgba(59, 130, 246, 0.6);
      transition: transform 0.3s ease, box-shadow 0.3s;
      background: #0f172a;
    }

    #memberImage:hover {
      transform: scale(1.02);
      box-shadow: 0 25px 40px -12px #3b82f6;
    }

    /* shimmer & flash */
    .flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      z-index: 999;
    }

    .green {
      background: radial-gradient(circle at center, rgba(34,197,94,0.35), rgba(34,197,94,0.1));
      backdrop-filter: blur(2px);
    }

    .red {
      background: radial-gradient(circle at center, rgba(239,68,68,0.4), rgba(239,68,68,0.1));
    }

    /* loading spinner */
    .loader {
      width: 48px;
      height: 48px;
      border: 5px solid rgba(59,130,246,0.2);
      border-top: 5px solid #3b82f6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status-check {
      font-size: 1.3rem;
      color: #94a3b8;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* responsive */
    @media (max-width: 750px) {
      .card {
        padding: 1.8rem;
      }
      h1 {
        font-size: 1.9rem;
        padding-left: 16px;
      }
      .status {
        font-size: 2rem;
      }
      .value {
        font-size: 1.3rem;
      }
      .info {
        flex-direction: column;
      }
      #memberImage {
        width: 150px;
        height: 150px;
      }
      .site-header {
        flex-direction: column;
        text-align: center;
      }
    }

    /* subtle pulse for valid status */
    @keyframes softPulse {
      0% { text-shadow: 0 0 0px rgba(34,197,94,0);}
      100% { text-shadow: 0 0 12px rgba(34,197,94,0.5);}
    }
    .status.valid {
      animation: softPulse 1.2s infinite alternate;
    }

    button.retry-link {
      background: none;
      border: none;
      color: #3b82f6;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 20px;
      text-decoration: underline;
    }
  </style>
</head>
<body>

   <!-- Header Section -->
    <header>
        <div class="container header-container">
            <a href="index.html" class="logo">
                <i class="fas fa-lightbulb"></i>
                <h1>Innovation<span>Hub</span></h1>
            </a>
            <div class="mobile-menu">
                <i class="fas fa-bars"></i>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><i class="fa-solid fa-share-nodes"><a href="linktree.html"></i> Social Media</li>
                    <li><a href="https://rscpcalicut.org.in/"  class="active">Home</a></li>
                    <li><a href="resources.html">Resources</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="puzzles.html">Puzzles</a></li>
                    <li><a href="members.html">Members</a></li>
                    <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSc-Ph9MNjaGHah7bsieymDIJKiK5HP0YzsSS3-2YgadgU49og/viewform?usp=sharing&ouid=117126086225918702846" class="cta-button">Join Now</a></li>
                </ul>
            </nav>
        </div>
    </header>

<div class="wrapper">
  <div class="card">
    <div style="display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap;">
      <h1>✦ Member Verification</h1>
      <div class="badge" id="qrBadge">QR • secure link</div>
    </div>

    <div id="statusContainer">
      <div id="status" class="status">⟡ Checking credentials ⟡</div>
      <div id="loaderSpinner" class="loader"></div>
    </div>

    <div id="info" style="display: none;">
      <div class="info">
        <div class="info-left">
          <div class="detail-card">
            <div class="label">Full name</div>
            <div id="name" class="value">—</div>
            
            <div class="label">Member ID</div>
            <div id="memberId" class="value">—</div>
            
            <div class="label">Membership expiry</div>
            <div id="validity" class="value">—</div>
            <div id="validityNote" class="member-badge"></div>
          </div>
        </div>
        <div class="info-right">
          <img id="memberImage" alt="member portrait" />
        </div>
      </div>
    </div>
    <div id="notFoundMsg" style="text-align: center; padding: 20px; display: none;">
      <div style="font-size: 2rem; margin-bottom: 8px;">🔍</div>
      <div style="font-size: 1.3rem; font-weight: 500;">No membership data found</div>
      <div style="color: #9ca3af; margin-top: 8px;">Please verify the QR code or contact support.</div>
    </div>
  </div>
</div>

<div id="footer"></div>
<div id="flash" class="flash"></div>

<script>
  // ---------- CONFIG ----------
  const SHEET_URL = "https://docs.google.com/spreadsheets/d/1CLmhUxbgZrdlFAs_lLxYv1e6Gqikyo7MEUDSjUxnReM/gviz/tq";

  // DOM elements
  const statusEl = document.getElementById("status");
  const infoEl = document.getElementById("info");
  const notFoundDiv = document.getElementById("notFoundMsg");
  const loaderSpinner = document.getElementById("loaderSpinner");
  const nameEl = document.getElementById("name");
  const memberIdEl = document.getElementById("memberId");
  const validityEl = document.getElementById("validity");
  const memberImg = document.getElementById("memberImage");
  const validityNoteSpan = document.getElementById("validityNote");

  // get id from url
  const params = new URLSearchParams(window.location.search);
  const memberId = params.get("id");

  // helper speak with better voice handling
  function speak(text, priority = true) {
    if (!window.speechSynthesis) return;
    try {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = 0.95;
      utterance.pitch = 1.05;
      utterance.lang = 'en-US';
      utterance.volume = 0.9;
      window.speechSynthesis.cancel(); // avoid overlapping
      window.speechSynthesis.speak(utterance);
    } catch(e) { console.warn(e); }
  }

  // flash with extra class
  function flashScreen(colorType) {
    const flashDiv = document.getElementById("flash");
    flashDiv.className = "flash " + (colorType === 'green' ? 'green' : 'red');
    flashDiv.style.opacity = 1;
    setTimeout(() => {
      flashDiv.style.opacity = 0;
    }, 520);
  }

  // advanced expiry parser (supports "Month YYYY" like "January 2025", "Dec 2026")
  function parseExpiry(text) {
    if (!text || typeof text !== 'string') return null;
    const trimmed = text.trim();
    const parts = trimmed.split(/\s+/);
    if (parts.length < 2) return null;
    let monthName = parts[0].toLowerCase().replace(/[^a-z]/g, '');
    let yearStr = parts[1];
    let year = parseInt(yearStr, 10);
    if (isNaN(year)) return null;
    
    const monthsMap = {
      jan:0, january:0, feb:1, february:1, mar:2, march:2, apr:3, april:3,
      may:4, jun:5, june:5, jul:6, july:6, aug:7, august:7, sep:8, september:8,
      oct:9, october:9, nov:10, november:10, dec:11, december:11
    };
    let monthIdx = monthsMap[monthName];
    if (monthIdx === undefined) return null;
    // last day of month at 23:59:59 for inclusive check
    return new Date(year, monthIdx + 1, 0, 23, 59, 59);
  }

  // format date to readable style
  function formatExpiryReadable(expiryDate) {
    if (!expiryDate) return "";
    const options = { year: 'numeric', month: 'long' };
    return expiryDate.toLocaleDateString('en-US', options);
  }

  // load google sheet data and validate
  async function fetchAndValidate() {
    if (!memberId) {
      statusEl.innerText = "⛔ Invalid Access Link";
      statusEl.className = "status invalid";
      if(loaderSpinner) loaderSpinner.style.display = "none";
      flashScreen("red");
      speak("Invalid QR code");
      return;
    }

    try {
      const response = await fetch(SHEET_URL);
      const text = await response.text();
      // parse google viz response
      const jsonStart = text.indexOf('(');
      const jsonEnd = text.lastIndexOf(')');
      if (jsonStart === -1 || jsonEnd === -1) throw new Error("Invalid sheet response");
      const jsonStr = text.slice(jsonStart + 1, jsonEnd);
      const data = JSON.parse(jsonStr);
      const rows = data.table.rows;
      
      let foundMember = null;
      // iterate rows (skip header row 0)
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row.c) continue;
        // column index 8 => Member ID (9th column, zero-based)
        const idCell = row.c[8];
        const idValue = idCell ? idCell.v : null;
        if (idValue != null && String(idValue).trim() === String(memberId).trim()) {
          const name = row.c[3]?.v || "Member";
          const expiryRaw = row.c[7]?.v || "";
          const imageRaw = row.c[9]?.v || "";
          foundMember = { name, id: idValue, expiryRaw, imageRaw };
          break;
        }
      }

      if (!foundMember) {
        statusEl.innerText = "✘ Member Not Found";
        statusEl.className = "status invalid";
        if(loaderSpinner) loaderSpinner.style.display = "none";
        infoEl.style.display = "none";
        notFoundDiv.style.display = "block";
        flashScreen("red");
        speak("Member not found");
        return;
      }

      // member found -> display info
      notFoundDiv.style.display = "none";
      infoEl.style.display = "block";
      if(loaderSpinner) loaderSpinner.style.display = "none";

      const { name, id, expiryRaw, imageRaw } = foundMember;
      nameEl.innerText = name || "—";
      memberIdEl.innerText = id;
      validityEl.innerText = expiryRaw || "No expiry data";

      // handle image
      if (imageRaw && imageRaw.trim() !== "") {
        let imgUrl = imageRaw.trim();
        if (imgUrl.startsWith("http") || imgUrl.startsWith("//")) {
          memberImg.src = imgUrl;
        } else {
          memberImg.src = "https://placehold.co/400x400/1e293b/3b82f6?text=Member";
        }
        memberImg.style.display = "block";
        memberImg.onerror = () => {
          memberImg.src = "https://placehold.co/400x400/1e293b/9ca3af?text=no+image";
        };
      } else {
        memberImg.src = "https://placehold.co/400x400/1e293b/6b7280?text=Portrait";
        memberImg.style.display = "block";
      }

      const expiryDate = parseExpiry(expiryRaw);
      const now = new Date();

      if (!expiryDate) {
        statusEl.innerText = "⚠️ Data Corrupt";
        statusEl.className = "status invalid";
        validityNoteSpan.innerText = "Expiry format unrecognized";
        flashScreen("red");
        speak("Membership data error");
        return;
      }

      const isActive = now <= expiryDate;
      if (isActive) {
        statusEl.innerText = "✓ VALID MEMBER";
        statusEl.className = "status valid";
        const formattedExp = formatExpiryReadable(expiryDate);
        validityNoteSpan.innerHTML = `✅ Active until ${formattedExp}`;
        flashScreen("green");
        speak(`Welcome ${name}. Member verified.`);
      } else {
        statusEl.innerText = "⨀ MEMBERSHIP EXPIRED";
        statusEl.className = "status invalid";
        const expiredDateStr = formatExpiryReadable(expiryDate);
        validityNoteSpan.innerHTML = `⚠️ Expired on ${expiredDateStr} · Renewal required`;
        flashScreen("red");
        speak(`Membership expired. Please renew.`);
      }

    } catch (err) {
      console.error(err);
      statusEl.innerText = "⛔ Connection Error";
      statusEl.className = "status invalid";
      if(loaderSpinner) loaderSpinner.style.display = "none";
      infoEl.style.display = "none";
      notFoundDiv.style.display = "block";
      notFoundDiv.innerHTML = `<div style="font-size:1.5rem;">⚠️ Server unreachable</div><div style="margin-top:8px;">Check network or refresh</div>`;
      flashScreen("red");
      speak("System error loading data");
    }
  }

  // load header & footer from external? but we can build inline dynamic elegant version.
  // For robust professional look, we create header/footer programmatically if fetch fails, but we build static fallback.
  async function loadLayout() {
    const headerDiv = document.getElementById("header");
    const footerDiv = document.getElementById("footer");
    // We'll create premium header/footer inline (since external file might 404, but we can provide a beautiful fallback)
    // Let's design consistent high-end UI without external dependency to guarantee beauty.
    // but we still try to fetch header_footer.html if exists? but original spec had it. We'll implement graceful.
    try {
      const res = await fetch("header_footer.html");
      if (res.ok) {
        const html = await res.text();
        const temp = document.createElement("div");
        temp.innerHTML = html;
        const headerEl = temp.querySelector("header");
        const footerEl = temp.querySelector("footer");
        if (headerEl) headerDiv.appendChild(headerEl.cloneNode(true));
        if (footerEl) footerDiv.appendChild(footerEl.cloneNode(true));
        else injectDefaultUI(headerDiv, footerDiv);
      } else {
        injectDefaultUI(headerDiv, footerDiv);
      }
    } catch(e) {
      injectDefaultUI(headerDiv, footerDiv);
    }
  }

  function injectDefaultUI(headerDiv, footerDiv) {
    // premium static header if external missing
    headerDiv.innerHTML = `
      <div class="site-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div class="logo-area">
          <div class="logo-icon">◈</div>
          <span class="brand">Veritas Access</span>
        </div>
        <div class="badge">secure • live validation</div>
      </div>
    `;
    footerDiv.innerHTML = `
      <div class="site-footer">
        <span>© 2025 Elite Member Gateway — Encrypted Validation</span>
        <span style="margin-left: 1rem;">⚡ real-time sheet sync</span>
      </div>
    `;
    // restyle header/footer to match existing classes already defined in CSS
    const existingHeader = headerDiv.querySelector('.site-header');
    if(existingHeader) existingHeader.style.cssText = 'background: rgba(15,23,42,0.8); backdrop-filter: blur(16px); border-bottom: 1px solid #3b82f640; padding: 16px 32px;';
  }

  // init loader
  function init() {
    if (!memberId) {
      statusEl.innerText = "🔒 Invalid QR Code";
      statusEl.className = "status invalid";
      if(loaderSpinner) loaderSpinner.style.display = "none";
      infoEl.style.display = "none";
      notFoundDiv.style.display = "block";
      notFoundDiv.innerHTML = `<div style="font-size: 2rem;">📷</div><div>Missing member ID in URL</div><div style="font-size: 0.9rem; margin-top: 12px;">Please scan a valid QR code</div>`;
      flashScreen("red");
      speak("Invalid QR code");
      return;
    }
    // start fetch
    fetchAndValidate();
  }

  loadLayout().then(() => {
    init();
  }).catch(() => {
    init();
  });
  
  // optional: reload safety if needed - auto retry? but fine.
  // also if member image load error handled.
  window.addEventListener('load', () => {
    // preload any extra animation
    if(memberId && !document.querySelector("#info[style*='display: block']")) {
      // still loading
    }
  });
</script>
</body>
