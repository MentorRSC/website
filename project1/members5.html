<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card Popup</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f0f2f5;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Popup Animation */
.popup {
  animation: fadeInScale 0.5s ease forwards;
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.7);
  }
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* Card Container */
.card {
  width: 320px;
  height: 520px;
  position: relative;
  background: url('/mnt/data/IH_ID_Card.png') no-repeat center/cover;
  border-radius: 15px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  overflow: hidden;
}

/* Text ABOVE image box */
.info {
  position: absolute;
  top: 30%;
  width: 100%;
  text-align: center;
  color: #000;
}

.name {
  font-size: 18px;
  font-weight: bold;
}

.id {
  font-size: 14px;
  margin-top: 4px;
}

.year {
  font-size: 13px;
  margin-top: 2px;
  color: #333;
}

/* Photo box */
.photo-box {
  position: absolute;
  width: 52%;
  height: 28%;
  top: 38%;
  left: 50%;
  transform: translateX(-50%);
  border: 4px solid #3FA9F5;
  border-radius: 20px;
  overflow: hidden;
  background: #fff;
}

.photo-box img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

</style>
</head>

<body>

<div class="popup">
  <div class="card">

    <!-- TEXT ABOVE IMAGE -->
    <div class="info">
      <div class="name">John Doe</div>
      <div class="id">ID: RSC-2026-001</div>
      <div class="year">Valid: 2026</div>
    </div>

    <!-- IMAGE BOX -->
    <div class="photo-box">
      <img src="https://lh3.googleusercontent.com/d/1Dhs3kyTugFw49mQK_5Huc-T4_qmngDaS" alt="Profile">
    </div>

  </div>
</div>

</body>
</html>
