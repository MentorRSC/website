<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MediaPipe Hands · Fullscreen Modes</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- MediaPipe dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
        }

        /* Camera feed – full screen */
        #camera-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #0a0a0a;
            z-index: 1;
            transform: scaleX(-1); /* mirror for natural selfie view */
        }

        /* Canvas for MediaPipe skeleton overlay */
        #skeleton-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;  /* allow clicks to pass to buttons */
            transform: scaleX(-1); /* mirror to match camera */
        }

        /* ----- SETTINGS BUTTON (top right) ----- */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(10, 10, 20, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 48px;
            padding: 12px 22px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f0f0f0;
            font-weight: 500;
            font-size: 0.95rem;
            box-shadow: 0 8px 28px rgba(0,0,0,0.7);
            cursor: pointer;
            transition: 0.25s ease;
        }
        .settings-btn i { color: #ffd966; font-size: 1.2rem; }
        .settings-btn:hover {
            background: rgba(40, 40, 60, 0.95);
            border-color: rgba(255,215,0,0.5);
            transform: scale(1.02);
        }
        .settings-btn span { letter-spacing: 0.3px; }

        /* ---- DROPDOWN (settings menu) ---- */
        .settings-dropdown {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 20;
            background: rgba(8, 8, 18, 0.94);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 10px 6px;
            min-width: 200px;
            box-shadow: 0 20px 56px rgba(0,0,0,0.85);
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            flex-direction: column;
            gap: 2px;
            transform-origin: top right;
        }
        .settings-dropdown.open { display: flex; }
        .dropdown-item {
            background: transparent;
            border: none;
            padding: 12px 20px;
            border-radius: 16px;
            color: #dce2ec;
            font-size: 0.95rem;
            font-weight: 450;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            border-left: 3px solid transparent;
        }
        .dropdown-item i { width: 22px; color: #9aa8b9; font-size: 1.1rem; }
        .dropdown-item:hover {
            background: rgba(255, 215, 0, 0.06);
            border-left-color: #ffd966;
            color: #fff;
        }
        .dropdown-item.active {
            background: rgba(255, 215, 0, 0.10);
            border-left-color: #ffd966;
            color: #ffea9e;
        }
        .dropdown-divider {
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin: 4px 12px;
        }

        /* permission overlay */
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .permission-overlay.hidden { display: none; }
        .permission-box {
            background: rgba(20, 20, 38, 0.7);
            backdrop-filter: blur(4px);
            padding: 2.4rem 2.8rem;
            border-radius: 48px;
            border: 1px solid rgba(255,215,0,0.12);
            max-width: 380px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.6);
        }
        .permission-box i { font-size: 3.6rem; color: #ffd966; margin-bottom: 16px; }
        .permission-box h2 { font-weight: 400; font-size: 1.6rem; margin-bottom: 10px; }
        .permission-box p { opacity: 0.7; margin-bottom: 28px; font-size: 0.95rem; }
        .btn-primary {
            background: #ffd966;
            border: none;
            color: #12121c;
            font-weight: 600;
            padding: 14px 38px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2);
        }
        .btn-primary:hover { background: #ffe088; transform: scale(1.02); }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: #ccc;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,215,0,0.25); }
        .status-badge {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            padding: 8px 24px;
            border-radius: 40px;
            color: #d0d8e6;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            opacity: 0.8;
            letter-spacing: 0.3px;
        }
        @media (max-width: 480px) {
            .settings-btn span { display: none; }
            .settings-btn { padding: 12px 16px; }
            .settings-dropdown { min-width: 170px; right: 10px; top: 72px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">

        <!-- Camera feed (full screen) mirrored -->
        <video id="camera-view" autoplay playsinline muted></video>

        <!-- Skeleton canvas (mirrored) -->
        <canvas id="skeleton-canvas"></canvas>

        <!-- Settings button -->
        <button class="settings-btn" id="settingsToggle">
            <i class="fas fa-sliders-h"></i>
            <span>Settings</span>
        </button>

        <!-- Dropdown -->
        <div class="settings-dropdown" id="settingsDropdown">
            <button class="dropdown-item" data-mode="camera"><i class="fas fa-video"></i> Camera view</button>
            <button class="dropdown-item" data-mode="skeleton"><i class="fas fa-robot"></i> Skeleton view</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" data-mode="hybrid"><i class="fas fa-layer-group"></i> Hybrid mode</button>
        </div>

        <!-- Permission overlay -->
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-box">
                <i class="fas fa-camera-retro"></i>
                <h2>Camera & Hand Detection</h2>
                <p>Enable camera to detect hands and show skeleton with MediaPipe.</p>
                <button class="btn-primary" id="requestPermissionBtn">
                    <i class="fas fa-check-circle" style="margin-right: 10px;"></i> Enable camera
                </button>
                <button class="btn-secondary" id="openSettingsBtn">
                    <i class="fas fa-cog" style="margin-right: 8px;"></i> Open settings
                </button>
                <div style="margin-top: 16px; font-size: 0.75rem; opacity: 0.35;">multi‑hand detection active</div>
            </div>
        </div>

        <!-- status -->
        <div class="status-badge" id="modeStatus">⚙️ camera view</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- DOM refs ----------
            const video = document.getElementById('camera-view');
            const canvas = document.getElementById('skeleton-canvas');
            const ctx = canvas.getContext('2d');
            const permissionOverlay = document.getElementById('permissionOverlay');
            const requestBtn = document.getElementById('requestPermissionBtn');
            const openSettingsBtn = document.getElementById('openSettingsBtn');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsDropdown = document.getElementById('settingsDropdown');
            const modeStatus = document.getElementById('modeStatus');

            // state
            let currentMode = 'camera';   // 'camera' , 'skeleton' , 'hybrid'
            let cameraActive = false;
            let cameraStream = null;
            let animationFrame = null;
            let handsDetected = [];        // store latest hand landmarks

            // ---------- canvas sizing ----------
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ---------- MediaPipe Hands setup ----------
            const hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 4,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.6
            });

            // onResults: store landmarks
            hands.onResults((results) => {
                handsDetected = results.multiHandLandmarks || [];
            });

            // camera utility from MediaPipe
            function initCamera() {
                if (!video) return;
                const camera = new Camera(video, {
                    onFrame: async () => {
                        await hands.send({ image: video });
                    },
                    width: 640,
                    height: 480
                });
                camera.start();
            }

            // ---------- draw skeleton with MediaPipe landmarks ----------
            function drawSkeletonOnCanvas() {
                // clear canvas
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // In SKELETON mode: fill with black background
                if (currentMode === 'skeleton') {
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }

                // If no hands detected, show placeholder
                if (!handsDetected || handsDetected.length === 0) {
                    if (currentMode === 'skeleton' || currentMode === 'hybrid') {
                        ctx.font = `20px 'Segoe UI', sans-serif`;
                        ctx.fillStyle = 'rgba(180, 200, 230, 0.5)';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('✋ show your hands', canvas.width/2, canvas.height/2 - 12);
                        ctx.font = `14px 'Segoe UI', sans-serif`;
                        ctx.fillStyle = 'rgba(150, 170, 200, 0.3)';
                        ctx.fillText('multi-hand supported', canvas.width/2, canvas.height/2 + 30);
                    }
                    return;
                }

                // draw each hand
                for (let handIdx = 0; handIdx < handsDetected.length; handIdx++) {
                    const landmarks = handsDetected[handIdx];
                    if (!landmarks || landmarks.length === 0) continue;

                    // scale coordinates to canvas (mirrored already by canvas transform)
                    const pts = landmarks.map(lm => ({
                        x: lm.x * canvas.width,
                        y: lm.y * canvas.height
                    }));

                    // choose color per hand
                    const hue = (handIdx * 40 + 200) % 360;
                    const color = `hsl(${hue}, 85%, 60%)`;
                    const colorDim = `hsl(${hue}, 70%, 40%)`;
                    const glowColor = `hsla(${hue}, 90%, 65%, 0.2)`;

                    // MediaPipe hand connections
                    const connections = [
                        [0,1],[1,2],[2,3],[3,4],         // thumb
                        [0,5],[5,6],[6,7],[7,8],         // index
                        [0,9],[9,10],[10,11],[11,12],    // middle
                        [0,13],[13,14],[14,15],[15,16],  // ring
                        [0,17],[17,18],[18,19],[19,20],  // pinky
                        [5,9],[9,13],[13,17]              // palm
                    ];

                    // glow effect for skeleton
                    ctx.shadowColor = glowColor;
                    ctx.shadowBlur = 20;
                    ctx.lineWidth = 4;
                    ctx.lineCap = 'round';
                    ctx.lineJoin = 'round';

                    // draw connections
                    for (let [i, j] of connections) {
                        if (i < pts.length && j < pts.length) {
                            ctx.beginPath();
                            ctx.moveTo(pts[i].x, pts[i].y);
                            ctx.lineTo(pts[j].x, pts[j].y);
                            ctx.strokeStyle = color;
                            ctx.stroke();
                        }
                    }

                    // draw keypoints (fingers & joints)
                    ctx.shadowBlur = 15;
                    for (let k = 0; k < pts.length; k++) {
                        const p = pts[k];
                        // bigger for fingertips (4,8,12,16,20)
                        const isFingertip = (k === 4 || k === 8 || k === 12 || k === 16 || k === 20);
                        const radius = isFingertip ? 8 : 5;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, radius, 0, 2 * Math.PI);
                        ctx.fillStyle = isFingertip ? '#ffdb7c' : colorDim;
                        ctx.fill();
                        ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                    }

                    // add small hand index label
                    ctx.shadowBlur = 0;
                    ctx.font = `13px 'Segoe UI', sans-serif`;
                    ctx.fillStyle = 'rgba(255,255,240,0.5)';
                    ctx.textAlign = 'center';
                    ctx.fillText(`hand ${handIdx+1}`, pts[0].x, pts[0].y - 28);
                }
            }

            // ---------- render loop ----------
            function renderFrame() {
                // In SKELETON mode: we want fullscreen blank (black) with skeleton
                // In HYBRID: camera behind + skeleton on top (transparent bg)
                // In CAMERA: just clear canvas so camera shows through
                
                if (currentMode === 'camera') {
                    // clear canvas -> camera visible fullscreen
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                } else {
                    // skeleton or hybrid: draw skeleton (hybrid: transparent bg, skeleton: black bg)
                    drawSkeletonOnCanvas();
                }

                animationFrame = requestAnimationFrame(renderFrame);
            }

            // ---------- start camera + mediapipe ----------
            async function startCameraAndHands() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                        audio: false
                    });
                    video.srcObject = stream;
                    cameraStream = stream;
                    cameraActive = true;
                    await video.play();
                    
                    // init MediaPipe camera utils
                    initCamera();

                    permissionOverlay.classList.add('hidden');
                    // start render loop
                    if (!animationFrame) {
                        renderFrame();
                    }
                } catch (err) {
                    console.warn('Camera error:', err);
                    permissionOverlay.classList.remove('hidden');
                    requestBtn.innerHTML = '<i class="fas fa-exclamation-triangle" style="margin-right:10px;"></i> Retry';
                    cameraActive = false;
                }
            }

            // ---------- permission request ----------
            function requestPermission() {
                startCameraAndHands();
            }

            // ---------- set mode ----------
            function setMode(mode) {
                currentMode = mode;
                const modeNames = {
                    camera: '📷 camera view',
                    skeleton: '🦴 skeleton view',
                    hybrid: '🌀 hybrid mode'
                };
                modeStatus.textContent = modeNames[mode] || 'camera view';

                document.querySelectorAll('.dropdown-item').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.mode === mode) btn.classList.add('active');
                });
                settingsDropdown.classList.remove('open');

                // if mode is camera or hybrid and camera not active, request camera
                if ((mode === 'camera' || mode === 'hybrid') && !cameraActive) {
                    requestPermission();
                }
                // if skeleton mode, ensure render loop is running
                if (!animationFrame) {
                    renderFrame();
                }
            }

            // ---------- event listeners ----------
            requestBtn.addEventListener('click', requestPermission);
            openSettingsBtn.addEventListener('click', function() {
                settingsDropdown.classList.toggle('open');
                permissionOverlay.classList.add('hidden');
                if (!cameraActive) {
                    // start render loop for skeleton mock
                    if (!animationFrame) renderFrame();
                    setMode('skeleton');
                }
            });

            settingsToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                settingsDropdown.classList.toggle('open');
            });

            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    const mode = this.dataset.mode;
                    if (mode) {
                        setMode(mode);
                        if ((mode === 'camera' || mode === 'hybrid') && !cameraActive) {
                            requestPermission();
                        }
                        if (mode === 'skeleton' && !cameraActive) {
                            if (!animationFrame) renderFrame();
                        }
                    }
                });
            });

            document.addEventListener('click', function(e) {
                if (!settingsDropdown.contains(e.target) && e.target !== settingsToggle) {
                    settingsDropdown.classList.remove('open');
                }
            });

            // resize canvas on window resize
            window.addEventListener('resize', resizeCanvas);

            // clean up
            window.addEventListener('beforeunload', function() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }
                if (animationFrame) cancelAnimationFrame(animationFrame);
            });

            // ---------- init: show permission overlay ----------
            permissionOverlay.classList.remove('hidden');
            // start with skeleton mock mode (but no camera yet)
            setMode('skeleton');
            // start render loop
            renderFrame();

        })();
    </script>
</body>
</html>
