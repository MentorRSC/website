<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Skeleton + Camera View</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b0b;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #1a1a1a;
            overflow: hidden;
        }

        /* Camera feed – full screen */
        #camera-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #222;
            z-index: 1;
        }

        /* Canvas for skeleton overlay (hybrid) */
        #skeleton-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;  /* allow clicks to pass to buttons */
        }

        /* ----- SETTINGS BUTTON (top right) ----- */
        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            background: rgba(20, 20, 30, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 48px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #f0f0f0;
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: 0.25s ease;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .settings-btn i {
            font-size: 1.2rem;
            color: #ffd966;
        }
        .settings-btn:hover {
            background: rgba(40, 40, 60, 0.9);
            border-color: rgba(255,215,0,0.5);
            transform: scale(1.02);
        }

        /* ---- DROPDOWN (settings menu) ---- */
        .settings-dropdown {
            position: absolute;
            top: 80px;
            right: 20px;
            z-index: 20;
            background: rgba(16, 16, 24, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 12px 6px;
            min-width: 200px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.08);
            display: none;
            flex-direction: column;
            gap: 4px;
            transform-origin: top right;
            transition: 0.2s ease;
        }
        .settings-dropdown.open {
            display: flex;
        }
        .dropdown-item {
            background: transparent;
            border: none;
            padding: 12px 20px;
            border-radius: 16px;
            color: #eaeef5;
            font-size: 0.95rem;
            font-weight: 450;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            letter-spacing: 0.2px;
            border-left: 3px solid transparent;
        }
        .dropdown-item i {
            width: 22px;
            color: #aab;
            font-size: 1.1rem;
        }
        .dropdown-item:hover {
            background: rgba(255, 215, 0, 0.08);
            border-left-color: #ffd966;
            color: #fff;
        }
        .dropdown-item.active {
            background: rgba(255, 215, 0, 0.12);
            border-left-color: #ffd966;
            color: #ffea9e;
        }
        .dropdown-divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 4px 12px;
        }

        /* permission overlay */
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 8, 16, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .permission-overlay.hidden {
            display: none;
        }
        .permission-box {
            background: rgba(30, 30, 44, 0.7);
            backdrop-filter: blur(4px);
            padding: 2.4rem 2.8rem;
            border-radius: 48px;
            border: 1px solid rgba(255,215,0,0.15);
            max-width: 380px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .permission-box i {
            font-size: 3.6rem;
            color: #ffd966;
            margin-bottom: 16px;
        }
        .permission-box h2 {
            font-weight: 400;
            font-size: 1.6rem;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }
        .permission-box p {
            opacity: 0.7;
            margin-bottom: 28px;
            font-size: 0.95rem;
        }
        .btn-primary {
            background: #ffd966;
            border: none;
            color: #12121c;
            font-weight: 600;
            padding: 14px 38px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 16px rgba(255, 215, 0, 0.2);
        }
        .btn-primary:hover {
            background: #ffe088;
            transform: scale(1.02);
            box-shadow: 0 8px 24px rgba(255, 215, 0, 0.3);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: #ccc;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.05);
            border-color: rgba(255,215,0,0.3);
        }
        .status-badge {
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 40px;
            color: #ddd;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.06);
            pointer-events: none;
            opacity: 0.6;
        }

        /* responsiveness */
        @media (max-width: 480px) {
            .settings-btn span { display: none; }
            .settings-btn { padding: 12px 16px; }
            .settings-dropdown { min-width: 170px; right: 10px; top: 72px; }
        }
    </style>
</head>
<body>
    <div class="app-container" id="app">

        <!-- Camera feed (full screen) -->
        <video id="camera-view" autoplay playsinline muted></video>

        <!-- Skeleton canvas overlay -->
        <canvas id="skeleton-canvas"></canvas>

        <!-- Settings button (top right) -->
        <button class="settings-btn" id="settingsToggle">
            <i class="fas fa-sliders-h"></i>
            <span>Settings</span>
        </button>

        <!-- Dropdown menu -->
        <div class="settings-dropdown" id="settingsDropdown">
            <button class="dropdown-item" data-mode="camera"><i class="fas fa-video"></i> Camera view</button>
            <button class="dropdown-item" data-mode="skeleton"><i class="fas fa-robot"></i> Skeleton view</button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item" data-mode="hybrid"><i class="fas fa-layer-group"></i> Hybrid mode</button>
        </div>

        <!-- Permission overlay (shown first) -->
        <div class="permission-overlay" id="permissionOverlay">
            <div class="permission-box">
                <i class="fas fa-camera-retro"></i>
                <h2>Camera access</h2>
                <p>This app uses your camera to show a live view with an optional hand skeleton overlay.</p>
                <button class="btn-primary" id="requestPermissionBtn">
                    <i class="fas fa-check-circle" style="margin-right: 10px;"></i> Enable camera
                </button>
                <button class="btn-secondary" id="openSettingsBtn">
                    <i class="fas fa-cog" style="margin-right: 8px;"></i> Open settings
                </button>
                <div style="margin-top: 16px; font-size: 0.75rem; opacity: 0.4;">you can change mode anytime</div>
            </div>
        </div>

        <!-- small status -->
        <div class="status-badge" id="modeStatus">⚙️ camera view</div>
    </div>

    <script>
        (function() {
            "use strict";

            // ---------- DOM refs ----------
            const video = document.getElementById('camera-view');
            const canvas = document.getElementById('skeleton-canvas');
            const ctx = canvas.getContext('2d');
            const permissionOverlay = document.getElementById('permissionOverlay');
            const requestBtn = document.getElementById('requestPermissionBtn');
            const openSettingsBtn = document.getElementById('openSettingsBtn');
            const settingsToggle = document.getElementById('settingsToggle');
            const settingsDropdown = document.getElementById('settingsDropdown');
            const modeStatus = document.getElementById('modeStatus');

            // mode state
            let currentMode = 'camera';   // 'camera' , 'skeleton' , 'hybrid'
            let cameraActive = false;
            let cameraStream = null;
            let animationFrame = null;

            // ---------- canvas sizing ----------
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // ---------- draw skeleton (hand & finger) ----------
            // draws a stylized skeleton hand + forearm (mock)
            function drawSkeleton() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // if skeleton or hybrid, draw; else skip (camera mode)
                if (currentMode === 'camera') return;

                const w = canvas.width;
                const h = canvas.height;

                // Map hand to roughly center-right (like a hand in view)
                const baseX = w * 0.6;
                const baseY = h * 0.55;
                const scale = Math.min(w, h) / 480;

                // ----- draw arm (forearm) -----
                ctx.beginPath();
                ctx.moveTo(baseX - 60 * scale, baseY + 120 * scale);
                ctx.lineTo(baseX - 20 * scale, baseY + 40 * scale);
                ctx.strokeStyle = '#7fc9ff';
                ctx.lineWidth = 12 * scale;
                ctx.shadowColor = 'rgba(100, 200, 255, 0.3)';
                ctx.shadowBlur = 14;
                ctx.stroke();

                // ----- hand palm (skeleton) -----
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.ellipse(baseX, baseY, 40 * scale, 50 * scale, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(80, 180, 255, 0.20)';
                ctx.fill();
                ctx.strokeStyle = '#7fc9ff';
                ctx.lineWidth = 3 * scale;
                ctx.stroke();

                // --- fingers (skeleton lines) ---
                const fingers = [
                    { angle: -0.45, len: 80, label: 'thumb' },
                    { angle: -0.15, len: 90, label: 'index' },
                    { angle: 0.05, len: 85, label: 'middle' },
                    { angle: 0.25, len: 80, label: 'ring' },
                    { angle: 0.45, len: 70, label: 'pinky' }
                ];

                ctx.shadowBlur = 8;
                ctx.lineWidth = 4 * scale;
                ctx.strokeStyle = '#6bc3ff';

                fingers.forEach((f, idx) => {
                    const angle = f.angle + (idx * 0.02);
                    const endX = baseX + Math.sin(angle) * f.len * scale;
                    const endY = baseY - Math.cos(angle) * f.len * scale;

                    // draw finger bone (proximal)
                    ctx.beginPath();
                    ctx.moveTo(baseX, baseY);
                    const midX = baseX + Math.sin(angle) * (f.len * 0.55) * scale;
                    const midY = baseY - Math.cos(angle) * (f.len * 0.55) * scale;
                    ctx.lineTo(midX, midY);
                    ctx.stroke();

                    // distal (tip)
                    ctx.beginPath();
                    ctx.moveTo(midX, midY);
                    ctx.lineTo(endX, endY);
                    ctx.strokeStyle = '#4fa8ff';
                    ctx.stroke();

                    // small joint circles
                    ctx.beginPath();
                    ctx.arc(midX, midY, 5 * scale, 0, 2 * Math.PI);
                    ctx.fillStyle = '#b0daff';
                    ctx.shadowBlur = 10;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(endX, endY, 4 * scale, 0, 2 * Math.PI);
                    ctx.fillStyle = '#7fc9ff';
                    ctx.fill();
                });

                // wrist joint
                ctx.beginPath();
                ctx.arc(baseX - 10 * scale, baseY + 18 * scale, 8 * scale, 0, 2 * Math.PI);
                ctx.fillStyle = '#5aa9dd';
                ctx.shadowBlur = 12;
                ctx.fill();

                // add some 'finger dots' 
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#cce8ff';
                for (let i = 0; i < 5; i++) {
                    const a = -0.35 + i * 0.2;
                    const dx = baseX + Math.sin(a) * 60 * scale;
                    const dy = baseY - Math.cos(a) * 65 * scale;
                    ctx.beginPath();
                    ctx.arc(dx, dy, 3 * scale, 0, 2 * Math.PI);
                    ctx.fill();
                }

                // label
                ctx.shadowBlur = 0;
                ctx.font = `${14 * scale}px 'Segoe UI', sans-serif`;
                ctx.fillStyle = 'rgba(200, 230, 255, 0.7)';
                ctx.fillText('✋ skeleton hand', baseX - 40 * scale, baseY + 90 * scale);
            }

            // ---------- render loop (hybrid/camera/skeleton) ----------
            function renderFrame() {
                if (!cameraActive) {
                    // if camera not active, still draw skeleton if needed
                    if (currentMode === 'skeleton' || currentMode === 'hybrid') {
                        drawSkeleton();
                    } else {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                    animationFrame = requestAnimationFrame(renderFrame);
                    return;
                }

                // camera is active: draw skeleton overlay if hybrid or skeleton only
                if (currentMode === 'hybrid') {
                    // draw skeleton on top of camera (camera is background)
                    drawSkeleton();
                } else if (currentMode === 'skeleton') {
                    // camera feed still visible? we want full skeleton view (hide camera)
                    // we set video opacity 0? but we want full skeleton: we keep video but overlay skeleton
                    // we make skeleton dominant: we draw full skeleton but we also show camera blurred? 
                    // For skeleton mode we want to hide camera feed - but we keep it for simplicity
                    // we set video to be visible but we draw skeleton fully opaque, so it's 'skeleton view'
                    // we could also clear canvas and draw skeleton only.
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    drawSkeleton(); 
                } else {
                    // camera mode: clear skeleton canvas
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                }

                animationFrame = requestAnimationFrame(renderFrame);
            }

            // ---------- apply mode ----------
            function setMode(mode) {
                currentMode = mode;
                // update status badge
                const modeNames = {
                    camera: '📷 camera view',
                    skeleton: '🦴 skeleton view',
                    hybrid: '🌀 hybrid mode'
                };
                modeStatus.textContent = modeNames[mode] || 'camera view';

                // update active class in dropdown
                document.querySelectorAll('.dropdown-item').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.mode === mode) btn.classList.add('active');
                });

                // close dropdown
                settingsDropdown.classList.remove('open');

                // if mode is skeleton, we might want to show skeleton instantly
                // render loop will handle it
            }

            // ---------- camera start ----------
            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
                        audio: false 
                    });
                    video.srcObject = stream;
                    cameraStream = stream;
                    cameraActive = true;
                    await video.play();
                    // hide permission overlay
                    permissionOverlay.classList.add('hidden');
                    // start render loop if not started
                    if (!animationFrame) {
                        renderFrame();
                    }
                } catch (err) {
                    console.warn('Camera permission denied or error:', err);
                    // show permission overlay again with hint
                    permissionOverlay.classList.remove('hidden');
                    // change button text
                    requestBtn.innerHTML = '<i class="fas fa-exclamation-triangle" style="margin-right:10px;"></i> Retry';
                    cameraActive = false;
                }
            }

            // ---------- permission request ----------
            function requestPermission() {
                startCamera();
            }

            // ---------- open settings (fallback) ----------
            function openSettings() {
                // just toggle dropdown, simulate settings
                settingsDropdown.classList.toggle('open');
            }

            // ---------- event listeners ----------
            requestBtn.addEventListener('click', requestPermission);
            openSettingsBtn.addEventListener('click', function() {
                // if permission denied, we can open settings 
                // but we also show dropdown as "settings"
                settingsDropdown.classList.toggle('open');
                permissionOverlay.classList.add('hidden'); // hide overlay
                // if no camera active, we just show skeleton mock
                if (!cameraActive) {
                    // start render loop for skeleton view even without camera
                    if (!animationFrame) {
                        renderFrame();
                    }
                    // set mode skeleton as default when no camera
                    setMode('skeleton');
                }
            });

            // settings toggle button
            settingsToggle.addEventListener('click', function(e) {
                e.stopPropagation();
                settingsDropdown.classList.toggle('open');
            });

            // dropdown item clicks
            document.querySelectorAll('.dropdown-item').forEach(item => {
                item.addEventListener('click', function(e) {
                    const mode = this.dataset.mode;
                    if (mode) {
                        setMode(mode);
                        // if camera not active and mode is camera, try to request camera
                        if (mode === 'camera' && !cameraActive) {
                            requestPermission();
                        } else if (mode === 'skeleton' && !cameraActive) {
                            // start render if not started
                            if (!animationFrame) renderFrame();
                        } else if (mode === 'hybrid' && !cameraActive) {
                            // hybrid needs camera + skeleton; request camera
                            requestPermission();
                            // but we also show skeleton mock if camera fails
                            if (!animationFrame) renderFrame();
                        }
                    }
                });
            });

            // close dropdown on outside click
            document.addEventListener('click', function(e) {
                if (!settingsDropdown.contains(e.target) && e.target !== settingsToggle) {
                    settingsDropdown.classList.remove('open');
                }
            });

            // ---------- init: show permission overlay ----------
            permissionOverlay.classList.remove('hidden');
            // start render loop (background) so skeleton can show even without camera
            renderFrame();

            // if we have no camera, but user clicks "open settings" we can show skeleton
            // auto set skeleton as default mock
            setMode('skeleton');

            // handle window resize for canvas
            window.addEventListener('resize', () => {
                resizeCanvas();
            });

            // stop stream on page unload
            window.addEventListener('beforeunload', function() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                }
                if (animationFrame) cancelAnimationFrame(animationFrame);
            });

        })();
    </script>
</body>
</html>
