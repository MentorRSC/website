<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🧩 Pinch Puzzle · 9 pieces</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            touch-action: none;
            overflow: hidden;
            width: 100%;
            height: 100vh;
            position: relative;
        }
        #app {
            width: 100%;
            height: 100%;
            max-width: 500px;
            max-height: 900px;
            position: relative;
            background: #141a24;
            border-radius: 0;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            margin: 0 auto;
        }
        /* FULLSCREEN CAMERA VIEW */
        #cameraView {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }
        #cameraView video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #111;
        }
        .camera-overlay {
            position: absolute;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            pointer-events: none;
            font-size: 1.6rem;
            font-weight: 700;
            text-shadow: 0 4px 20px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            padding: 16px 0;
            margin: 0 20px;
            border-radius: 80px;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            letter-spacing: 0.5px;
        }
        .camera-overlay span {
            display: inline-block;
        }
        .timer-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 700;
            border: 1px solid #ffbb33;
            color: #ffbb33;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            letter-spacing: 1px;
            pointer-events: none;
        }
        /* skeleton overlay (finger detection) */
        #skeletonCanvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
            opacity: 0.7;
        }
        /* PUZZLE VIEW (9 pieces) */
        #puzzleView {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #141a24;
            display: none;
            flex-direction: column;
            z-index: 20;
            padding: 8px;
        }
        .puzzle-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: 100%;
            height: 100%;
            background: #1e2635;
            border-radius: 24px;
            padding: 4px;
            box-shadow: inset 0 0 0 1px #3d455a;
            touch-action: none;
            position: relative;
        }
        .puzzle-piece {
            background: #2f384b;
            background-size: cover;
            background-position: center;
            border-radius: 10px;
            touch-action: none;
            cursor: grab;
            box-shadow: 0 2px 8px rgba(0,0,0,0.6);
            border: 2px solid #4d5670;
            transition: border 0.1s;
            will-change: transform;
            position: relative;
        }
        .puzzle-piece:active {
            cursor: grabbing;
        }
        .puzzle-piece.dragging {
            z-index: 30;
            box-shadow: 0 20px 40px rgba(0,0,0,0.9);
            transform: scale(1.02);
            border-color: #ffbb33;
        }
        .puzzle-piece.pinched {
            border-color: #ff6b6b;
            box-shadow: 0 0 0 3px #ff6b6b, 0 8px 20px rgba(255,0,0,0.4);
        }
        .puzzle-controls {
            display: flex;
            gap: 10px;
            padding: 12px 6px 6px 6px;
            background: #141a24;
        }
        .puzzle-controls button {
            flex: 1;
            background: #2b3548;
            border: none;
            color: white;
            font-weight: 700;
            padding: 14px 0;
            border-radius: 60px;
            font-size: 1.2rem;
            box-shadow: 0 6px 0 #141a24;
            transition: all 0.08s ease;
            border: 1px solid #4d5a72;
            touch-action: manipulation;
            cursor: pointer;
            letter-spacing: 0.5px;
        }
        .puzzle-controls button:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #141a24;
        }
        .puzzle-controls .btn-primary {
            background: #ffbb33;
            color: #0b0e14;
            border-color: #ffd966;
            box-shadow: 0 6px 0 #b17f1a;
        }
        #puzzleMessage {
            background: #1e2533;
            border-radius: 40px;
            padding: 14px 12px;
            margin: 4px 0 0 0;
            text-align: center;
            border: 1px solid #4a536b;
            font-size: 1.2rem;
            font-weight: 600;
            color: #eee;
        }
        .message-congrats {
            background: #1f3a2a;
            border-color: #5fbb7a;
            color: #b3ffcc;
        }
        .message-sorry {
            background: #3a2020;
            border-color: #bb5f5f;
            color: #ffb3b3;
        }
        .hidden {
            display: none !important;
        }
        /* reset button on camera */
        #resetCameraBtn {
            position: absolute;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid #ffbb33;
            color: #ffbb33;
            font-weight: 700;
            padding: 16px;
            border-radius: 80px;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            z-index: 20;
            transition: 0.1s;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        #resetCameraBtn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>
<div id="app">
    <!-- CAMERA VIEW (full screen) -->
    <div id="cameraView">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="skeletonCanvas"></canvas>
        <div class="camera-overlay" id="statusOverlay">
            <span id="statusText">✋ Show open hand</span>
        </div>
        <div class="timer-badge" id="timerBadge">⏳ 0s</div>
        <button id="resetCameraBtn">⟳ Restart</button>
    </div>

    <!-- PUZZLE VIEW (9 pieces) -->
    <div id="puzzleView">
        <div class="puzzle-grid" id="puzzleGrid"></div>
        <div id="puzzleMessage">⏳ 30s · pinch & drag pieces</div>
        <div class="puzzle-controls">
            <button id="backToCameraBtn">📷 Camera</button>
            <button id="shuffleBtn" class="btn-primary">🔀 Shuffle</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- DOM refs -----
        const video = document.getElementById('video');
        const skeletonCanvas = document.getElementById('skeletonCanvas');
        const ctx = skeletonCanvas.getContext('2d');
        const statusText = document.getElementById('statusText');
        const timerBadge = document.getElementById('timerBadge');
        const cameraView = document.getElementById('cameraView');
        const puzzleView = document.getElementById('puzzleView');
        const puzzleGrid = document.getElementById('puzzleGrid');
        const puzzleMessage = document.getElementById('puzzleMessage');
        const backToCameraBtn = document.getElementById('backToCameraBtn');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const resetCameraBtn = document.getElementById('resetCameraBtn');

        // ----- state -----
        let stream = null;
        let photoDataURL = null;
        let pieces = [];                 // { id, row, col, currentIndex, dataURL }
        let dragState = null;            // { element, index, offsetX, offsetY, startX, startY, pinchActive }
        let puzzleTimer = null;
        let countdownTimer = null;
        let gameActive = false;
        let handConfirmed = false;
        let handDetectInterval = null;
        let puzzleSolved = false;

        // ----- sizing -----
        function resizeCanvas() {
            const rect = cameraView.getBoundingClientRect();
            skeletonCanvas.width = rect.width || 400;
            skeletonCanvas.height = rect.height || 600;
        }
        window.addEventListener('resize', resizeCanvas);

        // ----- finger skeleton drawing (mock) -----
        function drawSkeleton(openHand = false) {
            const w = skeletonCanvas.width, h = skeletonCanvas.height;
            ctx.clearRect(0, 0, w, h);
            if (!openHand) {
                // draw closed fist or nothing
                ctx.fillStyle = 'rgba(255,255,0,0.2)';
                ctx.beginPath();
                ctx.arc(w/2, h/2, 40, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,200,0,0.6)';
                ctx.lineWidth = 4;
                ctx.stroke();
                return;
            }
            // draw open hand skeleton (5 fingers)
            const cx = w/2, cy = h/2 - 20;
            const fingerLength = 80;
            const spread = 0.9;
            ctx.strokeStyle = '#00ffcc';
            ctx.lineWidth = 6;
            ctx.shadowColor = '#00ffcc';
            ctx.shadowBlur = 12;
            // palm
            ctx.beginPath();
            ctx.ellipse(cx, cy+20, 40, 30, 0, 0, Math.PI*2);
            ctx.stroke();

            // fingers
            const angles = [-1.2, -0.6, 0, 0.6, 1.2];
            for (let i = 0; i < 5; i++) {
                const angle = angles[i];
                const x1 = cx + Math.sin(angle) * 30;
                const y1 = cy + 10 + Math.cos(angle) * 10;
                const x2 = cx + Math.sin(angle) * (30 + fingerLength);
                const y2 = cy + 10 + Math.cos(angle) * (10 + fingerLength);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                // fingertip
                ctx.beginPath();
                ctx.arc(x2, y2, 10, 0, Math.PI*2);
                ctx.fillStyle = '#00ffcc';
                ctx.fill();
                ctx.stroke();
            }
            // thumb
            ctx.beginPath();
            ctx.moveTo(cx-20, cy+30);
            ctx.lineTo(cx-60, cy+70);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(cx-60, cy+70, 10, 0, Math.PI*2);
            ctx.fillStyle = '#00ffcc';
            ctx.fill();
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ----- hand detection (mock with brightness + motion) -----
        let lastAvg = 0;
        function detectHand() {
            if (video.readyState < 2) return false;
            const canvas = document.createElement('canvas');
            canvas.width = 32; canvas.height = 24;
            const c = canvas.getContext('2d');
            c.drawImage(video, 0, 0, 32, 24);
            const data = c.getImageData(0, 0, 32, 24).data;
            let sum = 0, count = 0;
            for (let i = 0; i < data.length; i += 4) {
                sum += data[i] + data[i+1] + data[i+2];
                count += 3;
            }
            const avg = sum / count;
            const motion = Math.abs(avg - lastAvg) > 5;
            lastAvg = avg;
            // heuristic: open hand if avg brightness in range and motion
            return (avg > 90 && avg < 210 && motion);
        }

        function startHandDetection() {
            if (handDetectInterval) clearInterval(handDetectInterval);
            handDetectInterval = setInterval(() => {
                if (puzzleSolved) return;
                const isOpen = detectHand();
                drawSkeleton(isOpen);
                if (isOpen && !handConfirmed) {
                    handConfirmed = true;
                    startCountdown();
                } else if (!isOpen) {
                    handConfirmed = false;
                    if (countdownTimer) {
                        clearInterval(countdownTimer);
                        countdownTimer = null;
                        statusText.innerText = '✋ Show open hand';
                        timerBadge.innerText = '⏳ 0s';
                    }
                }
                if (!handConfirmed) {
                    statusText.innerText = '✋ Show open hand';
                }
            }, 250);
        }

        // ----- countdown & capture -----
        function startCountdown() {
            if (countdownTimer) clearInterval(countdownTimer);
            let sec = 3;
            statusText.innerText = `⏳ ${sec}s`;
            timerBadge.innerText = `⏳ ${sec}s`;
            countdownTimer = setInterval(() => {
                sec--;
                if (sec <= 0) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                    statusText.innerText = '📸 Capture!';
                    timerBadge.innerText = '📸';
                    capturePhotoAndStartPuzzle();
                } else {
                    statusText.innerText = `⏳ ${sec}s`;
                    timerBadge.innerText = `⏳ ${sec}s`;
                }
            }, 1000);
        }

        function capturePhotoAndStartPuzzle() {
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const c = canvas.getContext('2d');
            c.drawImage(video, 0, 0, canvas.width, canvas.height);
            photoDataURL = canvas.toDataURL('image/jpeg', 0.9);
            buildPuzzle(photoDataURL);
            cameraView.style.display = 'none';
            puzzleView.style.display = 'flex';
            if (handDetectInterval) clearInterval(handDetectInterval);
            handDetectInterval = null;
            startPuzzleTimer();
            gameActive = true;
            puzzleSolved = false;
        }

        // ----- build 9-piece puzzle -----
        function buildPuzzle(imageSrc) {
            const img = new Image();
            img.onload = function() {
                const cols = 3, rows = 3;
                const pw = img.width / cols, ph = img.height / rows;
                puzzleGrid.innerHTML = '';
                pieces = [];
                for (let r = 0; r < rows; r++) {
                    for (let c = 0; c < cols; c++) {
                        const canvas = document.createElement('canvas');
                        canvas.width = pw; canvas.height = ph;
                        const ctx2 = canvas.getContext('2d');
                        ctx2.drawImage(img, c * pw, r * ph, pw, ph, 0, 0, pw, ph);
                        const dataURL = canvas.toDataURL('image/jpeg');
                        pieces.push({
                            id: r * cols + c,
                            row: r, col: c,
                            dataURL: dataURL,
                            currentIndex: r * cols + c
                        });
                    }
                }
                shufflePieces();
                renderPuzzle();
            };
            img.src = imageSrc;
        }

        function shufflePieces() {
            const indices = pieces.map((_, i) => i);
            for (let i = indices.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [indices[i], indices[j]] = [indices[j], indices[i]];
            }
            pieces.forEach((p, i) => p.currentIndex = indices[i]);
        }

        function renderPuzzle() {
            const sorted = [...pieces].sort((a, b) => a.currentIndex - b.currentIndex);
            puzzleGrid.innerHTML = '';
            for (let p of sorted) {
                const div = document.createElement('div');
                div.className = 'puzzle-piece';
                div.style.backgroundImage = `url(${p.dataURL})`;
                div.style.backgroundSize = 'cover';
                div.dataset.id = p.id;
                div.dataset.index = p.currentIndex;
                // pointer + touch events
                div.addEventListener('pointerdown', onPiecePointerDown);
                div.addEventListener('touchstart', onPieceTouchStart, { passive: false });
                puzzleGrid.appendChild(div);
            }
            checkWin();
        }

        // ----- drag & pinch (gesture) -----
        function onPiecePointerDown(e) { e.preventDefault(); startDrag(e.currentTarget, e.clientX, e.clientY); }
        function onPieceTouchStart(e) { e.preventDefault(); const t = e.touches[0]; startDrag(e.currentTarget, t.clientX, t.clientY); }

        function startDrag(el, cx, cy) {
            if (!gameActive || puzzleSolved) return;
            const rect = el.getBoundingClientRect();
            const gridRect = puzzleGrid.getBoundingClientRect();
            const offsetX = cx - rect.left;
            const offsetY = cy - rect.top;
            const idx = parseInt(el.dataset.index);
            dragState = {
                element: el,
                index: idx,
                offsetX: offsetX,
                offsetY: offsetY,
                startX: cx, startY: cy,
                pinchActive: false,
                snapIndex: null
            };
            el.classList.add('dragging');
            el.style.zIndex = 30;

            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
            window.addEventListener('touchmove', onTouchMove, { passive: false });
            window.addEventListener('touchend', onTouchEnd, { passive: false });
            // also listen for pinch (two finger) via touch events
            window.addEventListener('touchmove', onPinchMove, { passive: false });
            window.addEventListener('touchend', onPinchEnd, { passive: false });
        }

        function onPointerMove(e) { e.preventDefault(); moveDrag(e.clientX, e.clientY); }
        function onTouchMove(e) { e.preventDefault(); const t = e.touches[0]; if (t) moveDrag(t.clientX, t.clientY); }

        function moveDrag(cx, cy) {
            if (!dragState) return;
            const el = dragState.element;
            const gridRect = puzzleGrid.getBoundingClientRect();
            const x = cx - gridRect.left - dragState.offsetX;
            const y = cy - gridRect.top - dragState.offsetY;
            el.style.transform = `translate(${x}px, ${y}px)`;
            el.style.position = 'relative';
            el.style.left = '0px'; el.style.top = '0px';

            // snap detection
            const all = puzzleGrid.querySelectorAll('.puzzle-piece');
            let target = null;
            const centerX = cx - gridRect.left;
            const centerY = cy - gridRect.top;
            for (let child of all) {
                if (child === el) continue;
                const r = child.getBoundingClientRect();
                const cx2 = r.left + r.width/2 - gridRect.left;
                const cy2 = r.top + r.height/2 - gridRect.top;
                if (Math.hypot(centerX - cx2, centerY - cy2) < 45) {
                    target = parseInt(child.dataset.index);
                    break;
                }
            }
            dragState.snapIndex = target;
            el.style.borderColor = target !== null ? '#ffbb33' : '#4d5670';
        }

        // pinch gesture: when two fingers on same piece -> swap with adjacent?
        let pinchTouchIds = [];
        function onPinchMove(e) {
            if (!dragState || e.touches.length < 2) return;
            const el = dragState.element;
            // highlight as pinched
            el.classList.add('pinched');
            // if pinched, we swap with the piece under the second finger?
            const touch1 = e.touches[0], touch2 = e.touches[1];
            // get center of two fingers
            const cx = (touch1.clientX + touch2.clientX)/2;
            const cy = (touch1.clientY + touch2.clientY)/2;
            // find piece at center
            const gridRect = puzzleGrid.getBoundingClientRect();
            const all = puzzleGrid.querySelectorAll('.puzzle-piece');
            let targetEl = null;
            for (let child of all) {
                if (child === el) continue;
                const r = child.getBoundingClientRect();
                if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
                    targetEl = child;
                    break;
                }
            }
            if (targetEl) {
                const targetIdx = parseInt(targetEl.dataset.index);
                const currentIdx = parseInt(el.dataset.index);
                // swap
                const p1 = pieces.find(p => p.currentIndex === currentIdx);
                const p2 = pieces.find(p => p.currentIndex === targetIdx);
                if (p1 && p2) {
                    const temp = p1.currentIndex;
                    p1.currentIndex = p2.currentIndex;
                    p2.currentIndex = temp;
                    renderPuzzle();
                    // reset drag state
                    endDragClean();
                }
            }
        }

        function onPinchEnd(e) {
            if (dragState && dragState.element) {
                dragState.element.classList.remove('pinched');
            }
        }

        function onPointerUp(e) { e.preventDefault(); endDrag(); }
        function onTouchEnd(e) { e.preventDefault(); endDrag(); }

        function endDrag() {
            if (!dragState) return;
            const el = dragState.element;
            el.classList.remove('dragging');
            el.style.zIndex = '';
            el.style.transform = '';
            el.style.borderColor = '#4d5670';
            el.classList.remove('pinched');

            const snap = dragState.snapIndex;
            if (snap !== undefined && snap !== null) {
                const currentIdx = parseInt(el.dataset.index);
                const targetPiece = pieces.find(p => p.currentIndex === snap);
                const currentPiece = pieces.find(p => p.currentIndex === currentIdx);
                if (targetPiece && currentPiece) {
                    const temp = currentPiece.currentIndex;
                    currentPiece.currentIndex = targetPiece.currentIndex;
                    targetPiece.currentIndex = temp;
                    renderPuzzle();
                }
            }
            endDragClean();
        }

        function endDragClean() {
            window.removeEventListener('pointermove', onPointerMove);
            window.removeEventListener('pointerup', onPointerUp);
            window.removeEventListener('touchmove', onTouchMove);
            window.removeEventListener('touchend', onTouchEnd);
            window.removeEventListener('touchmove', onPinchMove);
            window.removeEventListener('touchend', onPinchEnd);
            if (dragState) {
                if (dragState.element) {
                    dragState.element.classList.remove('dragging');
                    dragState.element.classList.remove('pinched');
                    dragState.element.style.transform = '';
                    dragState.element.style.borderColor = '#4d5670';
                }
                dragState = null;
            }
        }

        // ----- win check -----
        function checkWin() {
            if (!gameActive) return;
            const sorted = [...pieces].sort((a, b) => a.currentIndex - b.currentIndex);
            let win = true;
            for (let i = 0; i < sorted.length; i++) {
                if (sorted[i].id !== i) { win = false; break; }
            }
            if (win && !puzzleSolved) {
                puzzleSolved = true;
                gameActive = false;
                if (puzzleTimer) clearInterval(puzzleTimer);
                puzzleMessage.className = 'message-congrats';
                puzzleMessage.innerHTML = '🎉 CONGRATULATIONS! 🎉';
                timerBadge.innerText = '🏆';
            }
        }

        // ----- timer 30s -----
        function startPuzzleTimer() {
            let seconds = 30;
            timerBadge.innerText = `⏳ ${seconds}s`;
            puzzleMessage.innerText = `⏳ ${seconds}s · pinch & drag`;
            if (puzzleTimer) clearInterval(puzzleTimer);
            puzzleTimer = setInterval(() => {
                seconds--;
                timerBadge.innerText = `⏳ ${seconds}s`;
                puzzleMessage.innerText = `⏳ ${seconds}s · pinch & drag`;
                if (seconds <= 0 && !puzzleSolved) {
                    clearInterval(puzzleTimer);
                    puzzleTimer = null;
                    gameActive = false;
                    puzzleMessage.className = 'message-sorry';
                    puzzleMessage.innerHTML = '😞 SORRY! Try again.';
                    timerBadge.innerText = '⏰';
                }
            }, 1000);
        }

        // ----- reset to camera -----
        function resetToCamera() {
            if (handDetectInterval) clearInterval(handDetectInterval);
            if (countdownTimer) clearInterval(countdownTimer);
            if (puzzleTimer) clearInterval(puzzleTimer);
            puzzleTimer = null;
            countdownTimer = null;
            handDetectInterval = null;
            gameActive = false;
            handConfirmed = false;
            puzzleSolved = false;
            cameraView.style.display = 'flex';
            puzzleView.style.display = 'none';
            statusText.innerText = '✋ Show open hand';
            timerBadge.innerText = '⏳ 0s';
            puzzleMessage.className = '';
            puzzleMessage.innerHTML = '⏳ 30s · pinch & drag';
            if (!stream) startCamera();
            startHandDetection();
            resizeCanvas();
        }

        // ----- camera init -----
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                await video.play();
                resizeCanvas();
            } catch (err) {
                statusText.innerText = '⚠️ Camera permission denied';
                console.warn('camera error', err);
            }
        }

        // ----- init -----
        async function init() {
            await startCamera();
            startHandDetection();
            resetCameraBtn.addEventListener('click', resetToCamera);
            backToCameraBtn.addEventListener('click', resetToCamera);
            shuffleBtn.addEventListener('click', function() {
                if (photoDataURL && !puzzleSolved) {
                    shufflePieces();
                    renderPuzzle();
                }
            });
            // resize canvas on show
            resizeCanvas();
        }
        init();
    })();
</script>
</body>
</html>
