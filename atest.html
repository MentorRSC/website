<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Membership Attendance System</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
            padding: 24px;
        }
        h1 {
            font-size: 28px;
            margin: 0 0 8px 0;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1:before {
            content: "📋";
            font-size: 32px;
        }
        .sub {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
            border-left: 3px solid #8b5cf6;
            padding-left: 12px;
        }
        .member-card {
            background: #f8fafc;
            border-radius: 24px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #e2e8f0;
            transition: all 0.2s ease;
        }
        .member-card.active {
            background: linear-gradient(135deg, #d9f99d 0%, #bbf7d0 100%);
            border-color: #22c55e;
        }
        .member-card.expired {
            background: #fee2e2;
            border-color: #ef4444;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #334155;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 16px;
            transition: 0.2s;
            background: white;
        }
        input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139,92,246,0.2);
        }
        button {
            background: #8b5cf6;
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 8px;
        }
        button:hover {
            background: #7c3aed;
            transform: scale(0.98);
        }
        button:disabled {
            background: #cbd5e1;
            cursor: not-allowed;
        }
        .btn-exit {
            background: #ef4444;
            margin-top: 12px;
        }
        .btn-exit:hover {
            background: #dc2626;
        }
        .guest-row {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }
        .guest-row button {
            margin-top: 0;
            background: #475569;
        }
        .guest-row button:first-child {
            background: #0f172a;
        }
        .info-text {
            font-size: 13px;
            color: #475569;
            margin-top: 16px;
            text-align: center;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-success { background: #22c55e20; color: #166534; }
        .badge-error { background: #ef444420; color: #991b1b; }
        .badge-info { background: #3b82f620; color: #1e3a8a; }
        hr {
            margin: 20px 0;
            border: none;
            border-top: 1px solid #e2e8f0;
        }
        .flex-buttons {
            display: flex;
            gap: 12px;
        }
        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>Attendance Portal</h1>
    <div class="sub">🔐 Check-in with your Registration Number</div>

    <div class="input-group">
        <label>📇 Registration Number / Member ID</label>
        <input type="text" id="regNo" placeholder="e.g., MEM1001, 2024001" autocomplete="off">
    </div>

    <button id="checkBtn">🔍 Verify & Check-in</button>

    <div id="memberInfo" style="display: none;"></div>

    <hr>

    <div class="guest-row">
        <button id="guestYesBtn">👤 Continue as Guest</button>
        <button id="guestNoBtn">❌ Exit / Not Interested</button>
    </div>

    <div class="info-text" id="logMsg">
        💡 Enter your reg no → system validates membership → logs attendance automatically
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    // REPLACE WITH YOUR DEPLOYED WEB APP URL (from Apps Script > Deploy > Web App)
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyYaQvzOjlTgJ4sYMB_Synlsbq0jsqM8mIvXw5apAhebRasQqYmjOObN3X7lQ4NdbC-/exec';
    
    // Helper: send logs to Apps Script
    async function sendLog(type, data) {
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', // required for cross-origin to Apps Script
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    type: type,
                    data: data,
                    timestamp: new Date().toISOString(),
                    userAgent: navigator.userAgent
                })
            });
            console.log(`Log sent: ${type}`, data);
        } catch(e) {
            console.warn('Logging failed (non-blocking):', e);
        }
    }

    // Get member data from server (GET request)
    async function fetchMember(regNo) {
        const url = `${WEB_APP_URL}?action=getMember&regNo=${encodeURIComponent(regNo)}&callback=`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            return data;
        } catch(err) {
            console.error("Fetch error:", err);
            return { status: 'error', message: 'Network or CORS issue. Check URL deployment.' };
        }
    }

    // UI Elements
    const regInput = document.getElementById('regNo');
    const checkBtn = document.getElementById('checkBtn');
    const memberInfoDiv = document.getElementById('memberInfo');
    const guestYesBtn = document.getElementById('guestYesBtn');
    const guestNoBtn = document.getElementById('guestNoBtn');
    const logMsgSpan = document.getElementById('logMsg');
    
    let currentMember = null;
    let isCheckedIn = false;
    let checkinTime = null;

    function showMessage(msg, isError = false) {
        logMsgSpan.innerHTML = isError ? `⚠️ ${msg}` : `ℹ️ ${msg}`;
        logMsgSpan.style.background = isError ? '#fee2e2' : '#e0f2fe';
        setTimeout(() => {
            if(logMsgSpan.innerHTML === `⚠️ ${msg}` || logMsgSpan.innerHTML === `ℹ️ ${msg}`) {
                logMsgSpan.style.background = '#f1f5f9';
                logMsgSpan.innerHTML = '💡 Ready for next action';
            }
        }, 3000);
    }

    function renderMemberCard(member, isValid, expiryDate) {
        const validityText = isValid ? '✅ ACTIVE' : '❌ EXPIRED';
        const cardClass = isValid ? 'active' : 'expired';
        let validityInfo = member.validity ? `Valid until: ${member.validity}` : 'No expiry info';
        
        return `
            <div class="member-card ${cardClass}">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
                    <strong style="font-size: 18px;">👤 ${escapeHtml(member.name)}</strong>
                    <span class="status-badge ${isValid ? 'badge-success' : 'badge-error'}">${validityText}</span>
                </div>
                <div style="margin-top: 12px; font-size: 14px;">
                    <div>🆔 Reg: ${escapeHtml(member.regNo)}</div>
                    <div>📞 ${member.phone || 'No phone'}</div>
                    <div>📧 ${member.email || 'No email'}</div>
                    <div>📅 ${validityInfo}</div>
                    ${!isValid ? '<div style="color:#b91c1c; margin-top:8px;">⚠️ Membership expired — check-in not allowed.</div>' : ''}
                </div>
                ${isValid && !isCheckedIn ? '<button id="confirmCheckinBtn" style="margin-top: 14px; background: #22c55e;">✅ Confirm Check-in Now</button>' : ''}
                ${isValid && isCheckedIn ? '<button id="exitNowBtn" class="btn-exit">🚪 Exit & Log Session</button>' : ''}
            </div>
        `;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }

    function checkMembershipValidity(validityStr) {
        if (!validityStr) return false;
        // Try to parse date (supports DD/MM/YYYY, YYYY-MM-DD, etc)
        let parsedDate = new Date(validityStr);
        if (isNaN(parsedDate.getTime())) {
            // try common format like "31 Dec 2025"
            const parts = validityStr.split(/[ ,/-]/);
            if(parts.length >= 3) {
                parsedDate = new Date(parts.join(' '));
            }
        }
        if (isNaN(parsedDate.getTime())) return false;
        const today = new Date();
        today.setHours(0,0,0,0);
        return parsedDate >= today;
    }

    async function handleCheckin() {
        if (!currentMember) {
            showMessage('No member loaded. Enter registration number first.', true);
            return;
        }
        const isValid = checkMembershipValidity(currentMember.validity);
        if (!isValid) {
            // Log expired attempt
            await sendLog('EXPIRED_ATTEMPT', {
                regNo: currentMember.regNo,
                name: currentMember.name,
                phone: currentMember.phone,
                validity: currentMember.validity,
                entryTime: new Date().toISOString()
            });
            showMessage(`❌ Membership expired on ${currentMember.validity}. Access denied.`, true);
            return;
        }
        
        // Valid member checkin
        checkinTime = new Date().toISOString();
        isCheckedIn = true;
        
        await sendLog('MEMBER_CHECKIN', {
            regNo: currentMember.regNo,
            name: currentMember.name,
            phone: currentMember.phone,
            email: currentMember.email,
            entryTime: checkinTime,
            validity: currentMember.validity
        });
        
        showMessage(`✅ Welcome ${currentMember.name}! Check-in logged at ${new Date().toLocaleTimeString()}`);
        renderCurrentCard();
    }
    
    async function handleExit() {
        if (!isCheckedIn || !currentMember) {
            showMessage('No active check-in session found.', true);
            return;
        }
        const exitTime = new Date().toISOString();
        await sendLog('MEMBER_EXIT', {
            regNo: currentMember.regNo,
            name: currentMember.name,
            exitTime: exitTime,
            duration: `Started at ${new Date(checkinTime).toLocaleTimeString()}`
        });
        isCheckedIn = false;
        showMessage(`🚪 Goodbye ${currentMember.name}! Exit logged.`);
        renderCurrentCard();
    }
    
    function renderCurrentCard() {
        if (!currentMember) {
            memberInfoDiv.style.display = 'none';
            return;
        }
        const isValid = checkMembershipValidity(currentMember.validity);
        memberInfoDiv.style.display = 'block';
        memberInfoDiv.innerHTML = renderMemberCard(currentMember, isValid, currentMember.validity);
        
        // Attach event listeners after rendering
        const confirmBtn = document.getElementById('confirmCheckinBtn');
        if (confirmBtn) confirmBtn.addEventListener('click', handleCheckin);
        
        const exitBtn = document.getElementById('exitNowBtn');
        if (exitBtn) exitBtn.addEventListener('click', handleExit);
    }
    
    async function onVerify() {
        const regNo = regInput.value.trim();
        if (!regNo) {
            showMessage('Please enter a Registration Number', true);
            return;
        }
        
        checkBtn.disabled = true;
        checkBtn.textContent = '⏳ Verifying...';
        memberInfoDiv.style.display = 'none';
        
        try {
            const memberData = await fetchMember(regNo);
            if (memberData.status === 'found') {
                currentMember = memberData;
                isCheckedIn = false;
                checkinTime = null;
                renderCurrentCard();
                showMessage(`✔ Member found: ${memberData.name}`);
            } else {
                currentMember = null;
                memberInfoDiv.style.display = 'none';
                showMessage(`❌ Reg No ${regNo} not found in membership database.`, true);
                await sendLog('GUEST_INTERACTION', { guestChoice: 'member_not_found', regNo: regNo });
            }
        } catch(err) {
            showMessage('Connection error. Check CORS / Web App URL.', true);
            console.error(err);
        } finally {
            checkBtn.disabled = false;
            checkBtn.textContent = '🔍 Verify & Check-in';
        }
    }
    
    async function guestFlow(choice) {
        await sendLog('GUEST_VISIT', {
            guestChoice: choice === 'yes' ? 'Browse as Guest' : 'Declined Entry',
            visitTime: new Date().toISOString(),
            ip: 'client-side'
        });
        if (choice === 'yes') {
            showMessage('👋 Guest mode: You can browse facility info. No check-in recorded.');
            // optional: redirect or show digital brochure
        } else {
            showMessage('Thanks for visiting! Goodbye.');
        }
        // Clear member UI
        currentMember = null;
        memberInfoDiv.style.display = 'none';
        regInput.value = '';
    }
    
    // Event Listeners
    checkBtn.addEventListener('click', onVerify);
    guestYesBtn.addEventListener('click', () => guestFlow('yes'));
    guestNoBtn.addEventListener('click', () => guestFlow('no'));
    
    regInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') onVerify();
    });
    
    // On page load test server connectivity
    window.addEventListener('load', async () => {
        try {
            const testFetch = await fetch(`${WEB_APP_URL}?action=getMember&regNo=TEST`);
            if (!testFetch.ok) throw new Error();
            showMessage('✅ System online. Enter your registration number.');
        } catch(e) {
            showMessage('⚠️ Cannot reach server. Check Web App URL & redeploy as "Anyone"', true);
        }
    });
</script>
</body>
</html>
