<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>State Explorer | Professional Notice Board Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #3b82f6;
            --primary-dark: #1e3a8a;
            --accent: #f43f5e;
            --dark: #0f172a;
            --text: #334155;
            --text-light: #64748b;
            --border: #e2e8f0;
            --bg-light: #f8fafc;
            --card-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            --hover-shadow: 0 18px 30px -12px rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e6f0fa 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
            color: var(--text);
        }

        .explorer-widget {
            max-width: 1280px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
        }

        .widget-hero {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            padding: 2rem 2rem;
            color: white;
            text-align: center;
        }

        .widget-hero i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .widget-hero h2 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .widget-hero p {
            opacity: 0.9;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .dropdown-panel {
            padding: 2rem;
        }

        .state-selector {
            margin-bottom: 2rem;
        }

        .dropdown-label {
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--dark);
        }

        .custom-select {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .select-trigger {
            background: white;
            border: 2px solid var(--border);
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }

        .select-trigger:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
        }

        .dropdown-options {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 1rem;
            max-height: 340px;
            overflow-y: auto;
            z-index: 9999;
            box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.3);
            display: none;
            list-style: none;
        }

        .dropdown-options.show {
            display: block;
        }

        .dropdown-option {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: background 0.12s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .dropdown-option:last-child {
            border-bottom: none;
        }

        .dropdown-option:hover {
            background: #eef2ff;
        }

        .option-title {
            font-weight: 600;
            color: var(--dark);
        }

        .option-badge {
            font-size: 0.7rem;
            background: #e2e8f0;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
        }

        /* Cards Grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .dynamic-card {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.25s ease;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .dynamic-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
            border-color: var(--primary);
        }

        .card-thumbnail {
            width: 100%;
            height: 200px;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid var(--border);
        }

        .thumbnail-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .dynamic-card:hover .thumbnail-image {
            transform: scale(1.05);
        }

        .no-thumbnail {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--text-light);
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
        }

        .no-thumbnail i {
            font-size: 3rem;
            opacity: 0.5;
        }

        .card-content {
            padding: 1.2rem;
            flex: 1;
        }

        .date-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            background: #eef2ff;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary-dark);
            width: fit-content;
            margin-bottom: 0.8rem;
        }

        .notice-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .notice-summary {
            font-size: 0.85rem;
            color: var(--text);
            margin-bottom: 0.75rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .meta-footer {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid var(--border);
        }

        .state-chip {
            background: #f1f5f9;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 1rem;
            animation: fadeIn 0.2s ease;
        }

        .modal-container {
            background: white;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
            animation: slideUp 0.25s ease;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.35);
            transform: rotate(90deg);
        }

        .modal-body {
            display: flex;
            flex-direction: row;
            overflow-y: auto;
            max-height: calc(90vh - 70px);
        }

        .modal-image-section {
            flex: 1;
            background: var(--bg-light);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            border-right: 1px solid var(--border);
            min-width: 250px;
        }

        .modal-image {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        .modal-content-section {
            flex: 1.5;
            padding: 1.5rem;
            overflow-y: auto;
        }

        .detail-row {
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
        }

        .detail-label {
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.25rem;
        }

        .detail-value {
            color: var(--text);
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .detail-value a {
            color: var(--primary);
            text-decoration: none;
        }

        .detail-value a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 3rem;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .empty-state-card {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-light);
            background: #fefce8;
            border-radius: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .dropdown-panel {
                padding: 1rem;
            }
            
            .cards-grid {
                grid-template-columns: 1fr;
            }
            
            .modal-body {
                flex-direction: column;
            }
            
            .modal-image-section {
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 1rem;
            }
            
            .modal-image {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="explorer-widget">
        <div class="widget-hero">
            <i class="fas fa-globe-americas"></i>
            <h2>Notice Board Hub</h2>
            <p>State-wise Updates & Announcements</p>
        </div>
        <div class="dropdown-panel">
            <div class="state-selector">
                <div class="dropdown-label">
                    <i class="fas fa-chevron-circle-down"></i> Select State / Hub 
                </div>
                <div class="custom-select" id="customSelect">
                    <div class="select-trigger" id="selectTrigger">
                        <span id="selectedStateName">Choose a state</span>
                        <i class="fas fa-angle-down"></i>
                    </div>
                    <ul class="dropdown-options" id="dropdownOptions"></ul>
                </div>
            </div>
            <div id="cardsSection" class="cards-container" style="display: none;"></div>
        </div>
    </div>

    <script>
        const MASTER_SPREADSHEET_ID = '1vfSO8NP0p1um-ueMspk4ekPtsEZKSfKwrvgh54SK70c';
        const MASTER_DATA_URL = `https://docs.google.com/spreadsheets/d/${MASTER_SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

        let masterRows = [];
        let uniqueStatesInOrder = [];
        let selectedState = null;
        let childSheetCache = new Map();

        const dropdown = document.getElementById('dropdownOptions');
        const selectTrigger = document.getElementById('selectTrigger');
        const selectedStateSpan = document.getElementById('selectedStateName');
        const cardsSection = document.getElementById('cardsSection');

        function parseCSV(csvText) {
            const rows = [];
            let currentRow = [];
            let currentField = '';
            let insideQuotes = false;
            let i = 0;
            const len = csvText.length;
            
            while (i < len) {
                const ch = csvText[i];
                const nextCh = csvText[i+1];
                
                if (ch === '"') {
                    if (insideQuotes && nextCh === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        insideQuotes = !insideQuotes;
                    }
                } else if (ch === ',' && !insideQuotes) {
                    currentRow.push(currentField);
                    currentField = '';
                } else if ((ch === '\n' || (ch === '\r' && nextCh === '\n')) && !insideQuotes) {
                    currentRow.push(currentField);
                    if (currentRow.length > 0) rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                    if (ch === '\r') i++;
                } else if (ch === '\r' && !insideQuotes) {
                    currentRow.push(currentField);
                    if (currentRow.length > 0) rows.push(currentRow);
                    currentRow = [];
                    currentField = '';
                } else {
                    currentField += ch;
                }
                i++;
            }
            
            if (currentField !== '' || currentRow.length > 0) {
                currentRow.push(currentField);
                if (currentRow.length > 0) rows.push(currentRow);
            }
            
            return rows.map(row => row.map(cell => {
                let cleaned = String(cell).trim();
                if (cleaned.startsWith('"') && cleaned.endsWith('"')) {
                    cleaned = cleaned.slice(1, -1).replace(/""/g, '"');
                }
                return cleaned;
            }));
        }

        function formatDateToDMY(dateObj) {
            if (!dateObj || isNaN(dateObj.getTime())) return null;
            const day = String(dateObj.getDate()).padStart(2, '0');
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const year = dateObj.getFullYear();
            return `${day}/${month}/${year}`;
        }

        function parseDateFlexible(dateStr) {
            if (!dateStr || dateStr === '—' || dateStr === '') return null;
            let cleaned = String(dateStr).trim();
            let d = new Date(cleaned);
            if (!isNaN(d.getTime())) return d;
            
            const parts = cleaned.split(/[-/]/);
            if (parts.length === 3) {
                let year = parseInt(parts[2]);
                let month = parseInt(parts[1]) - 1;
                let day = parseInt(parts[0]);
                if (year < 100) year += 2000;
                let d2 = new Date(year, month, day);
                if (!isNaN(d2.getTime())) return d2;
            }
            return null;
        }

        function isNonEmptyContent(value) {
            if (!value || value === '—' || value === '' || value === 'null') return false;
            return String(value).trim() !== '';
        }

        function isValidImageUrl(url) {
            if (!url || typeof url !== 'string') return false;
            const trimmed = url.trim();
            if (!trimmed) return false;
            const lower = trimmed.toLowerCase();
            
            // Check for common image extensions
            const imageExtensions = ['.jpg', '.jpeg', '.png', '.webp', '.gif', '.bmp', '.svg'];
            const hasImageExtension = imageExtensions.some(ext => lower.endsWith(ext));
            
            // Check for Google Drive direct image URLs
            const isGoogleDriveImage = lower.includes('lh3.googleusercontent.com/d/') || 
                                      lower.includes('drive.google.com/uc') ||
                                      lower.includes('googleusercontent.com');
            
            // Check for other image hosts
            const isImageHost = lower.includes('image') || lower.includes('photo') || 
                                lower.includes('imgur.com') || lower.includes('ibb.co') ||
                                lower.includes('images') || lower.includes('pics');
            
            return (lower.startsWith('http://') || lower.startsWith('https://')) && 
                   (hasImageExtension || isGoogleDriveImage || isImageHost);
        }

        async function fetchMasterSheet() {
            try {
                const response = await fetch(MASTER_DATA_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const csvText = await response.text();
                const parsed = parseCSV(csvText);
                if (parsed.length < 2) throw new Error('Master sheet insufficient data');
                
                const tempRows = [];
                const seenStates = new Set();
                
                for (let idx = 1; idx < parsed.length; idx++) {
                    const row = parsed[idx];
                    let state = (row.length >= 2) ? row[1] : '';
                    let linkedId = (row.length >= 3) ? row[2] : '';
                    
                    if (!state || state === '' || state.toLowerCase() === 'null' || state === 'STATE') continue;
                    
                    linkedId = linkedId ? linkedId.trim() : null;
                    if (linkedId === '' || linkedId.toLowerCase() === 'null') linkedId = null;
                    
                    if (linkedId) {
                        tempRows.push({ state: state, linkedSheetId: linkedId });
                        if (!seenStates.has(state)) {
                            seenStates.add(state);
                            uniqueStatesInOrder.push(state);
                        }
                    }
                }
                masterRows = tempRows;
                renderDropdownInOrder();
            } catch (err) {
                console.error(err);
                dropdown.innerHTML = `<li class="dropdown-option" style="justify-content:center;">⚠️ Failed to load hubs</li>`;
            }
        }

        function renderDropdownInOrder() {
            if (!dropdown) return;
            let optionsHtml = '';
            for (let state of uniqueStatesInOrder) {
                optionsHtml += `
                    <li class="dropdown-option" data-state-value="${escapeHtml(state)}">
                        <span class="option-title">${escapeHtml(state)}</span>
                        <span class="option-badge"><i class="fas fa-map-pin"></i> hub</span>
                    </li>
                `;
            }
            dropdown.innerHTML = optionsHtml;
            
            document.querySelectorAll('.dropdown-option[data-state-value]').forEach(opt => {
                opt.removeEventListener('click', handleOptionClick);
                opt.addEventListener('click', handleOptionClick);
            });
        }

        function handleOptionClick(e) {
            const val = e.currentTarget.getAttribute('data-state-value');
            closeDropdown();
            selectedState = val;
            selectedStateSpan.innerHTML = escapeHtml(val);
            loadDataForState(val);
        }

        async function fetchChildSheet(sheetId) {
            if (childSheetCache.has(sheetId)) return childSheetCache.get(sheetId);
            
            try {
                const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
                const resp = await fetch(url);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const csvText = await resp.text();
                const parsedRows = parseCSV(csvText);
                
                const dataRows = [];
                for (let r = 1; r < parsedRows.length; r++) {
                    const rowCells = parsedRows[r];
                    if (rowCells.length === 0 || (rowCells.length === 1 && rowCells[0] === '')) continue;
                    
                    const rowObj = {};
                    for (let colIdx = 0; colIdx < 10; colIdx++) {
                        const colKey = `col${colIdx + 1}`;
                        const cellValue = (colIdx < rowCells.length && rowCells[colIdx] !== undefined) ? rowCells[colIdx] : '';
                        rowObj[colKey] = cellValue;
                    }
                    
                    const hasTitle = isNonEmptyContent(rowObj.col2);
                    const hasSummary = isNonEmptyContent(rowObj.col3);
                    
                    if (hasTitle || hasSummary) {
                        dataRows.push(rowObj);
                    }
                }
                
                const result = { rows: dataRows, error: false };
                childSheetCache.set(sheetId, result);
                return result;
            } catch (err) {
                console.warn(`Error sheet ${sheetId}:`, err);
                const errorResult = { rows: [], error: true };
                childSheetCache.set(sheetId, errorResult);
                return errorResult;
            }
        }

        async function loadDataForState(state) {
            cardsSection.style.display = 'block';
            cardsSection.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p>Loading notices for ${escapeHtml(state)}...</p></div>`;
            
            const entries = masterRows.filter(row => row.state === state);
            const sheetIds = [];
            for (let entry of entries) {
                if (entry.linkedSheetId) sheetIds.push(entry.linkedSheetId);
            }
            const uniqueSheetIds = [...new Set(sheetIds)];
            const cardItems = [];
            
            for (const sheetId of uniqueSheetIds) {
                const sheetData = await fetchChildSheet(sheetId);
                if (sheetData && sheetData.rows && sheetData.rows.length) {
                    for (let rowData of sheetData.rows) {
                        const dateRaw = rowData.col1 || '';
                        const parsedDate = parseDateFlexible(dateRaw);
                        const displayDate = parsedDate ? formatDateToDMY(parsedDate) : (dateRaw && dateRaw !== '' ? dateRaw : null);
                        
                        const titleText = isNonEmptyContent(rowData.col2) ? rowData.col2 : null;
                        const summaryText = isNonEmptyContent(rowData.col3) ? rowData.col3 : null;
                        
                        if (!titleText && !summaryText) continue;
                        
                        let posterUrl = null;
                        if (rowData.col4 && isValidImageUrl(rowData.col4)) {
                            posterUrl = rowData.col4.trim();
                        }
                        
                        cardItems.push({
                            id: `${sheetId}_${Date.now()}_${Math.random()}_${cardItems.length}`,
                            state: state,
                            dateObj: parsedDate,
                            dateDisplay: displayDate,
                            title: titleText,
                            summary: summaryText,
                            posterUrl: posterUrl,
                            fullRow: rowData,
                        });
                    }
                }
            }
            
            renderCards(cardItems);
        }

        function renderCards(cardsArray) {
            if (!cardsSection) return;
            
            if (cardsArray.length === 0) {
                cardsSection.innerHTML = `<div class="empty-state-card"><i class="fas fa-info-circle fa-2x"></i><p style="margin-top: 1rem;">No notices found for this hub.</p></div>`;
                return;
            }
            
            let html = `<div class="cards-grid">`;
            for (let card of cardsArray) {
                const hasPoster = card.posterUrl !== null;
                const titleHtml = card.title ? `<div class="notice-title">${escapeHtml(card.title)}</div>` : '';
                const summaryHtml = card.summary ? `<div class="notice-summary">${escapeHtml(card.summary)}</div>` : '';
                const dateHtml = card.dateDisplay ? `<div class="date-badge"><i class="far fa-calendar-alt"></i> ${escapeHtml(card.dateDisplay)}</div>` : '';
                
                html += `
                    <div class="dynamic-card" data-card-id="${escapeHtml(card.id)}">
                        <div class="card-thumbnail">
                            ${hasPoster ? 
                                `<img class="thumbnail-image" src="${escapeHtml(card.posterUrl)}" alt="thumbnail" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\'no-thumbnail\'><i class=\'fas fa-image\'></i><span>No Image</span></div>'">` : 
                                `<div class="no-thumbnail"><i class="fas fa-newspaper"></i><span>No Image</span></div>`
                            }
                        </div>
                        <div class="card-content">
                            ${dateHtml}
                            ${titleHtml}
                            ${summaryHtml}
                            <div class="meta-footer">
                                <span class="state-chip"><i class="fas fa-flag"></i> ${escapeHtml(card.state)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }
            html += `</div>`;
            cardsSection.innerHTML = html;
            
            document.querySelectorAll('.dynamic-card').forEach(cardDiv => {
                cardDiv.addEventListener('click', (e) => {
                    const cardId = cardDiv.getAttribute('data-card-id');
                    const selectedCard = cardsArray.find(c => c.id === cardId);
                    if (selectedCard) openModal(selectedCard);
                });
            });
        }
        
        function openModal(card) {
            const fullRow = card.fullRow || {};
            
            // Build only non-empty fields
            const fieldLabels = {
                col1: 'Date Published',
                col2: 'Title',
                col3: 'Description',
                col4: 'Image Link',
                col5: 'Additional Information',
                col6: 'Reference',
                col7: 'Notes',
                col8: 'Category',
                col9: 'Source',
                col10: 'Remarks'
            };
            
            const nonEmptyFields = [];
            for (let i = 1; i <= 10; i++) {
                const key = `col${i}`;
                let value = fullRow[key];
                if (isNonEmptyContent(value) && i !== 4) { // Skip col4 as it's shown as image
                    const label = fieldLabels[key] || `Field ${i}`;
                    nonEmptyFields.push({ label, value });
                }
            }
            
            const hasImage = card.posterUrl !== null;
            
            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            
            let fieldsHtml = '';
            for (let f of nonEmptyFields) {
                let displayValue = f.value;
                if (f.value.startsWith('http')) {
                    displayValue = `<a href="${escapeHtml(f.value)}" target="_blank">${escapeHtml(f.value)}</a>`;
                }
                fieldsHtml += `
                    <div class="detail-row">
                        <div class="detail-label">${escapeHtml(f.label)}</div>
                        <div class="detail-value">${displayValue}</div>
                    </div>
                `;
            }
            
            modal.innerHTML = `
                <div class="modal-container">
                    <div class="modal-header">
                        <h3><i class="fas fa-info-circle"></i> Notice Details</h3>
                        <button class="modal-close"><i class="fas fa-times"></i></button>
                    </div>
                    <div class="modal-body">
                        ${hasImage ? `
                            <div class="modal-image-section">
                                <img class="modal-image" src="${escapeHtml(card.posterUrl)}" alt="notice image" onerror="this.parentElement.innerHTML='<div class=\'modal-image-section\' style=\'justify-content:center;\'><i class=\'fas fa-image fa-3x\' style=\'opacity:0.3;\'></i></div>'">
                            </div>
                        ` : ''}
                        <div class="modal-content-section">
                            ${fieldsHtml || '<p style="color: #64748b; text-align: center;">No additional details available.</p>'}
                            <div class="detail-row" style="background: #f8fafc; margin-top: 0.5rem; border-radius: 0.5rem; padding: 0.5rem 0.75rem;">
                                <div class="detail-label">Hub</div>
                                <div class="detail-value"><span style="background: #eef2ff; padding: 0.2rem 0.8rem; border-radius: 20px; display: inline-block;">${escapeHtml(card.state)}</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }
        
        function closeDropdown() { 
            const dd = document.getElementById('dropdownOptions');
            if (dd) dd.classList.remove('show');
        }
        
        function toggleDropdown() { 
            const dd = document.getElementById('dropdownOptions');
            if (dd) dd.classList.toggle('show');
        }
        
        selectTrigger?.addEventListener('click', (e) => { 
            e.stopPropagation(); 
            toggleDropdown(); 
        });
        
        document.addEventListener('click', function(e) {
            const container = document.getElementById('customSelect');
            if (container && !container.contains(e.target)) closeDropdown();
        });
        
        cardsSection.style.display = 'none';
        fetchMasterSheet();
    </script>
</body>
</html>
