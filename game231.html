<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Hand Puzzle · Pinch Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            font-family: 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        .app-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: #111;
            overflow: hidden;
        }
        #camera-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
            z-index: 1;
            transform: scaleX(-1);
        }
        #skeleton-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            transform: scaleX(-1);
        }
        /* puzzle overlay - full screen */
        #puzzle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: #0a0a12;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #puzzle-overlay.active { display: flex; }
        .puzzle-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 4px;
            width: 85vmin;
            height: 85vmin;
            max-width: 500px;
            max-height: 500px;
            background: #1a1a2a;
            padding: 8px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
            z-index: 11;
        }
        .puzzle-piece {
            background-size: cover;
            background-position: center;
            border-radius: 8px;
            position: relative;
            border: 2px solid rgba(255,255,255,0.08);
            transition: transform 0.15s ease;
        }
        .puzzle-piece.empty {
            background: #1a1a2a !important;
            border: 2px dashed rgba(255,255,255,0.1);
        }
        .puzzle-piece.highlight {
            border-color: #ffd966;
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }
        .timer {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffd966;
            font-size: 2.2rem;
            font-weight: 700;
            background: rgba(0,0,0,0.7);
            padding: 8px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,215,0,0.2);
            z-index: 15;
            font-variant-numeric: tabular-nums;
        }
        .puzzle-status {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.7);
            padding: 10px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
            z-index: 15;
            text-align: center;
            min-width: 200px;
        }
        .settings-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 20;
            background: rgba(16,16,28,0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.15);
            border-radius: 48px;
            padding: 10px 18px;
            color: #f0f0f0;
            font-weight: 500;
            cursor: pointer;
            transition: 0.25s;
        }
        .settings-btn i { color: #ffd966; margin-right: 8px; }
        .settings-btn:hover { background: rgba(40,40,60,0.9); transform: scale(1.02); }
        .settings-dropdown {
            position: absolute;
            top: 75px;
            left: 20px;
            z-index: 20;
            background: rgba(12,12,22,0.95);
            backdrop-filter: blur(14px);
            border-radius: 24px;
            padding: 10px 6px;
            min-width: 190px;
            box-shadow: 0 20px 56px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.06);
            display: none;
            flex-direction: column;
            gap: 2px;
        }
        .settings-dropdown.open { display: flex; }
        .dropdown-item {
            background: transparent;
            border: none;
            padding: 12px 20px;
            border-radius: 16px;
            color: #dce2ec;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: 0.15s;
            width: 100%;
            border-left: 3px solid transparent;
        }
        .dropdown-item i { width: 22px; color: #9aa8b9; }
        .dropdown-item:hover { background: rgba(255,215,0,0.06); border-left-color: #ffd966; color: #fff; }
        .dropdown-item.active { background: rgba(255,215,0,0.10); border-left-color: #ffd966; color: #ffea9e; }
        .dropdown-item.danger { color: #ff6b6b; }
        .dropdown-item.danger:hover { background: rgba(255,0,0,0.1); border-left-color: #ff6b6b; }
        .permission-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .permission-overlay.hidden { display: none; }
        .permission-box {
            background: rgba(20,20,38,0.7);
            backdrop-filter: blur(4px);
            padding: 2.4rem 2.8rem;
            border-radius: 48px;
            border: 1px solid rgba(255,215,0,0.12);
            max-width: 380px;
        }
        .permission-box i { font-size: 3.6rem; color: #ffd966; margin-bottom: 16px; }
        .permission-box h2 { font-weight: 400; font-size: 1.6rem; margin-bottom: 10px; }
        .permission-box p { opacity: 0.7; margin-bottom: 28px; }
        .btn-primary {
            background: #ffd966;
            border: none;
            color: #12121c;
            font-weight: 600;
            padding: 14px 38px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(255,215,0,0.2);
        }
        .btn-primary:hover { background: #ffe088; transform: scale(1.02); }
        .btn-secondary {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.12);
            color: #ccc;
            padding: 12px 28px;
            border-radius: 60px;
            font-size: 0.9rem;
            margin-top: 12px;
            cursor: pointer;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,215,0,0.25); }
        .status-badge {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            padding: 6px 20px;
            border-radius: 40px;
            color: #d0d8e6;
            font-size: 0.8rem;
            border: 1px solid rgba(255,255,255,0.05);
            pointer-events: none;
            opacity: 0.7;
        }
        .pinch-indicator {
            position: absolute;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            z-index: 25;
            pointer-events: none;
            transform: translate(-50%, -50%);
            display: none;
            border: 2px solid rgba(255,255,255,0.3);
        }
        @media (max-width: 480px) {
            .settings-btn span { display: none; }
            .settings-btn { padding: 10px 14px; }
            .settings-dropdown { min-width: 160px; left: 10px; top: 70px; }
            .puzzle-container { width: 92vmin; height: 92vmin; }
            .timer { font-size: 1.6rem; padding: 6px 16px; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <video id="camera-view" autoplay playsinline muted></video>
    <canvas id="skeleton-canvas"></canvas>
    <div class="pinch-indicator" id="pinchIndicator"></div>
    
    <button class="settings-btn" id="settingsToggle"><i class="fas fa-sliders-h"></i><span>Settings</span></button>
    <div class="settings-dropdown" id="settingsDropdown">
        <button class="dropdown-item" data-mode="camera"><i class="fas fa-video"></i> Camera view</button>
        <button class="dropdown-item" data-mode="skeleton"><i class="fas fa-robot"></i> Skeleton view</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" data-mode="hybrid"><i class="fas fa-layer-group"></i> Hybrid mode</button>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item" id="exitGameBtn"><i class="fas fa-sign-out-alt"></i> Exit Game</button>
        <button class="dropdown-item" id="restartGameBtn"><i class="fas fa-redo"></i> Restart Game</button>
        <button class="dropdown-item" id="setDurationBtn"><i class="fas fa-clock"></i> Set Duration</button>
    </div>

    <div class="permission-overlay" id="permissionOverlay">
        <div class="permission-box">
            <i class="fas fa-camera-retro"></i>
            <h2>Camera & Hand Detection</h2>
            <p>Enable camera to detect hands and play the puzzle game with pinch control.</p>
            <button class="btn-primary" id="requestPermissionBtn"><i class="fas fa-check-circle" style="margin-right:10px;"></i> Enable camera</button>
            <button class="btn-secondary" id="openSettingsBtn"><i class="fas fa-cog" style="margin-right:8px;"></i> Open settings</button>
        </div>
    </div>

    <div class="status-badge" id="modeStatus">⚙️ hybrid mode</div>

    <!-- Puzzle overlay -->
    <div id="puzzle-overlay">
        <div class="timer" id="timerDisplay">30</div>
        <div class="puzzle-container" id="puzzleContainer"></div>
        <div class="puzzle-status" id="puzzleStatus">🧩 Arrange the puzzle</div>
    </div>
</div>

<script>
(function() {
    "use strict";
    const video = document.getElementById('camera-view');
    const canvas = document.getElementById('skeleton-canvas');
    const ctx = canvas.getContext('2d');
    const permissionOverlay = document.getElementById('permissionOverlay');
    const requestBtn = document.getElementById('requestPermissionBtn');
    const openSettingsBtn = document.getElementById('openSettingsBtn');
    const settingsToggle = document.getElementById('settingsToggle');
    const settingsDropdown = document.getElementById('settingsDropdown');
    const modeStatus = document.getElementById('modeStatus');
    const puzzleOverlay = document.getElementById('puzzle-overlay');
    const puzzleContainer = document.getElementById('puzzleContainer');
    const timerDisplay = document.getElementById('timerDisplay');
    const puzzleStatus = document.getElementById('puzzleStatus');
    const pinchIndicator = document.getElementById('pinchIndicator');

    let currentMode = 'hybrid';
    let cameraActive = false;
    let cameraStream = null;
    let animationFrame = null;
    let handsDetected = [];
    let puzzleActive = false;
    let puzzleTimer = null;
    let timerSeconds = 30;
    let gameDuration = 30;
    let puzzlePieces = [];
    let isPuzzleSolved = false;
    let capturedImageData = null;
    let gameInProgress = false;
    let countdownActive = false;
    let countdownTimer = null;
    let countdownValue = 3;

    // Pinch tracking
    let isPinching = false;
    let pinchX = 0, pinchY = 0;
    let selectedPiece = null;
    let selectedOriginalIndex = -1;

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // MediaPipe Hands
    const hands = new Hands({ locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
    hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.6 });
    hands.onResults((results) => { 
        handsDetected = results.multiHandLandmarks || [];
        processPinchDetection();
    });

    function initCamera() {
        if (!video) return;
        const camera = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        camera.start();
    }

    // Process pinch detection
    function processPinchDetection() {
        if (!gameInProgress || isPuzzleSolved) {
            if (selectedPiece) {
                selectedPiece.classList.remove('highlight');
                selectedPiece = null;
            }
            pinchIndicator.style.display = 'none';
            return;
        }

        if (!handsDetected || handsDetected.length === 0) {
            if (selectedPiece) {
                selectedPiece.classList.remove('highlight');
                selectedPiece = null;
            }
            pinchIndicator.style.display = 'none';
            return;
        }

        const landmarks = handsDetected[0];
        if (!landmarks) return;

        // Get thumb tip (4) and index finger tip (8)
        const thumbTip = landmarks[4];
        const indexTip = landmarks[8];
        
        // Calculate distance
        const dx = thumbTip.x - indexTip.x;
        const dy = thumbTip.y - indexTip.y;
        const distance = Math.sqrt(dx*dx + dy*dy);
        
        // Map to screen coords (mirrored)
        const screenX = (1 - indexTip.x) * canvas.width;
        const screenY = indexTip.y * canvas.height;
        
        // Pinch threshold (normalized)
        const pinchThreshold = 0.06;
        const isCurrentlyPinching = distance < pinchThreshold;

        // Update pinch indicator - Yellow when not pinched, Green when pinched
        if (isCurrentlyPinching) {
            pinchIndicator.style.display = 'block';
            pinchIndicator.style.left = screenX + 'px';
            pinchIndicator.style.top = screenY + 'px';
            pinchIndicator.style.background = '#00ff88';
            pinchIndicator.style.boxShadow = '0 0 30px rgba(0,255,136,0.6)';
            pinchX = screenX;
            pinchY = screenY;
        } else {
            pinchIndicator.style.display = 'none';
        }

        // Pinch logic for puzzle interaction
        if (isCurrentlyPinching && !isPinching) {
            // Pinch started - select piece
            isPinching = true;
            selectPieceAt(screenX, screenY);
        } else if (!isCurrentlyPinching && isPinching) {
            // Pinch ended - drop piece
            isPinching = false;
            if (selectedPiece) {
                dropPiece();
            }
        } else if (isCurrentlyPinching && isPinching && selectedPiece) {
            // Move piece with pinch
            movePieceWithPinch(screenX, screenY);
        }
    }

    function selectPieceAt(x, y) {
        const containerRect = puzzleContainer.getBoundingClientRect();
        const pieces = puzzleContainer.querySelectorAll('.puzzle-piece');
        const pieceSize = pieces[0]?.offsetWidth || 0;
        const gap = 4;
        
        // Find which piece is at the pinch position
        for (let piece of pieces) {
            if (piece.dataset.empty === 'true') continue;
            const rect = piece.getBoundingClientRect();
            const centerX = rect.left + rect.width/2;
            const centerY = rect.top + rect.height/2;
            const dist = Math.sqrt((x - centerX)**2 + (y - centerY)**2);
            if (dist < rect.width/2) {
                selectedPiece = piece;
                selectedOriginalIndex = parseInt(piece.dataset.originalIndex);
                piece.classList.add('highlight');
                piece.style.transform = 'scale(1.05)';
                piece.style.zIndex = 10;
                return;
            }
        }
    }

    function movePieceWithPinch(x, y) {
        if (!selectedPiece) return;
        const containerRect = puzzleContainer.getBoundingClientRect();
        const pieces = puzzleContainer.querySelectorAll('.puzzle-piece');
        const pieceSize = pieces[0]?.offsetWidth || 0;
        const gap = 4;
        
        // Calculate grid position
        const col = Math.round((x - containerRect.left - pieceSize/2) / (pieceSize + gap));
        const row = Math.round((y - containerRect.top - pieceSize/2) / (pieceSize + gap));
        
        if (col >= 0 && col < 3 && row >= 0 && row < 3) {
            const targetIndex = row * 3 + col;
            const targetPiece = pieces[targetIndex];
            
            if (targetPiece && targetPiece.dataset.empty === 'true' && targetPiece !== selectedPiece) {
                // Swap with empty piece
                swapPieces(selectedPiece, targetPiece);
                selectedPiece.classList.remove('highlight');
                selectedPiece.style.transform = '';
                selectedPiece.style.zIndex = 1;
                selectedPiece = null;
                isPinching = false;
                checkPuzzleSolved();
            }
        }
    }

    function swapPieces(pieceA, pieceB) {
        // Swap data
        const tempOriginal = pieceA.dataset.originalIndex;
        const tempEmpty = pieceA.dataset.empty;
        pieceA.dataset.originalIndex = pieceB.dataset.originalIndex;
        pieceA.dataset.empty = pieceB.dataset.empty;
        pieceB.dataset.originalIndex = tempOriginal;
        pieceB.dataset.empty = tempEmpty;
        
        // Swap visuals
        const tempBg = pieceA.style.backgroundImage;
        pieceA.style.backgroundImage = pieceB.style.backgroundImage;
        pieceB.style.backgroundImage = tempBg;
        
        // Update classes
        pieceA.classList.toggle('empty', pieceA.dataset.empty === 'true');
        pieceB.classList.toggle('empty', pieceB.dataset.empty === 'true');
        
        // Update indices in DOM
        const tempIndex = pieceA.dataset.index;
        pieceA.dataset.index = pieceB.dataset.index;
        pieceB.dataset.index = tempIndex;
        
        // Update puzzlePieces array
        const idxA = parseInt(pieceA.dataset.index);
        const idxB = parseInt(pieceB.dataset.index);
        const temp = puzzlePieces[idxA];
        puzzlePieces[idxA] = puzzlePieces[idxB];
        puzzlePieces[idxB] = temp;
    }

    function dropPiece() {
        if (selectedPiece) {
            selectedPiece.classList.remove('highlight');
            selectedPiece.style.transform = '';
            selectedPiece.style.zIndex = 1;
            selectedPiece = null;
        }
    }

    // Drawing skeleton with yellow dot for thumb, green dot when pinched
    function drawSkeletonOnCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (currentMode === 'camera') return;
        if (currentMode === 'skeleton' || puzzleActive) {
            ctx.fillStyle = '#0a0a12';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        if (!handsDetected || handsDetected.length === 0) {
            if (currentMode === 'skeleton' || currentMode === 'hybrid') {
                ctx.font = '20px "Segoe UI", sans-serif';
                ctx.fillStyle = 'rgba(180,200,230,0.5)';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('✋ show your hands', canvas.width/2, canvas.height/2 - 12);
            }
            return;
        }
        for (let handIdx = 0; handIdx < handsDetected.length; handIdx++) {
            const landmarks = handsDetected[handIdx];
            if (!landmarks) continue;
            const pts = landmarks.map(lm => ({ x: lm.x * canvas.width, y: lm.y * canvas.height }));
            const hue = (handIdx * 40 + 200) % 360;
            const color = `hsl(${hue}, 85%, 60%)`;
            const colorDim = `hsl(${hue}, 70%, 40%)`;
            const connections = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];
            ctx.shadowColor = `hsla(${hue}, 90%, 65%, 0.2)`;
            ctx.shadowBlur = 20;
            ctx.lineWidth = 4;
            for (let [i, j] of connections) {
                if (i < pts.length && j < pts.length) {
                    ctx.beginPath();
                    ctx.moveTo(pts[i].x, pts[i].y);
                    ctx.lineTo(pts[j].x, pts[j].y);
                    ctx.strokeStyle = color;
                    ctx.stroke();
                }
            }
            ctx.shadowBlur = 15;
            
            // Check if pinched for this hand
            let isPinched = false;
            if (landmarks.length > 8) {
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const dx = thumbTip.x - indexTip.x;
                const dy = thumbTip.y - indexTip.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                isPinched = dist < 0.06;
            }
            
            for (let k = 0; k < pts.length; k++) {
                const p = pts[k];
                const isFingertip = (k === 4 || k === 8 || k === 12 || k === 16 || k === 20);
                const radius = isFingertip ? 8 : 5;
                // Yellow dot for thumb (index 4)
                const isThumb = (k === 4);
                ctx.beginPath();
                ctx.arc(p.x, p.y, radius, 0, 2 * Math.PI);
                
                if (isThumb && isPinched) {
                    // Green dot when pinched
                    ctx.fillStyle = '#00ff88';
                    ctx.shadowColor = 'rgba(0,255,136,0.6)';
                    ctx.shadowBlur = 30;
                } else if (isThumb) {
                    // Yellow dot for thumb
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = 'rgba(255,215,0,0.6)';
                    ctx.shadowBlur = 25;
                } else if (isFingertip) {
                    ctx.fillStyle = '#ffdb7c';
                    ctx.shadowColor = `hsla(${hue}, 90%, 65%, 0.3)`;
                    ctx.shadowBlur = 15;
                } else {
                    ctx.fillStyle = colorDim;
                    ctx.shadowColor = `hsla(${hue}, 90%, 65%, 0.2)`;
                    ctx.shadowBlur = 10;
                }
                ctx.fill();
                
                // Add stroke for better visibility
                if (isThumb && isPinched) {
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else if (isThumb) {
                    ctx.strokeStyle = '#ffd700';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                } else {
                    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
    }

    function renderFrame() {
        if (currentMode === 'camera') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        } else {
            drawSkeletonOnCanvas();
        }
        animationFrame = requestAnimationFrame(renderFrame);
    }

    // ----- PUZZLE LOGIC -----
    function captureAndCreatePuzzle() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = video.videoWidth || 640;
        tempCanvas.height = video.videoHeight || 480;
        const tempCtx = tempCanvas.getContext('2d');
        tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
        capturedImageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
        
        const containerSize = Math.min(window.innerWidth * 0.85, window.innerHeight * 0.85, 500);
        const pieceSize = containerSize / 3 - 4;
        puzzleContainer.innerHTML = '';
        puzzleContainer.style.width = containerSize + 'px';
        puzzleContainer.style.height = containerSize + 'px';
        
        const pieceOrder = [0,1,2,3,4,5,6,7,8];
        for (let i = pieceOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [pieceOrder[i], pieceOrder[j]] = [pieceOrder[j], pieceOrder[i]];
        }
        if (pieceOrder.join(',') === '0,1,2,3,4,5,6,7,8') {
            [pieceOrder[0], pieceOrder[1]] = [pieceOrder[1], pieceOrder[0]];
        }
        puzzlePieces = pieceOrder;

        pieceOrder.forEach((originalIndex, pos) => {
            const div = document.createElement('div');
            div.className = 'puzzle-piece';
            if (originalIndex === 8) {
                div.classList.add('empty');
                div.dataset.empty = 'true';
            } else {
                const row = Math.floor(originalIndex / 3);
                const col = originalIndex % 3;
                const sx = col * (tempCanvas.width / 3);
                const sy = row * (tempCanvas.height / 3);
                const sw = tempCanvas.width / 3;
                const sh = tempCanvas.height / 3;
                const pieceCanvas = document.createElement('canvas');
                pieceCanvas.width = sw;
                pieceCanvas.height = sh;
                const pCtx = pieceCanvas.getContext('2d');
                pCtx.drawImage(tempCanvas, sx, sy, sw, sh, 0, 0, sw, sh);
                div.style.backgroundImage = `url(${pieceCanvas.toDataURL()})`;
                div.style.backgroundSize = 'cover';
                div.dataset.originalIndex = originalIndex;
            }
            div.dataset.index = pos;
            div.style.width = pieceSize + 'px';
            div.style.height = pieceSize + 'px';
            puzzleContainer.appendChild(div);
        });
        
        // Hide camera for puzzle game - show only skeleton
        video.style.display = 'none';
    }

    function checkPuzzleSolved() {
        const pieces = puzzleContainer.querySelectorAll('.puzzle-piece');
        let solved = true;
        for (let i = 0; i < pieces.length; i++) {
            const orig = parseInt(pieces[i].dataset.originalIndex);
            if (orig !== i) { solved = false; break; }
        }
        if (solved && gameInProgress) {
            isPuzzleSolved = true;
            gameInProgress = false;
            clearInterval(puzzleTimer);
            puzzleStatus.textContent = '🎉 Congratulations! You solved it! 🎉';
            puzzleStatus.style.color = '#ffd966';
            setTimeout(() => {
                resetPuzzle();
            }, 3000);
        }
    }

    function resetPuzzle() {
        clearInterval(puzzleTimer);
        clearTimeout(countdownTimer);
        puzzleOverlay.classList.remove('active');
        puzzleActive = false;
        gameInProgress = false;
        isPuzzleSolved = false;
        isPinching = false;
        selectedPiece = null;
        pinchIndicator.style.display = 'none';
        puzzleStatus.style.color = '#fff';
        puzzleStatus.textContent = '✋ Show open hand to start';
        timerDisplay.textContent = gameDuration;
        video.style.display = 'block';
        video.classList.add('active');
    }

    function startPuzzleGame() {
        if (puzzleActive) return;
        if (!handsDetected || handsDetected.length === 0) {
            puzzleStatus.textContent = '✋ Show your hand to start';
            return;
        }
        const landmarks = handsDetected[0];
        if (!landmarks) return;
        const tipIndices = [4, 8, 12, 16, 20];
        const wrist = landmarks[0];
        let open = true;
        for (let idx of tipIndices) {
            if (landmarks[idx].y > wrist.y + 0.1) { open = false; break; }
        }
        if (!open) {
            puzzleStatus.textContent = '✋ Open your hand to start';
            return;
        }
        
        puzzleStatus.textContent = '⏳ 3';
        countdownValue = 3;
        puzzleOverlay.classList.add('active');
        puzzleActive = true;
        countdownActive = true;
        
        countdownTimer = setInterval(() => {
            countdownValue--;
            if (countdownValue > 0) {
                puzzleStatus.textContent = `⏳ ${countdownValue}`;
            } else {
                clearInterval(countdownTimer);
                countdownActive = false;
                video.style.display = 'none';
                captureAndCreatePuzzle();
                gameInProgress = true;
                isPuzzleSolved = false;
                timerSeconds = gameDuration;
                timerDisplay.textContent = gameDuration;
                puzzleStatus.textContent = '🧩 Arrange the puzzle';
                puzzleStatus.style.color = '#fff';
                puzzleTimer = setInterval(() => {
                    timerSeconds--;
                    timerDisplay.textContent = timerSeconds;
                    if (timerSeconds <= 0) {
                        clearInterval(puzzleTimer);
                        gameInProgress = false;
                        puzzleStatus.textContent = '⏰ Timeout! Restarting...';
                        puzzleStatus.style.color = '#ff6b6b';
                        setTimeout(() => {
                            resetPuzzle();
                            puzzleStatus.textContent = '✋ Show open hand to start';
                        }, 2000);
                    }
                }, 1000);
            }
        }, 1000);
    }

    // Start camera
    async function startCameraAndHands() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
                audio: false
            });
            video.srcObject = stream;
            cameraStream = stream;
            cameraActive = true;
            await video.play();
            video.classList.add('active');
            initCamera();
            permissionOverlay.classList.add('hidden');
            if (!animationFrame) renderFrame();
            setInterval(() => {
                if (!puzzleActive && cameraActive && currentMode === 'hybrid') {
                    startPuzzleGame();
                }
            }, 2000);
        } catch (err) {
            console.warn('Camera error:', err);
            permissionOverlay.classList.remove('hidden');
            requestBtn.innerHTML = '<i class="fas fa-exclamation-triangle" style="margin-right:10px;"></i> Retry';
            cameraActive = false;
        }
    }

    function requestPermission() { startCameraAndHands(); }

    function setMode(mode) {
        currentMode = mode;
        const modeNames = { camera: '📷 camera view', skeleton: '🦴 skeleton view', hybrid: '🌀 hybrid mode' };
        modeStatus.textContent = modeNames[mode] || 'camera view';
        document.querySelectorAll('.dropdown-item').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.mode === mode) btn.classList.add('active');
        });
        settingsDropdown.classList.remove('open');
        if ((mode === 'camera' || mode === 'hybrid') && !cameraActive) requestPermission();
        if (!animationFrame) renderFrame();
        if (mode === 'hybrid') {
            video.style.display = 'block';
            video.classList.add('active');
        } else if (mode === 'skeleton') {
            video.style.display = 'none';
            video.classList.remove('active');
        }
    }

    // Game controls
    function exitGame() {
        resetPuzzle();
        puzzleStatus.textContent = '🚪 Game exited';
        setTimeout(() => {
            puzzleStatus.textContent = '✋ Show open hand to start';
        }, 1500);
        settingsDropdown.classList.remove('open');
    }

    function restartGame() {
        resetPuzzle();
        setTimeout(() => {
            startPuzzleGame();
        }, 500);
        settingsDropdown.classList.remove('open');
    }

    function setDuration() {
        const newDuration = prompt('Enter game duration in seconds:', gameDuration);
        if (newDuration !== null && !isNaN(newDuration) && parseInt(newDuration) > 0) {
            gameDuration = parseInt(newDuration);
            timerDisplay.textContent = gameDuration;
            puzzleStatus.textContent = `⏱️ Duration set to ${gameDuration}s`;
            setTimeout(() => {
                puzzleStatus.textContent = '✋ Show open hand to start';
            }, 1500);
        }
        settingsDropdown.classList.remove('open');
    }

    // Event listeners
    requestBtn.addEventListener('click', requestPermission);
    openSettingsBtn.addEventListener('click', function() {
        settingsDropdown.classList.toggle('open');
        permissionOverlay.classList.add('hidden');
        if (!cameraActive) { if (!animationFrame) renderFrame(); setMode('skeleton'); }
    });
    settingsToggle.addEventListener('click', function(e) { e.stopPropagation(); settingsDropdown.classList.toggle('open'); });
    document.querySelectorAll('.dropdown-item[data-mode]').forEach(item => {
        item.addEventListener('click', function() {
            const mode = this.dataset.mode;
            if (mode) setMode(mode);
        });
    });
    document.getElementById('exitGameBtn').addEventListener('click', exitGame);
    document.getElementById('restartGameBtn').addEventListener('click', restartGame);
    document.getElementById('setDurationBtn').addEventListener('click', setDuration);
    
    document.addEventListener('click', function(e) {
        if (!settingsDropdown.contains(e.target) && e.target !== settingsToggle) {
            settingsDropdown.classList.remove('open');
        }
    });
    window.addEventListener('resize', resizeCanvas);
    window.addEventListener('beforeunload', function() {
        if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
        if (animationFrame) cancelAnimationFrame(animationFrame);
        clearInterval(puzzleTimer);
        clearTimeout(countdownTimer);
    });

    // Init
    permissionOverlay.classList.remove('hidden');
    setMode('hybrid');
    renderFrame();
    puzzleStatus.textContent = '✋ Show open hand to start puzzle';

})();
</script>
</body>
</html>
