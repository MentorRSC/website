            <a href="index.html" class="logo">
                <i class="fas fa-lightbulb"></i>

<!-- TITLE -->
<section class="header-section">
<h1>Member List</h1>
<p>Registered Members and Validity</p>
</section>

<!-- TABLE -->
<div class="container table-container">

<table>
<thead>
<tr>
<th>Sl.No</th>
<th>Name</th>
<th>Reg No</th>
<th>Validity</th>
</tr>
</thead>

<tbody id="data"></tbody>

</table>

</div>

<!-- FOOTER -->
<footer>
<p>&copy; 2025 Innovation Hub</p>
</footer>

<script>

const url = "https://docs.google.com/spreadsheets/d/1WRtwYpQ7jsnwYaQUGivSZTrAOOHZyxS8s0-P8aAaiow/gviz/tq?tqx=out:json";

fetch(url)
.then(res => res.text())
.then(rep => {

const json = JSON.parse(rep.substring(47).slice(0,-2));
const rows = json.table.rows;

let html = "";

rows.forEach((r,i)=>{

if(i < 6) return;

const sl = r.c[2]?.v || "";
const name = r.c[3]?.v || "";
const validity = r.c[7]?.v || "";
const reg = r.c[8]?.v || "";

html += `
<tr>
<td>${sl}</td>
<td>${name}</td>
<td>${reg}</td>
<td>${validity}</td>
</tr>
`;

});

document.getElementById("data").innerHTML = html;

});

</script>

</body>
</html>
