<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>English to Malayalam/Hindi Speaker</title>

<style>
:root{
    --primary:#2563eb;
    --success:#16a34a;
    --danger:#dc2626;
    --bg:#f4f7fb;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:var(--bg);
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.12);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
}

textarea{
    width:100%;
    min-height:150px;
    border:2px solid #ddd;
    border-radius:12px;
    padding:12px;
    font-size:16px;
    resize:vertical;
}

select{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
}

.buttons{
    display:flex;
    gap:10px;
    margin-top:20px;
}

button{
    flex:1;
    border:none;
    border-radius:12px;
    padding:14px;
    cursor:pointer;
    font-size:16px;
    color:white;
}

.translate-btn{
    background:var(--primary);
}

.speak-btn{
    background:var(--success);
}

.stop-btn{
    background:var(--danger);
}

.status{
    margin-top:15px;
    font-size:14px;
    color:#555;
}

@media(max-width:600px){
    .buttons{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="container">

<h1>🌍 English → Malayalam / Hindi Speaker</h1>

<label>Enter English Text</label>
<textarea id="englishText"
placeholder="Type English text here..."></textarea>

<label>Translate To</label>
<select id="language">
    <option value="ml">Malayalam</option>
    <option value="hi">Hindi</option>
</select>

<div class="buttons">
    <button class="translate-btn"
            onclick="translateText()">
        Translate
    </button>

    <button class="speak-btn"
            onclick="translateAndSpeak()">
        Translate & Speak
    </button>

    <button class="stop-btn"
            onclick="speechSynthesis.cancel()">
        Stop
    </button>
</div>

<label>Translated Text</label>
<textarea id="translatedText"
readonly></textarea>

<div class="status" id="status">
Ready.
</div>

</div>

<script>

async function translateText() {

    const text =
        document.getElementById(
            "englishText"
        ).value.trim();

    const lang =
        document.getElementById(
            "language"
        ).value;

    if(!text){
        alert("Please enter text.");
        return;
    }

    document.getElementById(
        "status"
    ).innerText = "Translating...";

    try{

        const response = await fetch(
            "https://libretranslate.com/translate",
            {
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    q:text,
                    source:"en",
                    target:lang,
                    format:"text"
                })
            }
        );

        const data =
            await response.json();

        document.getElementById(
            "translatedText"
        ).value =
            data.translatedText;

        document.getElementById(
            "status"
        ).innerText =
            "Translation completed.";

        return data.translatedText;

    }catch(error){

        document.getElementById(
            "status"
        ).innerText =
            "Translation failed.";

        console.error(error);

        return null;
    }
}

async function translateAndSpeak(){

    const translated =
        await translateText();

    if(!translated){
        return;
    }

    const utterance =
        new SpeechSynthesisUtterance(
            translated
        );

    const lang =
        document.getElementById(
            "language"
        ).value;

    if(lang === "ml"){
        utterance.lang = "ml-IN";
    }else{
        utterance.lang = "hi-IN";
    }

    const voices =
        speechSynthesis.getVoices();

    const matchingVoice =
        voices.find(v =>
            v.lang.toLowerCase()
            .startsWith(lang)
        );

    if(matchingVoice){
        utterance.voice =
            matchingVoice;
    }

    speechSynthesis.cancel();
    speechSynthesis.speak(
        utterance
    );

    document.getElementById(
        "status"
    ).innerText =
        "Speaking...";
}

speechSynthesis.onvoiceschanged =
    () => {
        speechSynthesis.getVoices();
    };

</script>

</body>
</html>
