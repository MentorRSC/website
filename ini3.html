<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wedding Invitation Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5a3;
            --gold-dark: #9a7040;
            --cream: #faf6ef;
            --cream-deep: #f2ead9;
            --ink: #2c2118;
            --ink-mid: #5a4030;
            --ink-light: #8b6f5a;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, var(--cream-deep) 0%, #e8dfd1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: white;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid rgba(201,169,110,0.3);
            pointer-events: none;
            border-radius: 2px;
        }

        .content {
            padding: 50px 40px;
            text-align: center;
        }

        .ornament {
            font-size: 1.5rem;
            color: var(--gold);
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: var(--ink-light);
            font-style: italic;
            margin-bottom: 2rem;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin: 1.5rem auto;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--ink-mid);
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 2px;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--gold);
        }

        button {
            width: 100%;
            background: var(--ink);
            color: var(--gold-light);
            border: none;
            padding: 14px;
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background: var(--ink-mid);
            transform: translateY(-2px);
        }

        .toggle-link {
            margin-top: 1.5rem;
            color: var(--ink-light);
            cursor: pointer;
            font-style: italic;
        }

        .toggle-link:hover {
            color: var(--gold);
        }

        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 2px;
            display: none;
            font-size: 0.9rem;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 1rem;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 2px solid var(--gold-light);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .content { padding: 30px 20px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="content">
                <div class="ornament">✦ ✦ ✦</div>
                <h1 id="pageTitle">Wedding Manager</h1>
                <div class="subtitle" id="pageSubtitle">Create your wedding invitation portal</div>
                <div class="divider"></div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button onclick="handleLogin()">Login to Dashboard</button>
                    <div class="toggle-link" onclick="showRegister()">New user? Create an account</div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" style="display:none;">
                    <div class="form-group">
                        <label>Your Name</label>
                        <input type="text" id="regUsername" placeholder="Your full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="regEmail" placeholder="your@email.com">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password">
                    </div>
                    <div class="form-group">
                        <label>Wedding Date</label>
                        <input type="text" id="regEventDate" placeholder="Saturday, 14 June 2026">
                    </div>
                    <div class="form-group">
                        <label>Wedding Time</label>
                        <input type="text" id="regEventTime" placeholder="5:30 PM">
                    </div>
                    <div class="form-group">
                        <label>Venue / Location</label>
                        <input type="text" id="regLocation" placeholder="Grand Venue, City">
                    </div>
                    <button onclick="handleRegister()">Create Account</button>
                    <div class="toggle-link" onclick="showLogin()">Already have an account? Login</div>
                </div>

                <div id="messageContainer" class="message"></div>
                <div id="loader" class="loader"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURE YOUR APPS SCRIPT URL HERE
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
        
        // Helper function to show messages
        function showMessage(message, type) {
            const msgDiv = document.getElementById('messageContainer');
            msgDiv.textContent = message;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                msgDiv.className = 'message';
            }, 5000);
        }

        function showLoader(show) {
            const loader = document.getElementById('loader');
            if (show) {
                loader.classList.add('show');
            } else {
                loader.classList.remove('show');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showMessage('Please enter email and password', 'error');
                return;
            }

            showLoader(true);

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'login',
                        email: email,
                        password: password
                    })
                });

                // Since mode is 'no-cors', we need to use a different approach
                // Alternative: Use GET request with parameters
                const getResponse = await fetch(`${APPS_SCRIPT_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
                const result = await getResponse.json();
                
                if (result.status === 'success') {
                    localStorage.setItem('userId', result.userId);
                    window.location.href = `dashboard.html?userId=${result.userId}`;
                } else {
                    showMessage(result.message || 'Login failed', 'error');
                }
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Network error. Please try again.', 'error');
            } finally {
                showLoader(false);
            }
        }

        async function handleRegister() {
            const userData = {
                action: 'register',
                username: document.getElementById('regUsername').value,
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                eventDate: document.getElementById('regEventDate').value,
                eventTime: document.getElementById('regEventTime').value,
                location: document.getElementById('regLocation').value
            };

            if (!userData.username || !userData.email || !userData.password) {
                showMessage('Please fill all required fields', 'error');
                return;
            }

            showLoader(true);

            try {
                const response = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });
                const result = await response.json();
                
                if (result.status === 'registered') {
                    showMessage('Registration successful! Please login.', 'success');
                    showLogin();
                    document.getElementById('loginEmail').value = userData.email;
                } else {
                    showMessage(result.message || 'Registration failed', 'error');
                }
            } catch (error) {
                console.error('Registration error:', error);
                showMessage('Network error. Please try again.', 'error');
            } finally {
                showLoader(false);
            }
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('pageTitle').textContent = 'Create Account';
            document.getElementById('pageSubtitle').textContent = 'Start your wedding journey';
            document.getElementById('messageContainer').className = 'message';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('pageTitle').textContent = 'Wedding Manager';
            document.getElementById('pageSubtitle').textContent = 'Create your wedding invitation portal';
            document.getElementById('messageContainer').className = 'message';
        }

        // Check if user is already logged in
        const userId = new URLSearchParams(window.location.search).get('userId');
        if (userId) {
            localStorage.setItem('userId', userId);
            window.location.href = `dashboard.html?userId=${userId}`;
        }
    </script>
</body>
</html>
