<!DOCTYPE html>
<html>
<head>
    <title>Test Google Script</title>
</head>
<body>
    <h2>Test Form Submission</h2>
    <button onclick="testScript()">Test Script</button>
    <div id="result"></div>

    <script>
    function testScript() {
        let form = document.createElement("form");
        form.method = "POST";
        form.action = "https://script.google.com/macros/s/AKfycbxuoWM6NyQK7gDkWrZhB_j8YXWs-lBQ55_pxpokUPZwvUPoGWp_aFEBXfJrpq9ut13u/exec";
        form.target = "hidden_iframe";
        form.style.display = "none";
        
        function addField(name, value) {
            let input = document.createElement("input");
            input.type = "hidden";
            input.name = name;
            input.value = value;
            form.appendChild(input);
        }
        
        addField("name", "Test User");
        addField("phone", "9998887776");
        addField("dob", "2000-01-01");
        addField("date", "Mar 2026");
        
        document.body.appendChild(form);
        form.submit();
        
        document.getElementById("result").innerHTML = "✅ Test submitted! Check your Google Sheet.";
        setTimeout(() => { location.reload(); }, 2000);
    }
    </script>
    
    <iframe name="hidden_iframe" style="display:none;"></iframe>
</body>
</html>
