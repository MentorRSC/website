<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fractal Trinity | Dragon Curve · Golden Spiral · Mandelbrot ∞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', 'Monaco', monospace;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Canvas container - full immersive fractal view */
        .fractal-stage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Professional glassmorphic bottom bar with neon vibe */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(0, 255, 255, 0.4);
            box-shadow: 0 -10px 40px rgba(0, 255, 255, 0.15);
            z-index: 20;
            padding: 0.9rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .brand {
            display: flex;
            gap: 1.2rem;
            align-items: baseline;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, #0ff, #f0f, #ff66cc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            text-shadow: 0 0 6px rgba(0,255,255,0.4);
        }

        .badge {
            font-size: 0.7rem;
            background: rgba(0, 255, 255, 0.12);
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            border-left: 2px solid cyan;
            color: #b0f0ff;
            font-family: monospace;
        }

        /* Fractal selector buttons - isolated controls */
        .selector-group {
            display: flex;
            gap: 1rem;
            background: rgba(0, 0, 0, 0.45);
            padding: 0.3rem 0.8rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
        }

        .fractal-btn {
            background: transparent;
            border: 1.2px solid rgba(0, 255, 255, 0.55);
            color: #0ff;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .fractal-btn.active {
            background: cyan;
            color: #000;
            box-shadow: 0 0 16px cyan;
            border-color: white;
            text-shadow: none;
        }

        .fractal-btn:hover:not(.active) {
            background: rgba(0, 255, 255, 0.2);
            border-color: #0ff;
            transform: scale(1.02);
        }

        .info-panel {
            font-size: 0.72rem;
            color: #7df9ff;
            background: rgba(0, 20, 30, 0.6);
            padding: 0.25rem 1rem;
            border-radius: 32px;
            font-family: monospace;
            backdrop-filter: blur(4px);
        }

        .reset-tip {
            font-size: 0.68rem;
            color: #88aaff;
        }

        @media (max-width: 750px) {
            .bottom-bar {
                padding: 0.6rem 1rem;
                flex-direction: column;
                gap: 0.6rem;
            }
            .selector-group {
                order: 2;
            }
            .brand, .info-panel {
                width: 100%;
                justify-content: center;
                text-align: center;
            }
            .fractal-btn {
                padding: 0.3rem 0.9rem;
                font-size: 0.7rem;
            }
        }

        /* subtle animated border pulse */
        @keyframes borderPulse {
            0% { border-top-color: rgba(0,255,255,0.3); box-shadow: 0 -5px 20px rgba(0,255,255,0.1);}
            100% { border-top-color: rgba(0,255,255,0.9); box-shadow: 0 -8px 30px rgba(0,255,255,0.4);}
        }
        .bottom-bar {
            animation: borderPulse 2.5s infinite alternate;
        }
    </style>
</head>
<body>

<div class="fractal-stage">
    <canvas id="fractalCanvas" width="1400" height="900"></canvas>
</div>

<div class="bottom-bar">
    <div class="brand">
        <span class="logo">◈ FRACTAL CORE ◈</span>
        <span class="badge">INFINITE LOOP | NEON CHROMATIC</span>
    </div>
    <div class="selector-group">
        <button class="fractal-btn" data-mode="mandelbrot">🌀 MANDELBROT</button>
        <button class="fractal-btn" data-mode="dragon">🐉 DRAGON CURVE</button>
        <button class="fractal-btn" data-mode="golden">✨ GOLDEN SPIRAL</button>
    </div>
    <div class="info-panel">
        <span id="liveStatus">⚡ ZOOM INFINITE</span>
        <span class="reset-tip"> | 🖱️ click reset / [R]</span>
    </div>
</div>

<script>
    (function(){
        // ----- DOM elements -----
        const canvas = document.getElementById('fractalCanvas');
        const ctx = canvas.getContext('2d');
        const modeBtns = document.querySelectorAll('.fractal-btn');
        const statusSpan = document.getElementById('liveStatus');
        
        // ----- App state -----
        let currentMode = 'mandelbrot';   // 'mandelbrot', 'dragon', 'golden'
        
        // ----- Mandelbrot infinite zoom parameters (endless loop) -----
        let mandelX = -0.7269;
        let mandelY = 0.1889;
        let mandelZoom = 1.0;
        const ZOOM_SPEED = 1.18;       // per frame exponential zoom -> infinite feel
        let autoZoomActive = true;
        
        // ----- Dragon Curve Data -----
        let dragonPoints = [];
        const DRAGON_LEVEL = 13;        // high detail for elegant curve
        
        // ----- Golden Spiral Data -----
        let spiralPoints = [];
        const SPIRAL_STEPS = 1300;
        const SPIRAL_MAX_RADIUS = 15.2;
        
        // ----- Color animation (time-based shifting) -----
        let timeAcc = 0;
        let animationFrameId = null;
        
        // canvas dimensions
        let w = window.innerWidth;
        let h = window.innerHeight;
        
        // ------------------- UTILITIES -------------------
        function updateDimensions() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
        }
        
        // Dynamic neon stroke color based on time (rich gradient)
        function getNeonStrokeColor(t, alpha = 0.95) {
            const r = Math.sin(t * 0.73) * 0.7 + 0.8;
            const g = Math.sin(t * 0.91 + 1.8) * 0.8 + 0.8;
            const b = Math.sin(t * 1.17 + 3.2) * 0.9 + 0.5;
            return `rgba(${Math.floor(r * 210 + 45)}, ${Math.floor(g * 210 + 45)}, ${Math.floor(b * 230 + 25)}, ${alpha})`;
        }
        
        // Background with deep black / cyan / purple undertones (changes with time)
        function drawDynamicBackground(ctx, w, h, t) {
            // pure black base but slight hue shift in corners for neon aura
            const gradient = ctx.createLinearGradient(0, 0, w, h);
            const hue1 = (Math.sin(t * 0.2) * 0.1);
            const hue2 = (Math.cos(t * 0.23) * 0.12);
            gradient.addColorStop(0, `rgba(0, 0, 0, 1)`);
            gradient.addColorStop(0.5, `rgba(0, ${Math.floor(5 + hue1 * 10)}, ${Math.floor(8 + hue2 * 12)}, 1)`);
            gradient.addColorStop(1, `rgba(0, 0, 5, 1)`);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, w, h);
            // extra subtle particle aura (optional)
        }
        
        // ------------------- DRAGON CURVE GENERATION (Heighway Dragon, exact L-system) -------------------
        function generateDragonCurve(iterations) {
            // L-system: start = "FX", rules: X -> X+YF+, Y -> -FX-Y
            let seq = "FX";
            for (let i = 0; i < iterations; i++) {
                let nxt = "";
                for (let ch of seq) {
                    if (ch === 'X') nxt += "X+YF+";
                    else if (ch === 'Y') nxt += "-FX-Y";
                    else nxt += ch;
                }
                seq = nxt;
            }
            let x = 0, y = 0;
            let angle = 0;        // 0 radians = east
            const step = 4.0;
            const points = [{x: 0, y: 0}];
            for (let cmd of seq) {
                if (cmd === 'F') {
                    const nx = x + step * Math.cos(angle);
                    const ny = y + step * Math.sin(angle);
                    points.push({x: nx, y: ny});
                    x = nx;
                    y = ny;
                } else if (cmd === '+') {
                    angle += Math.PI / 2;
                } else if (cmd === '-') {
                    angle -= Math.PI / 2;
                }
            }
            return points;
        }
        
        function refreshDragon() {
            dragonPoints = generateDragonCurve(DRAGON_LEVEL);
        }
        
        // ------------------- GOLDEN SPIRAL (Logarithmic / Fibonacci-based) -------------------
        function generateGoldenSpiral(pointCount, maxRad) {
            const points = [];
            const phi = (1 + Math.sqrt(5)) / 2;   // golden ratio
            const growth = Math.pow(phi, 2 / Math.PI); // spiral expansion factor per radian
            for (let i = 0; i <= pointCount; i++) {
                const rad = i * 0.055;    // angle increment
                let radius = 0.28 * Math.pow(growth, rad);
                if (radius > maxRad) break;
                const x = radius * Math.cos(rad);
                const y = radius * Math.sin(rad);
                points.push({x, y});
            }
            return points;
        }
        
        function refreshGoldenSpiral() {
            spiralPoints = generateGoldenSpiral(SPIRAL_STEPS, SPIRAL_MAX_RADIUS);
        }
        
        // ------------------- MANDELBROT RENDER (Infinite zoom + full dynamic color) -------------------
        function renderMandelbrot(ctx, w, h, centerX, centerY, zoom, timeVal) {
            const maxIter = 200 + Math.floor(zoom * 0.8);
            const bailout = 4.0;
            const imageData = ctx.getImageData(0, 0, w, h);
            const data = imageData.data;
            const halfW = w / 2;
            const halfH = h / 2;
            const scale = 3.6 / zoom;
            
            for (let px = 0; px < w; px++) {
                for (let py = 0; py < h; py++) {
                    const x0 = (px - halfW) / halfW * scale + centerX;
                    const y0 = (py - halfH) / halfH * scale + centerY;
                    let x = 0, y = 0;
                    let iter = 0;
                    while (x*x + y*y < bailout && iter < maxIter) {
                        const xt = x*x - y*y + x0;
                        y = 2*x*y + y0;
                        x = xt;
                        iter++;
                    }
                    const idx = (py * w + px) * 4;
                    if (iter === maxIter) {
                        // deep inside set: deep black with subtle cyan/magenta hints
                        data[idx] = 0;
                        data[idx+1] = 4 + Math.floor(Math.sin(timeVal) * 3);
                        data[idx+2] = 8 + Math.floor(Math.cos(timeVal * 1.3) * 5);
                        data[idx+3] = 255;
                    } else {
                        // smooth coloring with time-dependent hue rotation
                        const t = iter / maxIter;
                        let hueShift = (t * 5.0 + timeVal * 1.2) % 1.0;
                        let r = Math.sin(2 * Math.PI * hueShift) * 0.8 + 0.7;
                        let g = Math.sin(2 * Math.PI * (hueShift + 0.33)) * 0.85 + 0.7;
                        let b = Math.sin(2 * Math.PI * (hueShift + 0.67)) * 0.9 + 0.4;
                        data[idx] = Math.floor(r * 200 + 55);
                        data[idx+1] = Math.floor(g * 210 + 45);
                        data[idx+2] = Math.floor(b * 230 + 25);
                        data[idx+3] = 255;
                    }
                }
            }
            ctx.putImageData(imageData, 0, 0);
            
            // draw zoom info overlay
            ctx.font = "12px 'JetBrains Mono', monospace";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "rgba(0, 255, 210, 0.85)";
            ctx.fillText(`⚡ INFINITE ZOOM: x${zoom.toFixed(6)}  |  auto-loop`, 22, 48);
        }
        
        // ------------------- DRAGON CURVE RENDER (isolated, only dragon) -------------------
        function renderDragonOnly(ctx, w, h, timeVal) {
            drawDynamicBackground(ctx, w, h, timeVal);
            ctx.save();
            ctx.translate(w/2, h/2);
            const scaleFactor = Math.min(w, h) / 380;
            ctx.scale(scaleFactor, scaleFactor);
            if (!dragonPoints.length) refreshDragon();
            const points = dragonPoints;
            if (points.length < 2) {
                ctx.restore();
                return;
            }
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            const strokeClr = getNeonStrokeColor(timeVal, 0.95);
            ctx.strokeStyle = strokeClr;
            ctx.lineWidth = 2.4;
            ctx.shadowBlur = 12;
            ctx.shadowColor = `hsl(${(timeVal * 120) % 360}, 100%, 55%)`;
            ctx.stroke();
            // secondary glow pass
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = "rgba(0, 210, 255, 0.35)";
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.restore();
            
            // label
            ctx.font = "11px monospace";
            ctx.fillStyle = "#0ff";
            ctx.shadowBlur = 0;
            ctx.fillText("🐉 Heighway Dragon Curve | Level 13", 22, 40);
        }
        
        // ------------------- GOLDEN SPIRAL RENDER (isolated, only spiral) -------------------
        function renderGoldenSpiralOnly(ctx, w, h, timeVal) {
            drawDynamicBackground(ctx, w, h, timeVal);
            ctx.save();
            ctx.translate(w/2, h/2);
            const scaleVal = Math.min(w, h) / 32;
            ctx.scale(scaleVal, scaleVal);
            if (!spiralPoints.length) refreshGoldenSpiral();
            const points = spiralPoints;
            if (points.length < 2) {
                ctx.restore();
                return;
            }
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                ctx.lineTo(points[i].x, points[i].y);
            }
            const phiHue = (timeVal * 0.85) % 1;
            const gradCol = `hsl(${phiHue * 360}, 100%, 62%)`;
            ctx.strokeStyle = gradCol;
            ctx.lineWidth = 2.6;
            ctx.shadowBlur = 12;
            ctx.shadowColor = "cyan";
            ctx.stroke();
            // extra fine inner line
            ctx.beginPath();
            ctx.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
            ctx.strokeStyle = `rgba(255, 100, 200, 0.7)`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.restore();
            
            ctx.font = "11px monospace";
            ctx.fillStyle = "#ffb3ff";
            ctx.fillText("✨ Golden Spiral | φ = 1.618 • logarithmic", 22, 40);
        }
        
        // ------------------- MASTER RENDER DISPATCH (show ONLY selected fractal) -------------------
        function renderCurrentFractal(nowSeconds) {
            if (!ctx) return;
            updateDimensions();
            if (currentMode === 'mandelbrot') {
                // INFINITE ZOOM ACTIVE: continuously zoom further (never ending)
                if (autoZoomActive) {
                    mandelZoom *= ZOOM_SPEED;
                    // keep zoom extremely high but stable (limit not needed, but for performance keep huge)
                    if (mandelZoom > 1e15) mandelZoom = 1e15;
                }
                renderMandelbrot(ctx, w, h, mandelX, mandelY, mandelZoom, nowSeconds);
                statusSpan.innerHTML = "🌀 MANDELBROT • ∞ ZOOM LOOP";
            } 
            else if (currentMode === 'dragon') {
                renderDragonOnly(ctx, w, h, nowSeconds);
                statusSpan.innerHTML = "🐉 DRAGON CURVE • NEON CHROMATIC";
            } 
            else if (currentMode === 'golden') {
                renderGoldenSpiralOnly(ctx, w, h, nowSeconds);
                statusSpan.innerHTML = "✨ GOLDEN SPIRAL • PHI PROPORTION";
            }
        }
        
        // ------------------- RESET FUNCTIONALITY -------------------
        function resetCurrentView() {
            if (currentMode === 'mandelbrot') {
                mandelX = -0.7269;
                mandelY = 0.1889;
                mandelZoom = 1.0;
                autoZoomActive = true;
            } else if (currentMode === 'dragon') {
                refreshDragon();
            } else if (currentMode === 'golden') {
                refreshGoldenSpiral();
            }
        }
        
        // ------------------- MODE SWITCHING (clean separation) -------------------
        function setActiveMode(mode) {
            currentMode = mode;
            // Update active button style
            modeBtns.forEach(btn => {
                if (btn.getAttribute('data-mode') === mode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            // For each mode, ensure data is ready
            if (mode === 'dragon' && (!dragonPoints.length || dragonPoints.length < 50)) {
                refreshDragon();
            }
            if (mode === 'golden' && (!spiralPoints.length || spiralPoints.length < 100)) {
                refreshGoldenSpiral();
            }
            if (mode === 'mandelbrot') {
                // just ensure zoom is active
                if (mandelZoom < 0.5) resetCurrentView();
            }
        }
        
        // ------------------- ANIMATION LOOP (time & infinite zoom) -------------------
        let frameCount = 0;
        let startGlobalTime = performance.now() / 1000;
        function animationLoop() {
            const now = performance.now() / 1000;
            const elapsed = now - startGlobalTime;
            timeAcc = elapsed;
            renderCurrentFractal(elapsed);
            animationFrameId = requestAnimationFrame(animationLoop);
        }
        
        // ------------------- EVENT HANDLERS -------------------
        function handleResize() {
            updateDimensions();
            // optional re-center for spiral/dragon not needed but fine
            if (currentMode === 'dragon') refreshDragon();
            if (currentMode === 'golden') refreshGoldenSpiral();
        }
        
        // Button click listeners: separate interaction
        modeBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const mode = btn.getAttribute('data-mode');
                if (mode === 'mandelbrot') setActiveMode('mandelbrot');
                else if (mode === 'dragon') setActiveMode('dragon');
                else if (mode === 'golden') setActiveMode('golden');
            });
        });
        
        // reset button via R key
        window.addEventListener('keydown', (e) => {
            if (e.key === 'r' || e.key === 'R') {
                resetCurrentView();
                e.preventDefault();
            }
            // optional: press 1,2,3 for quick switching
            if (e.key === '1') setActiveMode('mandelbrot');
            if (e.key === '2') setActiveMode('dragon');
            if (e.key === '3') setActiveMode('golden');
        });
        
        // also add reset tip on bottom bar click? we use global reset key
        // click on brand? just for fun - reset
        document.querySelector('.logo').addEventListener('click', () => {
            resetCurrentView();
        });
        
        // initial data generation
        function init() {
            updateDimensions();
            refreshDragon();
            refreshGoldenSpiral();
            setActiveMode('mandelbrot');    // start with infinite zoom mandelbrot
            window.addEventListener('resize', () => {
                handleResize();
            });
            animationLoop();
        }
        
        init();
    })();
</script>
</body>
</html>
