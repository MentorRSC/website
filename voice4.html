<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Translate & Speak</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:20px auto;
    padding:15px;
}

textarea{
    width:100%;
    min-height:120px;
    padding:10px;
    margin:10px 0;
}

select,
input[type=range]{
    width:100%;
    margin:8px 0;
}

button{
    padding:10px 15px;
    margin:5px 0;
    cursor:pointer;
}

.row{
    margin-top:10px;
}
</style>
</head>
<body>

<h2>English → Malayalam / Hindi Speaker</h2>

<label>English Text</label>

<textarea id="englishText"
placeholder="Type English text here"></textarea>

<label>Translate To</label>

<select id="language">
    <option value="ml">Malayalam</option>
    <option value="hi">Hindi</option>
</select>

<button onclick="translateText()">
Translate
</button>

<label>Translated Text</label>

<textarea id="translatedText"
readonly></textarea>

<label>Voice</label>

<select id="voiceSelect"></select>

<div class="row">
<label>
Pitch:
<span id="pitchValue">1</span>
</label>

<input
type="range"
id="pitch"
min="0"
max="2"
step="0.1"
value="1">
</div>

<div class="row">
<label>
Speed:
<span id="rateValue">1</span>
</label>

<input
type="range"
id="rate"
min="0.5"
max="2"
step="0.1"
value="1">
</div>

<button onclick="speakTranslated()">
🔊 Speak Translation
</button>

<button onclick="speechSynthesis.cancel()">
⏹ Stop
</button>

<p id="status"></p>

<script>

const voiceSelect =
document.getElementById("voiceSelect");

function loadVoices() {

    const voices =
        speechSynthesis.getVoices();

    voiceSelect.innerHTML = "";

    voices.forEach(v => {

        const option =
            document.createElement(
                "option"
            );

        option.value = v.name;

        option.textContent =
            `${v.name} (${v.lang})`;

        voiceSelect.appendChild(
            option
        );
    });
}

speechSynthesis.onvoiceschanged =
loadVoices;

loadVoices();

document
.getElementById("pitch")
.oninput = function(){

    document
    .getElementById("pitchValue")
    .innerText = this.value;
};

document
.getElementById("rate")
.oninput = function(){

    document
    .getElementById("rateValue")
    .innerText = this.value;
};

async function translateText(){

    const text =
        document
        .getElementById(
            "englishText"
        ).value.trim();

    if(!text){
        alert(
            "Enter English text"
        );
        return;
    }

    const lang =
        document
        .getElementById(
            "language"
        ).value;

    document
    .getElementById(
        "status"
    ).innerText =
        "Translating...";

    try{

        const url =
        `https://api.mymemory.translated.net/get?q=${
            encodeURIComponent(text)
        }&langpair=en|${lang}`;

        const response =
            await fetch(url);

        const data =
            await response.json();

        document
        .getElementById(
            "translatedText"
        ).value =
            data.responseData
            .translatedText;

        document
        .getElementById(
            "status"
        ).innerText =
            "Translation complete";

    }
    catch(err){

        console.error(err);

        document
        .getElementById(
            "status"
        ).innerText =
            "Translation failed";
    }
}

async function speakTranslated(){

    if(
        !document
        .getElementById(
            "translatedText"
        ).value.trim()
    ){
        await translateText();
    }

    const text =
        document
        .getElementById(
            "translatedText"
        ).value;

    const utterance =
        new SpeechSynthesisUtterance(
            text
        );

    const lang =
        document
        .getElementById(
            "language"
        ).value;

    utterance.lang =
        lang === "ml"
        ? "ml-IN"
        : "hi-IN";

    utterance.pitch =
        parseFloat(
            document
            .getElementById(
                "pitch"
            ).value
        );

    utterance.rate =
        parseFloat(
            document
            .getElementById(
                "rate"
            ).value
        );

    const voices =
        speechSynthesis.getVoices();

    const selected =
        voices.find(
            v =>
            v.name ===
            voiceSelect.value
        );

    if(selected){
        utterance.voice =
            selected;
    }

    speechSynthesis.cancel();

    speechSynthesis.speak(
        utterance
    );
}

</script>

</body>
</html>
