<!DOCTYPE html>
<html>
<head>
<title>Simple Form</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg, #667eea, #764ba2);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  background: white;
  padding: 30px;
  border-radius: 15px;
  width: 320px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 15px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}
</style>

</head>

<body>

<div class="card">
  <h2>Enter Your Name</h2>

  <form action="https://docs.google.com/forms/d/e/1FAIpQLScTKHIc1sZohKYSLe48sd_0n2BT_3gBzRT1VAHrjhp-ZMm3KQ/formResponse"
        method="POST"
        target="hidden_iframe"
        onsubmit="showSuccess()">

    <!-- ✅ CORRECT FIELD -->
    <input type="text" name="entry.1633920210" placeholder="Your Name" required>

    <button type="submit">Submit</button>
  </form>

  <p id="msg" style="display:none; color:green;">✅ Submitted successfully!</p>

  <iframe name="hidden_iframe" style="display:none;"></iframe>
</div>

<script>
function showSuccess() {
  setTimeout(() => {
    document.getElementById("msg").style.display = "block";
  }, 500);
}
</script>

</body>
</html>
