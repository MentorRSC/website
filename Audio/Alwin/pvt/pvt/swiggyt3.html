<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Sheet Viewer - Click to View Details</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: monospace;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }

        button:hover {
            background: #5a67d8;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .example {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            margin-bottom: 20px;
        }

        .example span {
            background: #f0f0f0;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-family: monospace;
        }

        .example span:hover {
            background: #e0e0e0;
        }

        /* List View - Only First Column */
        .list-container {
            margin-top: 20px;
        }

        .list-item {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .list-item:hover {
            background: #f5f3ff;
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
        }

        .item-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .item-title {
            flex: 1;
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }

        .item-arrow {
            color: #667eea;
            font-size: 18px;
        }

        /* Modal Popup */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 0;
            width: 90%;
            max-width: 600px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.3s;
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 16px 16px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 18px;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .close:hover {
            opacity: 0.7;
        }

        .modal-body {
            padding: 20px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .detail-row {
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #667eea;
        }

        .detail-label {
            font-weight: bold;
            color: #667eea;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .detail-value {
            color: #333;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sheet-link {
            background: #e8f5e9;
            border-left-color: #4caf50;
            cursor: pointer;
            transition: 0.2s;
        }

        .sheet-link:hover {
            background: #c8e6c9;
            transform: scale(1.01);
        }

        .sheet-link .detail-value {
            color: #2e7d32;
            text-decoration: underline;
            font-family: monospace;
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: #666;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin-top: 20px;
        }

        .success {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 20px;
        }

        .sheet-info {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .badge {
            display: inline-block;
            background: #ff9800;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            margin-left: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }
            .modal-content {
                width: 95%;
                margin: 10% auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Interactive Sheet Viewer</h1>
        <div class="subtitle">Click any item to view details (Columns 2-5)</div>
        
        <div class="input-group">
            <input type="text" id="sheetId" placeholder="Enter Google Sheet ID" value="1G8nLMbRB7bU25ReXbPgNuGaL3jEiN9rvsG4LKGiJkz4">
            <button onclick="loadSheet()">📥 Load Sheet</button>
        </div>
        
        <div class="example">
            💡 Example Sheet IDs (click to try):<br>
            <span onclick="setExample('1G8nLMbRB7bU25ReXbPgNuGaL3jEiN9rvsG4LKGiJkz4')">Your Sheet</span>
        </div>
        
        <div id="data"></div>
    </div>

    <!-- Modal Popup -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 Record Details</h3>
                <span class="close">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script>
        let currentSheetData = [];
        let currentSheetId = '';

        async function loadSheet() {
            const sheetId = document.getElementById('sheetId').value.trim();
            
            if (!sheetId) {
                showError('Please enter a Google Sheet ID');
                return;
            }
            
            currentSheetId = sheetId;
            const div = document.getElementById('data');
            div.innerHTML = '<div class="loading">🔄 Loading sheet data...</div>';
            
            const URL = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;
            
            try {
                const response = await fetch(URL);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Sheet not accessible`);
                }
                
                const text = await response.text();
                
                let json;
                try {
                    const jsonStr = text.substring(47).slice(0, -2);
                    json = JSON.parse(jsonStr);
                } catch (e) {
                    throw new Error('Invalid response format. Make sure the sheet is published.');
                }
                
                const rows = json.table.rows;
                const cols = json.table.cols;
                
                if (!rows || rows.length === 0) {
                    showError('No data found in this sheet');
                    return;
                }
                
                // Get column labels
                const columnNames = cols.map((col, idx) => {
                    return col.label || col.id || `Column ${idx + 1}`;
                });
                
                // Store data for later use
                currentSheetData = [];
                const firstColumnData = [];
                
                for (let i = 0; i < rows.length; i++) {
                    const cells = rows[i].c || [];
                    const rowData = {};
                    
                    // Store all columns
                    cells.forEach((cell, idx) => {
                        if (cell && cell.v !== null && cell.v !== undefined) {
                            rowData[columnNames[idx] || `col_${idx}`] = cell.v;
                            rowData[`col_${idx}`] = cell.v;
                        }
                    });
                    
                    rowData.rowIndex = i;
                    currentSheetData.push(rowData);
                    
                    // Get first column value (col_0)
                    const firstColValue = rowData[columnNames[0]] || rowData.col_0 || `Row ${i + 1}`;
                    firstColumnData.push({
                        value: firstColValue,
                        index: i
                    });
                }
                
                // Show sheet info
                let html = `
                    <div class="success">✅ Sheet loaded successfully!</div>
                    <div class="sheet-info">
                        📄 Sheet ID: ${sheetId}<br>
                        📊 Total Records: ${rows.length}<br>
                        📋 Total Columns: ${cols.length}<br>
                        💡 Click any row to see Columns 2-5
                    </div>
                    <div class="list-container">
                `;
                
                // Display only first column as clickable list
                firstColumnData.forEach((item, idx) => {
                    html += `
                        <div class="list-item" onclick="showDetails(${item.index})">
                            <div class="item-number">${idx + 1}</div>
                            <div class="item-title">${escapeHtml(String(item.value))}</div>
                            <div class="item-arrow">→</div>
                        </div>
                    `;
                });
                
                html += `</div>`;
                div.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                showError(`
                    <strong>❌ Failed to load sheet</strong><br><br>
                    Error: ${error.message}<br><br>
                    <strong>How to fix:</strong><br>
                    1. Make sure your Google Sheet is <strong>published to web</strong><br>
                    2. Go to: File → Share → Publish to web → Click "Publish"<br>
                    3. Make sure the Sheet ID is correct
                `);
            }
        }
        
        function showDetails(rowIndex) {
            const rowData = currentSheetData[rowIndex];
            if (!rowData) return;
            
            const modal = document.getElementById('detailModal');
            const modalBody = document.getElementById('modalBody');
            
            // Extract columns 2, 3, 4, 5 (indices 1, 2, 3, 4)
            const col2 = rowData.col_1 || rowData['Column 2'] || 'No data';
            const col3 = rowData.col_2 || rowData['Column 3'] || 'No data';
            const col4 = rowData.col_3 || rowData['Column 4'] || 'No data';
            const col5 = rowData.col_4 || rowData['Column 5'] || 'No data';
            
            // Check if any of these columns contain a Sheet ID (looks like a Google Sheet ID)
            const sheetIdPattern = /[a-zA-Z0-9_-]{30,}/;
            const fieldsToCheck = [
                { label: 'Column 2', value: col2 },
                { label: 'Column 3', value: col3 },
                { label: 'Column 4', value: col4 },
                { label: 'Column 5', value: col5 }
            ];
            
            let html = `
                <div class="detail-row">
                    <div class="detail-label">📌 Column 1 (Title)</div>
                    <div class="detail-value">${escapeHtml(rowData.col_0 || rowData['Column 1'] || 'No data')}</div>
                </div>
            `;
            
            fieldsToCheck.forEach(field => {
                const isSheetId = sheetIdPattern.test(field.value) && field.value.length > 30;
                
                if (isSheetId) {
                    html += `
                        <div class="detail-row sheet-link" onclick="openSheet('${escapeHtml(field.value)}')">
                            <div class="detail-label">🔗 ${field.label} (Click to open)</div>
                            <div class="detail-value">📊 ${escapeHtml(field.value)}</div>
                            <div style="font-size: 11px; color: #666; margin-top: 5px;">✨ Click to open this sheet →</div>
                        </div>
                    `;
                } else {
                    html += `
                        <div class="detail-row">
                            <div class="detail-label">📄 ${field.label}</div>
                            <div class="detail-value">${escapeHtml(field.value)}</div>
                        </div>
                    `;
                }
            });
            
            // Add additional info
            html += `
                <div class="detail-row" style="background: #e3f2fd;">
                    <div class="detail-label">ℹ️ Info</div>
                    <div class="detail-value">Row ${rowIndex + 1} • Click outside to close</div>
                </div>
            `;
            
            modalBody.innerHTML = html;
            modal.style.display = 'block';
        }
        
        function openSheet(sheetId) {
            // Clean the sheet ID (remove any extra spaces or characters)
            let cleanId = sheetId.trim();
            // If it looks like a Google Sheet ID, open it
            if (cleanId.match(/[a-zA-Z0-9_-]{30,}/)) {
                window.open(`https://docs.google.com/spreadsheets/d/${cleanId}`, '_blank');
            } else {
                // Try to open as URL if it's a full URL
                if (cleanId.startsWith('http')) {
                    window.open(cleanId, '_blank');
                } else {
                    alert('This does not appear to be a valid Sheet ID: ' + cleanId);
                }
            }
        }
        
        function showError(message) {
            const div = document.getElementById('data');
            div.innerHTML = `<div class="error">${message}</div>`;
        }
        
        function setExample(sheetId) {
            document.getElementById('sheetId').value = sheetId;
            loadSheet();
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        // Modal close functionality
        const modal = document.getElementById('detailModal');
        const closeBtn = document.querySelector('.close');
        
        closeBtn.onclick = function() {
            modal.style.display = 'none';
        }
        
        window.onclick = function(event) {
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
        
        // Load default sheet on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadSheet();
        });
    </script>
</body>
</html>
