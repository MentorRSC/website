<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Card Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Section - from Sheet5 -->
        <header class="app-header">
            <h1 id="main-heading">Loading...</h1>
            <p id="sub-heading"></p>
        </header>

        <!-- Controls Bar -->
        <div class="controls-bar">
            <div class="control-group">
                <label>🎨 Color Theme:</label>
                <select id="theme-selector">
                    <option value="">Loading themes...</option>
                </select>
            </div>
            
            <div class="control-group">
                <label>📇 Card Style:</label>
                <select id="style-selector">
                    <option value="">Loading styles...</option>
                </select>
            </div>
            
            <button id="refresh-btn" class="refresh-btn">⟳ Refresh Data</button>
        </div>

        <!-- Cards Container -->
        <div id="cards-container" class="cards-grid">
            <div class="loading-spinner">Loading cards...</div>
        </div>

        <!-- Footer -->
        <footer id="footer-text" class="app-footer"></footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
