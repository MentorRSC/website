<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .dashboard-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .dashboard-content {
            padding: 30px;
        }

        .status-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            background: #f39c12;
            color: white;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 15px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .info-card h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-card p {
            color: #666;
            line-height: 1.6;
            margin: 8px 0;
        }

        .info-card strong {
            color: #333;
        }

        .message-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .message-box h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .message-box p {
            color: #856404;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 600;
            margin-top: 20px;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1>🏆 Member Dashboard</h1>
            <p>Welcome to our exclusive community</p>
        </div>
        
        <div class="dashboard-content" id="dashboardContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading your information...</p>
            </div>
        </div>
    </div>

    <script>
        // Load registration data from localStorage
        function loadDashboard() {
            const registrationData = localStorage.getItem('registrationData');
            
            if (!registrationData) {
                // No registration found, redirect to registration page
                window.location.href = 'registration.html';
                return;
            }
            
            const data = JSON.parse(registrationData);
            const container = document.getElementById('dashboardContent');
            
            // Format date
            const dob = new Date(data.dob);
            const formattedDob = dob.toLocaleDateString('en-US', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const html = `
                <div class="status-card">
                    <h2>📋 Application Status</h2>
                    <div class="status-badge">Pending Review</div>
                    <p style="margin-top: 15px;">Your application is being reviewed by our team</p>
                </div>
                
                <div class="info-grid">
                    <div class="info-card">
                        <h3>👤 Personal Information</h3>
                        <p><strong>Name:</strong> ${escapeHtml(data.name)}</p>
                        <p><strong>Date of Birth:</strong> ${formattedDob}</p>
                        <p><strong>Mobile:</strong> ${escapeHtml(data.mobile)}</p>
                    </div>
                    
                    <div class="info-card">
                        <h3>💡 Your Contribution</h3>
                        <p>${escapeHtml(data.offering)}</p>
                    </div>
                </div>
                
                <div class="message-box">
                    <h3>📞 Important Note</h3>
                    <p>You cannot register directly for membership. The club will review your application and contact you if you're eligible. Please wait for our call within 2-3 business days.</p>
                    <p style="margin-top: 10px;"><strong>Application ID:</strong> ${generateApplicationId()}</p>
                    <p><strong>Submitted on:</strong> ${new Date().toLocaleString()}</p>
                </div>
                
                <div style="text-align: center;">
                    <a href="registration.html" class="btn">Submit Another Application</a>
                </div>
            `;
            
            container.innerHTML = html;
        }
        
        function generateApplicationId() {
            const timestamp = Date.now();
            const random = Math.floor(Math.random() * 1000);
            return `APP-${timestamp}-${random}`;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        
        // Load dashboard on page load
        loadDashboard();
    </script>
</body>
</html>
