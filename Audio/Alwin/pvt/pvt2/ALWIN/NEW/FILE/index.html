<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Smart Launch | Secure Connection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        body.dark {
            background: #0f172a;
        }

        .launch-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 2rem;
            word-break: break-word;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.3s ease;
        }

        body.dark .app-title {
            color: #f1f5f9;
        }

        .app-title.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .loader-wrapper {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loader-wrapper.visible {
            opacity: 1;
        }

        .spinner-ring {
            width: 56px;
            height: 56px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
            background: rgba(255,255,255,0.7);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        body.dark .loader-text {
            color: #cbd5e1;
            background: rgba(30,41,59,0.6);
        }

        /* MODAL POPUP STYLES - for proceed confirmation */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
 backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-card {
            background: #ffffff;
            border-radius: 32px;
            max-width: 340px;
            width: 85%;
            padding: 2rem 1.5rem 1.8rem;
            text-align: center;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.35);
            transform: scale(0.95);
            transition: transform 0.25s ease;
            animation: modalPop 0.3s ease forwards;
        }

        body.dark .modal-card {
            background: #1e293b;
        }

        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-icon {
            font-size: 3.5rem;
            margin-bottom: 0.75rem;
        }

        .modal-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        body.dark .modal-title {
            color: #f1f5f9;
        }

        .modal-message {
            font-size: 0.95rem;
            color: #475569;
            margin-bottom: 1.8rem;
            line-height: 1.4;
        }

        body.dark .modal-message {
            color: #cbd5e1;
        }

        .modal-url {
            background: #f1f5f9;
            padding: 0.5rem;
            border-radius: 14px;
            font-size: 0.8rem;
            word-break: break-all;
            margin-bottom: 1.5rem;
            color: #3b82f6;
            font-family: monospace;
        }

        body.dark .modal-url {
            background: #0f172a;
            color: #60a5fa;
        }

        .proceed-btn {
            background: #10b981;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);
        }

        .proceed-btn:hover {
            background: #059669;
            transform: scale(1.02);
        }

        .error-modal .modal-card {
            border-top: 5px solid #ef4444;
        }

        .error-modal .modal-icon {
            font-size: 3rem;
        }

        .error-btn {
            background: #ef4444;
            box-shadow: none;
        }

        .error-btn:hover {
            background: #dc2626;
        }

        /* Toast for minor info (non-blocking) */
        .toast-popup {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 0.7rem 1.3rem;
            border-radius: 60px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s ease;
            backdrop-filter: blur(8px);
            background: rgba(15, 23, 42, 0.95);
            max-width: 85vw;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
        }

        .toast-popup.show {
            transform: translateX(-50%) translateY(0);
        }

        .theme-toggle-mini {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 0.9rem;
            font-size: 1rem;
            cursor: pointer;
            z-index: 1100;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            font-weight: 500;
            color: #1e293b;
        }

        body.dark .theme-toggle-mini {
            background: rgba(30,41,59,0.8);
            color: #facc15;
        }

        @media (max-width: 500px) {
            .app-title { font-size: 1.8rem; }
            .modal-card { padding: 1.5rem 1.2rem; }
            .modal-title { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-mini" id="themeToggleBtn" aria-label="Dark/Light mode">🌙 Dark</button>

    <div class="launch-container">
        <h1 id="dynamicTitle" class="app-title">✨</h1>
        <div id="loaderUI" class="loader-wrapper">
            <div class="spinner-ring"></div>
            <div class="loader-text">🔐 Verifying secure channel...</div>
        </div>
    </div>

    <!-- Modal Container (Dynamic) -->
    <div id="actionModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-icon" id="modalIcon">🔒</div>
            <div class="modal-title" id="modalTitle">Secure Connection</div>

            <button id="modalActionBtn" class="proceed-btn">Proceed →</button>
        </div>
    </div>

    <div id="toastMsg" class="toast-popup"></div>

    <script>
        (function() {
            // ---------- CONFIGURATION ----------
            const SHEET_ID = "1iRgmm2a-1o0VtGwk_p10pFiKdj9ewQ2hmQfZh0LCDuY";
            
            // DOM Elements
            const titleEl = document.getElementById('dynamicTitle');
            const loaderWrapper = document.getElementById('loaderUI');
            const modalOverlay = document.getElementById('actionModal');
            const modalIcon = document.getElementById('modalIcon');
            const modalTitle = document.getElementById('modalTitle');
            const modalMessage = document.getElementById('modalMessage');
            const modalUrlContainer = document.getElementById('modalUrlContainer');
            const modalBtn = document.getElementById('modalActionBtn');
            const toastEl = document.getElementById('toastMsg');
            
            let pendingRedirectUrl = null;
            let redirectTriggered = false;
            
            // Helper: Show simple toast (non-blocking)
            let toastTimeout = null;
            function showToast(message, isError = false) {
                if (toastTimeout) clearTimeout(toastTimeout);
                toastEl.textContent = message;
                toastEl.classList.remove('show');
                void toastEl.offsetWidth;
                toastEl.style.background = isError ? "rgba(185, 28, 28, 0.96)" : "rgba(15, 23, 42, 0.95)";
                toastEl.classList.add('show');
                toastTimeout = setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 3000);
            }
            
            // Helper: Show modal (either success/proceed or error)
            function showModal(config) {
                // config: { type, title, message, url, buttonText, onConfirm }
                modalIcon.textContent = config.icon || (config.type === 'error' ? '⚠️' : '🔒');
                modalTitle.textContent = config.title;
                modalMessage.textContent = config.message;
                
                if (config.url && config.type !== 'error') {
                    modalUrlContainer.textContent = `🌐 ${config.url}`;
                    modalUrlContainer.style.display = 'block';
                } else {
                    modalUrlContainer.style.display = 'none';
                }
                
                // Style button based on type
                if (config.type === 'error') {
                    modalBtn.classList.add('error-btn');
                    modalBtn.textContent = config.buttonText || 'OK';
                } else {
                    modalBtn.classList.remove('error-btn');
                    modalBtn.textContent = config.buttonText || 'Proceed →';
                }
                
                // Remove previous listeners and attach new one
                const newBtn = modalBtn.cloneNode(true);
                modalBtn.parentNode.replaceChild(newBtn, modalBtn);
                const finalBtn = document.getElementById('modalActionBtn');
                
                finalBtn.addEventListener('click', () => {
                    closeModal();
                    if (config.onConfirm && typeof config.onConfirm === 'function') {
                        config.onConfirm();
                    }
                });
                
                modalOverlay.classList.add('active');
            }
            
            function closeModal() {
                modalOverlay.classList.remove('active');
            }
            
            // Helper: fetch sheet data
            async function fetchSheetMetadata() {
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Sheet access failed. Make sure it's public.`);
                }
                const text = await response.text();
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\((.+)\);/);
                if (!jsonMatch || !jsonMatch[1]) {
                    throw new Error("Invalid Google Sheets response.");
                }
                const data = JSON.parse(jsonMatch[1]);
                const rows = data.table?.rows || [];
                if (rows.length === 0) throw new Error("Sheet1 is empty.");
                const firstRow = rows[0].c || [];
                const getVal = (idx) => {
                    const cell = firstRow[idx];
                    if (!cell) return "";
                    return (cell.v !== undefined && cell.v !== null) ? String(cell.v).trim() : "";
                };
                const titleRaw = getVal(0);
                const flagRaw = getVal(1);
                const urlRaw = getVal(2);
                
                let flag = -1;
                if (flagRaw === "1") flag = 1;
                else if (flagRaw === "0") flag = 0;
                
                return { title: titleRaw || "Smart Launch", flag, redirectUrl: urlRaw };
            }
            
            // Escape title for safety
            function escapeHtml(str) {
                if (!str) return "";
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }
            
            // Main flow
            async function runLaunch() {
                loaderWrapper.classList.remove('visible');
                titleEl.classList.remove('reveal');
                titleEl.textContent = "✨";
                
                let sheetTitle = "";
                let sheetFlag = 0;
                let sheetUrl = "";
                let fetchError = null;
                
                // ---- FETCH DATA ----
                try {
                    const meta = await fetchSheetMetadata();
                    sheetTitle = meta.title;
                    sheetFlag = meta.flag;
                    sheetUrl = meta.redirectUrl;
                    
                    if (sheetFlag === -1) {
                        throw new Error("Invalid flag value in Cell2. Must be 0 (restricted) or 1 (redirect).");
                    }
                    
                    // If flag 1 but URL is empty -> config error
                    if (sheetFlag === 1 && (!sheetUrl || sheetUrl === "")) {
                        throw new Error("Flag is 1 but redirect URL (Cell3) is empty.");
                    }
                } catch (err) {
                    fetchError = err.message;
                    console.error("Fetch error:", err);
                }
                
                // ---- CASE 1: FETCH ERROR (Server Error) ----
                if (fetchError) {
                    // Show title fallback
                    titleEl.textContent = "⚠️ Connection Error";
                    titleEl.classList.add('reveal');
                    loaderWrapper.classList.remove('visible');
                    
                    // Show ERROR modal (server error popup with OK button)
                    showModal({
                        type: 'error',
                        icon: '⚠️',
                        title: 'Server Error',
                        message: `Unable to fetch configuration.\n${fetchError}`,
                        buttonText: 'OK',
                        onConfirm: () => {
                            // Just close modal, stay on page
                            console.log("Error acknowledged.");
                        }
                    });
                    return;
                }
                
                // ---- DISPLAY TITLE FROM CELL1 (ONLY VISIBLE TEXT) ----
                titleEl.textContent = escapeHtml(sheetTitle) || "Untitled";
                titleEl.classList.add('reveal');
                
                // ---- FLAG = 0 : RESTRICTED / NO ENTRY -> SHOW SERVER ERROR MODAL ----
                if (sheetFlag === 0) {
                    loaderWrapper.classList.remove('visible');
                    showModal({
                        type: 'error',
                        icon: '🚫',
                        title: 'Access Restricted',
                        message: 'Server error: Entry not allowed or restricted area. You do not have permission to proceed.',
                        buttonText: 'OK',
                        onConfirm: () => {
                            // Stay on page, no redirect
                            console.log("Restricted access confirmed.");
                        }
                    });
                    return;
                }
                
                // ---- FLAG = 1 : SHOW 3 SEC LOADER, THEN PROCEED MODAL ----
                if (sheetFlag === 1) {
                    // Show loader for exactly 3 seconds
                    loaderWrapper.classList.add('visible');
                    await new Promise(resolve => setTimeout(resolve, 3000));
                    loaderWrapper.classList.remove('visible');
                    
                    // Prepare URL for redirect
                    let finalUrl = sheetUrl.trim();
                    if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                        finalUrl = 'https://' + finalUrl;
                    }
                    pendingRedirectUrl = finalUrl;
                    
                    // Show Proceed Modal (Secure connection ready)
                    showModal({
                        type: 'success',
                        icon: '🔒✅',
                        title: 'Secure Connection Active',
                        message: 'Connection has been securely established. Click Proceed to continue to the protected destination.',
                        url: pendingRedirectUrl,
                        buttonText: 'Proceed →',
                        onConfirm: () => {
                            if (!redirectTriggered && pendingRedirectUrl) {
                                redirectTriggered = true;
                                showToast(`Redirecting to secure destination...`, false);
                                setTimeout(() => {
                                    window.location.href = pendingRedirectUrl;
                                }, 150);
                            }
                        }
                    });
                    return;
                }
                
                // Fallback (should never reach)
                loaderWrapper.classList.remove('visible');
                showModal({
                    type: 'error',
                    icon: '⚠️',
                    title: 'Unknown State',
                    message: 'Invalid configuration state.',
                    buttonText: 'OK'
                });
            }
            
            // Dark Mode Toggle
            function initTheme() {
                const btn = document.getElementById('themeToggleBtn');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let stored = localStorage.getItem('app_theme');
                let theme = stored || (prefersDark ? 'dark' : 'light');
                const apply = (newTheme) => {
                    if (newTheme === 'dark') {
                        document.body.classList.add('dark');
                        btn.innerHTML = '☀️ Light';
                    } else {
                        document.body.classList.remove('dark');
                        btn.innerHTML = '🌙 Dark';
                    }
                    localStorage.setItem('app_theme', newTheme);
                };
                apply(theme);
                btn.addEventListener('click', () => {
                    const next = document.body.classList.contains('dark') ? 'light' : 'dark';
                    apply(next);
                });
            }
            
            document.addEventListener('DOMContentLoaded', () => {
                initTheme();
                runLaunch().catch(err => {
                    console.error("Fatal:", err);
                    showModal({
                        type: 'error',
                        icon: '🔥',
                        title: 'Critical Error',
                        message: `Unexpected system error: ${err.message}`,
                        buttonText: 'Reload',
                        onConfirm: () => window.location.reload()
                    });
                });
            });
        })();
    </script>
</body>
</html>
