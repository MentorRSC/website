<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Smart Launch | Dynamic Redirect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        body.dark {
            background: #0f172a;
        }

        .launch-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        .app-title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 2rem;
            word-break: break-word;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.3s ease;
        }

        body.dark .app-title {
            color: #f1f5f9;
        }

        .app-title.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        .loader-wrapper {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loader-wrapper.visible {
            opacity: 1;
        }

        .spinner-ring {
            width: 56px;
            height: 56px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
            background: rgba(255,255,255,0.7);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        body.dark .loader-text {
            color: #cbd5e1;
            background: rgba(30,41,59,0.6);
        }

        .hidden {
            display: none;
        }

        .toast-popup {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s ease;
            backdrop-filter: blur(8px);
            background: rgba(15, 23, 42, 0.95);
            max-width: 85vw;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
        }

        .toast-popup.error {
            background: rgba(185, 28, 28, 0.96);
            border-left: 4px solid #facc15;
        }

        .toast-popup.show {
            transform: translateX(-50%) translateY(0);
        }

        .theme-toggle-mini {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 0.9rem;
            font-size: 1rem;
            cursor: pointer;
            z-index: 1100;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            font-weight: 500;
            color: #1e293b;
        }

        body.dark .theme-toggle-mini {
            background: rgba(30,41,59,0.8);
            color: #facc15;
        }

        @media (max-width: 500px) {
            .app-title {
                font-size: 1.8rem;
            }
            .toast-popup {
                font-size: 0.8rem;
                padding: 0.6rem 1.2rem;
                white-space: normal;
                max-width: 90vw;
                text-align: center;
            }
            .launch-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-mini" id="themeToggleBtn" aria-label="Dark/Light mode">🌙 Dark</button>

    <div class="launch-container">
        <h1 id="dynamicTitle" class="app-title">✨</h1>
        <div id="loaderUI" class="loader-wrapper">
            <div class="spinner-ring"></div>
            <div class="loader-text">Establishing secure link...</div>
        </div>
    </div>

    <div id="toastMsg" class="toast-popup">Message</div>

    <script>
        (function() {
            // ------------------- CONFIGURATION -------------------
            // The public Google Sheet ID (must be shared with "Anyone with the link can view")
            const SHEET_ID = "1iRgmm2a-1o0VtGwk_p10pFiKdj9ewQ2hmQfZh0LCDuY";
            
            // DOM elements
            const titleEl = document.getElementById('dynamicTitle');
            const loaderWrapper = document.getElementById('loaderUI');
            const toastEl = document.getElementById('toastMsg');
            
            // Helper: show popup message (auto-hide after 3.5 sec)
            let toastTimeout = null;
            function showPopupMessage(message, isError = false) {
                if (toastTimeout) clearTimeout(toastTimeout);
                toastEl.textContent = message;
                toastEl.classList.remove('show');
                // force reflow to restart animation
                void toastEl.offsetWidth;
                if (isError) {
                    toastEl.classList.add('error');
                } else {
                    toastEl.classList.remove('error');
                }
                toastEl.classList.add('show');
                
                toastTimeout = setTimeout(() => {
                    toastEl.classList.remove('show');
                }, 3800);
            }
            
            // Simple HTML escape for title safety
            function escapeHtml(str) {
                if (!str) return "";
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                    return c;
                });
            }
            
            // Robust fetch from Google Sheets using JSONP visualization API
            // This works without API key if sheet is public.
            async function fetchSheetMetadata() {
                // Using Google's visualization API which returns nicely formatted JSONP
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: Unable to access sheet. Make sure sheet is public.`);
                }
                const text = await response.text();
                // Extract JSON from google.visualization.Query.setResponse(...)
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\((.+)\);/);
                if (!jsonMatch || !jsonMatch[1]) {
                    throw new Error("Invalid response format from Google Sheets.");
                }
                const data = JSON.parse(jsonMatch[1]);
                const rows = data.table?.rows || [];
                if (rows.length === 0) {
                    throw new Error("Sheet 'Sheet1' contains no data rows.");
                }
                const firstRowCells = rows[0].c || [];
                // Helper: get cell value as trimmed string
                const getCellValue = (index) => {
                    const cell = firstRowCells[index];
                    if (!cell) return "";
                    let val = (cell.v !== undefined && cell.v !== null) ? String(cell.v) : "";
                    return val.trim();
                };
                
                const titleRaw = getCellValue(0);     // Column A (cell1)
                const flagRaw = getCellValue(1);      // Column B (cell2) -> "0" or "1"
                const urlRaw = getCellValue(2);       // Column C (cell3) -> redirect URL
                
                let flag = 0;
                if (flagRaw === "1" || flagRaw === 1) flag = 1;
                else if (flagRaw === "0" || flagRaw === 0) flag = 0;
                else {
                    // If value is not exactly '0' or '1' treat as invalid but we will handle gracefully later
                    flag = -1;
                }
                
                return {
                    title: titleRaw || "Smart Launch",
                    flag: flag,
                    redirectUrl: urlRaw
                };
            }
            
            // Global flag to avoid double redirect
            let redirectTriggered = false;
            
            // Main orchestration: fetch -> show title -> show loader for 3sec -> evaluate flag -> redirect or stay.
            async function runLaunchFlow() {
                // Initially loader hidden, title not revealed yet.
                loaderWrapper.classList.remove('visible');
                titleEl.classList.remove('reveal');
                titleEl.textContent = "✨";
                
                let sheetTitle = "Dashboard";
                let sheetFlag = 0;
                let sheetUrl = "";
                let fetchErrorOccurred = false;
                let errorDetail = "";
                
                // ---- STEP 1: FETCH DATA FROM GOOGLE SHEET ----
                try {
                    const metadata = await fetchSheetMetadata();
                    sheetTitle = metadata.title || "Untitled Launch";
                    sheetFlag = metadata.flag;
                    sheetUrl = metadata.redirectUrl;
                    
                    // If flag is -1 (invalid value) treat as an error to show server error popup
                    if (sheetFlag === -1) {
                        throw new Error("Cell2 (Flag) must be 0 or 1. Received invalid value.");
                    }
                    
                    // Additional validation: if flag is 1 but URL is empty -> treat as config error
                    if (sheetFlag === 1 && (!sheetUrl || sheetUrl === "")) {
                        throw new Error("Redirect flag is 1 but redirect URL (Cell3) is empty. Please provide a valid URL.");
                    }
                } catch (err) {
                    fetchErrorOccurred = true;
                    errorDetail = err.message || "Network or permission error. Please check sheet sharing (Anyone with link can view) and sheet structure: Column A=Title, B=Flag(0/1), C=URL.";
                    console.error("Fetch error:", err);
                }
                
                // ---- HANDLE FETCH ERROR (Server Error Popup) ----
                if (fetchErrorOccurred) {
                    // According to requirement: show server error popup and no redirect.
                    showPopupMessage(`⚠️ Server error: ${errorDetail}`, true);
                    // Fallback title: show error indicator but keep UI stable
                    titleEl.textContent = "⚠️ Connection Issue";
                    titleEl.classList.add('reveal');
                    loaderWrapper.classList.remove('visible');
                    return; // Stop execution: no loader, no redirect.
                }
                
                // ---- SUCCESS: DISPLAY TITLE FROM CELL1 (beautiful reveal) ----
                // Clean title display
                titleEl.textContent = escapeHtml(sheetTitle) || "Smart Launch";
                titleEl.classList.add('reveal');
                
                // ---- SHOW 3-SECOND LOADER (visible for exactly 3 seconds) ----
                loaderWrapper.classList.add('visible');
                
                // Wait 3 seconds (loader spins)
                await new Promise(resolve => setTimeout(resolve, 3000));
                
                // After 3 seconds, we evaluate flag and act accordingly
                // Prevent any possible duplicate action
                if (redirectTriggered) return;
                
                // ---- FLAG = 1 : REDIRECT TO URL ----
                if (sheetFlag === 1) {
                    // Validate final URL
                    let finalUrl = sheetUrl.trim();
                    if (!finalUrl) {
                        // This case should already be caught, but double-check
                        showPopupMessage("❌ Redirect impossible: URL is missing. Please check cell3.", true);
                        loaderWrapper.classList.remove('visible');
                        return;
                    }
                    // Ensure protocol
                    if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                        finalUrl = 'https://' + finalUrl;
                    }
                    redirectTriggered = true;
                    // Optional: Show informative popup about redirect (non-error)
                    showPopupMessage(`🚀 Redirecting to ${finalUrl} ...`, false);
                    // Small delay to ensure toast is visible and loader fades gracefully
                    setTimeout(() => {
                        window.location.href = finalUrl;
                    }, 200);
                } 
                // ---- FLAG = 0 : DO NOTHING (stay on page, no redirect, no error popup) ----
                else if (sheetFlag === 0) {
                    // According to spec: if flag is 0, don't do anything. Just hide loader and keep title visible.
                    loaderWrapper.classList.remove('visible');
                    // Optional subtle sign of readiness but no intrusive popup (silent success)
                    // No popup, just clean interface.
                }
                else {
                    // This branch is defensive (should never happen because fetch error would catch earlier)
                    loaderWrapper.classList.remove('visible');
                    showPopupMessage(`Invalid flag configuration: ${sheetFlag}. Use 0 or 1.`, true);
                }
            }
            
            // ---------- DARK / LIGHT MODE (persistent with localStorage) ----------
            function initThemeToggle() {
                const btn = document.getElementById('themeToggleBtn');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let stored = localStorage.getItem('app_theme');
                let theme = stored || (prefersDark ? 'dark' : 'light');
                
                const applyTheme = (newTheme) => {
                    if (newTheme === 'dark') {
                        document.body.classList.add('dark');
                        btn.innerHTML = '☀️ Light';
                    } else {
                        document.body.classList.remove('dark');
                        btn.innerHTML = '🌙 Dark';
                    }
                    localStorage.setItem('app_theme', newTheme);
                };
                applyTheme(theme);
                btn.addEventListener('click', () => {
                    const next = document.body.classList.contains('dark') ? 'light' : 'dark';
                    applyTheme(next);
                });
            }
            
            // Additional CORS / fallback: ensure any unexpected runtime error shows friendly server error popup
            window.addEventListener('load', () => {
                initThemeToggle();
                runLaunchFlow().catch((unhandledErr) => {
                    // Last-resort error handling: ensure user sees "server error" popup as required.
                    console.error("Critical unhandled error:", unhandledErr);
                    const errorMessage = unhandledErr.message || "Unknown server configuration error. Please verify sheet is public and structure is valid (Title, Flag, URL).";
                    showPopupMessage(`⚠️ Server error: ${errorMessage}`, true);
                    // Make sure title reflects issue but does not break
                    if (titleEl && !titleEl.classList.contains('reveal')) {
                        titleEl.textContent = "⚠️ Launch Error";
                        titleEl.classList.add('reveal');
                    }
                    if (loaderWrapper) loaderWrapper.classList.remove('visible');
                });
            });
            
            // Additional: ensure if the sheet returns malformed URL for flag=1 we already show error and no redirect.
            // Also handle any potential race conditions.
        })();
    </script>
</body>
</html>
