<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Smart Launch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        /* Dark theme support (optional toggle at corner) */
        body.dark {
            background: #0f172a;
        }

        /* Main container - clean, only title visible initially */
        .launch-container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            text-align: center;
        }

        /* Title styling - only visible element from sheet */
        .app-title {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: #0f172a;
            margin-bottom: 2rem;
            word-break: break-word;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.4s ease, transform 0.3s ease;
        }

        body.dark .app-title {
            color: #f1f5f9;
        }

        .app-title.reveal {
            opacity: 1;
            transform: translateY(0);
        }

        /* Loader UI - 3 second visual, modern spinner */
        .loader-wrapper {
            margin-top: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loader-wrapper.visible {
            opacity: 1;
        }

        .spinner-ring {
            width: 56px;
            height: 56px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 0.95rem;
            font-weight: 500;
            color: #475569;
            background: rgba(255,255,255,0.7);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        body.dark .loader-text {
            color: #cbd5e1;
            background: rgba(30,41,59,0.6);
        }

        /* Hidden state for redirect phase */
        .hidden {
            display: none;
        }

        /* Toast / Popup message (server error or redirect info) */
        .toast-popup {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 60px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.2);
            z-index: 1000;
            transition: transform 0.3s ease;
            backdrop-filter: blur(8px);
            background: rgba(15, 23, 42, 0.95);
            max-width: 85vw;
            text-align: center;
            white-space: nowrap;
            pointer-events: none;
        }

        .toast-popup.error {
            background: rgba(185, 28, 28, 0.95);
            color: #fff;
            border-left: 4px solid #facc15;
        }

        .toast-popup.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Dark mode toggle - subtle, top corner but does not disturb minimal UI */
        .theme-toggle-mini {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 2rem;
            padding: 0.5rem 0.9rem;
            font-size: 1.1rem;
            cursor: pointer;
            z-index: 1100;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: all 0.2s;
            font-weight: 500;
            color: #1e293b;
        }

        body.dark .theme-toggle-mini {
            background: rgba(30,41,59,0.8);
            color: #facc15;
        }

        /* responsive */
        @media (max-width: 500px) {
            .app-title {
                font-size: 1.8rem;
            }
            .toast-popup {
                font-size: 0.8rem;
                padding: 0.6rem 1.2rem;
                white-space: normal;
                max-width: 90vw;
                text-align: center;
            }
            .launch-container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- minimal theme toggle (optional, but user requested theme toggle at corner previously) -->
    <button class="theme-toggle-mini" id="themeToggleBtn" aria-label="Dark/Light mode">🌙 Dark</button>

    <div class="launch-container">
        <!-- Title from sheet cell1 (only visible text from data) -->
        <h1 id="dynamicTitle" class="app-title">—</h1>
        
        <!-- Loader UI: shown for 3 seconds then redirect or error popup -->
        <div id="loaderUI" class="loader-wrapper">
            <div class="spinner-ring"></div>
            <div class="loader-text">Connecting to server...</div>
        </div>
    </div>

    <div id="toastMsg" class="toast-popup">Message</div>

    <script>
        // ---------- CONFIG ----------
        const SHEET_ID = "1iRgmm2a-1o0VtGwk_p10pFiKdj9ewQ2hmQfZh0LCDuY";
        
        // DOM elements
        const titleEl = document.getElementById('dynamicTitle');
        const loaderWrapper = document.getElementById('loaderUI');
        const toastEl = document.getElementById('toastMsg');
        
        // Helper: show popup message (auto-hide after 3 sec)
        let toastTimeout = null;
        function showPopupMessage(message, isError = false) {
            if (toastTimeout) clearTimeout(toastTimeout);
            toastEl.textContent = message;
            toastEl.classList.remove('show');
            // force reflow
            void toastEl.offsetWidth;
            if (isError) {
                toastEl.classList.add('error');
            } else {
                toastEl.classList.remove('error');
            }
            toastEl.classList.add('show');
            
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3500);
        }
        
        // Helper: escape HTML for title only (avoid injection but keep clean)
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Fetch sheet data (first row, columns: A=title, B=flag, C=url)
        async function fetchSheetMetadata() {
            // Using public Google Sheets visualization API (no API key needed if sheet shared "Anyone with link can view")
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Sheet1`;
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}: Failed to fetch sheet`);
            const text = await response.text();
            // parse JSONP response: google.visualization.Query.setResponse({...})
            const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\((.+)\);/);
            if (!jsonMatch || !jsonMatch[1]) throw new Error("Invalid sheet response format");
            const data = JSON.parse(jsonMatch[1]);
            const rows = data.table?.rows || [];
            if (rows.length === 0) throw new Error("Sheet is empty");
            const firstRow = rows[0].c || [];
            const getVal = (idx) => {
                const cell = firstRow[idx];
                if (!cell) return "";
                return (cell.v !== undefined && cell.v !== null) ? String(cell.v) : "";
            };
            const titleRaw = getVal(0);    // cell1 : title
            const flagRaw = getVal(1);     // cell2 : "0" or "1"
            const urlRaw = getVal(2);      // cell3 : redirect URL
            const flag = (flagRaw === "1" || flagRaw === 1) ? 1 : 0;
            return { title: titleRaw || "Untitled", flag, redirectUrl: urlRaw.trim() };
        }
        
        // Main flow: 
        // Step 1: Show title immediately after fetch (but before loader UI fully visible?)
        // Actually requirement: first screen just show a title only from cell1, then show 3sec loader UI, then redirect OR server error popup.
        // So we: fetch data in background, BUT keep UI clean (only title appears after fetch). 
        // While fetching we might show minimal "..." but better: show placeholder? We'll fetch first, then reveal title, then start 3 sec loader.
        // However user expects: "first screen just show a title only.. from cell1.. then show a 3second loader ui visible good for everyone then redirect or server error popup."
        // So we must: 1) Fetch title & flag & url (with loading state but title hidden until data arrives) -> once we have title, display it.
        // 2) After title is displayed, start a 3-second loader animation (visible).
        // 3) After 3 seconds, evaluate flag: if flag=1 -> redirect to url; if flag=0 -> stay (no redirect) but also no error? but spec says if 0 don't do anything. However also show popup? Not required but we can just stay idle.
        // Also if any server error during fetch -> show popup error message and no further redirect.
        
        let redirectExecuted = false;
        
        async function startApp() {
            // Initially loader is hidden? We want title first. But we need to fetch data first.
            // We'll make loader wrapper hidden initially until title appears.
            loaderWrapper.classList.remove('visible');
            titleEl.classList.remove('reveal');
            titleEl.textContent = "✨";
            
            let sheetTitle = "";
            let sheetFlag = 0;
            let sheetUrl = "";
            let fetchError = null;
            
            // Fetch data from sheet
            try {
                const meta = await fetchSheetMetadata();
                sheetTitle = meta.title;
                sheetFlag = meta.flag;
                sheetUrl = meta.redirectUrl;
            } catch (err) {
                fetchError = err.message || "Network or permission error. Make sure sheet is public (Anyone with link can view).";
                console.error(err);
            }
            
            // If fetch error: show error popup and stop. No redirect, no title from sheet.
            if (fetchError) {
                // Show error popup with server error message
                showPopupMessage(`⚠️ Server Error: ${fetchError}`, true);
                // Display fallback title? But requirement: if error, we still show something? But we want clean - just show "Error" but not misleading.
                titleEl.textContent = "⚠️";
                titleEl.classList.add('reveal');
                // Keep loader hidden, because we don't proceed.
                loaderWrapper.classList.remove('visible');
                return;
            }
            
            // SUCCESS: Display title from cell1 (beautiful reveal)
            titleEl.textContent = escapeHtml(sheetTitle) || "Untitled";
            titleEl.classList.add('reveal');
            
            // After title shown, now show loader UI for exactly 3 seconds (visible)
            loaderWrapper.classList.add('visible');
            
            // Wait 3 seconds while loader spins
            await new Promise(resolve => setTimeout(resolve, 3000));
            
            // After 3 seconds: evaluate flag
            if (sheetFlag === 1) {
                // REDIRECT case
                if (!sheetUrl) {
                    // URL is empty or missing -> show server error popup, no redirect
                    showPopupMessage("❌ Redirect flag = 1 but no URL found in cell3. Cannot redirect.", true);
                    // keep loader visible? hide loader gracefully, but show error.
                    loaderWrapper.classList.remove('visible');
                    return;
                }
                // Build valid URL
                let finalUrl = sheetUrl;
                if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                    finalUrl = 'https://' + finalUrl;
                }
                // Show a small info popup: "Redirecting..." (optional but friendly)
                showPopupMessage(`Redirecting to ${finalUrl} ...`, false);
                // Perform redirect after short micro delay to ensure popup shows
                redirectExecuted = true;
                setTimeout(() => {
                    window.location.href = finalUrl;
                }, 200);
            } 
            else if (sheetFlag === 0) {
                // Flag = 0: Do nothing (just stay on page, no redirect). According to spec: if 0 don't do anything.
                // But we might show a subtle success popup? Not required but to inform user: "Ready. No redirect."
                // However the requirement says "just show a title only.. then loader .. redirect or server error popup" – for flag 0 we just remain idle.
                // No redirect, no error popup. But we can hide loader gracefully.
                loaderWrapper.classList.remove('visible');
                // Optional minimal info? But spec says "dont do anything", so we keep silent and just title visible.
                // For better UX, not showing any intrusive popup for flag 0. The user only sees title.
            }
            else {
                // invalid flag (not 0 or 1)
                loaderWrapper.classList.remove('visible');
                showPopupMessage(`Invalid flag value (${sheetFlag}) in cell2. Expected 0 or 1.`, true);
            }
        }
        
        // ---------- DARK / LIGHT MODE (preserve toggle at corner, minimal) ----------
        function initThemeToggle() {
            const btn = document.getElementById('themeToggleBtn');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let stored = localStorage.getItem('app_theme');
            let theme = stored || (prefersDark ? 'dark' : 'light');
            
            const applyTheme = (newTheme) => {
                if (newTheme === 'dark') {
                    document.body.classList.add('dark');
                    btn.innerHTML = '☀️ Light';
                } else {
                    document.body.classList.remove('dark');
                    btn.innerHTML = '🌙 Dark';
                }
                localStorage.setItem('app_theme', newTheme);
            };
            applyTheme(theme);
            btn.addEventListener('click', () => {
                const next = document.body.classList.contains('dark') ? 'light' : 'dark';
                applyTheme(next);
            });
        }
        
        // Additional: handle case if sheet fetch takes too long? But user sees title only after fetch.
        // To ensure no flashing: run startApp after DOM ready.
        document.addEventListener('DOMContentLoaded', () => {
            initThemeToggle();
            startApp().catch(err => {
                // catastrophic error: show popup
                showPopupMessage(`Unexpected error: ${err.message}`, true);
                titleEl.textContent = "Error";
                titleEl.classList.add('reveal');
                loaderWrapper.classList.remove('visible');
            });
        });
    </script>
</body>
</html>
