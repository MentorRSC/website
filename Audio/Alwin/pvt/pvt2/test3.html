<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Multi-Sheet App | Vendor Marketplace</title>
  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      transition: all 0.3s ease;
    }

    .app-shell {
      max-width: 450px;
      width: 100%;
      background: #ffffff;
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.1);
      position: relative;
      scroll-behavior: smooth;
    }

    /* Theme Variables */
    body[data-theme="light"] { --primary-color: #ff6e2e; --primary-dark: #e55a1e; --bg-color: #ffffff; --card-bg: #f8f9fa; }
    body[data-theme="dark"] { --primary-color: #ff6e2e; --primary-dark: #e55a1e; --bg-color: #1a1a1a; --card-bg: #2d2d2d; color: #ffffff; }
    body[data-theme="orange"] { --primary-color: #ff9800; --primary-dark: #e68900; --bg-color: #fff8f0; --card-bg: #ffffff; }
    body[data-theme="green"] { --primary-color: #4caf50; --primary-dark: #388e3c; --bg-color: #f1f8e9; --card-bg: #ffffff; }
    body[data-theme="yellow"] { --primary-color: #ffc107; --primary-dark: #ffb300; --bg-color: #fffde7; --card-bg: #ffffff; }
    body[data-theme="blue"] { --primary-color: #2196f3; --primary-dark: #1976d2; --bg-color: #e3f2fd; --card-bg: #ffffff; }
    body[data-theme="red"] { --primary-color: #f44336; --primary-dark: #d32f2f; --bg-color: #ffebee; --card-bg: #ffffff; }

    /* Card Style Variables */
    body[data-card-style="square"] .item-card, body[data-card-style="square"] .vendor-card,
    body[data-card-style="square"] .product-card, body[data-card-style="square"] .user-card {
      border-radius: 8px;
    }
    body[data-card-style="circle"] .item-card, body[data-card-style="circle"] .vendor-card,
    body[data-card-style="circle"] .product-card, body[data-card-style="circle"] .user-card {
      border-radius: 50px;
    }
    body[data-card-style="mix"] .item-card, body[data-card-style="mix"] .vendor-card,
    body[data-card-style="mix"] .product-card, body[data-card-style="mix"] .user-card {
      border-radius: 20px 8px 20px 8px;
    }

    .app-shell {
      background: var(--bg-color);
    }

    :root {
      --primary-color: #ff6e2e;
      --primary-dark: #e55a1e;
      --secondary-color: #2e7d32;
      --bg-gray: #f8f8f8;
      --text-dark: #1a1a1a;
      --text-light: #6e6e6e;
      --border-light: #f0f0f0;
      --shadow-sm: 0 2px 12px rgba(0, 0, 0, 0.04);
      --radius-card: 20px;
      --radius-btn: 40px;
    }

    body[data-theme="dark"] {
      --bg-gray: #2d2d2d;
      --text-dark: #ffffff;
      --text-light: #b0b0b0;
      --border-light: #404040;
    }

    .hidden { display: none !important; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .flex-center { display: flex; justify-content: center; align-items: center; }

    .app-header {
      background: var(--bg-color);
      padding: 18px 16px 12px 16px;
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .location-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 18px;
      color: var(--text-dark);
    }
    .location-icon { color: var(--primary-color); font-size: 20px; }
    .profile-icon {
      background: var(--bg-gray);
      border-radius: 50%;
      padding: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary-color);
      cursor: pointer;
      transition: transform 0.2s;
    }
    .theme-selector {
      background: var(--bg-gray);
      border-radius: 30px;
      padding: 5px 10px;
      display: flex;
      gap: 5px;
      cursor: pointer;
    }
    .theme-option {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      cursor: pointer;
    }

    .search-box {
      margin-top: 14px;
      background: var(--bg-gray);
      border-radius: 30px;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .search-box i { color: var(--primary-color); font-size: 18px; }
    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 15px;
      width: 100%;
      font-family: 'Inter', sans-serif;
      color: var(--text-dark);
    }

    /* Advertisement Carousel */
    .banner-area { padding: 16px 16px 8px 16px; position: relative; }
    .ad-carousel-container { position: relative; overflow: hidden; border-radius: var(--radius-card); }
    .ad-slides { display: flex; transition: transform 0.5s ease-in-out; }
    .ad-slide {
      min-width: 100%;
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      border-radius: var(--radius-card);
      padding: 20px;
      color: white;
      cursor: pointer;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 140px;
    }
    .ad-slide h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .ad-slide p { font-size: 13px; opacity: 0.9; margin: 4px 0; }
    .ad-slide .offer-badge {
      display: inline-block;
      background: rgba(255,255,255,0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      margin-top: 10px;
    }
    .carousel-dots { display: flex; justify-content: center; gap: 8px; margin-top: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; transition: all 0.3s; }
    .dot.active { width: 20px; border-radius: 10px; background: var(--primary-color); }
    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.4);
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
    }
    .carousel-arrow.left { left: 8px; }
    .carousel-arrow.right { right: 8px; }

    /* 2-Column Grid for Cards */
    .two-column-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 8px 12px 80px 12px;
    }
    .items-grid {
      padding: 8px 12px 80px 12px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .item-card, .vendor-card, .product-card, .user-card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-light);
      padding: 12px;
      cursor: pointer;
      transition: transform 0.1s;
    }
    .item-card:active, .vendor-card:active, .product-card:active { transform: scale(0.98); }
    .item-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--primary-color)20, var(--primary-dark)20);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      color: var(--primary-color);
      margin: 0 auto 10px;
    }
    .item-title {
      font-weight: 700;
      font-size: 14px;
      color: var(--text-dark);
      text-align: center;
      margin-bottom: 4px;
    }
    .item-subtitle {
      font-size: 11px;
      color: var(--text-light);
      text-align: center;
      margin: 4px 0;
    }
    .item-badge {
      background: var(--primary-color);
      color: white;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      display: inline-block;
      margin-top: 6px;
      width: 100%;
      text-align: center;
    }

    /* Bottom Navigation */
    .bottom-nav-fixed {
      background: rgba(var(--bg-color-rgb, 255,255,255),0.98);
      border-top: 1px solid var(--border-light);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 20px 18px;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 450px;
      backdrop-filter: blur(2px);
      z-index: 20;
    }
    .nav-icon {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #8e8e8e;
      cursor: pointer;
      flex: 1;
      text-align: center;
    }
    .nav-icon i { font-size: 22px; }
    .nav-icon.active { color: var(--primary-color); font-weight: 500; }

    /* Modal Styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      padding: 1rem;
    }
    .modal-container {
      background: var(--card-bg);
      max-width: 400px;
      width: 100%;
      max-height: 85vh;
      border-radius: 1.8rem;
      overflow: hidden;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.4);
    }
    .modal-header {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      color: white;
      padding: 1.2rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-close {
      background: rgba(255,255,255,0.2);
      border: none;
      color: white;
      font-size: 1.3rem;
      cursor: pointer;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-body { padding: 1.5rem; overflow-y: auto; max-height: calc(85vh - 80px); }
    .detail-row { padding: 0.85rem 0; border-bottom: 1px solid var(--border-light); }
    .detail-label { font-weight: 700; color: var(--primary-color); font-size: 0.75rem; text-transform: uppercase; }
    .detail-value { color: var(--text-dark); word-break: break-word; font-size: 0.9rem; margin-top: 5px; }

    /* Profile Page */
    .profile-container { padding: 24px 20px; }
    .profile-cover {
      background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
      height: 120px;
      border-radius: 20px;
      position: relative;
      margin-bottom: 60px;
    }
    .profile-avatar {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 50px;
      color: var(--primary-color);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      border: 4px solid var(--primary-color);
    }
    .user-name { text-align: center; margin-top: 20px; font-size: 24px; font-weight: 700; color: var(--text-dark); }
    .user-regid { text-align: center; color: var(--text-light); font-size: 14px; margin-top: 4px; }
    .info-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 20px 0; }
    .info-card { background: var(--bg-gray); border-radius: 16px; padding: 12px; text-align: center; }
    .info-label { font-size: 11px; color: var(--text-light); text-transform: uppercase; margin-bottom: 5px; }
    .info-value { font-size: 14px; font-weight: 600; color: var(--text-dark); }
    .level-badge {
      display: inline-block;
      background: linear-gradient(135deg, #ffd89b, #c7e9fb);
      padding: 8px 16px;
      border-radius: 30px;
      font-weight: 700;
      margin: 10px 0;
    }
    .transactions-list { margin-top: 20px; max-height: 300px; overflow-y: auto; }
    .transaction-item {
      background: var(--bg-gray);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logout-btn, .login-btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 40px;
      width: 100%;
      font-weight: 600;
      margin-top: 20px;
      cursor: pointer;
    }
    .login-input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      font-size: 14px;
      background: var(--card-bg);
      color: var(--text-dark);
    }
    .toast-message {
      visibility: hidden;
      min-width: 180px;
      background-color: #323232;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 10px 18px;
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast-message.show { visibility: visible; opacity: 1; }
    .loading { text-align: center; padding: 40px; color: var(--text-light); }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border-light);
      border-top-color: var(--primary-color);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body data-theme="light" data-card-style="mix">
<div class="app-shell" id="appShell">
  <div id="homePageContainer"></div>
  <div id="profilePageContainer" class="hidden"></div>
  <div id="offersPageContainer" class="hidden"></div>
  <div id="vendorsPageContainer" class="hidden"></div>

  <div class="bottom-nav-fixed" id="bottomNav">
    <div class="nav-icon" data-nav="home"><i class="fas fa-home"></i><span>Home</span></div>
    <div class="nav-icon" data-nav="vendors"><i class="fas fa-store"></i><span>Vendors</span></div>
    <div class="nav-icon" data-nav="products"><i class="fas fa-box"></i><span>Products</span></div>
    <div class="nav-icon" data-nav="offers"><i class="fas fa-tag"></i><span>Offers</span></div>
    <div class="nav-icon" data-nav="account"><i class="fas fa-user"></i><span>Account</span></div>
  </div>
  <div id="globalToast" class="toast-message"></div>
</div>

<script>
  /********************************************************************
   * MASTER SHEET CONFIGURATION
   * Row1: Ad Sheet ID
   * Row2: User Auth Sheet ID  
   * Row3: Product1 Sheet ID (Fixed Products)
   * Row4: Vendor List Sheet ID
   * Row5: Theme Config Sheet ID
   ********************************************************************/
  const MASTER_SHEET_ID = '1vfSO8NP0p1um-ueMspk4ekPtsEZKSfKwrvgh54SK70c';
  const APP_NAME = "Vendor Marketplace";
  
  // Global state
  let adSheetId = null;
  let userAuthSheetId = null;
  let fixedProductsSheetId = null;
  let vendorListSheetId = null;
  let themeConfigSheetId = null;
  
  let advertisements = [];
  let vendors = [];
  let fixedProducts = [];
  let currentPage = "home";
  let currentAdIndex = 0;
  let autoSlideInterval = null;
  let isLoggedIn = false;
  let currentUser = null;
  let userTransactions = [];

  function showToast(msg) {
    const toastEl = document.getElementById("globalToast");
    toastEl.textContent = msg;
    toastEl.classList.add("show");
    setTimeout(() => toastEl.classList.remove("show"), 1800);
  }

  function parseCSV(csvText) {
    const rows = [];
    let currentRow = [], currentField = '', insideQuotes = false;
    for (let i = 0; i < csvText.length; i++) {
      const ch = csvText[i], nextCh = csvText[i+1];
      if (ch === '"') {
        if (insideQuotes && nextCh === '"') { currentField += '"'; i++; }
        else insideQuotes = !insideQuotes;
      } else if (ch === ',' && !insideQuotes) {
        currentRow.push(currentField);
        currentField = '';
      } else if ((ch === '\n' || (ch === '\r' && nextCh === '\n')) && !insideQuotes) {
        currentRow.push(currentField);
        if (currentRow.length > 0) rows.push(currentRow);
        currentRow = [];
        currentField = '';
        if (ch === '\r') i++;
      } else if (ch === '\r' && !insideQuotes) {
        currentRow.push(currentField);
        if (currentRow.length > 0) rows.push(currentRow);
        currentRow = [];
        currentField = '';
      } else currentField += ch;
    }
    if (currentField !== '' || currentRow.length > 0) {
      currentRow.push(currentField);
      if (currentRow.length > 0) rows.push(currentRow);
    }
    return rows.map(row => row.map(cell => {
      let cleaned = String(cell).trim();
      if (cleaned.startsWith('"') && cleaned.endsWith('"')) cleaned = cleaned.slice(1, -1).replace(/""/g, '"');
      return cleaned;
    }));
  }

  async function fetchSheetData(sheetId) {
    if (!sheetId) return null;
    try {
      const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;
      const response = await fetch(url);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return parseCSV(await response.text());
    } catch (err) {
      console.error(`Error fetching sheet:`, err);
      return null;
    }
  }

  // Load Master Config
  async function loadMasterConfig() {
    try {
      const parsed = await fetchSheetData(MASTER_SHEET_ID);
      if (!parsed || parsed.length < 2) throw new Error('Master sheet insufficient data');
      
      // Row structure: Row1=Ad Sheet, Row2=User Auth, Row3=Products, Row4=Vendors, Row5=Theme
      for (let i = 0; i < parsed.length && i < 5; i++) {
        const row = parsed[i];
        const sheetId = row[0] || '';
        if (i === 0) adSheetId = sheetId;
        else if (i === 1) userAuthSheetId = sheetId;
        else if (i === 2) fixedProductsSheetId = sheetId;
        else if (i === 3) vendorListSheetId = sheetId;
        else if (i === 4) themeConfigSheetId = sheetId;
      }
      return true;
    } catch (err) {
      console.error(err);
      showToast('Failed to load configuration');
      return false;
    }
  }

  // Load Theme Config
  async function loadThemeConfig() {
    if (!themeConfigSheetId) return;
    const parsed = await fetchSheetData(themeConfigSheetId);
    if (parsed && parsed.length > 1) {
      const theme = parsed[1][0] || 'light';
      const cardStyle = parsed[1][1] || 'mix';
      document.body.setAttribute('data-theme', theme);
      document.body.setAttribute('data-card-style', cardStyle);
    }
  }

  // Load Advertisements
  async function loadAdvertisements() {
    if (!adSheetId) { advertisements = getDefaultAds(); return; }
    const parsed = await fetchSheetData(adSheetId);
    if (parsed && parsed.length > 1) {
      const ads = [];
      for (let i = 1; i < parsed.length; i++) {
        const row = parsed[i];
        if (row[0] && row[0].trim()) {
          ads.push({
            title: row[0] || 'Special Offer',
            description: row[1] || 'Limited time deal',
            offer: row[2] || 'Grab it now',
            link: row[3] || '',
            icon: row[4] || 'fa-tag',
            fullDetails: row[5] || row[1] || 'Click for more details'
          });
        }
      }
      advertisements = ads.length > 0 ? ads : getDefaultAds();
    } else advertisements = getDefaultAds();
  }

  // Load Vendors
  async function loadVendors() {
    if (!vendorListSheetId) { vendors = getDefaultVendors(); return; }
    const parsed = await fetchSheetData(vendorListSheetId);
    if (parsed && parsed.length > 1) {
      const vendorList = [];
      for (let i = 1; i < parsed.length; i++) {
        const row = parsed[i];
        if (row[0] && row[0].trim()) {
          vendorList.push({
            id: row[0],
            name: row[1] || row[0],
            description: row[2] || 'Vendor',
            icon: row[3] || 'fa-store',
            productSheetId: row[4] || null,
            rating: row[5] || '4.0',
            location: row[6] || 'Local'
          });
        }
      }
      vendors = vendorList.length > 0 ? vendorList : getDefaultVendors();
    } else vendors = getDefaultVendors();
  }

  // Load Fixed Products (Admin defined)
  async function loadFixedProducts() {
    if (!fixedProductsSheetId) { fixedProducts = getDefaultProducts(); return; }
    const parsed = await fetchSheetData(fixedProductsSheetId);
    if (parsed && parsed.length > 1) {
      const products = [];
      for (let i = 1; i < parsed.length; i++) {
        const row = parsed[i];
        if (row[0] && row[0].trim()) {
          products.push({
            name: row[0] || 'Product',
            price: row[1] || '₹299',
            description: row[2] || 'Quality product',
            icon: row[3] || 'fa-box',
            rating: row[4] || '4.0',
            category: row[5] || 'General'
          });
        }
      }
      fixedProducts = products.length > 0 ? products : getDefaultProducts();
    } else fixedProducts = getDefaultProducts();
  }

  // Load Vendor Products
  async function loadVendorProducts(vendorId, vendorProductSheetId) {
    if (!vendorProductSheetId) return [];
    const parsed = await fetchSheetData(vendorProductSheetId);
    if (parsed && parsed.length > 1) {
      const products = [];
      for (let i = 1; i < parsed.length; i++) {
        const row = parsed[i];
        if (row[0] && row[0].trim()) {
          products.push({
            name: row[0] || 'Product',
            price: row[1] || '₹199',
            description: row[2] || 'Product description',
            icon: row[3] || 'fa-box',
            stock: row[4] || 'In Stock'
          });
        }
      }
      return products;
    }
    return [];
  }

  // User Authentication
  async function validateUserLogin(username, password) {
    if (!userAuthSheetId) { showToast('User system not configured'); return false; }
    const parsed = await fetchSheetData(userAuthSheetId);
    if (parsed && parsed.length > 1) {
      for (let i = 1; i < parsed.length; i++) {
        const row = parsed[i];
        if (row[0] === username && row[1] === password) {
          await loadUserDetails(row[2] || null, username);
          return true;
        }
      }
    }
    return false;
  }

  async function loadUserDetails(userSheetId, username) {
    if (!userSheetId) {
      currentUser = { username, name: username, regId: 'REG001', phone: '+91 9876543210', email: username + '@example.com', state: 'Unknown', joinedDate: new Date().toLocaleDateString(), level: 'Bronze', avatar: 'fa-user-circle' };
      userTransactions = [];
      return;
    }
    const parsed = await fetchSheetData(userSheetId);
    if (parsed && parsed.length > 1) {
      const row = parsed[1];
      currentUser = {
        username: username,
        name: row[0] || username,
        regId: row[1] || 'REG' + Math.random().toString(36).substr(2, 6).toUpperCase(),
        phone: row[2] || '+91 9876543210',
        email: row[3] || username + '@example.com',
        state: row[4] || 'Unknown',
        joinedDate: row[5] || new Date().toLocaleDateString(),
        level: row[6] || 'Bronze',
        avatar: row[7] || 'fa-user-circle'
      };
      userTransactions = [];
      for (let i = 2; i < parsed.length; i++) {
        const t = parsed[i];
        if (t[0]) userTransactions.push({ date: t[0], description: t[1], amount: t[2], status: t[3] || 'Completed' });
      }
    } else {
      currentUser = { username, name: username, regId: 'REG001', phone: '+91 9876543210', email: username + '@example.com', state: 'Unknown', joinedDate: new Date().toLocaleDateString(), level: 'Bronze', avatar: 'fa-user-circle' };
    }
  }

  // UI Rendering
  function showLoginModal() {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3><i class="fas fa-lock"></i> Login Required</h3><button class="modal-close" id="closeLoginBtn"><i class="fas fa-times"></i></button></div><div class="modal-body"><input type="text" id="loginUsername" class="login-input" placeholder="Username"><input type="password" id="loginPassword" class="login-input" placeholder="Password"><div id="loginError" class="error-msg" style="color:red; font-size:12px;"></div><button id="loginSubmitBtn" class="login-btn">Login</button></div></div>`;
    document.body.appendChild(modal);
    const close = () => modal.remove();
    document.getElementById('closeLoginBtn').addEventListener('click', close);
    modal.addEventListener('click', (e) => { if (e.target === modal) close(); });
    document.getElementById('loginSubmitBtn').addEventListener('click', async () => {
      const user = document.getElementById('loginUsername').value;
      const pwd = document.getElementById('loginPassword').value;
      if (!user || !pwd) { document.getElementById('loginError').innerText = 'Enter credentials'; return; }
      const valid = await validateUserLogin(user, pwd);
      if (valid) { isLoggedIn = true; close(); showToast(`Welcome ${currentUser.name}!`); renderProfilePage(); navigateTo('account'); }
      else document.getElementById('loginError').innerText = 'Invalid credentials';
    });
  }

  function renderProfilePage() {
    if (!isLoggedIn) { showLoginModal(); return; }
    document.getElementById("profilePageContainer").innerHTML = `
      <div class="profile-container">
        <div class="profile-cover"></div>
        <div class="profile-avatar"><i class="fas ${currentUser.avatar}"></i></div>
        <div class="user-name">${escapeHtml(currentUser.name)}</div>
        <div class="user-regid">ID: ${escapeHtml(currentUser.regId)}</div>
        <div class="info-grid">
          <div class="info-card"><div class="info-label">Phone</div><div class="info-value">${escapeHtml(currentUser.phone)}</div></div>
          <div class="info-card"><div class="info-label">Email</div><div class="info-value">${escapeHtml(currentUser.email)}</div></div>
          <div class="info-card"><div class="info-label">State</div><div class="info-value">${escapeHtml(currentUser.state)}</div></div>
          <div class="info-card"><div class="info-label">Joined</div><div class="info-value">${escapeHtml(currentUser.joinedDate)}</div></div>
        </div>
        <div style="text-align:center;"><div class="level-badge">⭐ Level: ${escapeHtml(currentUser.level)} ⭐</div></div>
        <div class="transactions-list"><h3 style="margin-bottom:12px;">📋 Recent Transactions</h3>${userTransactions.map(t => `<div class="transaction-item"><div><strong>${escapeHtml(t.date)}</strong><br><small>${escapeHtml(t.description)}</small></div><div style="font-weight:700; color:var(--primary-color);">${escapeHtml(t.amount)}</div></div>`).join('') || '<div style="text-align:center;">No transactions</div>'}</div>
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>`;
    document.getElementById("logoutBtn")?.addEventListener("click", () => { isLoggedIn = false; currentUser = null; showToast('Logged out'); navigateTo('home'); });
  }

  // Home Page with 2-column cards
  async function renderHomePage() {
    document.getElementById("homePageContainer").innerHTML = `
      <div class="app-header">
        <div class="flex-between">
          <div class="location-row"><i class="fas fa-map-marker-alt location-icon"></i><span>${APP_NAME}</span></div>
          <div class="flex-center" style="gap:10px;">
            <div class="theme-selector" id="themeSelector"><i class="fas fa-palette"></i></div>
            <div class="profile-icon" id="profileIconBtn"><i class="far fa-user"></i></div>
          </div>
        </div>
        <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search vendors or products..."></div>
      </div>
      <div class="banner-area" id="dynamicBannerArea"><div class="loading"><div class="loading-spinner"></div></div></div>
      <div class="two-column-grid" id="homeCardsGrid"><div class="loading"><div class="loading-spinner"></div></div></div>
    `;
    setupCarousel();
    await displayHomeCards();
    document.getElementById("searchInput")?.addEventListener("input", (e) => filterHomeCards(e.target.value));
    document.getElementById("profileIconBtn")?.addEventListener("click", () => navigateTo("account"));
    document.getElementById("themeSelector")?.addEventListener("click", showThemeModal);
  }

  async function displayHomeCards(searchText = '') {
    const container = document.getElementById("homeCardsGrid");
    if (!container) return;
    
    let filteredVendors = vendors.filter(v => v.name.toLowerCase().includes(searchText.toLowerCase()));
    let filteredProducts = fixedProducts.filter(p => p.name.toLowerCase().includes(searchText.toLowerCase()));
    
    let html = '';
    // Show Vendors section
    if (filteredVendors.length > 0) {
      html += `<div style="grid-column: 1/-1; margin-top:10px;"><h3>🏪 Vendors</h3></div>`;
      filteredVendors.forEach(v => {
        html += `<div class="vendor-card" data-vendor-id="${v.id}"><div class="item-icon"><i class="fas ${v.icon}"></i></div><div class="item-title">${escapeHtml(v.name)}</div><div class="item-subtitle">⭐ ${v.rating} • ${v.location}</div><div class="item-badge">View Products →</div></div>`;
      });
    }
    // Show Fixed Products
    if (filteredProducts.length > 0) {
      html += `<div style="grid-column: 1/-1; margin-top:10px;"><h3>🔥 Featured Products</h3></div>`;
      filteredProducts.forEach(p => {
        html += `<div class="product-card" data-product-name="${p.name}"><div class="item-icon"><i class="fas ${p.icon}"></i></div><div class="item-title">${escapeHtml(p.name)}</div><div class="item-subtitle">${escapeHtml(p.price)}<br>⭐ ${p.rating}</div><div class="item-badge">View Details →</div></div>`;
      });
    }
    if (filteredVendors.length === 0 && filteredProducts.length === 0) html = `<div style="grid-column:1/-1; text-align:center; padding:40px;">🔍 No results found</div>`;
    
    container.innerHTML = html;
    
    document.querySelectorAll('.vendor-card').forEach(card => {
      card.addEventListener('click', () => showVendorProducts(card.dataset.vendorId));
    });
    document.querySelectorAll('.product-card').forEach(card => {
      card.addEventListener('click', () => showProductDetails(card.dataset.productName));
    });
  }

  function filterHomeCards(searchText) { displayHomeCards(searchText); }

  async function showVendorProducts(vendorId) {
    const vendor = vendors.find(v => v.id === vendorId);
    if (!vendor) return;
    showToast(`Loading ${vendor.name} products...`);
    const products = await loadVendorProducts(vendor.id, vendor.productSheetId);
    
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3><i class="fas ${vendor.icon}"></i> ${escapeHtml(vendor.name)} Products</h3><button class="modal-close"><i class="fas fa-times"></i></button></div><div class="modal-body">${products.map(p => `<div class="detail-row"><div class="detail-label">${escapeHtml(p.name)}</div><div class="detail-value">${escapeHtml(p.price)}<br>${escapeHtml(p.description)}<br><small>${p.stock}</small></div></div>`).join('') || '<div>No products available</div>'}</div></div>`;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.remove(); });
  }

  function showProductDetails(productName) {
    const product = fixedProducts.find(p => p.name === productName);
    if (!product) return;
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3><i class="fas ${product.icon}"></i> ${escapeHtml(product.name)}</h3><button class="modal-close"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="detail-row"><div class="detail-label">Price</div><div class="detail-value">${escapeHtml(product.price)}</div></div><div class="detail-row"><div class="detail-label">Description</div><div class="detail-value">${escapeHtml(product.description)}</div></div><div class="detail-row"><div class="detail-label">Rating</div><div class="detail-value">⭐ ${product.rating}</div></div><div class="detail-row"><div class="detail-label">Category</div><div class="detail-value">${escapeHtml(product.category)}</div></div></div></div>`;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
  }

  // Vendors Page
  function renderVendorsPage() {
    document.getElementById("vendorsPageContainer").innerHTML = `
      <div class="app-header"><div class="flex-between"><div class="location-row"><i class="fas fa-arrow-left" id="backBtn" style="cursor:pointer;"></i><i class="fas fa-store location-icon"></i><span>All Vendors</span></div><div class="profile-icon"><i class="far fa-user"></i></div></div><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchVendors" placeholder="Search vendors..."></div></div>
      <div class="two-column-grid" id="vendorsGrid"><div class="loading"><div class="loading-spinner"></div></div></div>`;
    document.getElementById("backBtn")?.addEventListener("click", () => navigateTo("home"));
    displayVendorsGrid();
    document.getElementById("searchVendors")?.addEventListener("input", (e) => filterVendors(e.target.value));
  }

  function displayVendorsGrid(searchText = '') {
    const container = document.getElementById("vendorsGrid");
    if (!container) return;
    let filtered = vendors.filter(v => v.name.toLowerCase().includes(searchText.toLowerCase()));
    if (filtered.length === 0) { container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">🔍 No vendors found</div>`; return; }
    let html = '';
    filtered.forEach(v => { html += `<div class="vendor-card" data-vendor-id="${v.id}"><div class="item-icon"><i class="fas ${v.icon}"></i></div><div class="item-title">${escapeHtml(v.name)}</div><div class="item-subtitle">⭐ ${v.rating} • ${v.location}</div><div class="item-badge">View Products →</div></div>`; });
    container.innerHTML = html;
    document.querySelectorAll('.vendor-card').forEach(card => { card.addEventListener('click', () => showVendorProducts(card.dataset.vendorId)); });
  }
  function filterVendors(text) { displayVendorsGrid(text); }

  // Products Page
  function renderProductsPage() {
    document.getElementById("homePageContainer").innerHTML = `
      <div class="app-header"><div class="flex-between"><div class="location-row"><i class="fas fa-arrow-left" id="backBtn" style="cursor:pointer;"></i><i class="fas fa-box location-icon"></i><span>All Products</span></div><div class="profile-icon"><i class="far fa-user"></i></div></div><div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchProducts" placeholder="Search products..."></div></div>
      <div class="two-column-grid" id="productsGrid"><div class="loading"><div class="loading-spinner"></div></div></div>`;
    document.getElementById("backBtn")?.addEventListener("click", () => navigateTo("home"));
    displayProductsGrid();
    document.getElementById("searchProducts")?.addEventListener("input", (e) => filterProductsGrid(e.target.value));
  }

  function displayProductsGrid(searchText = '') {
    const container = document.getElementById("productsGrid");
    if (!container) return;
    let filtered = fixedProducts.filter(p => p.name.toLowerCase().includes(searchText.toLowerCase()));
    if (filtered.length === 0) { container.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:40px;">🔍 No products found</div>`; return; }
    let html = '';
    filtered.forEach(p => { html += `<div class="product-card" data-product-name="${p.name}"><div class="item-icon"><i class="fas ${p.icon}"></i></div><div class="item-title">${escapeHtml(p.name)}</div><div class="item-subtitle">${escapeHtml(p.price)}<br>⭐ ${p.rating}</div><div class="item-badge">View Details →</div></div>`; });
    container.innerHTML = html;
    document.querySelectorAll('.product-card').forEach(card => { card.addEventListener('click', () => showProductDetails(card.dataset.productName)); });
  }
  function filterProductsGrid(text) { displayProductsGrid(text); }

  // Offers Page
  function renderOffersPage() {
    document.getElementById("offersPageContainer").innerHTML = `
      <div class="app-header"><div class="flex-between"><div class="location-row"><i class="fas fa-arrow-left" id="backBtn" style="cursor:pointer;"></i><i class="fas fa-tag location-icon"></i><span>Special Offers</span></div><div class="profile-icon"><i class="far fa-user"></i></div></div></div>
      <div class="two-column-grid" id="offersGrid">${advertisements.map((ad, idx) => `<div class="item-card" data-offer-idx="${idx}"><div class="item-icon"><i class="fas ${ad.icon}"></i></div><div class="item-title">${escapeHtml(ad.title)}</div><div class="item-subtitle">${escapeHtml(ad.description)}</div><div class="item-badge">${escapeHtml(ad.offer)}</div></div>`).join('')}</div>`;
    document.getElementById("backBtn")?.addEventListener("click", () => navigateTo("home"));
    document.querySelectorAll('.item-card[data-offer-idx]').forEach(card => {
      card.addEventListener('click', () => { const ad = advertisements[parseInt(card.dataset.offerIdx)]; showOfferPopup(ad); });
    });
  }

  function showOfferPopup(ad) {
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3><i class="fas ${ad.icon}"></i> ${escapeHtml(ad.title)}</h3><button class="modal-close"><i class="fas fa-times"></i></button></div><div class="modal-body"><div class="detail-row"><div class="detail-label">Description</div><div class="detail-value">${escapeHtml(ad.description)}</div></div><div class="detail-row"><div class="detail-label">Offer</div><div class="detail-value">${escapeHtml(ad.offer)}</div></div><div class="detail-row"><div class="detail-label">Details</div><div class="detail-value">${escapeHtml(ad.fullDetails)}</div></div>${ad.link ? `<div class="detail-row sheet-link" onclick="window.open('${ad.link}','_blank')"><div class="detail-label">🔗 Redeem Now</div></div>` : ''}</div></div>`;
    document.body.appendChild(modal);
    modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
  }

  // Theme Modal
  function showThemeModal() {
    const themes = ['light', 'dark', 'orange', 'green', 'yellow', 'blue', 'red'];
    const cardStyles = ['square', 'circle', 'mix'];
    const modal = document.createElement('div');
    modal.className = 'modal-overlay';
    modal.innerHTML = `<div class="modal-container"><div class="modal-header"><h3>🎨 Customize Theme</h3><button class="modal-close"><i class="fas fa-times"></i></button></div><div class="modal-body"><h4>Color Theme</h4><div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px;">${themes.map(t => `<div class="theme-option" data-theme="${t}" style="background:${t === 'light' ? '#fff' : t === 'dark' ? '#333' : t === 'orange' ? '#ff9800' : t === 'green' ? '#4caf50' : t === 'yellow' ? '#ffc107' : t === 'blue' ? '#2196f3' : '#f44336'}; border:2px solid #ddd;"></div>`).join('')}</div><h4>Card Style</h4><div style="display:flex; gap:10px; margin-bottom:20px;">${cardStyles.map(s => `<button class="login-btn" data-style="${s}" style="background:var(--primary-color); padding:8px; margin:0;">${s.toUpperCase()}</button>`).join('')}</div></div></div>`;
    document.body.appendChild(modal);
    document.querySelectorAll('.theme-option').forEach(opt => {
      opt.addEventListener('click', () => { document.body.setAttribute('data-theme', opt.dataset.theme); });
    });
    document.querySelectorAll('[data-style]').forEach(btn => {
      btn.addEventListener('click', () => { document.body.setAttribute('data-card-style', btn.dataset.style); });
    });
    modal.querySelector('.modal-close').addEventListener('click', () => modal.remove());
  }

  function setupCarousel() {
    const bannerArea = document.getElementById("dynamicBannerArea");
    if (!bannerArea || advertisements.length === 0) return;
    let slidesHtml = '', dotsHtml = '';
    advertisements.forEach((ad, idx) => {
      slidesHtml += `<div class="ad-slide" data-ad-index="${idx}"><i class="fas ${ad.icon}" style="font-size:32px;"></i><h3>${escapeHtml(ad.title)}</h3><p>${escapeHtml(ad.description)}</p><div class="offer-badge">${escapeHtml(ad.offer)}</div></div>`;
      dotsHtml += `<div class="dot ${idx === 0 ? 'active' : ''}" data-dot-index="${idx}"></div>`;
    });
    bannerArea.innerHTML = `<div class="ad-carousel-container"><div class="carousel-arrow left" id="carouselLeft"><i class="fas fa-chevron-left"></i></div><div class="ad-slides" id="adSlides">${slidesHtml}</div><div class="carousel-arrow right" id="carouselRight"><i class="fas fa-chevron-right"></i></div></div><div class="carousel-dots" id="carouselDots">${dotsHtml}</div>`;
    const slidesContainer = document.getElementById('adSlides');
    const dots = document.querySelectorAll('.dot');
    function updateCarousel(index) { currentAdIndex = index; slidesContainer.style.transform = `translateX(-${currentAdIndex * slidesContainer.parentElement.offsetWidth}px)`; dots.forEach((d, i) => d.classList.toggle('active', i === currentAdIndex)); }
    function nextSlide() { currentAdIndex = (currentAdIndex + 1) % advertisements.length; updateCarousel(currentAdIndex); resetAutoSlide(); }
    function prevSlide() { currentAdIndex = (currentAdIndex - 1 + advertisements.length) % advertisements.length; updateCarousel(currentAdIndex); resetAutoSlide(); }
    function resetAutoSlide() { if (autoSlideInterval) clearInterval(autoSlideInterval); autoSlideInterval = setInterval(nextSlide, 5000); }
    document.getElementById('carouselLeft')?.addEventListener('click', prevSlide);
    document.getElementById('carouselRight')?.addEventListener('click', nextSlide);
    dots.forEach(dot => dot.addEventListener('click', () => { updateCarousel(parseInt(dot.dataset.dotIndex)); resetAutoSlide(); }));
    document.querySelectorAll('.ad-slide').forEach(slide => { slide.addEventListener('click', () => showOfferPopup(advertisements[parseInt(slide.dataset.adIndex)])); });
    resetAutoSlide();
  }

  function navigateTo(page) {
    currentPage = page;
    const homeDiv = document.getElementById("homePageContainer");
    const profileDiv = document.getElementById("profilePageContainer");
    const offersDiv = document.getElementById("offersPageContainer");
    const vendorsDiv = document.getElementById("vendorsPageContainer");
    [homeDiv, profileDiv, offersDiv, vendorsDiv].forEach(d => d?.classList.add('hidden'));
    if (page === "home") { homeDiv.classList.remove('hidden'); renderHomePage(); }
    else if (page === "account") { renderProfilePage(); profileDiv.classList.remove('hidden'); }
    else if (page === "products") { homeDiv.classList.remove('hidden'); renderProductsPage(); }
    else if (page === "offers") { offersDiv.classList.remove('hidden'); renderOffersPage(); }
    else if (page === "vendors") { vendorsDiv.classList.remove('hidden'); renderVendorsPage(); }
    document.querySelectorAll(".nav-icon").forEach(nav => nav.classList.remove("active"));
    document.querySelector(`.nav-icon[data-nav="${page}"]`)?.classList.add("active");
  }

  function setupBottomNav() {
    document.querySelectorAll(".nav-icon").forEach(nav => {
      nav.addEventListener("click", () => navigateTo(nav.dataset.nav));
    });
  }

  function getDefaultAds() {
    return [{ title: "🔥 Special Offer!", description: "Check out our latest deals", offer: "Limited Time", icon: "fa-tag", fullDetails: "Get up to 50% off!" },
            { title: "✨ New Arrivals", description: "Explore new products", offer: "Free Shipping", icon: "fa-star", fullDetails: "New products added weekly!" }];
  }
  function getDefaultVendors() {
    return [{ id: "v1", name: "ElectroHub", description: "Electronics", icon: "fa-bolt", productSheetId: null, rating: "4.5", location: "City Center" },
            { id: "v2", name: "FashionStore", description: "Clothing", icon: "fa-tshirt", productSheetId: null, rating: "4.3", location: "Mall Road" }];
  }
  function getDefaultProducts() {
    return [{ name: "Wireless Headphones", price: "₹2499", description: "Noise Cancellation", icon: "fa-headphones", rating: "4.5", category: "Electronics" },
            { name: "Cotton T-Shirt", price: "₹599", description: "Premium Quality", icon: "fa-tshirt", rating: "4.3", category: "Fashion" }];
  }
  function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

  async function initApp() {
    setupBottomNav();
    if (await loadMasterConfig()) {
      await Promise.all([loadThemeConfig(), loadAdvertisements(), loadVendors(), loadFixedProducts()]);
      await renderHomePage();
    } else {
      document.getElementById("homePageContainer").innerHTML = `<div style="text-align:center; padding:50px;"><i class="fas fa-exclamation-triangle" style="font-size:48px; color:#ff6e2e;"></i><p>Failed to load configuration.</p></div>`;
    }
  }
  initApp();
</script>
</body>
</html>
