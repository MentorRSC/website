<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wake Word UI - Hey Lyra</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #111, #1a1a2e);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0;
    }

    .container {
      background: rgba(0,0,0,0.7);
      padding: 40px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    #micButton {
      padding: 15px 40px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 50px;
      transition: transform 0.2s, background 0.2s;
    }

    #micButton:hover {
      background: #357abd;
      transform: scale(1.05);
    }

    #micButton:active {
      transform: scale(0.95);
    }

    #audioBarContainer {
      width: 400px;
      height: 30px;
      background: #333;
      margin: 30px auto;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.5);
    }

    #audioBar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4caf50, #8bc34a);
      transition: width 0.05s;
      border-radius: 15px;
    }

    #status {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      padding: 10px;
      background: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .wake {
      color: #ff6b6b;
      animation: pulse 0.5s ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); text-shadow: 0 0 10px #ff6b6b; }
      100% { transform: scale(1); }
    }

    .counter {
      font-size: 24px;
      margin-top: 20px;
      color: #ffd700;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎤 Hey Lyra Wake Word</h1>
  <button id="micButton">🎙️ Start Listening</button>

  <div id="audioBarContainer">
    <div id="audioBar"></div>
  </div>

  <div id="status">⚡ Idle - Click to start</div>
  <div class="counter">🔔 Detections: <span id="wakeCount">0</span></div>
</div>

<!-- Porcupine SDK - Correct import -->
<script src="https://cdn.jsdelivr.net/npm/@picovoice/porcupine-web@2.0.0/dist/porcupine-web.js"></script>

<script>
const ACCESS_KEY = "lfd0C+KPnrhOtZWXOj39sBSTwMHVn+wutSPMd6vMbDsrYQ6PCzUZ0g==";
const KEYWORD_PATH = "https://mentorrsc.github.io/website/hey-lyra.ppn";

let porcupine = null;
let audioContext = null;
let mediaStream = null;
let sourceNode = null;
let processorNode = null;
let animationId = null;
let wakeCount = 0;

const wakeCountSpan = document.getElementById("wakeCount");
const micButton = document.getElementById("micButton");
const statusText = document.getElementById("status");
const audioBar = document.getElementById("audioBar");

// Update wake counter display
function updateWakeCount() {
  wakeCountSpan.textContent = wakeCount;
}

// Visual feedback for wake word
function onWakeWordDetected() {
  wakeCount++;
  updateWakeCount();
  
  statusText.innerHTML = "🔥 WAKE WORD DETECTED! 🔥";
  statusText.classList.add("wake");
  
  // Flash effect on audio bar
  audioBar.style.background = "linear-gradient(90deg, #ff6b6b, #ff8787)";
  setTimeout(() => {
    audioBar.style.background = "linear-gradient(90deg, #4caf50, #8bc34a)";
  }, 300);
  
  setTimeout(() => {
    if (porcupine && audioContext) {
      statusText.innerHTML = "🎤 Listening for 'Hey Lyra'...";
      statusText.classList.remove("wake");
    }
  }, 2000);
  
  console.log("✅ Wake word detected! Count:", wakeCount);
}

// Audio visualization using AnalyserNode
function setupVisualization(analyser) {
  const dataArray = new Uint8Array(analyser.frequencyBinCount);
  
  function draw() {
    if (!analyser) return;
    analyser.getByteFrequencyData(dataArray);
    
    // Calculate average volume
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      sum += dataArray[i];
    }
    let avg = sum / dataArray.length;
    
    // Map volume to percentage (0-100)
    let percent = Math.min(100, (avg / 255) * 100);
    audioBar.style.width = percent + "%";
    
    animationId = requestAnimationFrame(draw);
  }
  
  draw();
}

// Audio processing for Porcupine
function setupAudioProcessing(source, context, porcupineInstance) {
  // Create ScriptProcessorNode for PCM audio (Porcupine expects 512 samples)
  const processor = context.createScriptProcessor(512, 1, 1);
  
  source.connect(processor);
  processor.connect(context.destination);
  
  processor.onaudioprocess = (event) => {
    if (!porcupineInstance) return;
    
    // Get audio data from microphone
    const inputBuffer = event.inputBuffer.getChannelData(0);
    
    // Convert Float32Array to Int16Array (required by Porcupine)
    const pcm = new Int16Array(inputBuffer.length);
    for (let i = 0; i < inputBuffer.length; i++) {
      // Convert float (-1 to 1) to int16 (-32768 to 32767)
      let sample = Math.max(-1, Math.min(1, inputBuffer[i]));
      sample = sample < 0 ? sample * 0x8000 : sample * 0x7FFF;
      pcm[i] = sample;
    }
    
    // Process audio frame
    try {
      const keywordIndex = porcupineInstance.process(pcm);
      if (keywordIndex !== -1) {
        onWakeWordDetected();
      }
    } catch (error) {
      console.error("Porcupine process error:", error);
    }
  };
  
  return processor;
}

// Stop all audio processing
async function stopListening() {
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  
  if (processorNode) {
    processorNode.disconnect();
    processorNode = null;
  }
  
  if (sourceNode) {
    sourceNode.disconnect();
    sourceNode = null;
  }
  
  if (audioContext) {
    await audioContext.close();
    audioContext = null;
  }
  
  if (mediaStream) {
    mediaStream.getTracks().forEach(track => track.stop());
    mediaStream = null;
  }
  
  if (porcupine) {
    porcupine.release();
    porcupine = null;
  }
}

// Initialize everything
async function startListening() {
  try {
    // Disable button during initialization
    micButton.disabled = true;
    statusText.innerHTML = "🎤 Requesting microphone permission...";
    
    // Stop any existing instance
    await stopListening();
    
    // Get microphone access
    mediaStream = await navigator.mediaDevices.getUserMedia({ 
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      } 
    });
    
    statusText.innerHTML = "✅ Microphone ready, loading wake word model...";
    
    // Create audio context
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    await audioContext.resume();
    
    // Create source from microphone
    sourceNode = audioContext.createMediaStreamSource(mediaStream);
    
    // Setup analyzer for visualization
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    sourceNode.connect(analyser);
    setupVisualization(analyser);
    
    // Initialize Porcupine with custom model
    statusText.innerHTML = "🔄 Loading 'Hey Lyra' model...";
    
    // Wait for Porcupine to be available
    if (typeof PorcupineWeb === 'undefined') {
      throw new Error("PorcupineWeb SDK not loaded. Check internet connection.");
    }
    
    porcupine = await PorcupineWeb.PorcupineWorker.create(
      ACCESS_KEY,
      [{ publicPath: KEYWORD_PATH, label: "Hey Lyra" }],
      (keywordLabel) => {
        // Callback for wake word detection
        console.log("Wake word detected:", keywordLabel);
        onWakeWordDetected();
      }
    );
    
    // Setup audio processing for Porcupine
    processorNode = setupAudioProcessing(sourceNode, audioContext, porcupine);
    
    statusText.innerHTML = "🎤 Listening for 'Hey Lyra'... Say it!";
    micButton.disabled = false;
    micButton.textContent = "🔴 Stop Listening";
    
    // Change button behavior to stop when clicked again
    micButton.onclick = async () => {
      await stopListening();
      micButton.textContent = "🎙️ Start Listening";
      statusText.innerHTML = "⏹️ Stopped - Click to start";
      audioBar.style.width = "0%";
      micButton.onclick = startListening;
    };
    
  } catch (error) {
    console.error("Initialization error:", error);
    statusText.innerHTML = "❌ Error: " + error.message;
    micButton.disabled = false;
    micButton.textContent = "🎙️ Start Listening";
    
    // Cleanup on error
    await stopListening();
  }
}

// Set initial button handler
micButton.onclick = startListening;

// Cleanup on page unload
window.addEventListener('beforeunload', () => {
  if (mediaStream) {
    mediaStream.getTracks().forEach(track => track.stop());
  }
  if (porcupine) {
    porcupine.release();
  }
  if (audioContext) {
    audioContext.close();
  }
});
</script>
</body>
</html>
