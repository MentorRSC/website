<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Audio Visualizer Streamer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      text-align: center;
    }
    canvas {
      border: 1px solid #444;
      margin-top: 20px;
    }
    button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>🎤 Audio Visualizer + Stream</h2>

<button id="startBtn">Start Listening</button>
<button id="muteBtn">Mute / Stop</button>

<canvas id="canvas" width="800" height="200"></canvas>

<script>
let audioContext;
let analyser;
let microphone;
let dataArray;
let animationId;
let mediaStream;
let isRunning = false;

// Simulated binary stream buffer
let binaryBuffer = [];

// Canvas setup
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

async function startAudio() {
  if (isRunning) return;

  audioContext = new (window.AudioContext || window.webkitAudioContext)();
  mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });

  microphone = audioContext.createMediaStreamSource(mediaStream);
  analyser = audioContext.createAnalyser();

  analyser.fftSize = 2048;
  const bufferLength = analyser.frequencyBinCount;
  dataArray = new Uint8Array(bufferLength);

  microphone.connect(analyser);

  isRunning = true;
  draw();
  streamBinary();
}

function draw() {
  animationId = requestAnimationFrame(draw);

  analyser.getByteTimeDomainData(dataArray);

  ctx.fillStyle = "#111";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.lineWidth = 2;
  ctx.strokeStyle = "#00ffcc";

  ctx.beginPath();

  const sliceWidth = canvas.width / dataArray.length;
  let x = 0;

  for (let i = 0; i < dataArray.length; i++) {
    const v = dataArray[i] / 128.0;
    const y = (v * canvas.height) / 2;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);

    x += sliceWidth;
  }

  ctx.lineTo(canvas.width, canvas.height / 2);
  ctx.stroke();
}

// Simulate streaming binary data
function streamBinary() {
  if (!isRunning) return;

  analyser.getByteTimeDomainData(dataArray);

  // Convert to binary (Uint8Array already binary-like)
  const chunk = new Uint8Array(dataArray);

  // Optional compression placeholder
  // (you could integrate real compression here)
  binaryBuffer.push(chunk);

  // Example: log size instead of sending
  console.log("Streaming chunk size:", chunk.length);

  setTimeout(streamBinary, 100); // stream every 100ms
}

// Stop + clear cache
function stopAudio() {
  if (!isRunning) return;

  cancelAnimationFrame(animationId);

  mediaStream.getTracks().forEach(track => track.stop());
  audioContext.close();

  isRunning = false;

  // Clear buffer/cache
  binaryBuffer = [];

  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  console.log("Stopped. Buffer cleared.");
}

// Buttons
document.getElementById("startBtn").onclick = startAudio;
document.getElementById("muteBtn").onclick = stopAudio;

</script>

</body>
</html>
