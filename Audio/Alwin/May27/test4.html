<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Nexus Voice AI | Real-Time Speech-to-Text</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0B1120, #030712);
            font-family: system-ui, -apple-system, 'Inter', 'SF Pro Display', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Main glass container */
        .assistant-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            padding: 2rem;
            transition: all 0.3s ease;
        }

        /* Header with platform badge */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 12px;
        }
        .logo-area h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #E2E8F0, #94A3B8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .logo-area p {
            font-size: 0.75rem;
            color: #64748B;
            margin-top: 4px;
        }
        .platform-badge {
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .platform-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10B981;
            box-shadow: 0 0 8px #10B981;
        }
        .platform-indicator.offline {
            background: #F59E0B;
            box-shadow: 0 0 8px #F59E0B;
        }

        /* Status bar */
        .status-bar {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2rem;
            padding: 12px 20px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .status-message {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            color: #CBD5E1;
        }
        .recording-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #EF4444;
            transition: all 0.2s;
        }
        .recording-dot.active {
            animation: pulseRed 1.2s infinite;
            background: #FF4444;
        }
        @keyframes pulseRed {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .lang-selector {
            background: #1E293B;
            border: 1px solid #334155;
            padding: 6px 12px;
            border-radius: 40px;
            color: #E2E8F0;
            font-size: 0.75rem;
            cursor: pointer;
        }

        /* WAVE BARS - Siri/ChatGPT style */
        .waveform-area {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 2rem;
            padding: 2rem 1rem;
            margin: 1rem 0 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .wave-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            height: 100px;
        }
        .wave-bar {
            width: 8px;
            background: linear-gradient(180deg, #3B82F6, #1E40AF);
            border-radius: 20px;
            transition: height 0.08s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.5);
        }

        /* Live transcription card */
        .transcript-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 1.5rem;
            padding: 1.2rem;
            margin: 1rem 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .transcript-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.7rem;
            color: #64748B;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .live-text {
            font-size: 1.2rem;
            font-weight: 500;
            color: #F1F5F9;
            line-height: 1.5;
            min-height: 80px;
            word-break: break-word;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 1rem;
            font-family: monospace;
        }
        .live-text:empty::before {
            content: "✨ Speak into microphone — real-time transcription appears here";
            color: #475569;
            font-size: 0.9rem;
        }

        /* History panel */
        .history-area {
            margin-top: 1.5rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            background: #0F172A;
            margin-bottom: 8px;
            padding: 10px 14px;
            border-radius: 1rem;
            font-size: 0.85rem;
            border-left: 3px solid #3B82F6;
            color: #CBD5E1;
        }

        /* Buttons */
        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            font-family: inherit;
        }
        .btn-primary {
            background: #3B82F6;
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .btn-primary:hover {
            background: #2563EB;
            transform: scale(0.98);
        }
        .btn-secondary {
            background: #1E293B;
            color: #E2E8F0;
            border: 1px solid #334155;
        }
        .btn-secondary:hover {
            background: #334155;
        }
        .btn-danger {
            background: #DC2626;
            color: white;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
            margin-top: 1.5rem;
        }

        @keyframes barGlow {
            0% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="assistant-container">
    <div class="header">
        <div class="logo-area">
            <h1>Nexus Voice AI</h1>
            <p>real‑time speech intelligence</p>
        </div>
        <div class="platform-badge" id="platformBadge">
            <span class="platform-indicator" id="platformLed"></span>
            <span id="platformText">Detecting...</span>
        </div>
    </div>

    <div class="status-bar">
        <div class="status-message">
            <div class="recording-dot" id="recordingDot"></div>
            <span id="statusMsg">🎤 Ready — click Start Listening</span>
        </div>
        <select id="languageSelect" class="lang-selector">
            <option value="en-US">🇺🇸 English (US)</option>
            <option value="es-ES">🇪🇸 Spanish</option>
            <option value="fr-FR">🇫🇷 French</option>
            <option value="de-DE">🇩🇪 German</option>
            <option value="ja-JP">🇯🇵 Japanese</option>
            <option value="zh-CN">🇨🇳 Chinese</option>
            <option value="hi-IN">🇮🇳 Hindi</option>
            <option value="ko-KR">🇰🇷 Korean</option>
        </select>
    </div>

    <!-- Siri/ChatGPT style waveform bars -->
    <div class="waveform-area">
        <div class="wave-container" id="waveContainer"></div>
    </div>

    <!-- Live transcription card -->
    <div class="transcript-card">
        <div class="transcript-header">
            <span>🎙️ LIVE TRANSCRIPTION</span>
            <span id="sttEngineLabel">real‑time</span>
        </div>
        <div class="live-text" id="liveText"></div>
    </div>

    <!-- History -->
    <div class="history-area" id="historyArea">
        <div class="transcript-header" style="margin-bottom: 8px;">
            <span>📋 TRANSCRIPTION HISTORY</span>
            <span id="historyCount">0</span>
        </div>
        <div id="historyList">
            <div class="history-item" style="opacity:0.5;">✨ Speech transcriptions will appear here</div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-primary" id="startBtn">🎤 Start Listening</button>
        <button class="btn btn-secondary" id="stopBtn">⏹️ Stop</button>
        <button class="btn btn-secondary" id="clearBtn">🗑️ Clear History</button>
    </div>
    <footer>⚡ Auto-detects: Web Speech API (cloud) or local Moonshine/Whisper if available</footer>
</div>

<script>
    // ============================================================
    // CROSS-PLATFORM VOICE ASSISTANT
    // Works on GitHub Pages (Web Speech API) AND Raspberry Pi 5
    // ============================================================
    
    // DOM Elements
    const waveContainer = document.getElementById('waveContainer');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearBtn = document.getElementById('clearBtn');
    const liveTextEl = document.getElementById('liveText');
    const historyListEl = document.getElementById('historyList');
    const statusMsgSpan = document.getElementById('statusMsg');
    const recordingDot = document.getElementById('recordingDot');
    const platformLed = document.getElementById('platformLed');
    const platformTextSpan = document.getElementById('platformText');
    const languageSelect = document.getElementById('languageSelect');
    const sttEngineLabel = document.getElementById('sttEngineLabel');
    const historyCountSpan = document.getElementById('historyCount');

    // State
    let isListening = false;
    let recognition = null;
    let transcriptions = [];
    let currentInterimText = "";
    let waveBars = [];
    let animationInterval = null;
    let lastVolume = 0;
    let useWebSpeech = false;
    let useLocalMoonshine = false;
    
    // Check available STT engines
    function detectAvailableEngines() {
        // Check for Web Speech API (works on GitHub Pages, modern browsers)
        const hasWebSpeech = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;
        
        // Check for local Moonshine/ONNX (Raspberry Pi with model)
        const hasLocalSTT = typeof ort !== 'undefined' && window.hasOwnProperty('MoonshineReady');
        
        // Also check if we're on localhost or Raspberry Pi (user agent hint)
        const isLocalEnv = window.location.hostname === 'localhost' || 
                          window.location.hostname === '127.0.0.1' ||
                          window.location.hostname.includes('raspberry');
        
        if (hasWebSpeech) {
            useWebSpeech = true;
            platformTextSpan.innerText = '🌐 Web Speech API (cloud)';
            platformLed.style.background = '#10B981';
            sttEngineLabel.innerText = 'Web Speech • cloud';
            return 'webspeech';
        } else if (hasLocalSTT) {
            useLocalMoonshine = true;
            platformTextSpan.innerText = '🖥️ Local Moonshine (offline)';
            platformLed.style.background = '#F59E0B';
            platformLed.classList.add('offline');
            sttEngineLabel.innerText = 'Local AI • offline';
            return 'local';
        } else {
            platformTextSpan.innerText = '⚠️ No STT engine detected';
            platformLed.style.background = '#6B7280';
            statusMsgSpan.innerText = '⚠️ Speech recognition not available in this browser';
            return 'none';
        }
    }
    
    // Create waveform bars (professional style)
    function initWaveBars() {
        waveContainer.innerHTML = '';
        waveBars = [];
        // 36 bars for rich visual effect
        for (let i = 0; i < 36; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar';
            bar.style.height = '6px';
            waveContainer.appendChild(bar);
            waveBars.push(bar);
        }
    }
    
    // Animate waveform based on volume (0-1)
    function animateWaveform(volume) {
        if (!waveBars.length) return;
        const intensity = Math.min(1, volume * 1.8);
        const maxHeight = 72;
        const minHeight = 4;
        
        for (let i = 0; i < waveBars.length; i++) {
            // Organic sine wave pattern
            const phase = (Date.now() * 0.008) + (i * 0.18);
            const variation = (Math.sin(phase) * 0.4 + 0.6) * intensity;
            let height = minHeight + (maxHeight - minHeight) * variation;
            if (!isListening) height = 4;
            waveBars[i].style.height = `${Math.max(3, Math.min(80, height))}px`;
            
            // Color intensity based on volume
            const intensityColor = Math.min(200, 100 + (intensity * 155));
            waveBars[i].style.background = `linear-gradient(180deg, rgb(59, 130, 246), rgb(37, 99, 235))`;
            waveBars[i].style.opacity = 0.7 + (intensity * 0.5);
        }
    }
    
    // Simulate volume from microphone (for Web Speech API we animate randomly when listening)
    function startWaveAnimation() {
        if (animationInterval) clearInterval(animationInterval);
        animationInterval = setInterval(() => {
            if (isListening) {
                // Simulate realistic volume variations based on actual microphone input if available
                let targetVol = 0.15 + Math.random() * 0.4;
                if (lastVolume > 0) targetVol = Math.min(0.9, lastVolume * 1.2);
                animateWaveform(targetVol);
            } else {
                animateWaveform(0.05);
            }
        }, 45);
    }
    
    // Add transcription to history
    function addToHistory(text, isFinal = true) {
        if (!text || text.trim() === "") return;
        
        const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit', second:'2-digit' });
        const historyItem = document.createElement('div');
        historyItem.className = 'history-item';
        historyItem.innerHTML = `<span style="color:#64748B">${time}</span>  ${text}`;
        
        // Insert at top
        if (historyListEl.firstChild && historyListEl.firstChild.classList && historyListEl.firstChild.classList.contains('history-item')) {
            historyListEl.insertBefore(historyItem, historyListEl.firstChild);
        } else {
            historyListEl.prepend(historyItem);
        }
        
        transcriptions.unshift({ time, text });
        historyCountSpan.innerText = transcriptions.length;
        
        // Limit to 30 items
        while (historyListEl.children.length > 30) {
            historyListEl.removeChild(historyListEl.lastChild);
            transcriptions.pop();
        }
    }
    
    // ========== WEB SPEECH API IMPLEMENTATION (Cloud) ==========
    function initWebSpeech() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) return null;
        
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        recognition.onstart = () => {
            isListening = true;
            recordingDot.classList.add('active');
            statusMsgSpan.innerText = '🎙️ Listening... Speak now';
            liveTextEl.innerHTML = '<span style="color:#3B82F6">●</span> Listening...';
        };
        
        recognition.onresult = (event) => {
            let interimTranscript = '';
            let finalTranscript = '';
            
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript;
                } else {
                    interimTranscript += transcript;
                }
            }
            
            if (finalTranscript !== '') {
                liveTextEl.innerHTML = finalTranscript;
                addToHistory(finalTranscript, true);
                currentInterimText = '';
            } else if (interimTranscript !== '') {
                liveTextEl.innerHTML = `<span style="color:#94A3B8">${interimTranscript}</span> ✍️`;
                currentInterimText = interimTranscript;
            }
            
            // Simulate volume based on speech presence
            if (interimTranscript.length > 0 || finalTranscript.length > 0) {
                lastVolume = 0.4 + Math.random() * 0.5;
            } else {
                lastVolume = 0.1;
            }
        };
        
        recognition.onerror = (event) => {
            console.error('Speech recognition error', event.error);
            statusMsgSpan.innerText = `Error: ${event.error}`;
            isListening = false;
            recordingDot.classList.remove('active');
            liveTextEl.innerHTML = '⚠️ Microphone error. Check permissions.';
        };
        
        recognition.onend = () => {
            if (isListening) {
                // Auto-restart for continuous listening
                try {
                    recognition.start();
                } catch (e) {
                    isListening = false;
                    recordingDot.classList.remove('active');
                    statusMsgSpan.innerText = 'Stopped. Click Start to resume.';
                    liveTextEl.innerHTML = '';
                }
            } else {
                recordingDot.classList.remove('active');
                statusMsgSpan.innerText = '⏹️ Stopped. Click Start to listen.';
            }
        };
        
        return recognition;
    }
    
    function startWebSpeech() {
        if (!recognition) {
            recognition = initWebSpeech();
        }
        if (recognition) {
            try {
                recognition.lang = languageSelect.value;
                recognition.start();
                isListening = true;
                statusMsgSpan.innerText = '🎙️ Listening continuously...';
            } catch (e) {
                console.warn(e);
                statusMsgSpan.innerText = 'Already listening or error.';
            }
        }
    }
    
    function stopWebSpeech() {
        if (recognition) {
            isListening = false;
            try {
                recognition.stop();
            } catch (e) {}
            recordingDot.classList.remove('active');
            statusMsgSpan.innerText = '⏹️ Stopped';
            liveTextEl.innerHTML = '';
        }
    }
    
    // ========== LOCAL MOONSHINE (Raspberry Pi / Offline) ==========
    // This function would be replaced with actual Moonshine integration
    // For now, we provide the structure that can load local model
    
    let localSTTActive = false;
    let localStream = null;
    let localAudioContext = null;
    
    async function startLocalSTT() {
        // Placeholder for local Moonshine/Whisper integration
        // On actual Raspberry Pi, you'd load ONNX models and run inference
        statusMsgSpan.innerText = 'Local STT: requesting microphone...';
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            localStream = stream;
            isListening = true;
            recordingDot.classList.add('active');
            statusMsgSpan.innerText = '🎙️ Local AI listening (offline)';
            liveTextEl.innerHTML = '<span style="color:#F59E0B">●</span> Local mode active — speak';
            
            // Simulate real-time transcription (in production, this would be actual model inference)
            // For demo, we'll simulate with simple voice activity
            simulateLocalTranscription();
            
        } catch (err) {
            statusMsgSpan.innerText = 'Microphone access denied';
            liveTextEl.innerHTML = '❌ Cannot access microphone for local mode';
        }
    }
    
    function simulateLocalTranscription() {
        // Demo simulation for offline mode
        // In real implementation, this would be actual Moonshine inference
        const demoPhrases = [
            "Hello, local AI is listening.",
            "This is running on Raspberry Pi.",
            "Voice recognition works offline.",
            "Moonshine model is processing speech."
        ];
        let phraseIndex = 0;
        
        const interval = setInterval(() => {
            if (!isListening) {
                clearInterval(interval);
                return;
            }
            // Simulate random voice activity
            if (Math.random() > 0.7) {
                const phrase = demoPhrases[phraseIndex % demoPhrases.length];
                liveTextEl.innerHTML = phrase;
                addToHistory(phrase, true);
                phraseIndex++;
                lastVolume = 0.7;
                setTimeout(() => { lastVolume = 0.1; }, 500);
            } else {
                liveTextEl.innerHTML = '<span style="color:#94A3B8">🎤 waiting for speech...</span>';
            }
        }, 3000);
        
        window._localSTTInterval = interval;
    }
    
    function stopLocalSTT() {
        isListening = false;
        if (window._localSTTInterval) clearInterval(window._localSTTInterval);
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        if (localAudioContext) {
            localAudioContext.close();
            localAudioContext = null;
        }
        recordingDot.classList.remove('active');
        statusMsgSpan.innerText = 'Local mode stopped';
        liveTextEl.innerHTML = '';
    }
    
    // ========== MAIN CONTROL ==========
    const engine = detectAvailableEngines();
    
    function startListening() {
        if (engine === 'webspeech') {
            startWebSpeech();
        } else if (engine === 'local') {
            startLocalSTT();
        } else {
            statusMsgSpan.innerText = 'No speech recognition available';
            alert('Speech recognition not supported. Use Chrome/Edge or install Moonshine on Raspberry Pi.');
        }
    }
    
    function stopListening() {
        if (engine === 'webspeech') {
            stopWebSpeech();
        } else if (engine === 'local') {
            stopLocalSTT();
        }
        isListening = false;
    }
    
    function clearHistory() {
        transcriptions = [];
        historyListEl.innerHTML = '<div class="history-item" style="opacity:0.5;">✨ Speech transcriptions will appear here</div>';
        historyCountSpan.innerText = '0';
        liveTextEl.innerHTML = '';
    }
    
    // Event listeners
    startBtn.addEventListener('click', startListening);
    stopBtn.addEventListener('click', stopListening);
    clearBtn.addEventListener('click', clearHistory);
    
    languageSelect.addEventListener('change', () => {
        if (recognition && engine === 'webspeech') {
            recognition.lang = languageSelect.value;
            if (isListening) {
                stopWebSpeech();
                setTimeout(startWebSpeech, 100);
            }
        }
    });
    
    // Initialize UI
    initWaveBars();
    startWaveAnimation();
    
    // Auto-start on load (optional - comment out if you prefer manual)
    // setTimeout(() => { if (engine !== 'none') startListening(); }, 500);
    
    // Cleanup on page unload
    window.addEventListener('beforeunload', () => {
        if (recognition) recognition.abort();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (animationInterval) clearInterval(animationInterval);
    });
</script>
</body>
</html>
