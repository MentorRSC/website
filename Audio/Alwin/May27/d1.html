<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline Keyword Visualizer</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands"></script>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#ffffff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container {
    width:90%;
    max-width:900px;
    text-align:center;
}
button {
    padding:12px 24px;
    border:none;
    border-radius:30px;
    background:#1a73e8;
    color:#fff;
    font-weight:600;
    cursor:pointer;
}
canvas {
    margin-top:20px;
    width:100%;
    height:200px;
}
.status {
    margin-top:10px;
    font-size:14px;
}
</style>
</head>

<body>
<div class="container">
    <h2>Offline Keyword Detection</h2>
    <button onclick="startListening()">Start Listening</button>
    <div class="status" id="status">Idle</div>
    <canvas id="canvas"></canvas>
</div>

<script>
let recognizer;
let ctx = document.getElementById('canvas').getContext('2d');
let width = 800;
let height = 200;

document.getElementById('canvas').width = width;
document.getElementById('canvas').height = height;

function drawBars(data) {
    ctx.clearRect(0,0,width,height);
    let barWidth = width / data.length;
    for(let i=0;i<data.length;i++){
        let val = data[i] * height;
        ctx.fillStyle = '#1e88e5';
        ctx.fillRect(i*barWidth, height - val, barWidth - 2, val);
    }
}

async function startListening(){
    document.getElementById('status').innerText = 'Loading model...';

    recognizer = speechCommands.create('BROWSER_FFT');
    await recognizer.ensureModelLoaded();

    document.getElementById('status').innerText = 'Listening (offline)...';

    recognizer.listen(result => {
        const scores = result.scores;
        const labels = recognizer.wordLabels();

        const maxIndex = scores.indexOf(Math.max(...scores));
        const word = labels[maxIndex];

        document.getElementById('status').innerText = 'Detected: ' + word;

        drawBars(scores);

        if(word === 'yes'){
            console.log('YES command');
        }

        if(word === 'no'){
            console.log('NO command');
        }

    }, {
        probabilityThreshold: 0.75
    });
}
</script>

</body>
</html>
