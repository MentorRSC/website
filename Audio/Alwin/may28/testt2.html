<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Silent Flow | Wake Word Visualizer</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

body {
    background: linear-gradient(135deg, #050a14 0%, #0a0f1a 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    transition: background 0.3s ease;
    overflow-x: hidden;
}

body.light-theme {
    background: linear-gradient(135deg, #e8ecf3 0%, #f0f4fa 100%);
}

/* Wave Container */
.wave-container {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(3px, 1.5vw, 10px);
    padding: 0 20px;
    z-index: 10;
    pointer-events: none;
    flex-wrap: wrap;
}

.wave-bar {
    width: clamp(3px, 1.8vw, 12px);
    height: 25px;
    border-radius: 20px;
    background: linear-gradient(180deg, #3a86ff, #ff66cc);
    transition: height 0.05s linear;
    box-shadow: 0 0 10px rgba(58, 134, 255, 0.5);
    will-change: height;
}

.wave-bar.idle {
    animation: gentleWave 0.8s infinite ease-in-out;
}

@keyframes gentleWave {
    0%, 100% { height: 20px; opacity: 0.6; transform: scaleY(0.8); }
    50% { height: 55px; opacity: 1; transform: scaleY(1); }
}

/* Wake Word Indicator */
.wake-indicator {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    background: rgba(10, 20, 35, 0.9);
    backdrop-filter: blur(20px);
    border-radius: 50px;
    padding: 10px 24px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    font-family: monospace;
    font-weight: 600;
    font-size: 14px;
    color: #3a86ff;
    pointer-events: none;
    transition: all 0.3s ease;
    white-space: nowrap;
    letter-spacing: 0.5px;
}

.wake-indicator.listening {
    background: rgba(255, 80, 120, 0.25);
    border-color: #ff5080;
    color: #ff80a0;
    animation: pulseGlow 1.5s infinite;
}

.wake-indicator.active {
    background: rgba(0, 255, 150, 0.25);
    border-color: #00ffaa;
    color: #00ffaa;
    animation: none;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 80, 120, 0.3); }
    50% { box-shadow: 0 0 0 15px rgba(255, 80, 120, 0); }
}

/* System Clock */
.system-clock {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 300;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 18px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-weight: 500;
    pointer-events: none;
}

.clock-time {
    font-size: 16px;
    font-weight: 600;
    color: #3a86ff;
    font-variant-numeric: tabular-nums;
}

.clock-ampm {
    font-size: 11px;
    font-weight: 500;
    color: #88aaff;
}

/* Mute Button */
.mute-overlay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    padding: 10px 20px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    color: #c0e4ff;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
}

.mute-overlay.muted {
    background: linear-gradient(135deg, #ff3366, #ff80b0);
    border-color: #ff80b0;
    color: white;
}

/* Settings Button */
.settings-corner {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 300;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 18px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    cursor: pointer;
    color: #3a86ff;
    font-weight: 600;
    font-size: 18px;
    transition: all 0.2s;
}

.settings-corner:hover {
    background: rgba(58, 134, 255, 0.2);
    transform: scale(0.95);
}

/* Settings Panel */
.settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    background: rgba(12, 22, 40, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(58, 134, 255, 0.3);
    z-index: 310;
    min-width: 240px;
    display: none;
    flex-direction: column;
    gap: 16px;
}

.settings-panel.show {
    display: flex;
}

.setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 14px;
    color: #eef3ff;
}

.setting-btn, select {
    background: rgba(58, 134, 255, 0.2);
    border: 1px solid rgba(58, 134, 255, 0.5);
    padding: 6px 14px;
    border-radius: 30px;
    cursor: pointer;
    color: inherit;
    font-family: inherit;
    font-size: 13px;
}

.record-btn {
    width: 100%;
    background: linear-gradient(135deg, #3a86ff, #ff66cc);
    border: none;
    padding: 10px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
}

.record-btn.recording {
    background: linear-gradient(135deg, #ff3366, #ff80b0);
    animation: pulseRed 1s infinite;
}

@keyframes pulseRed {
    0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(255, 51, 102, 0); }
}

.status-text {
    font-size: 11px;
    background: rgba(58, 134, 255, 0.15);
    padding: 6px 12px;
    border-radius: 20px;
    text-align: center;
    color: #88ddff;
}

.divider {
    height: 1px;
    background: rgba(58, 134, 255, 0.2);
    margin: 4px 0;
}

.hidden {
    display: none !important;
}

@media (max-width: 640px) {
    .wake-indicator { top: 65px; font-size: 11px; padding: 6px 16px; white-space: nowrap; }
    .system-clock { top: 12px; left: 12px; padding: 6px 14px; }
    .clock-time { font-size: 13px; }
    .settings-corner { top: 12px; right: 12px; padding: 6px 14px; }
    .mute-overlay { bottom: 12px; right: 12px; padding: 8px 16px; font-size: 12px; }
}
</style>
</head>
<body>

<div class="system-clock">
    <span class="clock-time" id="clockTime">--:--:--</span>
    <span class="clock-ampm" id="clockAmPm">--</span>
</div>

<div id="wakeIndicator" class="wake-indicator">🎤 Say "Hey Wave" to start</div>

<div id="settingsBtn" class="settings-corner">⚙️</div>

<div id="settingsPanel" class="settings-panel">
    <div class="setting-item">
        <span>🌗 Theme</span>
        <button id="themeBtn" class="setting-btn">Toggle</button>
    </div>
    <div class="setting-item">
        <span>🎙️ Wake Word</span>
        <button id="wakeToggleBtn" class="setting-btn">Disable</button>
    </div>
    <div class="setting-item">
        <span>⏱️ Duration</span>
        <select id="durationSelect">
            <option value="5">5 sec</option>
            <option value="10" selected>10 sec</option>
            <option value="15">15 sec</option>
            <option value="30">30 sec</option>
        </select>
    </div>
    <div class="divider"></div>
    <button id="recordBtn" class="record-btn">⏺ START RECORDING</button>
    <div id="statusMsg" class="status-text">⚪ Waiting for wake word</div>
</div>

<div id="waveContainer" class="wave-container"></div>
<button id="muteBtn" class="mute-overlay">🔇 MUTE</button>

<script>
(function() {
    // DOM Elements
    const waveContainer = document.getElementById('waveContainer');
    const muteBtn = document.getElementById('muteBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const themeBtn = document.getElementById('themeBtn');
    const wakeToggleBtn = document.getElementById('wakeToggleBtn');
    const durationSelect = document.getElementById('durationSelect');
    const recordBtn = document.getElementById('recordBtn');
    const statusMsg = document.getElementById('statusMsg');
    const wakeIndicator = document.getElementById('wakeIndicator');
    const clockTimeSpan = document.getElementById('clockTime');
    const clockAmPmSpan = document.getElementById('clockAmPm');

    // State
    let audioContext = null;
    let mediaStream = null;
    let analyser = null;
    let animationId = null;
    let isActive = false;
    let isMuted = false;
    let wakeEnabled = true;
    let recognition = null;
    
    // Recording
    let mediaRecorder = null;
    let chunks = [];
    let isRecording = false;
    let recordTimeout = null;
    let counterInterval = null;
    let recordDuration = 10;
    
    // Bars
    let bars = [];
    let barCount = 24;
    let freqData = null;
    
    // Clock
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        clockTimeSpan.textContent = `${hours.toString().padStart(2, '0')}:${minutes}:${seconds}`;
        clockAmPmSpan.textContent = ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    // Create bars
    function createBars() {
        const containerWidth = window.innerWidth - 40;
        const barWidth = Math.max(4, Math.min(12, Math.floor(containerWidth / 28)));
        barCount = Math.floor(containerWidth / (barWidth + 6));
        barCount = Math.min(32, Math.max(16, barCount));
        
        waveContainer.innerHTML = '';
        bars = [];
        
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar idle';
            waveContainer.appendChild(bar);
            bars.push(bar);
        }
    }
    
    // Update bars with audio
    function updateBars() {
        if (!isActive || isMuted || !analyser || !freqData) {
            return;
        }
        
        analyser.getByteFrequencyData(freqData);
        const binsPerBar = Math.floor(freqData.length / barCount);
        
        for (let i = 0; i < barCount; i++) {
            let sum = 0;
            const start = i * binsPerBar;
            const end = Math.min(start + binsPerBar, freqData.length);
            for (let j = start; j < end; j++) sum += freqData[j];
            
            let intensity = sum / (end - start) / 180;
            intensity = Math.min(1, Math.pow(intensity, 1.3) * 1.2);
            
            const height = 15 + (intensity * 110);
            const hue = 200 + intensity * 40;
            
            bars[i].style.height = `${height}px`;
            bars[i].style.background = `linear-gradient(180deg, hsl(${hue}, 85%, 55%), hsl(${hue + 20}, 80%, 60%))`;
            bars[i].style.boxShadow = `0 0 ${8 + intensity * 12}px rgba(58, 134, 255, ${0.3 + intensity * 0.5})`;
            bars[i].classList.remove('idle');
        }
    }
    
    // Idle animation
    function idleAnimation() {
        if (!isActive && bars.length) {
            bars.forEach((bar, i) => {
                bar.classList.add('idle');
            });
            requestAnimationFrame(idleAnimation);
        }
    }
    
    // Animation loop
    function animate() {
        if (!animationId) return;
        updateBars();
        animationId = requestAnimationFrame(animate);
    }
    
    // Start audio visualization
    async function startVisualizer() {
        if (isActive) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaStream = stream;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.7;
            freqData = new Uint8Array(analyser.frequencyBinCount);
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            isActive = true;
            isMuted = false;
            
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '🔇 MUTE';
            
            bars.forEach(bar => bar.classList.remove('idle'));
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
            
            statusMsg.innerText = '🎤 Active';
            wakeIndicator.textContent = '✅ Visualizer Active';
            wakeIndicator.classList.remove('listening');
            wakeIndicator.classList.add('active');
            
            setTimeout(() => {
                if (isActive) {
                    wakeIndicator.textContent = '🎧 Listening for "Hey Wave"';
                    wakeIndicator.classList.add('listening');
                    wakeIndicator.classList.remove('active');
                }
            }, 2000);
            
        } catch (err) {
            console.error('Mic error:', err);
            statusMsg.innerText = '❌ Mic access denied';
            wakeIndicator.textContent = '❌ Microphone access required';
        }
    }
    
    // Stop visualizer
    function stopVisualizer() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        if (audioContext) {
            audioContext.close().catch(() => {});
            audioContext = null;
        }
        
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
        
        analyser = null;
        isActive = false;
        isMuted = false;
        
        bars.forEach(bar => {
            bar.classList.add('idle');
            bar.style.height = '';
            bar.style.background = '';
        });
        
        statusMsg.innerText = '⚪ Waiting for wake word';
        wakeIndicator.textContent = '🎤 Say "Hey Wave" to start';
        wakeIndicator.classList.remove('active', 'listening');
        
        if (wakeEnabled && recognition) {
            setTimeout(() => {
                try { recognition.start(); } catch(e) {}
            }, 500);
        }
    }
    
    // Wake word detection
    function initWakeWord() {
        if (!wakeEnabled) return;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            wakeIndicator.textContent = '⚠️ Speech recognition not supported';
            return;
        }
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
            if (!isActive && wakeEnabled) {
                wakeIndicator.classList.add('listening');
                wakeIndicator.textContent = '🎧 Listening...';
            }
        };
        
        recognition.onend = () => {
            if (wakeEnabled && !isActive) {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 1000);
            }
        };
        
        recognition.onresult = (event) => {
            const last = event.results.length - 1;
            const text = event.results[last][0].transcript.toLowerCase().trim();
            
            if (text.includes('hey wave') || text.includes('hey wave') || text.includes('hey wave')) {
                if (!isActive) {
                    wakeIndicator.classList.add('active');
                    wakeIndicator.textContent = '✨ Wake word detected!';
                    setTimeout(() => {
                        startVisualizer();
                    }, 100);
                }
            }
        };
        
        recognition.onerror = (e) => {
            if (e.error === 'not-allowed') {
                wakeIndicator.textContent = '🎤 Microphone permission needed';
            }
        };
        
        try {
            recognition.start();
        } catch(e) {}
    }
    
    // Toggle mute
    function toggleMute() {
        if (!isActive) return;
        isMuted = !isMuted;
        
        if (isMuted) {
            muteBtn.classList.add('muted');
            muteBtn.innerHTML = '🔊 UNMUTE';
            statusMsg.innerText = '🔇 Muted';
            bars.forEach(bar => bar.classList.add('idle'));
        } else {
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '🔇 MUTE';
            statusMsg.innerText = '🎤 Active';
            bars.forEach(bar => bar.classList.remove('idle'));
        }
    }
    
    // Recording
    function updateRecordUI() {
        if (isRecording) {
            recordBtn.innerHTML = '⏹️ STOP RECORDING';
            recordBtn.classList.add('recording');
        } else {
            recordBtn.innerHTML = '⏺ START RECORDING';
            recordBtn.classList.remove('recording');
        }
    }
    
    function startCounter(seconds) {
        if (counterInterval) clearInterval(counterInterval);
        let remaining = seconds;
        const update = () => {
            if (remaining >= 0) {
                statusMsg.innerText = `🔴 Recording: ${remaining}s`;
                remaining--;
            }
            if (remaining < 0 && counterInterval) {
                clearInterval(counterInterval);
                counterInterval = null;
            }
        };
        update();
        counterInterval = setInterval(update, 1000);
    }
    
    function handleRecording() {
        if (!isActive || !mediaStream) {
            statusMsg.innerText = '❌ Activate mic first';
            return;
        }
        
        if (isRecording) {
            if (counterInterval) clearInterval(counterInterval);
            if (recordTimeout) clearTimeout(recordTimeout);
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            updateRecordUI();
            statusMsg.innerText = isMuted ? '🔇 Muted' : '🎤 Active';
            return;
        }
        
        chunks = [];
        const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mime });
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size) chunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            if (chunks.length) {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `wave_recording_${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                statusMsg.innerText = '💾 Saved!';
                setTimeout(() => {
                    if (!isRecording && isActive) {
                        statusMsg.innerText = isMuted ? '🔇 Muted' : '🎤 Active';
                    }
                }, 1500);
            }
            chunks = [];
            isRecording = false;
            updateRecordUI();
            if (counterInterval) clearInterval(counterInterval);
        };
        
        mediaRecorder.start(200);
        isRecording = true;
        updateRecordUI();
        startCounter(recordDuration);
        
        recordTimeout = setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }, recordDuration * 1000);
    }
    
    // Theme
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }
    
    function applyTheme() {
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    }
    
    // Toggle wake word
    function toggleWakeWord() {
        wakeEnabled = !wakeEnabled;
        wakeToggleBtn.textContent = wakeEnabled ? 'Disable' : 'Enable';
        
        if (wakeEnabled && !isActive) {
            initWakeWord();
        } else if (!wakeEnabled && recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
            if (!isActive) {
                wakeIndicator.textContent = '⏸️ Wake word disabled';
                wakeIndicator.classList.remove('listening', 'active');
            }
        }
    }
    
    // Event listeners
    muteBtn.addEventListener('click', toggleMute);
    recordBtn.addEventListener('click', handleRecording);
    durationSelect.addEventListener('change', (e) => {
        recordDuration = parseInt(e.target.value);
    });
    settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
        if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
            settingsPanel.classList.remove('show');
        }
    });
    themeBtn.addEventListener('click', toggleTheme);
    wakeToggleBtn.addEventListener('click', toggleWakeWord);
    window.addEventListener('resize', () => setTimeout(createBars, 100));
    
    // Initialize
    createBars();
    idleAnimation();
    applyTheme();
    initWakeWord();
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (audioContext) audioContext.close();
        if (animationId) cancelAnimationFrame(animationId);
        if (recognition) recognition.stop();
    });
})();
</script>
</body>
</html>
