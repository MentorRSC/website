<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Silent Blue Waves | Dynamic Visualizer + Countdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #0b1220;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'BlinkMacSystemFont', 'Roboto', sans-serif;
            padding: 1.5rem;
            transition: background 0.25s ease;
        }

        body.light-theme {
            background: #e9edf2;
        }

        .wave-container {
            background: linear-gradient(135deg, #0a1428, #050a18);
            width: 100%;
            max-width: 1300px;
            border-radius: 2rem;
            padding: 2rem 1.8rem 2rem 1.8rem;
            position: relative;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 200, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(0, 200, 255, 0.1);
        }

        body.light-theme .wave-container {
            background: linear-gradient(135deg, #ffffff, #f5f7fb);
            border: 1px solid rgba(0, 200, 255, 0.4);
        }

        .title-section {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .title-section h1 {
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #00c8ff, #ff50c8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            display: inline-block;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.3);
        }

        .title-section .sub {
            color: #8a9bb0;
            margin-top: 0.5rem;
            font-weight: 450;
            font-size: 0.9rem;
        }

        .settings-icon {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(10, 20, 40, 0.8);
            border: 1px solid rgba(0, 200, 255, 0.3);
            border-radius: 3rem;
            padding: 0.5rem 1rem;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(10px);
            color: #00c8ff;
        }

        .settings-dropdown {
            position: absolute;
            top: 55px;
            right: 0;
            background: rgba(10, 20, 40, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 1.2rem;
            padding: 1rem 1.3rem;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 200, 255, 0.3);
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 180px;
        }

        .dropdown-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: #e2e8f0;
        }

        .theme-toggle-btn {
            background: rgba(0, 200, 255, 0.2);
            border: 1px solid rgba(0, 200, 255, 0.5);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            color: inherit;
        }

        .duration-select {
            padding: 0.3rem 0.6rem;
            border-radius: 2rem;
            border: 1px solid rgba(0, 200, 255, 0.5);
            background: rgba(0, 0, 0, 0.3);
            font-family: inherit;
            font-weight: 500;
            color: inherit;
            cursor: pointer;
        }

        .permission-panel {
            background: rgba(10, 20, 40, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 1.8rem;
            padding: 2rem 1.5rem;
            text-align: center;
            border: 1px solid rgba(0, 200, 255, 0.3);
            margin-bottom: 1.8rem;
        }

        .perm-btn {
            background: linear-gradient(135deg, #00c8ff, #ff50c8);
            border: none;
            padding: 0.85rem 2.2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 3rem;
            color: white;
            cursor: pointer;
            transition: transform 0.15s;
            font-family: inherit;
        }

        .perm-btn:hover {
            transform: scale(0.98);
        }

        .status-msg {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 0.8rem;
            color: #00c8ff;
            font-weight: 500;
            background: rgba(0, 200, 255, 0.1);
            display: inline-block;
            width: auto;
            padding: 0.3rem 1rem;
            border-radius: 40px;
        }

        .waveform-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 1.6rem;
            padding: 1rem;
            margin: 1rem 0;
            border: 1px solid rgba(0, 200, 255, 0.2);
            position: relative;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            background: transparent;
            border-radius: 1rem;
        }

        /* Countdown overlay */
        .countdown-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 800;
            background: linear-gradient(135deg, #00c8ff, #ff50c8);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(0, 200, 255, 0.5);
            z-index: 10;
            pointer-events: none;
            animation: countdownPulse 0.5s ease-out;
            font-family: monospace;
        }

        @keyframes countdownPulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .recording-panel {
            background: rgba(10, 20, 40, 0.5);
            backdrop-filter: blur(8px);
            border-radius: 1.8rem;
            padding: 0.8rem 1.5rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            border: 1px solid rgba(0, 200, 255, 0.3);
        }

        .rec-toggle-btn {
            background: linear-gradient(135deg, #00c8ff, #ff50c8);
            border: none;
            padding: 0.7rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            min-width: 180px;
            color: white;
        }

        .rec-toggle-btn.recording-active {
            background: linear-gradient(135deg, #ff3366, #ff50c8);
            animation: pulse 1.2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 51, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0); }
        }

        .rec-status {
            font-size: 0.85rem;
            font-weight: 500;
            color: #00c8ff;
            padding: 0.3rem 1rem;
            background: rgba(0, 200, 255, 0.1);
            border-radius: 2rem;
        }

        .corner-buttons {
            position: relative;
            margin-top: 1.8rem;
            height: 60px;
        }

        .btn-corner {
            position: absolute;
            bottom: 0;
            background: rgba(10, 20, 40, 0.8);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 200, 255, 0.3);
            padding: 0.7rem 1.6rem;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 3rem;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #e2e8f0;
        }

        .btn-stop { left: 0; }
        .btn-stop:hover { background: rgba(255, 80, 80, 0.3); border-color: #ff5050; }
        .btn-mute { right: 0; }
        .btn-mute:hover { background: rgba(0, 200, 255, 0.3); }

        .info-note {
            text-align: center;
            font-size: 0.7rem;
            color: #6c7a8e;
            margin-top: 1.8rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(0, 200, 255, 0.2);
        }

        @media (max-width: 640px) {
            .wave-container { padding: 1.2rem; }
            .countdown-overlay { font-size: 50px; }
        }
    </style>
</head>
<body>
<div class="wave-container">
    <div class="title-section">
        <h1>Audio Bar</h1>
        <div class="sub">Dynamic waveform · particles · countdown timer</div>
        <div id="settingsButton" class="settings-icon">⚙️ Settings</div>
        <div id="settingsDropdown" class="settings-dropdown" style="display: none;">
            <div class="dropdown-item">
                <span>🌓 Dark/Light</span>
                <button id="themeToggleBtn" class="theme-toggle-btn">Toggle Theme</button>
            </div>
            <div class="dropdown-item">
                <span>⏱️ Duration (sec)</span>
                <select id="durationSelect" class="duration-select">
                    <option value="5">5 sec</option>
                    <option value="10" selected>10 sec</option>
                    <option value="15">15 sec</option>
                    <option value="30">30 sec</option>
                    <option value="60">60 sec</option>
                </select>
            </div>
        </div>
    </div>

    <div id="permissionZone" class="permission-panel">
        <p>🎤 Grant microphone access to see the dynamic waveform</p>
        <button id="requestPermBtn" class="perm-btn">✨ Request Permission & Start</button>
        <div class="status-area" style="margin-top: 1rem; text-align: center;">
            <div id="permStatusMsg" class="status-msg">⚡ Click to allow microphone</div>
        </div>
    </div>

    <div id="visualizerArea" style="display: none;">
        <div class="waveform-container" id="waveformContainer">
            <canvas id="waveCanvas" width="1100" height="400" style="width:100%; height:auto; max-width:1100px; aspect-ratio:1100/400"></canvas>
            <div id="countdownDisplay" style="display: none;" class="countdown-overlay"></div>
        </div>

        <div id="recordingPanel" class="recording-panel">
            <button id="recordToggleBtn" class="rec-toggle-btn">⏺ START RECORDING</button>
            <div id="recStatusMsg" class="rec-status">⚪ Ready</div>
        </div>

        <div class="corner-buttons">
            <button id="stopBtn" class="btn-corner btn-stop">⏹️ STOP</button>
            <button id="muteBtn" class="btn-corner btn-mute">🔇 MUTE</button>
        </div>
        <div class="info-note">Dynamic waveform with particles | Countdown before recording | Silent output</div>
    </div>
</div>

<script>
    (function() {
        // DOM elements
        const permissionZone = document.getElementById('permissionZone');
        const visualizerArea = document.getElementById('visualizerArea');
        const requestBtn = document.getElementById('requestPermBtn');
        const permStatusMsg = document.getElementById('permStatusMsg');
        const stopBtn = document.getElementById('stopBtn');
        const muteBtn = document.getElementById('muteBtn');
        const canvas = document.getElementById('waveCanvas');
        const recordToggleBtn = document.getElementById('recordToggleBtn');
        const recStatusSpan = document.getElementById('recStatusMsg');
        const settingsButton = document.getElementById('settingsButton');
        const settingsDropdown = document.getElementById('settingsDropdown');
        const themeToggle = document.getElementById('themeToggleBtn');
        const durationSelect = document.getElementById('durationSelect');
        const countdownDisplay = document.getElementById('countdownDisplay');

        // Audio context
        let audioContext = null;
        let mediaStream = null;
        let sourceNode = null;
        let analyserNode = null;
        let animationFrameId = null;
        let isStreamActive = false;
        let isMicrophoneMuted = false;
        
        // Recording variables
        let mediaRecorder = null;
        let recordedChunks = [];
        let isRecording = false;
        let recordingTimer = null;
        let selectedDuration = 10;
        let lastSavedBlobUrl = null;
        
        // Countdown variables
        let isCountdownActive = false;
        let countdownInterval = null;
        let currentCountdown = 5;
        
        // Waveform animation variables
        let phase = 0;
        let particles = [];
        
        // Canvas setup - INCREASED HEIGHT
        let ctx = canvas.getContext('2d');
        let canvasWidth = canvas.width;
        let canvasHeight = canvas.height;
        
        function initCanvasSize() {
            canvas.width = 1100;
            canvas.height = 400; // Increased height for bigger waves
            canvasWidth = canvas.width;
            canvasHeight = canvas.height;
            ctx = canvas.getContext('2d');
        }
        initCanvasSize();
        
        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 7;
                this.vy = (Math.random() - 0.5) * 7;
                this.life = Math.random() * 80 + 100;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 1.8;
            }
        }
        
        // Draw dynamic waveform with increased amplitude
        function drawWaveform(level) {
            if (!ctx) return;
            
            ctx.clearRect(0, 0, canvasWidth, canvasHeight);
            
            const centerY = canvasHeight / 2;
            const maxAmp = canvasHeight * 0.55; // Increased amplitude for bigger waves
            const baseAmp = Math.min(level * maxAmp * 1.2, maxAmp); // 1.2x multiplier for more dramatic effect
            const visibility = Math.min(1.0, level * 8);
            
            // Update phase
            phase += 0.04;
            
            // Add particles when audio is active
            if (level > 0.03 && isStreamActive && !isMicrophoneMuted) {
                const particleCount = Math.min(8, Math.floor(level * 12));
                for (let i = 0; i < particleCount; i++) {
                    particles.push(new Particle(
                        canvasWidth / 2 + (Math.random() - 0.5) * 120,
                        centerY + (Math.random() - 0.5) * 100
                    ));
                }
            }
            
            // Update and filter particles
            for (let p of particles) p.update();
            particles = particles.filter(p => p.life > 0);
            
            // If no audio or muted, draw idle glow line
            if (level < 0.01 || isMicrophoneMuted || !isStreamActive) {
                const glowAlpha = Math.min(60, visibility * 100);
                ctx.beginPath();
                ctx.moveTo(0, centerY);
                ctx.lineTo(canvasWidth, centerY);
                ctx.strokeStyle = `rgba(0, 200, 255, ${glowAlpha / 255})`;
                ctx.lineWidth = 8;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, centerY);
                ctx.lineTo(canvasWidth, centerY);
                ctx.strokeStyle = `rgba(0, 200, 255, ${Math.min(180, visibility * 220)})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                drawParticles();
                return;
            }
            
            // Draw gradient wave with enhanced bars effect
            const gradient = ctx.createLinearGradient(0, 0, canvasWidth, 0);
            gradient.addColorStop(0, '#00c8ff');
            gradient.addColorStop(0.5, '#ff50c8');
            gradient.addColorStop(1, '#00c8ff');
            
            // Calculate top and bottom wave points with more complex waveform
            const topPoints = [];
            const bottomPoints = [];
            
            for (let x = 0; x < canvasWidth; x += 2) {
                const norm = (x / canvasWidth) * 2 - 1;
                const envelope = Math.exp(-3.5 * norm * norm);
                
                // Multiple frequency waves for richer visual
                const wave1 = Math.sin((x * 0.04) + phase);
                const wave2 = Math.sin((x * 0.09) - phase * 1.5) * 0.5;
                const wave3 = Math.sin((x * 0.02) + phase * 0.8) * 0.3;
                const wave = (wave1 + wave2 + wave3) / 1.8;
                
                const amp = baseAmp * envelope * (0.7 + Math.sin(phase) * 0.25);
                const offset = wave * amp;
                
                topPoints.push({ x, y: centerY - offset });
                bottomPoints.push({ x, y: centerY + offset });
            }
            
            // Draw glow layers (multiple passes for glow effect)
            for (let glowWidth = 12; glowWidth >= 2; glowWidth -= 2) {
                ctx.beginPath();
                for (let i = 0; i < topPoints.length - 1; i++) {
                    ctx.moveTo(topPoints[i].x, topPoints[i].y);
                    ctx.lineTo(topPoints[i + 1].x, topPoints[i + 1].y);
                }
                ctx.strokeStyle = `rgba(0, 200, 255, ${35 * visibility})`;
                ctx.lineWidth = glowWidth;
                ctx.stroke();
                
                ctx.beginPath();
                for (let i = 0; i < bottomPoints.length - 1; i++) {
                    ctx.moveTo(bottomPoints[i].x, bottomPoints[i].y);
                    ctx.lineTo(bottomPoints[i + 1].x, bottomPoints[i + 1].y);
                }
                ctx.stroke();
            }
            
            // Draw main wave lines
            ctx.beginPath();
            for (let i = 0; i < topPoints.length - 1; i++) {
                ctx.moveTo(topPoints[i].x, topPoints[i].y);
                ctx.lineTo(topPoints[i + 1].x, topPoints[i + 1].y);
            }
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 4;
            ctx.stroke();
            
            ctx.beginPath();
            for (let i = 0; i < bottomPoints.length - 1; i++) {
                ctx.moveTo(bottomPoints[i].x, bottomPoints[i].y);
                ctx.lineTo(bottomPoints[i + 1].x, bottomPoints[i + 1].y);
            }
            ctx.stroke();
            
            // Draw vertical bars (spectrum style) - more bars for fuller look
            const step = Math.max(3, Math.floor(topPoints.length / 80));
            for (let i = 0; i < topPoints.length; i += step) {
                const barHeight = Math.abs(topPoints[i].y - bottomPoints[i].y);
                if (barHeight > 3) {
                    ctx.beginPath();
                    ctx.moveTo(topPoints[i].x, topPoints[i].y);
                    ctx.lineTo(topPoints[i].x, bottomPoints[i].y);
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = Math.min(5, 2.5 + barHeight / 18);
                    ctx.stroke();
                }
            }
            
            drawParticles();
        }
        
        function drawParticles() {
            for (let p of particles) {
                const alpha = Math.min(220, Math.max(0, (p.life / 180) * 200));
                ctx.beginPath();
                ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 200, 255, ${alpha / 255})`;
                ctx.fill();
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 80, 200, ${alpha / 255})`;
                ctx.fill();
            }
        }
        
        let currentLevel = 0;
        let smoothLevel = 0;
        
        function animateWaveform() {
            if (!animationFrameId) return;
            
            // Smooth the level for nicer animation
            smoothLevel = smoothLevel * 0.85 + currentLevel * 0.15;
            drawWaveform(smoothLevel);
            
            animationFrameId = requestAnimationFrame(animateWaveform);
        }
        
        // Update level from analyser
        function updateAudioLevel() {
            if (!isStreamActive || !analyserNode || isMicrophoneMuted) {
                currentLevel = 0;
                return;
            }
            
            const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteFrequencyData(dataArray);
            
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            let avg = sum / dataArray.length;
            currentLevel = avg / 255;
        }
        
        // Countdown function
        function startCountdown(callback) {
            if (isCountdownActive) return;
            
            currentCountdown = 5;
            countdownDisplay.style.display = 'flex';
            countdownDisplay.style.animation = 'none';
            countdownDisplay.offsetHeight; // Force reflow
            countdownDisplay.style.animation = 'countdownPulse 0.5s ease-out';
            countdownDisplay.textContent = currentCountdown;
            
            isCountdownActive = true;
            
            if (countdownInterval) clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                currentCountdown--;
                
                if (currentCountdown > 0) {
                    countdownDisplay.style.animation = 'none';
                    countdownDisplay.offsetHeight;
                    countdownDisplay.style.animation = 'countdownPulse 0.5s ease-out';
                    countdownDisplay.textContent = currentCountdown;
                } else if (currentCountdown === 0) {
                    countdownDisplay.style.animation = 'none';
                    countdownDisplay.offsetHeight;
                    countdownDisplay.style.animation = 'countdownPulse 0.5s ease-out';
                    countdownDisplay.textContent = 'GO!';
                    
                    setTimeout(() => {
                        countdownDisplay.style.display = 'none';
                        if (countdownInterval) clearInterval(countdownInterval);
                        countdownInterval = null;
                        isCountdownActive = false;
                        if (callback) callback();
                    }, 400);
                } else {
                    if (countdownInterval) clearInterval(countdownInterval);
                    countdownInterval = null;
                    isCountdownActive = false;
                    countdownDisplay.style.display = 'none';
                }
            }, 1000);
        }
        
        // Silent visualizer init
        async function initSilentVisualizerFromStream(stream) {
            if (audioContext && audioContext.state !== 'closed') await stopAndReleaseResources(false);
            mediaStream = stream;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyserNode = audioContext.createAnalyser();
            analyserNode.fftSize = 512;
            analyserNode.smoothingTimeConstant = 0.65;
            sourceNode = audioContext.createMediaStreamSource(mediaStream);
            sourceNode.connect(analyserNode);
            
            if (audioContext.state === 'suspended') await audioContext.resume();
            isStreamActive = true;
            isMicrophoneMuted = false;
            updateMuteButtonUI();
            
            if (animationFrameId) cancelAnimationFrame(animationFrameId);
            animationFrameId = requestAnimationFrame(animateWaveform);
            
            setInterval(updateAudioLevel, 30);
        }
        
        async function stopAndReleaseResources(keepUI = false) {
            if (animationFrameId) { cancelAnimationFrame(animationFrameId); animationFrameId = null; }
            if (sourceNode) { try { sourceNode.disconnect(); } catch(e) {} sourceNode = null; }
            if (analyserNode) { try { analyserNode.disconnect(); } catch(e) {} analyserNode = null; }
            if (audioContext) { await audioContext.close().catch(e=>{}); audioContext = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(track => { if(track.readyState === 'live') track.stop(); }); mediaStream = null; }
            isStreamActive = false;
            isMicrophoneMuted = false;
            currentLevel = 0;
            particles = [];
            
            if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            isCountdownActive = false;
            countdownDisplay.style.display = 'none';
            
            if (!keepUI) {
                visualizerArea.style.display = 'none';
                permissionZone.style.display = 'block';
                permStatusMsg.innerText = '⏹️ Stream stopped. Click to restart.';
            }
            if (isRecording) forceStopRecording();
            if (lastSavedBlobUrl) { URL.revokeObjectURL(lastSavedBlobUrl); lastSavedBlobUrl = null; }
        }
        
        function forceStopRecording() {
            if (recordingTimer) { clearTimeout(recordingTimer); recordingTimer = null; }
            if (mediaRecorder && isRecording && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            updateRecordButtonUI(false);
        }
        
        function updateMuteButtonUI() {
            if (isMicrophoneMuted) { muteBtn.innerHTML = '🔴 MUTED'; }
            else { muteBtn.innerHTML = '🔇 MUTE'; }
        }
        
        function toggleVisualMute() { 
            if(!isStreamActive) return; 
            isMicrophoneMuted = !isMicrophoneMuted; 
            updateMuteButtonUI(); 
            if (!isMicrophoneMuted) currentLevel = 0;
        }
        
        function updateRecordButtonUI(recording) {
            if (recording) {
                recordToggleBtn.innerHTML = '⏹️ STOP RECORDING';
                recordToggleBtn.classList.add('recording-active');
                recStatusSpan.innerHTML = '🔴 Recording...';
            } else {
                recordToggleBtn.innerHTML = '⏺ START RECORDING';
                recordToggleBtn.classList.remove('recording-active');
                recStatusSpan.innerHTML = '⚪ Ready';
            }
        }
        
        // WAV conversion and save
        async function convertToWavAndSave(chunks) {
            if (chunks.length === 0) return false;
            const blob = new Blob(chunks, { type: 'audio/webm' });
            const arrayBuffer = await blob.arrayBuffer();
            
            try {
                const audioCtxOff = new OfflineAudioContext({ numberOfChannels: 1, length: 1, sampleRate: 44100 });
                const audioBuffer = await audioCtxOff.decodeAudioData(arrayBuffer);
                const channelData = audioBuffer.getChannelData(0);
                
                const wavBuffer = float32ToWav(channelData, audioBuffer.sampleRate, 1);
                const wavBlob = new Blob([wavBuffer], { type: 'audio/wav' });
                
                if (lastSavedBlobUrl) URL.revokeObjectURL(lastSavedBlobUrl);
                const url = URL.createObjectURL(wavBlob);
                lastSavedBlobUrl = url;
                
                const a = document.createElement('a');
                a.href = url;
                a.download = 'recording.wav';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                recStatusSpan.innerHTML = '✅ Saved: recording.wav';
                setTimeout(() => { if (!isRecording) recStatusSpan.innerHTML = '⚪ Ready'; }, 2000);
                return true;
            } catch(e) {
                const fallbackUrl = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = fallbackUrl;
                a.download = 'recording.wav';
                a.click();
                URL.revokeObjectURL(fallbackUrl);
                return false;
            }
        }
        
        function float32ToWav(samples, sampleRate, numChannels) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, str) => { for (let i=0; i<str.length; i++) view.setUint8(offset+i, str.charCodeAt(i)); };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * numChannels * 2, true);
            view.setUint16(32, numChannels * 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);
            let offset = 44;
            for (let i=0; i<samples.length; i++) {
                let s = Math.max(-1, Math.min(1, samples[i]));
                s = s < 0 ? s * 0x8000 : s * 0x7FFF;
                view.setInt16(offset, s, true);
                offset += 2;
            }
            return buffer;
        }
        
        // Toggle recording with countdown
        async function toggleRecording() {
            if (!isStreamActive || !mediaStream) {
                recStatusSpan.innerText = '❌ No active mic';
                return;
            }
            
            if (isRecording) {
                // Stop recording immediately
                if (recordingTimer) clearTimeout(recordingTimer);
                if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
                isRecording = false;
                updateRecordButtonUI(false);
                recStatusSpan.innerText = '💾 Saving...';
            } else {
                // Start countdown before recording
                if (isCountdownActive) return;
                
                recStatusSpan.innerText = '⏰ Countdown 5...';
                startCountdown(() => {
                    // Start actual recording after countdown
                    recordedChunks = [];
                    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
                    mediaRecorder = new MediaRecorder(mediaStream, { mimeType });
                    mediaRecorder.ondataavailable = (e) => { if(e.data.size > 0) recordedChunks.push(e.data); };
                    mediaRecorder.onstop = async () => {
                        if (recordedChunks.length) await convertToWavAndSave(recordedChunks);
                        recordedChunks = [];
                        isRecording = false;
                        updateRecordButtonUI(false);
                    };
                    mediaRecorder.start(1000);
                    isRecording = true;
                    updateRecordButtonUI(true);
                    recStatusSpan.innerText = `⏺ Recording ${selectedDuration} sec...`;
                    recordingTimer = setTimeout(() => {
                        if (isRecording && mediaRecorder?.state === 'recording') mediaRecorder.stop();
                    }, selectedDuration * 1000);
                });
            }
        }
        
        async function requestMicAndStartVisualizer() {
            permStatusMsg.innerText = '🎤 Requesting microphone...';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                await initSilentVisualizerFromStream(stream);
                permissionZone.style.display = 'none';
                visualizerArea.style.display = 'block';
                permStatusMsg.innerText = '✅ Dynamic waveform active';
                updateMuteButtonUI();
            } catch(err) {
                permStatusMsg.innerText = '❌ Microphone error';
            }
        }
        
        function initTheme() { if(localStorage.getItem('theme')==='light') document.body.classList.add('light-theme'); }
        function toggleTheme() { document.body.classList.toggle('light-theme'); localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark'); }
        initTheme();
        
        requestBtn.addEventListener('click', requestMicAndStartVisualizer);
        stopBtn.addEventListener('click', async () => { if(isRecording) forceStopRecording(); await stopAndReleaseResources(true); permissionZone.style.display = 'block'; visualizerArea.style.display = 'none'; });
        muteBtn.addEventListener('click', toggleVisualMute);
        recordToggleBtn.addEventListener('click', toggleRecording);
        settingsButton.addEventListener('click', (e) => { e.stopPropagation(); settingsDropdown.style.display = settingsDropdown.style.display === 'none' ? 'flex' : 'none'; });
        document.addEventListener('click', (e) => { if(!settingsButton.contains(e.target) && !settingsDropdown.contains(e.target)) settingsDropdown.style.display = 'none'; });
        themeToggle.addEventListener('click', toggleTheme);
        durationSelect.addEventListener('change', (e) => { selectedDuration = parseInt(e.target.value,10); });
        
        drawWaveform(0);
    })();
</script>
