<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Offline Wake Word Visualizer</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/speech-commands@0.4.4/dist/speech-commands.min.js"></script>

<style>
/* Your existing CSS here - same as before */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #050a14 0%, #0a0f1a 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    transition: background 0.3s ease;
    overflow-x: hidden;
    position: relative;
}

body.light-theme {
    background: linear-gradient(135deg, #e8ecf3 0%, #f0f4fa 100%);
}

/* Wave Container */
.wave-container {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(3px, 1.5vw, 10px);
    padding: 0 15px;
    z-index: 10;
    pointer-events: none;
    flex-wrap: wrap;
}

.wave-bar {
    width: clamp(3px, 1.8vw, 12px);
    height: 25px;
    border-radius: 20px;
    background: linear-gradient(180deg, #3a86ff, #ff66cc);
    transition: height 0.05s linear;
    box-shadow: 0 0 10px rgba(58, 134, 255, 0.5);
    will-change: height;
}

.wave-bar.idle {
    animation: gentleWave 0.8s infinite ease-in-out;
}

@keyframes gentleWave {
    0%, 100% { height: 20px; opacity: 0.6; transform: scaleY(0.8); }
    50% { height: 55px; opacity: 1; transform: scaleY(1); }
}

/* Wake Word Indicator */
.wake-indicator {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    background: rgba(10, 20, 35, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 50px;
    padding: 12px 24px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    font-weight: 600;
    font-size: 14px;
    color: #3a86ff;
    pointer-events: none;
    transition: all 0.3s ease;
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-align: center;
    font-family: monospace;
}

.wake-indicator.listening {
    background: rgba(255, 80, 120, 0.25);
    border-color: #ff5080;
    color: #ff80a0;
    animation: pulseGlow 1.5s infinite;
}

.wake-indicator.active {
    background: rgba(0, 255, 150, 0.25);
    border-color: #00ffaa;
    color: #00ffaa;
    animation: none;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 80, 120, 0.3); }
    50% { box-shadow: 0 0 0 15px rgba(255, 80, 120, 0); }
}

/* Popup Notification */
.popup-notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: linear-gradient(135deg, rgba(58, 134, 255, 0.95), rgba(255, 102, 204, 0.95));
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 25px 35px;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    border: 2px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    max-width: 85%;
}

.popup-notification.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.popup-icon {
    font-size: 48px;
    margin-bottom: 15px;
}

.popup-title {
    font-size: 24px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
}

.popup-message {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 5px;
}

.popup-word {
    font-size: 20px;
    font-weight: 800;
    color: #ffea80;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* System Clock */
.system-clock {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 300;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 18px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-weight: 500;
    pointer-events: none;
}

.clock-time {
    font-size: 16px;
    font-weight: 600;
    color: #3a86ff;
    font-variant-numeric: tabular-nums;
}

.clock-ampm {
    font-size: 11px;
    font-weight: 500;
    color: #88aaff;
}

/* Mute Button */
.mute-overlay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    padding: 10px 20px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    color: #c0e4ff;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
}

.mute-overlay.muted {
    background: linear-gradient(135deg, #ff3366, #ff80b0);
    border-color: #ff80b0;
    color: white;
}

.mute-overlay:active {
    transform: scale(0.95);
}

/* Settings Button */
.settings-corner {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 300;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 18px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    cursor: pointer;
    color: #3a86ff;
    font-weight: 600;
    font-size: 18px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.settings-corner:active {
    transform: scale(0.95);
}

/* Settings Panel */
.settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    background: rgba(12, 22, 40, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(58, 134, 255, 0.3);
    z-index: 310;
    min-width: 280px;
    display: none;
    flex-direction: column;
    gap: 16px;
}

.settings-panel.show {
    display: flex;
}

.setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 14px;
    color: #eef3ff;
    flex-wrap: wrap;
}

.setting-item label {
    font-size: 13px;
    opacity: 0.9;
}

.setting-btn, select, .custom-wake-input {
    background: rgba(58, 134, 255, 0.2);
    border: 1px solid rgba(58, 134, 255, 0.5);
    padding: 8px 14px;
    border-radius: 30px;
    cursor: pointer;
    color: inherit;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
}

.custom-wake-input {
    flex: 1;
    min-width: 120px;
    cursor: text;
    text-align: center;
    font-weight: 600;
    letter-spacing: 1px;
}

.custom-wake-input:focus {
    outline: none;
    border-color: #00ffaa;
    background: rgba(0, 255, 170, 0.2);
}

.record-btn {
    width: 100%;
    background: linear-gradient(135deg, #3a86ff, #ff66cc);
    border: none;
    padding: 10px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.record-btn:active {
    transform: scale(0.98);
}

.record-btn.recording {
    background: linear-gradient(135deg, #ff3366, #ff80b0);
    animation: pulseRed 1s infinite;
}

@keyframes pulseRed {
    0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(255, 51, 102, 0); }
}

.status-text {
    font-size: 11px;
    background: rgba(58, 134, 255, 0.15);
    padding: 8px 12px;
    border-radius: 20px;
    text-align: center;
    color: #88ddff;
}

.divider {
    height: 1px;
    background: rgba(58, 134, 255, 0.2);
    margin: 4px 0;
}

/* Mobile Optimizations */
@media (max-width: 768px) {
    .wake-indicator { 
        top: 60px; 
        font-size: 11px; 
        padding: 8px 16px; 
        white-space: normal;
        max-width: 90%;
        line-height: 1.3;
    }
    .system-clock { top: 12px; left: 12px; padding: 6px 14px; }
    .clock-time { font-size: 13px; }
    .settings-corner { top: 12px; right: 12px; padding: 6px 14px; font-size: 16px; }
    .mute-overlay { bottom: 12px; right: 12px; padding: 8px 16px; font-size: 12px; }
    .settings-panel { 
        position: fixed;
        top: auto;
        bottom: 80px;
        right: 12px;
        left: 12px;
        max-width: none;
        min-width: auto;
    }
    .popup-notification {
        padding: 20px 25px;
        width: 85%;
    }
    .popup-title { font-size: 20px; }
    .popup-message { font-size: 14px; }
}

/* iOS specific */
@supports (-webkit-touch-callout: none) {
    .wake-indicator {
        top: 80px;
    }
}
</style>
</head>
<body>

<div class="system-clock">
    <span class="clock-time" id="clockTime">--:--:--</span>
    <span class="clock-ampm" id="clockAmPm">--</span>
</div>

<div id="wakeIndicator" class="wake-indicator">📥 Loading offline wake word model...</div>

<div id="settingsBtn" class="settings-corner">⚙️</div>

<div id="settingsPanel" class="settings-panel">
    <div class="setting-item">
        <label>🌗 Theme</label>
        <button id="themeBtn" class="setting-btn">Toggle</button>
    </div>
    <div class="setting-item">
        <label>🎙️ Offline Mode</label>
        <button id="offlineModeBtn" class="setting-btn">✅ Enabled</button>
    </div>
    <div class="setting-item">
        <label>⏱️ Duration</label>
        <select id="durationSelect">
            <option value="5">5 sec</option>
            <option value="10" selected>10 sec</option>
            <option value="15">15 sec</option>
            <option value="30">30 sec</option>
        </select>
    </div>
    <div class="divider"></div>
    <button id="recordBtn" class="record-btn">⏺ START RECORDING</button>
    <div id="statusMsg" class="status-text">⚪ Loading model...</div>
</div>

<div id="waveContainer" class="wave-container"></div>
<button id="muteBtn" class="mute-overlay">🔇 MUTE</button>

<script>
(async function() {
    // DOM Elements
    const waveContainer = document.getElementById('waveContainer');
    const muteBtn = document.getElementById('muteBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const themeBtn = document.getElementById('themeBtn');
    const offlineModeBtn = document.getElementById('offlineModeBtn');
    const durationSelect = document.getElementById('durationSelect');
    const recordBtn = document.getElementById('recordBtn');
    const statusMsg = document.getElementById('statusMsg');
    const wakeIndicator = document.getElementById('wakeIndicator');
    const clockTimeSpan = document.getElementById('clockTime');
    const clockAmPmSpan = document.getElementById('clockAmPm');

    // State
    let audioContext = null;
    let mediaStream = null;
    let analyser = null;
    let animationId = null;
    let isActive = false;
    let isMuted = false;
    
    // Offline Wake Word Detection
    let recognizer = null;
    let wakeWordModel = null;
    let isListening = false;
    let offlineEnabled = true;
    
    // Custom wake words mapping to model labels
    const wakeWordsList = ["hey", "hello", "hi", "lyra", "robot", "computer", "teacher", "start"];
    let customWakeWord = "";
    
    // Recording
    let mediaRecorder = null;
    let chunks = [];
    let isRecording = false;
    let recordTimeout = null;
    let counterInterval = null;
    let recordDuration = 10;
    
    // Bars
    let bars = [];
    let barCount = 24;
    let freqData = null;
    
    // Clock
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        clockTimeSpan.textContent = `${hours.toString().padStart(2, '0')}:${minutes}:${seconds}`;
        clockAmPmSpan.textContent = ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    // Show Popup Notification
    function showPopup(wakeWord) {
        const oldPopup = document.querySelector('.popup-notification');
        if (oldPopup) oldPopup.remove();
        
        const popup = document.createElement('div');
        popup.className = 'popup-notification';
        popup.innerHTML = `
            <div class="popup-icon">🎤✨</div>
            <div class="popup-title">Wake Word Detected!</div>
            <div class="popup-message">You said:</div>
            <div class="popup-word">"${wakeWord}"</div>
        `;
        document.body.appendChild(popup);
        
        setTimeout(() => popup.classList.add('show'), 10);
        
        setTimeout(() => {
            popup.classList.remove('show');
            setTimeout(() => popup.remove(), 300);
        }, 2000);
        
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(200);
        }
    }
    
    // Create bars
    function createBars() {
        const containerWidth = window.innerWidth - 40;
        const barWidth = Math.max(4, Math.min(12, Math.floor(containerWidth / 28)));
        barCount = Math.floor(containerWidth / (barWidth + 6));
        barCount = Math.min(32, Math.max(16, barCount));
        
        waveContainer.innerHTML = '';
        bars = [];
        
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar idle';
            waveContainer.appendChild(bar);
            bars.push(bar);
        }
    }
    
    // Update bars with audio
    function updateBars() {
        if (!isActive || isMuted || !analyser || !freqData) {
            return;
        }
        
        analyser.getByteFrequencyData(freqData);
        const binsPerBar = Math.floor(freqData.length / barCount);
        
        for (let i = 0; i < barCount; i++) {
            let sum = 0;
            const start = i * binsPerBar;
            const end = Math.min(start + binsPerBar, freqData.length);
            for (let j = start; j < end; j++) sum += freqData[j];
            
            let intensity = sum / (end - start) / 180;
            intensity = Math.min(1, Math.pow(intensity, 1.3) * 1.2);
            
            const height = 15 + (intensity * 110);
            const hue = 200 + intensity * 40;
            
            bars[i].style.height = `${height}px`;
            bars[i].style.background = `linear-gradient(180deg, hsl(${hue}, 85%, 55%), hsl(${hue + 20}, 80%, 60%))`;
            bars[i].style.boxShadow = `0 0 ${8 + intensity * 12}px rgba(58, 134, 255, ${0.3 + intensity * 0.5})`;
            bars[i].classList.remove('idle');
        }
    }
    
    function idleAnimation() {
        if (!isActive && bars.length) {
            bars.forEach(bar => {
                bar.classList.add('idle');
            });
            requestAnimationFrame(idleAnimation);
        }
    }
    
    function animate() {
        if (!animationId) return;
        updateBars();
        animationId = requestAnimationFrame(animate);
    }
    
    // Start audio visualization
    async function startVisualizer() {
        if (isActive) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            mediaStream = stream;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.7;
            freqData = new Uint8Array(analyser.frequencyBinCount);
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            isActive = true;
            isMuted = false;
            
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '🔇 MUTE';
            
            bars.forEach(bar => bar.classList.remove('idle'));
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
            
            statusMsg.innerText = '🎤 Active';
            wakeIndicator.textContent = '✅ Visualizer Active • Offline listening active';
            wakeIndicator.classList.remove('listening');
            wakeIndicator.classList.add('active');
            
            setTimeout(() => {
                if (isActive) {
                    wakeIndicator.textContent = `🎧 Offline - Listening for wake words`;
                    wakeIndicator.classList.add('listening');
                    wakeIndicator.classList.remove('active');
                }
            }, 2000);
            
        } catch (err) {
            console.error('Mic error:', err);
            statusMsg.innerText = '❌ Mic access denied';
            wakeIndicator.textContent = '❌ Microphone access required';
        }
    }
    
    // Stop visualizer
    function stopVisualizer() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        if (audioContext) {
            audioContext.close().catch(() => {});
            audioContext = null;
        }
        
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
        
        analyser = null;
        isActive = false;
        isMuted = false;
        
        bars.forEach(bar => {
            bar.classList.add('idle');
            bar.style.height = '';
            bar.style.background = '';
        });
        
        statusMsg.innerText = '⚪ Waiting for wake word';
        wakeIndicator.textContent = `🎤 Offline - Say: ${wakeWordsList.join(", ")}`;
        wakeIndicator.classList.remove('active', 'listening');
    }
    
    // Initialize offline wake word model
    async function initOfflineWakeWord() {
        try {
            wakeIndicator.textContent = '📥 Loading offline AI model... (40MB)';
            statusMsg.innerText = '📥 Loading offline model...';
            
            // Load the pre-trained speech commands model
            recognizer = await speechCommands.create('BROWSER_FFT');
            await recognizer.ensureModelLoaded();
            
            // Get available words from the model
            const words = recognizer.wordLabels();
            
            wakeIndicator.textContent = '🎤 Offline model ready! Say: ' + wakeWordsList.join(", ");
            statusMsg.innerText = '✅ Offline wake word ready';
            
            // Start listening
            startOfflineListening();
            
        } catch (error) {
            console.error('Failed to load offline model:', error);
            wakeIndicator.textContent = '⚠️ Offline model failed - using fallback mode';
            statusMsg.innerText = '⚠️ Using basic audio detection';
            
            // Fallback to simple volume detection
            startFallbackDetection();
        }
    }
    
    // Start offline listening with TensorFlow model
    function startOfflineListening() {
        if (!recognizer || isListening) return;
        
        isListening = true;
        
        // Listen for speech commands
        recognizer.listen(result => {
            if (!isActive) {
                const scores = result.scores;
                const words = recognizer.wordLabels();
                
                // Check each wake word
                for (let i = 0; i < wakeWordsList.length; i++) {
                    const wakeWord = wakeWordsList[i];
                    // Find closest match in model
                    for (let j = 0; j < words.length; j++) {
                        if (words[j].toLowerCase().includes(wakeWord.toLowerCase()) || 
                            wakeWord.toLowerCase().includes(words[j].toLowerCase())) {
                            if (scores[j] > 0.7) { // Confidence threshold
                                triggerWakeWord(wakeWord);
                                return;
                            }
                        }
                    }
                }
                
                // Also check custom wake word
                if (customWakeWord && customWakeWord !== "hey wave") {
                    for (let j = 0; j < words.length; j++) {
                        if (words[j].toLowerCase().includes(customWakeWord.toLowerCase())) {
                            if (scores[j] > 0.7) {
                                triggerWakeWord(customWakeWord);
                                return;
                            }
                        }
                    }
                }
            }
        }, {
            includeSpectrogram: false,
            probabilityThreshold: 0.75,
            invokeCallbackOnNoiseAndUnknown: true,
            overlapFactor: 0.5
        });
        
        wakeIndicator.classList.add('listening');
    }
    
    // Fallback: Simple volume-based detection (for when model fails)
    let fallbackStream = null;
    let fallbackAudioContext = null;
    let fallbackAnalyser = null;
    
    async function startFallbackDetection() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            fallbackStream = stream;
            fallbackAudioContext = new AudioContext();
            fallbackAnalyser = fallbackAudioContext.createAnalyser();
            const source = fallbackAudioContext.createMediaStreamSource(stream);
            source.connect(fallbackAnalyser);
            
            const dataArray = new Uint8Array(fallbackAnalyser.frequencyBinCount);
            let lastTriggerTime = 0;
            let silenceCount = 0;
            
            function detectVolume() {
                if (!fallbackAnalyser) return;
                
                fallbackAnalyser.getByteFrequencyData(dataArray);
                let sum = 0;
                for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
                let avg = sum / dataArray.length;
                let volume = avg / 255;
                
                // Simple voice activity detection
                if (volume > 0.15 && !isActive && (Date.now() - lastTriggerTime > 3000)) {
                    silenceCount++;
                    if (silenceCount > 3) {
                        triggerWakeWord("voice detected");
                        lastTriggerTime = Date.now();
                        silenceCount = 0;
                    }
                } else if (volume < 0.05) {
                    silenceCount = 0;
                }
                
                requestAnimationFrame(detectVolume);
            }
            
            detectVolume();
            wakeIndicator.textContent = '🎤 Fallback mode - Speak to activate';
            statusMsg.innerText = '⚡ Fallback detection active';
            
        } catch(e) {
            console.error('Fallback failed:', e);
        }
    }
    
    // Trigger wake word
    function triggerWakeWord(word) {
        if (!isActive) {
            showPopup(word);
            wakeIndicator.classList.add('active');
            wakeIndicator.textContent = `✨ Wake word detected! "${word}"`;
            setTimeout(() => {
                startVisualizer();
            }, 100);
        }
    }
    
    // Toggle mute
    function toggleMute() {
        if (!isActive) return;
        isMuted = !isMuted;
        
        if (isMuted) {
            muteBtn.classList.add('muted');
            muteBtn.innerHTML = '🔊 UNMUTE';
            statusMsg.innerText = '🔇 Muted';
            bars.forEach(bar => bar.classList.add('idle'));
        } else {
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '🔇 MUTE';
            statusMsg.innerText = '🎤 Active';
            bars.forEach(bar => bar.classList.remove('idle'));
        }
    }
    
    // Recording functions
    function updateRecordUI() {
        if (isRecording) {
            recordBtn.innerHTML = '⏹️ STOP RECORDING';
            recordBtn.classList.add('recording');
        } else {
            recordBtn.innerHTML = '⏺ START RECORDING';
            recordBtn.classList.remove('recording');
        }
    }
    
    function startCounter(seconds) {
        if (counterInterval) clearInterval(counterInterval);
        let remaining = seconds;
        const update = () => {
            if (remaining >= 0) {
                statusMsg.innerText = `🔴 Recording: ${remaining}s`;
                remaining--;
            }
            if (remaining < 0 && counterInterval) {
                clearInterval(counterInterval);
                counterInterval = null;
            }
        };
        update();
        counterInterval = setInterval(update, 1000);
    }
    
    function handleRecording() {
        if (!isActive || !mediaStream) {
            statusMsg.innerText = '❌ Activate wake word first';
            return;
        }
        
        if (isRecording) {
            if (counterInterval) clearInterval(counterInterval);
            if (recordTimeout) clearTimeout(recordTimeout);
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            updateRecordUI();
            statusMsg.innerText = isMuted ? '🔇 Muted' : '🎤 Active';
            return;
        }
        
        chunks = [];
        const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mime });
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size) chunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            if (chunks.length) {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `wave_recording_${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                statusMsg.innerText = '💾 Saved!';
                setTimeout(() => {
                    if (!isRecording && isActive) {
                        statusMsg.innerText = isMuted ? '🔇 Muted' : '🎤 Active';
                    }
                }, 1500);
            }
            chunks = [];
            isRecording = false;
            updateRecordUI();
            if (counterInterval) clearInterval(counterInterval);
        };
        
        mediaRecorder.start(200);
        isRecording = true;
        updateRecordUI();
        startCounter(recordDuration);
        
        recordTimeout = setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }, recordDuration * 1000);
    }
    
    // Theme
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }
    
    function applyTheme() {
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    }
    
    // Event listeners
    muteBtn.addEventListener('click', toggleMute);
    recordBtn.addEventListener('click', handleRecording);
    durationSelect.addEventListener('change', (e) => {
        recordDuration = parseInt(e.target.value);
    });
    settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
        if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
            settingsPanel.classList.remove('show');
        }
    });
    themeBtn.addEventListener('click', toggleTheme);
    offlineModeBtn.addEventListener('click', () => {
        offlineEnabled = !offlineEnabled;
        offlineModeBtn.textContent = offlineEnabled ? '✅ Enabled' : '❌ Disabled';
        if (!offlineEnabled && recognizer) {
            recognizer.stopListening();
            isListening = false;
        } else if (offlineEnabled && !recognizer) {
            initOfflineWakeWord();
        }
    });
    
    window.addEventListener('resize', () => setTimeout(createBars, 100));
    
    // Initialize
    createBars();
    idleAnimation();
    applyTheme();
    initOfflineWakeWord();
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (audioContext) audioContext.close();
        if (animationId) cancelAnimationFrame(animationId);
        if (recognizer) recognizer.stopListening();
        if (fallbackStream) fallbackStream.getTracks().forEach(t => t.stop());
    });
})();
</script>
</body>
</html>
