<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>Silent Flow | Custom Wake Word Visualizer</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #050a14 0%, #0a0f1a 100%);
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    transition: background 0.3s ease;
    overflow-x: hidden;
    position: relative;
}

body.light-theme {
    background: linear-gradient(135deg, #e8ecf3 0%, #f0f4fa 100%);
}

/* Wave Container */
.wave-container {
    position: fixed;
    bottom: 30px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: clamp(3px, 1.5vw, 10px);
    padding: 0 15px;
    z-index: 10;
    pointer-events: none;
    flex-wrap: wrap;
}

.wave-bar {
    width: clamp(3px, 1.8vw, 12px);
    height: 25px;
    border-radius: 20px;
    background: linear-gradient(180deg, #3a86ff, #ff66cc);
    transition: height 0.05s linear;
    box-shadow: 0 0 10px rgba(58, 134, 255, 0.5);
    will-change: height;
}

.wave-bar.idle {
    animation: gentleWave 0.8s infinite ease-in-out;
}

@keyframes gentleWave {
    0%, 100% { height: 20px; opacity: 0.6; transform: scaleY(0.8); }
    50% { height: 55px; opacity: 1; transform: scaleY(1); }
}

/* Wake Word Indicator */
.wake-indicator {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    background: rgba(10, 20, 35, 0.95);
    backdrop-filter: blur(20px);
    border-radius: 50px;
    padding: 12px 24px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    font-weight: 600;
    font-size: 14px;
    color: #3a86ff;
    pointer-events: none;
    transition: all 0.3s ease;
    white-space: nowrap;
    letter-spacing: 0.5px;
    text-align: center;
    font-family: monospace;
}

.wake-indicator.listening {
    background: rgba(255, 80, 120, 0.25);
    border-color: #ff5080;
    color: #ff80a0;
    animation: pulseGlow 1.5s infinite;
}

.wake-indicator.active {
    background: rgba(0, 255, 150, 0.25);
    border-color: #00ffaa;
    color: #00ffaa;
    animation: none;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 80, 120, 0.3); }
    50% { box-shadow: 0 0 0 15px rgba(255, 80, 120, 0); }
}

/* Popup Notification */
.popup-notification {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: linear-gradient(135deg, rgba(58, 134, 255, 0.95), rgba(255, 102, 204, 0.95));
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 25px 35px;
    text-align: center;
    z-index: 1000;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    border: 2px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    max-width: 85%;
}

.popup-notification.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.popup-icon {
    font-size: 48px;
    margin-bottom: 15px;
}

.popup-title {
    font-size: 24px;
    font-weight: 700;
    color: white;
    margin-bottom: 8px;
}

.popup-message {
    font-size: 16px;
    color: rgba(255, 255, 255, 0.9);
    margin-bottom: 5px;
}

.popup-word {
    font-size: 20px;
    font-weight: 800;
    color: #ffea80;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

/* System Clock */
.system-clock {
    position: fixed;
    top: 18px;
    left: 18px;
    z-index: 300;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 18px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    display: flex;
    align-items: baseline;
    gap: 6px;
    font-weight: 500;
    pointer-events: none;
}

.clock-time {
    font-size: 16px;
    font-weight: 600;
    color: #3a86ff;
    font-variant-numeric: tabular-nums;
}

.clock-ampm {
    font-size: 11px;
    font-weight: 500;
    color: #88aaff;
}

/* Mute Button */
.mute-overlay {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    padding: 10px 20px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    color: #c0e4ff;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
}

.mute-overlay.muted {
    background: linear-gradient(135deg, #ff3366, #ff80b0);
    border-color: #ff80b0;
    color: white;
}

.mute-overlay:active {
    transform: scale(0.95);
}

/* Settings Button */
.settings-corner {
    position: fixed;
    top: 18px;
    right: 18px;
    z-index: 300;
    background: rgba(10, 20, 35, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 40px;
    padding: 8px 18px;
    border: 1px solid rgba(58, 134, 255, 0.5);
    cursor: pointer;
    color: #3a86ff;
    font-weight: 600;
    font-size: 18px;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.settings-corner:active {
    transform: scale(0.95);
}

/* Settings Panel */
.settings-panel {
    position: fixed;
    top: 70px;
    right: 20px;
    background: rgba(12, 22, 40, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(58, 134, 255, 0.3);
    z-index: 310;
    min-width: 280px;
    display: none;
    flex-direction: column;
    gap: 16px;
}

.settings-panel.show {
    display: flex;
}

.setting-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    font-size: 14px;
    color: #eef3ff;
    flex-wrap: wrap;
}

.setting-item label {
    font-size: 13px;
    opacity: 0.9;
}

.setting-btn, select, .custom-wake-input {
    background: rgba(58, 134, 255, 0.2);
    border: 1px solid rgba(58, 134, 255, 0.5);
    padding: 8px 14px;
    border-radius: 30px;
    cursor: pointer;
    color: inherit;
    font-family: inherit;
    font-size: 13px;
    transition: all 0.2s;
}

.custom-wake-input {
    flex: 1;
    min-width: 120px;
    cursor: text;
    text-align: center;
    font-weight: 600;
    letter-spacing: 1px;
}

.custom-wake-input:focus {
    outline: none;
    border-color: #00ffaa;
    background: rgba(0, 255, 170, 0.2);
}

.record-btn {
    width: 100%;
    background: linear-gradient(135deg, #3a86ff, #ff66cc);
    border: none;
    padding: 10px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
}

.record-btn:active {
    transform: scale(0.98);
}

.record-btn.recording {
    background: linear-gradient(135deg, #ff3366, #ff80b0);
    animation: pulseRed 1s infinite;
}

@keyframes pulseRed {
    0% { box-shadow: 0 0 0 0 rgba(255, 51, 102, 0.5); }
    70% { box-shadow: 0 0 0 8px rgba(255, 51, 102, 0); }
}

.status-text {
    font-size: 11px;
    background: rgba(58, 134, 255, 0.15);
    padding: 8px 12px;
    border-radius: 20px;
    text-align: center;
    color: #88ddff;
}

.divider {
    height: 1px;
    background: rgba(58, 134, 255, 0.2);
    margin: 4px 0;
}

/* Mobile Optimizations */
@media (max-width: 768px) {
    .wake-indicator { 
        top: 60px; 
        font-size: 11px; 
        padding: 8px 16px; 
        white-space: normal;
        max-width: 90%;
        line-height: 1.3;
    }
    .system-clock { top: 12px; left: 12px; padding: 6px 14px; }
    .clock-time { font-size: 13px; }
    .settings-corner { top: 12px; right: 12px; padding: 6px 14px; font-size: 16px; }
    .mute-overlay { bottom: 12px; right: 12px; padding: 8px 16px; font-size: 12px; }
    .settings-panel { 
        position: fixed;
        top: auto;
        bottom: 80px;
        right: 12px;
        left: 12px;
        max-width: none;
        min-width: auto;
    }
    .popup-notification {
        padding: 20px 25px;
        width: 85%;
    }
    .popup-title { font-size: 20px; }
    .popup-message { font-size: 14px; }
}

/* iOS specific */
@supports (-webkit-touch-callout: none) {
    .wake-indicator {
        top: 80px;
    }
}
</style>
</head>
<body>

<div class="system-clock">
    <span class="clock-time" id="clockTime">--:--:--</span>
    <span class="clock-ampm" id="clockAmPm">--</span>
</div>

<div id="wakeIndicator" class="wake-indicator">🎤 Say "Hey, Hello, Hi, Lyra, Robot, Computer, Teacher, Start"</div>

<div id="settingsBtn" class="settings-corner">⚙️</div>

<div id="settingsPanel" class="settings-panel">
    <div class="setting-item">
        <label>🌗 Theme</label>
        <button id="themeBtn" class="setting-btn">Toggle</button>
    </div>
    <div class="setting-item">
        <label>🎙️ Wake Word</label>
        <input type="text" id="customWakeWord" class="custom-wake-input" maxlength="20" placeholder="Enter wake word">
    </div>
    <div class="setting-item">
        <label>⏱️ Duration</label>
        <select id="durationSelect">
            <option value="5">5 sec</option>
            <option value="10" selected>10 sec</option>
            <option value="15">15 sec</option>
            <option value="30">30 sec</option>
        </select>
    </div>
    <div class="divider"></div>
    <button id="recordBtn" class="record-btn">⏺ START RECORDING</button>
    <div id="statusMsg" class="status-text">⚪ Waiting for wake word</div>
</div>

<div id="waveContainer" class="wave-container"></div>
<button id="muteBtn" class="mute-overlay">🔇 MUTE</button>

<script>
(function() {
    // DOM Elements
    const waveContainer = document.getElementById('waveContainer');
    const muteBtn = document.getElementById('muteBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const themeBtn = document.getElementById('themeBtn');
    const customWakeInput = document.getElementById('customWakeWord');
    const durationSelect = document.getElementById('durationSelect');
    const recordBtn = document.getElementById('recordBtn');
    const statusMsg = document.getElementById('statusMsg');
    const wakeIndicator = document.getElementById('wakeIndicator');
    const clockTimeSpan = document.getElementById('clockTime');
    const clockAmPmSpan = document.getElementById('clockAmPm');

    // State
    let audioContext = null;
    let mediaStream = null;
    let analyser = null;
    let animationId = null;
    let isActive = false;
    let isMuted = false;
    let wakeEnabled = true;
    let recognition = null;
    let customWakeWord = "hey wave";
    
    // MULTI-WAKE-WORD LIST
    const defaultWakeWords = ["hey", "hello", "hi", "lyra", "robot", "computer", "teacher", "start"];
    let activeWakeWords = [...defaultWakeWords];
    
    // Recording
    let mediaRecorder = null;
    let chunks = [];
    let isRecording = false;
    let recordTimeout = null;
    let counterInterval = null;
    let recordDuration = 10;
    
    // Bars
    let bars = [];
    let barCount = 24;
    let freqData = null;
    
    // Clock
    function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        clockTimeSpan.textContent = `${hours.toString().padStart(2, '0')}:${minutes}:${seconds}`;
        clockAmPmSpan.textContent = ampm;
    }
    updateClock();
    setInterval(updateClock, 1000);
    
    // Check if spoken text contains any wake word
    function containsWakeWord(text) {
        const lowerText = text.toLowerCase().trim();
        
        // Check against custom wake word first
        const customLower = customWakeWord.toLowerCase().trim();
        if (customLower && lowerText.includes(customLower)) {
            return { detected: true, word: customLower };
        }
        
        // Check against default wake words
        for (let word of activeWakeWords) {
            if (lowerText.includes(word.toLowerCase())) {
                return { detected: true, word: word };
            }
        }
        
        return { detected: false, word: null };
    }
    
    // Show Popup Notification
    function showPopup(wakeWord) {
        // Remove existing popup
        const oldPopup = document.querySelector('.popup-notification');
        if (oldPopup) oldPopup.remove();
        
        // Create popup
        const popup = document.createElement('div');
        popup.className = 'popup-notification';
        popup.innerHTML = `
            <div class="popup-icon">🎤✨</div>
            <div class="popup-title">Wake Word Detected!</div>
            <div class="popup-message">You said:</div>
            <div class="popup-word">"${wakeWord}"</div>
        `;
        document.body.appendChild(popup);
        
        // Animate in
        setTimeout(() => popup.classList.add('show'), 10);
        
        // Auto hide after 2 seconds
        setTimeout(() => {
            popup.classList.remove('show');
            setTimeout(() => popup.remove(), 300);
        }, 2000);
        
        // Vibrate on mobile if supported
        if (window.navigator && window.navigator.vibrate) {
            window.navigator.vibrate(200);
        }
    }
    
    // Create bars
    function createBars() {
        const containerWidth = window.innerWidth - 40;
        const barWidth = Math.max(4, Math.min(12, Math.floor(containerWidth / 28)));
        barCount = Math.floor(containerWidth / (barWidth + 6));
        barCount = Math.min(32, Math.max(16, barCount));
        
        waveContainer.innerHTML = '';
        bars = [];
        
        for (let i = 0; i < barCount; i++) {
            const bar = document.createElement('div');
            bar.className = 'wave-bar idle';
            waveContainer.appendChild(bar);
            bars.push(bar);
        }
    }
    
    // Update bars with audio
    function updateBars() {
        if (!isActive || isMuted || !analyser || !freqData) {
            return;
        }
        
        analyser.getByteFrequencyData(freqData);
        const binsPerBar = Math.floor(freqData.length / barCount);
        
        for (let i = 0; i < barCount; i++) {
            let sum = 0;
            const start = i * binsPerBar;
            const end = Math.min(start + binsPerBar, freqData.length);
            for (let j = start; j < end; j++) sum += freqData[j];
            
            let intensity = sum / (end - start) / 180;
            intensity = Math.min(1, Math.pow(intensity, 1.3) * 1.2);
            
            const height = 15 + (intensity * 110);
            const hue = 200 + intensity * 40;
            
            bars[i].style.height = `${height}px`;
            bars[i].style.background = `linear-gradient(180deg, hsl(${hue}, 85%, 55%), hsl(${hue + 20}, 80%, 60%))`;
            bars[i].style.boxShadow = `0 0 ${8 + intensity * 12}px rgba(58, 134, 255, ${0.3 + intensity * 0.5})`;
            bars[i].classList.remove('idle');
        }
    }
    
    // Idle animation
    function idleAnimation() {
        if (!isActive && bars.length) {
            bars.forEach(bar => {
                bar.classList.add('idle');
            });
            requestAnimationFrame(idleAnimation);
        }
    }
    
    // Animation loop
    function animate() {
        if (!animationId) return;
        updateBars();
        animationId = requestAnimationFrame(animate);
    }
    
    // Start audio visualization
    async function startVisualizer() {
        if (isActive) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            mediaStream = stream;
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            analyser.smoothingTimeConstant = 0.7;
            freqData = new Uint8Array(analyser.frequencyBinCount);
            
            const source = audioContext.createMediaStreamSource(stream);
            source.connect(analyser);
            
            if (audioContext.state === 'suspended') {
                await audioContext.resume();
            }
            
            isActive = true;
            isMuted = false;
            
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '🔇 MUTE';
            
            bars.forEach(bar => bar.classList.remove('idle'));
            
            if (animationId) cancelAnimationFrame(animationId);
            animationId = requestAnimationFrame(animate);
            
            statusMsg.innerText = '🎤 Active';
            wakeIndicator.textContent = '✅ Visualizer Active • Listening for wake words';
            wakeIndicator.classList.remove('listening');
            wakeIndicator.classList.add('active');
            
            setTimeout(() => {
                if (isActive) {
                    wakeIndicator.textContent = `🎧 Listening for: ${activeWakeWords.join(", ")}`;
                    wakeIndicator.classList.add('listening');
                    wakeIndicator.classList.remove('active');
                }
            }, 2000);
            
        } catch (err) {
            console.error('Mic error:', err);
            statusMsg.innerText = '❌ Mic access denied';
            wakeIndicator.textContent = '❌ Microphone access required';
            
            // Show error popup
            const errorPopup = document.createElement('div');
            errorPopup.className = 'popup-notification';
            errorPopup.innerHTML = `
                <div class="popup-icon">⚠️</div>
                <div class="popup-title">Microphone Required</div>
                <div class="popup-message">Please allow microphone access to use wake word</div>
            `;
            document.body.appendChild(errorPopup);
            setTimeout(() => errorPopup.classList.add('show'), 10);
            setTimeout(() => {
                errorPopup.classList.remove('show');
                setTimeout(() => errorPopup.remove(), 300);
            }, 2500);
        }
    }
    
    // Stop visualizer
    function stopVisualizer() {
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
        
        if (audioContext) {
            audioContext.close().catch(() => {});
            audioContext = null;
        }
        
        if (mediaStream) {
            mediaStream.getTracks().forEach(t => t.stop());
            mediaStream = null;
        }
        
        analyser = null;
        isActive = false;
        isMuted = false;
        
        bars.forEach(bar => {
            bar.classList.add('idle');
            bar.style.height = '';
            bar.style.background = '';
        });
        
        statusMsg.innerText = '⚪ Waiting for wake word';
        wakeIndicator.textContent = `🎤 Say: ${activeWakeWords.join(", ")}`;
        wakeIndicator.classList.remove('active', 'listening');
        
        if (wakeEnabled && recognition) {
            setTimeout(() => {
                try { recognition.start(); } catch(e) { console.log('Restart error:', e); }
            }, 500);
        }
    }
    
    // Wake word detection with multiple wake words
    function initWakeWord() {
        if (!wakeEnabled) return;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            wakeIndicator.textContent = '⚠️ Speech recognition not supported on this device';
            statusMsg.innerText = '⚠️ Browser doesn\'t support wake word';
            return;
        }
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US';
        
        recognition.onstart = () => {
            if (!isActive && wakeEnabled) {
                wakeIndicator.classList.add('listening');
                wakeIndicator.textContent = `🎧 Listening for: ${activeWakeWords.join(", ")}`;
            }
        };
        
        recognition.onend = () => {
            if (wakeEnabled && !isActive) {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) { console.log('Restart error:', e); }
                }, 1000);
            }
        };
        
        recognition.onresult = (event) => {
            const last = event.results.length - 1;
            const text = event.results[last][0].transcript.toLowerCase().trim();
            
            // Check for any wake word
            const wakeCheck = containsWakeWord(text);
            
            if (wakeCheck.detected && !isActive) {
                // Show popup notification
                showPopup(wakeCheck.word);
                
                // Visual feedback on indicator
                wakeIndicator.classList.add('active');
                wakeIndicator.textContent = `✨ Wake word detected! "${wakeCheck.word}" from: "${text.substring(0, 40)}"`;
                
                // Start visualizer after a brief moment
                setTimeout(() => {
                    startVisualizer();
                }, 100);
            }
            
            // Show what's being heard (for debugging)
            if (!isActive && text.length > 0) {
                wakeIndicator.textContent = `🎤 "${text.substring(0, 40)}"`;
                setTimeout(() => {
                    if (!isActive && wakeEnabled) {
                        wakeIndicator.textContent = `🎧 Listening for: ${activeWakeWords.join(", ")}`;
                    }
                }, 1500);
            }
        };
        
        recognition.onerror = (e) => {
            console.log('Recognition error:', e.error);
            if (e.error === 'not-allowed') {
                wakeIndicator.textContent = '🎤 Microphone permission needed for wake word';
            } else if (e.error === 'network') {
                wakeIndicator.textContent = '🌐 Internet connection required for wake word';
            }
        };
        
        try {
            recognition.start();
        } catch(e) {
            console.log('Start error:', e);
        }
    }
    
    // Update wake word from input
    function updateWakeWord() {
        let newWord = customWakeInput.value.trim();
        if (newWord === "") {
            newWord = "hey wave";
            customWakeInput.value = "hey wave";
        }
        customWakeWord = newWord.toLowerCase();
        
        // Update UI
        if (!isActive) {
            wakeIndicator.textContent = `🎤 Say: ${activeWakeWords.join(", ")} (or "${customWakeWord}")`;
        } else {
            wakeIndicator.textContent = `🎧 Listening for: ${activeWakeWords.join(", ")}`;
        }
        
        // Restart recognition with new wake word
        if (wakeEnabled && recognition && !isActive) {
            try {
                recognition.stop();
                setTimeout(() => {
                    recognition.start();
                }, 100);
            } catch(e) {}
        }
        
        // Save to localStorage
        localStorage.setItem('customWakeWord', customWakeWord);
    }
    
    // Load saved wake word
    function loadSavedWakeWord() {
        const saved = localStorage.getItem('customWakeWord');
        if (saved) {
            customWakeWord = saved;
            customWakeInput.value = saved;
        } else {
            customWakeInput.value = "hey wave";
        }
        if (!isActive) {
            wakeIndicator.textContent = `🎤 Say: ${activeWakeWords.join(", ")} (or "${customWakeWord}")`;
        }
    }
    
    // Toggle mute
    function toggleMute() {
        if (!isActive) return;
        isMuted = !isMuted;
        
        if (isMuted) {
            muteBtn.classList.add('muted');
            muteBtn.innerHTML = '🔊 UNMUTE';
            statusMsg.innerText = '🔇 Muted';
            bars.forEach(bar => bar.classList.add('idle'));
        } else {
            muteBtn.classList.remove('muted');
            muteBtn.innerHTML = '🔇 MUTE';
            statusMsg.innerText = '🎤 Active';
            bars.forEach(bar => bar.classList.remove('idle'));
        }
    }
    
    // Recording
    function updateRecordUI() {
        if (isRecording) {
            recordBtn.innerHTML = '⏹️ STOP RECORDING';
            recordBtn.classList.add('recording');
        } else {
            recordBtn.innerHTML = '⏺ START RECORDING';
            recordBtn.classList.remove('recording');
        }
    }
    
    function startCounter(seconds) {
        if (counterInterval) clearInterval(counterInterval);
        let remaining = seconds;
        const update = () => {
            if (remaining >= 0) {
                statusMsg.innerText = `🔴 Recording: ${remaining}s`;
                remaining--;
            }
            if (remaining < 0 && counterInterval) {
                clearInterval(counterInterval);
                counterInterval = null;
            }
        };
        update();
        counterInterval = setInterval(update, 1000);
    }
    
    function handleRecording() {
        if (!isActive || !mediaStream) {
            statusMsg.innerText = '❌ Activate wake word first';
            showPopupMessage('Activate wake word first', 'info');
            return;
        }
        
        if (isRecording) {
            if (counterInterval) clearInterval(counterInterval);
            if (recordTimeout) clearTimeout(recordTimeout);
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
            isRecording = false;
            updateRecordUI();
            statusMsg.innerText = isMuted ? '🔇 Muted' : '🎤 Active';
            return;
        }
        
        chunks = [];
        const mime = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : 'audio/mp4';
        mediaRecorder = new MediaRecorder(mediaStream, { mimeType: mime });
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size) chunks.push(e.data);
        };
        
        mediaRecorder.onstop = () => {
            if (chunks.length) {
                const blob = new Blob(chunks, { type: 'audio/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `wave_recording_${Date.now()}.webm`;
                a.click();
                URL.revokeObjectURL(url);
                statusMsg.innerText = '💾 Saved!';
                setTimeout(() => {
                    if (!isRecording && isActive) {
                        statusMsg.innerText = isMuted ? '🔇 Muted' : '🎤 Active';
                    }
                }, 1500);
            }
            chunks = [];
            isRecording = false;
            updateRecordUI();
            if (counterInterval) clearInterval(counterInterval);
        };
        
        mediaRecorder.start(200);
        isRecording = true;
        updateRecordUI();
        startCounter(recordDuration);
        
        recordTimeout = setTimeout(() => {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                mediaRecorder.stop();
            }
        }, recordDuration * 1000);
    }
    
    function showPopupMessage(msg, type = 'info') {
        const popup = document.createElement('div');
        popup.className = 'popup-notification';
        popup.innerHTML = `
            <div class="popup-icon">${type === 'info' ? 'ℹ️' : '⚠️'}</div>
            <div class="popup-title">${type === 'info' ? 'Info' : 'Notice'}</div>
            <div class="popup-message">${msg}</div>
        `;
        document.body.appendChild(popup);
        setTimeout(() => popup.classList.add('show'), 10);
        setTimeout(() => {
            popup.classList.remove('show');
            setTimeout(() => popup.remove(), 300);
        }, 2000);
    }
    
    // Theme
    function toggleTheme() {
        document.body.classList.toggle('light-theme');
        localStorage.setItem('theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
    }
    
    function applyTheme() {
        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-theme');
        }
    }
    
    // Toggle wake word
    function toggleWakeWord() {
        wakeEnabled = !wakeEnabled;
        if (wakeEnabled && !isActive) {
            initWakeWord();
        } else if (!wakeEnabled && recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
            if (!isActive) {
                wakeIndicator.textContent = '⏸️ Wake word disabled';
                wakeIndicator.classList.remove('listening', 'active');
            }
        }
    }
    
    // Event listeners
    muteBtn.addEventListener('click', toggleMute);
    recordBtn.addEventListener('click', handleRecording);
    durationSelect.addEventListener('change', (e) => {
        recordDuration = parseInt(e.target.value);
    });
    settingsBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        settingsPanel.classList.toggle('show');
    });
    document.addEventListener('click', (e) => {
        if (!settingsBtn.contains(e.target) && !settingsPanel.contains(e.target)) {
            settingsPanel.classList.remove('show');
        }
    });
    themeBtn.addEventListener('click', toggleTheme);
    customWakeInput.addEventListener('change', updateWakeWord);
    customWakeInput.addEventListener('blur', updateWakeWord);
    
    window.addEventListener('resize', () => setTimeout(createBars, 100));
    
    // Initialize
    createBars();
    idleAnimation();
    applyTheme();
    loadSavedWakeWord();
    initWakeWord();
    
    // Check if mobile
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (isMobile) {
        console.log('Mobile device detected - wake word should work on iOS 14+ and Android');
        // iOS requires user interaction to start speech recognition
        if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            wakeIndicator.textContent = `🎤 Tap anywhere to enable wake words on iOS`;
            document.body.addEventListener('touchstart', function enableIOS() {
                if (recognition) {
                    try {
                        recognition.start();
                        wakeIndicator.textContent = `🎧 Listening for: ${activeWakeWords.join(", ")}`;
                        wakeIndicator.classList.add('listening');
                    } catch(e) {}
                }
                document.body.removeEventListener('touchstart', enableIOS);
            }, { once: true });
        }
    }
    
    // Cleanup
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (audioContext) audioContext.close();
        if (animationId) cancelAnimationFrame(animationId);
        if (recognition) recognition.stop();
    });
})();
</script>
</body>
</html>
