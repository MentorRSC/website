<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Audio Translation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 50px;
        }
        #output {
            margin-top: 20px;
            font-size: 18px;
            border: 1px solid #ccc;
            padding: 10px;
            min-height: 100px;
        }
    </style>
</head>
<body>
    <h1>Live Audio Translation</h1>
    <p>Click the button to start live speech recognition. Speak into your microphone.</p>
    <button id="start-btn">Start Listening</button>
    <button id="stop-btn" style="display:none;">Stop Listening</button>
    <div id="output"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const stopBtn = document.getElementById('stop-btn');
        const output = document.getElementById('output');

        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.lang = 'en-US'; // Change to desired language, e.g., 'es-ES' for Spanish

        let isListening = false;

        startBtn.addEventListener('click', () => {
            recognition.start();
            startBtn.style.display = 'none';
            stopBtn.style.display = 'inline';
            isListening = true;
        });

        stopBtn.addEventListener('click', () => {
            recognition.stop();
            startBtn.style.display = 'inline';
            stopBtn.style.display = 'none';
            isListening = false;
        });

        recognition.onresult = (event) => {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript;
            }
            output.textContent = transcript;
        };

        recognition.onend = () => {
            if (isListening) {
                recognition.start(); // Restart if still listening
            } else {
                startBtn.style.display = 'inline';
                stopBtn.style.display = 'none';
            }
        };

        recognition.onerror = (event) => {
            console.error('Speech recognition error:', event.error);
            output.textContent = 'Error: ' + event.error;
            startBtn.style.display = 'inline';
            stopBtn.style.display = 'none';
            isListening = false;
        };
    </script>
</body>
</html>
