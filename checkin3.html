<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Attendance Management System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .header h1 {
            color: #667eea;
            font-size: 28px;
            margin: 0;
        }

        .header-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .btn-secondary {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            animation: fadeIn 0.3s;
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideDown 0.3s;
        }

        .modal-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .option-buttons {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .option-btn {
            flex: 1;
            padding: 12px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .checkins-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }

        .checkins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .checkin-card {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border-left: 4px solid #48bb78;
        }

        .checkin-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .checkin-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .checkin-details {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .checkin-time {
            font-size: 12px;
            color: #48bb78;
            margin-bottom: 15px;
        }

        .signout-btn {
            width: 100%;
            padding: 10px;
            background: #f56565;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .signout-btn:hover {
            background: #e53e3e;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .badge-member {
            background: #4299e1;
            color: white;
        }

        .badge-guest {
            background: #ed8936;
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #999;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
            }
            .modal-content {
                margin: 20% auto;
                padding: 20px;
            }
            .checkins-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Attendance Management System</h1>
            <div class="header-buttons">
                <button class="btn-primary" onclick="showMemberGuestPopup()">➕ Check In</button>
                <button class="btn-secondary" onclick="refreshCheckins()">🔄 Refresh</button>
            </div>
        </div>

        <div class="checkins-section">
            <div class="section-title">Currently Checked In</div>
            <div id="checkinsList">
                <div class="loading">Loading check-ins...</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modalContent">
        </div>
    </div>

    <script>
        let currentMemberData = null;

        window.onload = function() {
            console.log("Page loaded, testing connection...");
            refreshCheckins();
            setInterval(refreshCheckins, 30000);
        };

        function refreshCheckins() {
            console.log("Refreshing check-ins...");
            google.script.run
                .withSuccessHandler(function(result) {
                    console.log("Check-ins received:", result);
                    displayCheckins(result);
                })
                .withFailureHandler(function(error) {
                    console.error("Error loading check-ins:", error);
                    showError("Failed to load check-ins: " + error.message);
                })
                .getTodayCheckins();
        }

        function displayCheckins(result) {
            const container = document.getElementById('checkinsList');
            
            if (!result.success) {
                container.innerHTML = `<div class="error-message">Error: ${result.error}</div>`;
                return;
            }
            
            const checkins = result.checkins;
            
            if (checkins.length === 0) {
                container.innerHTML = '<div class="empty-state">No one is currently checked in 🤔</div>';
                return;
            }
            
            let html = '<div class="checkins-grid">';
            checkins.forEach(checkin => {
                html += `
                    <div class="checkin-card">
                        <div class="checkin-name">${escapeHtml(checkin.name)}</div>
                        <div class="checkin-details">📞 ${escapeHtml(checkin.phone)}</div>
                        <div class="checkin-details">
                            <span class="badge ${checkin.type === 'Member' ? 'badge-member' : 'badge-guest'}">
                                ${checkin.type}
                            </span>
                        </div>
                        ${checkin.purpose ? `<div class="checkin-details">🎯 Purpose: ${escapeHtml(checkin.purpose)}</div>` : ''}
                        ${checkin.regNo ? `<div class="checkin-details">🆔 Reg ID: ${escapeHtml(checkin.regNo)}</div>` : ''}
                        <div class="checkin-time">⏰ Checked in: ${escapeHtml(checkin.checkinTime)}</div>
                        <button class="signout-btn" onclick="signOut('${escapeHtml(checkin.regNo || '')}', '${escapeHtml(checkin.phone)}', ${checkin.rowIndex})">
                            🚪 Sign Out
                        </button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function showMemberGuestPopup() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">Who is checking in?</div>
                <div class="option-buttons">
                    <button class="option-btn" onclick="showMemberOptions()">👤 Member</button>
                    <button class="option-btn" onclick="showGuestForm()">🚶 Guest</button>
                </div>
                <button onclick="closeModal()" style="margin-top: 20px; width: 100%; padding: 10px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer;">Cancel</button>
            `;
            
            modal.style.display = 'block';
        }

        function showMemberOptions() {
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">Member Check-in</div>
                <div class="option-buttons">
                    <button class="option-btn" onclick="showMemberSearchForm('name')">📝 Search by Name</button>
                    <button class="option-btn" onclick="showMemberSearchForm('regid')">🆔 Search by Reg ID</button>
                    <button class="option-btn" onclick="showMemberSearchForm('qrcode')">📱 Enter Reg ID</button>
                </div>
                <button onclick="showMemberGuestPopup()" style="margin-top: 20px; width: 100%; padding: 10px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer;">Back</button>
            `;
        }

        function showMemberSearchForm(searchType) {
            const modalContent = document.getElementById('modalContent');
            let label = '';
            let placeholder = '';
            
            if (searchType === 'name') {
                label = 'Enter Member Name';
                placeholder = 'e.g., Harinandan B';
            } else if (searchType === 'regid') {
                label = 'Enter Registration ID';
                placeholder = 'e.g., IH2602007';
            } else {
                label = 'Enter Registration ID from QR Code';
                placeholder = 'e.g., IH2602007';
            }
            
            modalContent.innerHTML = `
                <div class="modal-header">${label}</div>
                <div class="form-group">
                    <input type="text" id="searchValue" placeholder="${placeholder}" autocomplete="off">
                </div>
                <button class="btn-primary" onclick="fetchMember('${searchType}', document.getElementById('searchValue').value)" style="width: 100%;">🔍 Search</button>
                <button onclick="showMemberOptions()" style="margin-top: 10px; width: 100%; padding: 10px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer;">Back</button>
            `;
        }

        function fetchMember(searchType, searchValue) {
            if (!searchValue) {
                showError('Please enter a value');
                return;
            }
            
            showLoading('Searching for member...');
            
            google.script.run
                .withSuccessHandler(function(result) {
                    console.log("Member search result:", result);
                    if (result.success) {
                        currentMemberData = result.member;
                        showMemberCheckinForm(result.member);
                    } else {
                        closeModal();
                        showError(result.error);
                    }
                })
                .withFailureHandler(function(error) {
                    console.error("Search error:", error);
                    closeModal();
                    showError("Error: " + error.message);
                })
                .getMemberDetails(searchType, searchValue);
        }

        function showMemberCheckinForm(member) {
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">Member Details</div>
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" value="${escapeHtml(member.name)}" readonly style="background: #f7fafc;">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" value="${escapeHtml(member.phone)}" readonly style="background: #f7fafc;">
                </div>
                <div class="form-group">
                    <label>Registration ID</label>
                    <input type="text" value="${escapeHtml(member.regNo)}" readonly style="background: #f7fafc;">
                </div>
                <div class="form-group">
                    <label>Validity</label>
                    <input type="text" value="${escapeHtml(member.validity)}" readonly style="background: #f7fafc;">
                </div>
                <button class="btn-primary" onclick="confirmCheckIn('member')" style="width: 100%;">✅ Confirm Check-in</button>
                <button onclick="showMemberOptions()" style="margin-top: 10px; width: 100%; padding: 10px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer;">Back</button>
            `;
        }

        function showGuestForm() {
            const modalContent = document.getElementById('modalContent');
            
            modalContent.innerHTML = `
                <div class="modal-header">Guest Check-in</div>
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="guestName" placeholder="Enter full name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number *</label>
                    <input type="tel" id="guestPhone" placeholder="Enter phone number" required>
                </div>
                <div class="form-group">
                    <label>Purpose of Visit *</label>
                    <input type="text" id="guestPurpose" placeholder="e.g., Meeting, Interview" required>
                </div>
                <button class="btn-primary" onclick="validateGuestForm()" style="width: 100%;">Continue</button>
                <button onclick="showMemberGuestPopup()" style="margin-top: 10px; width: 100%; padding: 10px; background: #e2e8f0; border: none; border-radius: 8px; cursor: pointer;">Back</button>
            `;
        }

        function validateGuestForm() {
            const name = document.getElementById('guestName')?.value.trim();
            const phone = document.getElementById('guestPhone')?.value.trim();
            const purpose = document.getElementById('guestPurpose')?.value.trim();
            
            if (!name || !phone || !purpose) {
                showError('Please fill all fields');
                return;
            }
            
            if (!/^\d{10}$/.test(phone)) {
                showError('Please enter a valid 10-digit phone number');
                return;
            }
            
            currentMemberData = {
                name: name,
                phone: phone,
                purpose: purpose,
                type: 'Guest'
            };
            
            confirmCheckIn('guest');
        }

        function confirmCheckIn(type) {
            let data = {};
            
            if (type === 'member') {
                data = {
                    type: 'Member',
                    name: currentMemberData.name,
                    phone: currentMemberData.phone,
                    regNo: currentMemberData.regNo,
                    purpose: ''
                };
            } else {
                data = {
                    type: 'Guest',
                    name: currentMemberData.name,
                    phone: currentMemberData.phone,
                    regNo: '',
                    purpose: currentMemberData.purpose
                };
            }
            
            showLoading('Processing check-in...');
            
            google.script.run
                .withSuccessHandler(function(result) {
                    console.log("Check-in result:", result);
                    closeModal();
                    if (result.success) {
                        showSuccess(result.message);
                        refreshCheckins();
                    } else {
                        showError(result.error);
                    }
                })
                .withFailureHandler(function(error) {
                    console.error("Check-in error:", error);
                    closeModal();
                    showError("Error: " + error.message);
                })
                .recordCheckIn(data);
        }

        function signOut(regNo, phone, rowIndex) {
            if (!confirm('Are you sure you want to sign out this person?')) {
                return;
            }
            
            google.script.run
                .withSuccessHandler(function(result) {
                    console.log("Sign-out result:", result);
                    if (result.success) {
                        showSuccess(result.message);
                        refreshCheckins();
                    } else {
                        showError(result.error);
                    }
                })
                .withFailureHandler(function(error) {
                    console.error("Sign-out error:", error);
                    showError("Error: " + error.message);
                })
                .recordSignOut(regNo, phone, rowIndex);
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            currentMemberData = null;
        }
        
        function showLoading(message) {
            const modalContent = document.getElementById('modalContent');
            if (modalContent) {
                modalContent.innerHTML = `<div class="loading">${message}</div>`;
            }
        }
        
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = message;
            errorDiv.style.position = 'fixed';
            errorDiv.style.top = '20px';
            errorDiv.style.right = '20px';
            errorDiv.style.zIndex = '1001';
            errorDiv.style.maxWidth = '300px';
            document.body.appendChild(errorDiv);
            
            setTimeout(() => {
                errorDiv.remove();
            }, 4000);
        }
        
        function showSuccess(message) {
            const successDiv = document.createElement('div');
            successDiv.className = 'success-message';
            successDiv.innerHTML = message;
            successDiv.style.position = 'fixed';
            successDiv.style.top = '20px';
            successDiv.style.right = '20px';
            successDiv.style.zIndex = '1001';
            successDiv.style.maxWidth = '300px';
            document.body.appendChild(successDiv);
            
            setTimeout(() => {
                successDiv.remove();
            }, 3000);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target === modal) {
                closeModal();
            }
        };
    </script>
</body>
</html>
