<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Header Styles */
        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .logo h1 {
            color: #4a5568;
            font-size: 1.8rem;
        }
        
        .logo p {
            color: #718096;
            font-size: 0.9rem;
        }
        
        .signin-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }
        
        /* Table Styles */
        .attendance-section {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2d3748;
            border-left: 5px solid #667eea;
            padding-left: 15px;
        }
        
        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .stat-card {
            background: #f7fafc;
            padding: 10px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .stat-number {
            font-size: 1.5rem;
            font-weight: bold;
            color: #667eea;
        }
        
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 15px;
            overflow: hidden;
        }
        
        th {
            background: #f7fafc;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }
        
        tr:hover {
            background: #f7fafc;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .status-checkedin {
            background: #c6f6d5;
            color: #22543d;
        }
        
        .status-checkedout {
            background: #fed7d7;
            color: #742a2a;
        }
        
        .signout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        
        .signout-btn:hover:not(:disabled) {
            background: #c53030;
        }
        
        .signout-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        
        /* Modal/Popup Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            position: relative;
            animation: slideIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #a0aec0;
            transition: color 0.2s;
        }
        
        .close-modal:hover {
            color: #4a5568;
        }
        
        .modal h3 {
            margin-bottom: 20px;
            color: #2d3748;
            font-size: 1.4rem;
        }
        
        .option-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        
        .option-btn {
            background: #edf2f7;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .option-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        
        .member-option {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .form-group {
            margin-bottom: 18px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #4a5568;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        
        .form-group input:focus {
            border-color: #667eea;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .submit-btn:hover {
            transform: translateY(-1px);
        }
        
        .back-btn {
            background: #cbd5e0;
            color: #4a5568;
        }
        
        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 12px;
            display: none;
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        
        .message.info {
            background: #bee3f8;
            color: #2c5282;
            display: block;
        }
        
        .member-details {
            background: #f7fafc;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        
        .member-details p {
            margin: 8px 0;
        }
        
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 768px) {
            th, td { padding: 8px; font-size: 0.75rem; }
            .logo h1 { font-size: 1.2rem; }
            .logo p { font-size: 0.7rem; }
            .header { padding: 15px 20px; }
            .section-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>📋 Smart Attendance Tracker</h1>
            <p>Secure Check-in / Check-out System</p>
        </div>
        <button class="signin-btn" id="signinBtn">➕ Sign In / Check In</button>
    </div>

    <div class="attendance-section">
        <div class="section-title">📌 Today's Attendance</div>
        <div class="stats-bar" id="statsBar">
            <div class="stat-card">👥 Total: <span class="stat-number" id="totalCount">0</span></div>
            <div class="stat-card">✅ Checked In: <span class="stat-number" id="checkedInCount">0</span></div>
            <div class="stat-card">❌ Checked Out: <span class="stat-number" id="checkedOutCount">0</span></div>
        </div>
        <div class="table-wrapper">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Phone</th>
                        <th>Reg No</th>
                        <th>Check In</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="attendanceBody">
                    <tr><td colspan="7" style="text-align:center"><div class="loading-spinner"></div> Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Popup -->
<div id="modal" class="modal">
    <div class="modal-content" id="modalContent">
        <span class="close-modal">&times;</span>
        <div id="modalDynamic"></div>
    </div>
</div>

<script>
    // ==================== GLOBAL VARIABLES ====================
    let currentStep = 'initial';
    let currentMemberData = null;
    
    // ==================== INITIALIZATION ====================
    document.addEventListener('DOMContentLoaded', function() {
        loadAttendance();
        setupEventListeners();
    });
    
    function setupEventListeners() {
        document.getElementById('signinBtn').onclick = function() {
            currentStep = 'initial';
            showInitialPopup();
            modal.style.display = 'flex';
        };
        
        document.querySelector('.close-modal').onclick = closeModal;
        window.onclick = function(e) {
            if(e.target === modal) closeModal();
        };
    }
    
    // ==================== ATTENDANCE FUNCTIONS ====================
    function loadAttendance() {
        google.script.run.withSuccessHandler(function(attendance) {
            renderAttendance(attendance);
            updateStats(attendance);
        }).withFailureHandler(function(error) {
            console.error('Error loading attendance:', error);
            document.getElementById('attendanceBody').innerHTML = '<tr><td colspan="7" style="text-align:center;color:red;">❌ Error loading attendance. Please refresh.</td></tr>';
        }).getTodayAttendance();
    }
    
    function renderAttendance(attendance) {
        const tbody = document.getElementById('attendanceBody');
        if (!attendance || attendance.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">✨ No check-ins yet today. Click "Sign In" to get started!</td></tr>';
            return;
        }
        
        let html = '';
        attendance.forEach(person => {
            const isCheckedIn = person.status === 'Checked In';
            html += `<tr>
                <td><strong>${escapeHtml(person.name)}</strong></td>
                <td>${person.type === 'Member' ? '👤 Member' : '🚪 Guest'}</td>
                <td>${escapeHtml(person.phone || '-')}</td>
                <td>${escapeHtml(person.regNo || '-')}</td>
                <td>${person.checkin || '-'}</td>
                <td><span class="status-badge ${person.status === 'Checked In' ? 'status-checkedin' : 'status-checkedout'}">${person.status}</span></td>
                <td><button class="signout-btn" onclick="signOut(${person.rowIndex}, '${escapeHtml(person.name).replace(/'/g, "\\'")}')" ${!isCheckedIn ? 'disabled' : ''}>Sign Out</button></td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }
    
    function updateStats(attendance) {
        const total = attendance.length;
        const checkedIn = attendance.filter(p => p.status === 'Checked In').length;
        const checkedOut = total - checkedIn;
        
        document.getElementById('totalCount').textContent = total;
        document.getElementById('checkedInCount').textContent = checkedIn;
        document.getElementById('checkedOutCount').textContent = checkedOut;
    }
    
    function escapeHtml(str) {
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== MODAL FUNCTIONS ====================
    function closeModal() {
        modal.style.display = 'none';
        currentStep = 'initial';
        currentMemberData = null;
    }
    
    function showMessageInModal(msg, type) {
        let msgDiv = document.querySelector('#modalDynamic .message');
        if(!msgDiv) {
            msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            document.getElementById('modalDynamic').appendChild(msgDiv);
        }
        msgDiv.textContent = msg;
        msgDiv.className = `message ${type}`;
        if(type !== 'info') {
            setTimeout(() => {
                if(msgDiv) msgDiv.style.display = 'none';
            }, 3000);
        }
    }
    
    function clearModalMessage() {
        const msgDiv = document.querySelector('#modalDynamic .message');
        if(msgDiv) msgDiv.style.display = 'none';
    }
    
    // ==================== INITIAL POPUP ====================
    function showInitialPopup() {
        clearModalMessage();
        modalDynamic.innerHTML = `
            <h3>🔐 Choose Check-in Type</h3>
            <div class="option-buttons">
                <button class="option-btn member-option" onclick="selectMember()">👤 Member</button>
                <button class="option-btn" onclick="selectGuest()">🚪 Guest</button>
            </div>
        `;
    }
    
    // ==================== MEMBER FUNCTIONS ====================
    function selectMember() {
        currentStep = 'memberOptions';
        clearModalMessage();
        modalDynamic.innerHTML = `
            <h3>👤 Member Check-in</h3>
            <div class="option-buttons">
                <button class="option-btn" onclick="memberSearch('name')">📝 Search by Name</button>
                <button class="option-btn" onclick="memberSearch('regid')">🆔 Search by Reg ID</button>
                <button class="option-btn" onclick="memberSearch('phone')">📱 Search by Phone</button>
            </div>
            <button class="submit-btn back-btn" onclick="showInitialPopup()">← Back</button>
        `;
    }
    
    function memberSearch(searchType) {
        const searchLabel = searchType === 'name' ? 'Name' : (searchType === 'regid' ? 'Registration ID' : 'Phone Number');
        const placeholder = searchType === 'name' ? 'Enter full name' : (searchType === 'regid' ? 'Enter registration number' : 'Enter phone number');
        
        clearModalMessage();
        modalDynamic.innerHTML = `
            <h3>🔍 Search by ${searchLabel}</h3>
            <div class="form-group">
                <label>${searchLabel}</label>
                <input type="text" id="searchInput" placeholder="${placeholder}" autocomplete="off">
            </div>
            <button class="submit-btn" onclick="fetchMember('${searchType}')">🔍 Search & Check-in</button>
            <button class="submit-btn back-btn" onclick="selectMember()">← Back</button>
            <div class="message info" style="display:none"></div>
        `;
        
        // Auto-focus the input
        setTimeout(() => document.getElementById('searchInput')?.focus(), 100);
    }
    
    function fetchMember(searchType) {
        const searchValue = document.getElementById('searchInput').value.trim();
        if(!searchValue) {
            showMessageInModal('Please enter a value to search', 'error');
            return;
        }
        
        showMessageInModal('🔍 Searching...', 'info');
        
        google.script.run
            .withFailureHandler(function(err) {
                console.error('Script error:', err);
                showMessageInModal('Error: ' + (err.message || 'Failed to search. Please try again.'), 'error');
            })
            .withSuccessHandler(function(result) {
                if(!result.success) {
                    showMessageInModal(result.error || 'Member not found', 'error');
                    return;
                }
                showMemberCheckinUI(result);
            })
            .getMemberDetails(searchValue, searchType);
    }
    
    function showMemberCheckinUI(member) {
        currentMemberData = member;
        clearModalMessage();
        modalDynamic.innerHTML = `
            <h3>✅ Member Found</h3>
            <div class="member-details">
                <p><strong>👤 Name:</strong> ${escapeHtml(member.name)}</p>
                <p><strong>📞 Phone:</strong> ${escapeHtml(member.phone) || 'N/A'}</p>
                <p><strong>🆔 Reg No:</strong> ${escapeHtml(member.regNo) || 'N/A'}</p>
                <p><strong>📅 Validity:</strong> ${escapeHtml(member.validity) || 'No Expiry'}</p>
            </div>
            <button class="submit-btn" onclick="confirmCheckInMember()">✔ Confirm Check-in</button>
            <button class="submit-btn back-btn" onclick="selectMember()">← Cancel</button>
            <div class="message" style="display:none"></div>
        `;
    }
    
    function confirmCheckInMember() {
        if(!currentMemberData) {
            showMessageInModal('Member data not found. Please search again.', 'error');
            return;
        }
        
        showMessageInModal('Processing check-in...', 'info');
        
        google.script.run
            .withFailureHandler(function(err) {
                showMessageInModal('Check-in failed: ' + (err.message || 'Unknown error'), 'error');
            })
            .withSuccessHandler(function(res) {
                if(res.success) {
                    showMessageInModal(res.message, 'success');
                    setTimeout(() => {
                        closeModal();
                        loadAttendance();
                    }, 1500);
                } else {
                    showMessageInModal(res.error, 'error');
                }
            })
            .checkInMember(currentMemberData);
    }
    
    // ==================== GUEST FUNCTIONS ====================
    function selectGuest() {
        clearModalMessage();
        modalDynamic.innerHTML = `
            <h3>🚪 Guest Check-in</h3>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="guestName" placeholder="Enter full name" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Phone Number *</label>
                <input type="tel" id="guestPhone" placeholder="Phone number" autocomplete="off">
            </div>
            <div class="form-group">
                <label>Purpose of Visit *</label>
                <input type="text" id="guestPurpose" placeholder="Meeting, Tour, Delivery, etc." autocomplete="off">
            </div>
            <button class="submit-btn" onclick="submitGuest()">✔ Check-in Guest</button>
            <button class="submit-btn back-btn" onclick="showInitialPopup()">← Back</button>
            <div class="message" style="display:none"></div>
        `;
        
        // Auto-focus first input
        setTimeout(() => document.getElementById('guestName')?.focus(), 100);
    }
    
    function submitGuest() {
        const name = document.getElementById('guestName').value.trim();
        const phone = document.getElementById('guestPhone').value.trim();
        const purpose = document.getElementById('guestPurpose').value.trim();
        
        if(!name) {
            showMessageInModal('Please enter guest name', 'error');
            document.getElementById('guestName').focus();
            return;
        }
        if(!phone) {
            showMessageInModal('Please enter phone number', 'error');
            document.getElementById('guestPhone').focus();
            return;
        }
        if(!purpose) {
            showMessageInModal('Please enter purpose of visit', 'error');
            document.getElementById('guestPurpose').focus();
            return;
        }
        
        showMessageInModal('Processing guest check-in...', 'info');
        
        google.script.run
            .withFailureHandler(function(err) {
                showMessageInModal('Check-in failed: ' + (err.message || 'Unknown error'), 'error');
            })
            .withSuccessHandler(function(res) {
                if(res.success) {
                    showMessageInModal(res.message, 'success');
                    setTimeout(() => {
                        closeModal();
                        loadAttendance();
                    }, 1500);
                } else {
                    showMessageInModal(res.error, 'error');
                }
            })
            .checkInGuest({ name: name, phone: phone, purpose: purpose });
    }
    
    // ==================== SIGN OUT FUNCTION ====================
    function signOut(rowIndex, name) {
        if(confirm(`Sign out ${name}?`)) {
            google.script.run
                .withFailureHandler(function(err) {
                    alert('Sign out failed: ' + (err.message || 'Unknown error'));
                })
                .withSuccessHandler(function(res) {
                    if(res.success) {
                        loadAttendance();
                        alert(`${name} signed out successfully!`);
                    } else {
                        alert(res.error);
                    }
                })
                .checkOut(rowIndex);
        }
    }
    
    // Auto-refresh attendance every 30 seconds
    setInterval(() => {
        if(!modal.style.display || modal.style.display !== 'flex') {
            loadAttendance();
        }
    }, 30000);
</script>
</body>
</html>
