<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Attendance System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        /* Header */
        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h1 {
            color: #4a5568;
            font-size: 1.8rem;
        }
        .logo p {
            color: #718096;
            font-size: 0.9rem;
        }
        .signin-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .signin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
        }
        /* Table Styles */
        .attendance-section {
            background: white;
            border-radius: 25px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #2d3748;
            border-left: 5px solid #667eea;
            padding-left: 15px;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border-radius: 15px;
            overflow: hidden;
        }
        th {
            background: #f7fafc;
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }
        tr:hover {
            background: #f7fafc;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .status-checkedin {
            background: #c6f6d5;
            color: #22543d;
        }
        .status-checkedout {
            background: #fed7d7;
            color: #742a2a;
        }
        .signout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 6px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: background 0.2s;
        }
        .signout-btn:hover:not(:disabled) {
            background: #c53030;
        }
        .signout-btn:disabled {
            background: #a0aec0;
            cursor: not-allowed;
        }
        /* Modal/Popup Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            border-radius: 30px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            position: relative;
            animation: slideIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        @keyframes slideIn {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 28px;
            cursor: pointer;
            color: #a0aec0;
        }
        .modal h3 {
            margin-bottom: 20px;
            color: #2d3748;
        }
        .option-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 25px 0;
        }
        .option-btn {
            background: #edf2f7;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        .member-option {
            background: #667eea;
            color: white;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #4a5568;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: border 0.2s;
        }
        .form-group input:focus {
            border-color: #667eea;
        }
        .submit-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .back-btn {
            background: #cbd5e0;
            margin-top: 10px;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .message.success {
            background: #c6f6d5;
            color: #22543d;
            display: block;
        }
        .message.error {
            background: #fed7d7;
            color: #742a2a;
            display: block;
        }
        .member-details {
            background: #f7fafc;
            border-radius: 15px;
            padding: 15px;
            margin: 15px 0;
        }
        .qr-reader {
            text-align: center;
            margin: 15px 0;
        }
        #qr-video {
            width: 100%;
            max-width: 300px;
            border-radius: 15px;
        }
        @media (max-width: 768px) {
            th, td { padding: 8px; font-size: 0.8rem; }
            .logo h1 { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>📋 Attendance Tracker</h1>
            <p>Secure Check-in / Check-out System</p>
        </div>
        <button class="signin-btn" id="signinBtn">➕ Sign In / Check In</button>
    </div>

    <div class="attendance-section">
        <div class="section-title">📌 Today's Attendance</div>
        <div class="table-wrapper">
            <table id="attendanceTable">
                <thead>
                    <tr><th>Name</th><th>Type</th><th>Phone</th><th>Reg No</th><th>Check In</th><th>Status</th><th>Action</th></tr>
                </thead>
                <tbody id="attendanceBody">
                    <tr><td colspan="7" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Popup -->
<div id="modal" class="modal">
    <div class="modal-content" id="modalContent">
        <span class="close-modal">&times;</span>
        <div id="modalDynamic"></div>
    </div>
</div>

<script>
    // Load attendance on page load
    document.addEventListener('DOMContentLoaded', function() {
        loadAttendance();
    });

    function loadAttendance() {
        google.script.run.withSuccessHandler(renderAttendance).getTodayAttendance();
    }

    function renderAttendance(attendance) {
        const tbody = document.getElementById('attendanceBody');
        if (!attendance || attendance.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">No check-ins today</td></tr>';
            return;
        }
        let html = '';
        attendance.forEach(person => {
            const isCheckedIn = person.status === 'Checked In';
            html += `<tr>
                <td>${escapeHtml(person.name)}</td>
                <td>${person.type}</td>
                <td>${person.phone || '-'}</td>
                <td>${person.regNo || '-'}</td>
                <td>${person.checkin || '-'}</td>
                <td><span class="status-badge ${person.status === 'Checked In' ? 'status-checkedin' : 'status-checkedout'}">${person.status}</span></td>
                <td><button class="signout-btn" onclick="signOut(${person.rowIndex}, '${escapeHtml(person.name)}')" ${!isCheckedIn ? 'disabled' : ''}>Sign Out</button></td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // Modal logic
    const modal = document.getElementById('modal');
    const modalDynamic = document.getElementById('modalDynamic');
    let currentStep = 'initial'; // initial, memberOptions, memberForm, guestForm

    function closeModal() { modal.style.display = 'none'; currentStep = 'initial'; }
    document.querySelector('.close-modal').onclick = closeModal;
    window.onclick = function(e) { if(e.target === modal) closeModal(); }

    document.getElementById('signinBtn').onclick = function() {
        currentStep = 'initial';
        showInitialPopup();
        modal.style.display = 'flex';
    };

    function showInitialPopup() {
        modalDynamic.innerHTML = `
            <h3>🔐 Check-in Type</h3>
            <div class="option-buttons">
                <button class="option-btn member-option" onclick="selectMember()">👤 Member</button>
                <button class="option-btn" onclick="selectGuest()">🚪 Guest</button>
            </div>
        `;
    }

    function selectMember() {
        currentStep = 'memberOptions';
        modalDynamic.innerHTML = `
            <h3>👤 Member Check-in</h3>
            <div class="option-buttons">
                <button class="option-btn" onclick="memberSearch('name')">📝 Search by Name</button>
                <button class="option-btn" onclick="memberSearch('regid')">🆔 Search by Reg ID</button>
                <button class="option-btn" onclick="scanQRCode()">📷 Scan QR Code</button>
            </div>
            <button class="submit-btn back-btn" onclick="showInitialPopup()">← Back</button>
        `;
    }

    function memberSearch(searchType) {
        modalDynamic.innerHTML = `
            <h3>🔍 Search ${searchType === 'name' ? 'by Name' : 'by Registration ID'}</h3>
            <div class="form-group"><label>${searchType === 'name' ? 'Name' : 'Reg ID'}</label>
            <input type="text" id="searchInput" placeholder="Enter ${searchType === 'name' ? 'full name' : 'registration number'}"></div>
            <button class="submit-btn" onclick="fetchMember('${searchType}')">Search & Check-in</button>
            <button class="submit-btn back-btn" onclick="selectMember()">Back</button>
        `;
    }

    window.fetchMember = function(searchType) {
        const searchValue = document.getElementById('searchInput').value.trim();
        if(!searchValue) { showMessageInModal('Please enter value', 'error'); return; }
        showMessageInModal('Searching...', 'info');
        google.script.run.withFailureHandler(err => showMessageInModal(err.message, 'error'))
            .withSuccessHandler(function(result) {
                if(!result.success) { showMessageInModal(result.error, 'error'); return; }
                showMemberCheckinUI(result);
            }).getMemberDetails(searchValue, searchType);
    };

    function showMemberCheckinUI(member) {
        modalDynamic.innerHTML = `
            <h3>✅ Member Found</h3>
            <div class="member-details">
                <p><strong>Name:</strong> ${escapeHtml(member.name)}</p>
                <p><strong>Phone:</strong> ${member.phone}</p>
                <p><strong>Reg No:</strong> ${member.regNo}</p>
                <p><strong>Validity:</strong> ${member.validity || 'N/A'}</p>
            </div>
            <button class="submit-btn" onclick="confirmCheckInMember(${JSON.stringify(member).replace(/"/g, '&quot;')})">✔ Confirm Check-in</button>
            <button class="submit-btn back-btn" onclick="selectMember()">Cancel</button>
        `;
    }

    window.confirmCheckInMember = function(member) {
        google.script.run.withSuccessHandler(function(res) {
            if(res.success) { showMessageInModal(res.message, 'success'); setTimeout(()=> { closeModal(); loadAttendance(); }, 1500); }
            else { showMessageInModal(res.error, 'error'); }
        }).checkInMember(member);
    };

    function selectGuest() {
        modalDynamic.innerHTML = `
            <h3>🚪 Guest Check-in</h3>
            <div class="form-group"><label>Full Name *</label><input type="text" id="guestName" placeholder="Enter name"></div>
            <div class="form-group"><label>Phone Number *</label><input type="tel" id="guestPhone" placeholder="Phone number"></div>
            <div class="form-group"><label>Purpose of Visit *</label><input type="text" id="guestPurpose" placeholder="Meeting, Tour, etc."></div>
            <button class="submit-btn" onclick="submitGuest()">Check-in Guest</button>
            <button class="submit-btn back-btn" onclick="showInitialPopup()">Back</button>
        `;
    }

    window.submitGuest = function() {
        const name = document.getElementById('guestName').value.trim();
        const phone = document.getElementById('guestPhone').value.trim();
        const purpose = document.getElementById('guestPurpose').value.trim();
        if(!name || !phone || !purpose) { showMessageInModal('All fields required', 'error'); return; }
        google.script.run.withSuccessHandler(function(res) {
            if(res.success) { showMessageInModal(res.message, 'success'); setTimeout(()=> { closeModal(); loadAttendance(); }, 1500); }
            else { showMessageInModal(res.error, 'error'); }
        }).checkInGuest({ name, phone, purpose });
    };

    window.signOut = function(rowIndex, name) {
        if(confirm(`Sign out ${name}?`)) {
            google.script.run.withSuccessHandler(function(res) {
                if(res.success) { loadAttendance(); alert(`${name} signed out`); }
                else alert(res.error);
            }).checkOut(rowIndex);
        }
    };

    window.scanQRCode = function() {
        modalDynamic.innerHTML = `<h3>📷 QR Code Scanner</h3><div class="qr-reader"><video id="qr-video" autoplay playsinline></video></div><button class="submit-btn back-btn" onclick="selectMember()">Back</button>`;
        // Simple QR placeholder - you can integrate a library like html5-qrcode
        alert('QR scanning requires additional library. For now, please use Reg ID or Name.');
        selectMember();
    };

    function showMessageInModal(msg, type) {
        let msgDiv = document.querySelector('#modalDynamic .message');
        if(!msgDiv) {
            msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            document.getElementById('modalDynamic').appendChild(msgDiv);
        }
        msgDiv.textContent = msg;
        msgDiv.className = `message ${type}`;
        if(type !== 'info') setTimeout(()=> { if(msgDiv) msgDiv.style.display = 'none'; }, 3000);
    }
</script>
</body>
</html>
