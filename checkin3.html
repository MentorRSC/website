<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Management System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header h1 { color: #667eea; font-size: 28px; }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            margin: 5px;
        }
        .btn-secondary {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
        }
        .modal-header {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #667eea;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
        }
        .option-buttons { display: flex; gap: 15px; margin-top: 10px; }
        .option-btn {
            flex: 1;
            padding: 12px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
        }
        .option-btn:hover { background: #667eea; color: white; }
        .checkins-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .section-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            border-left: 4px solid #667eea;
            padding-left: 15px;
        }
        .checkins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        .checkin-card {
            background: #f7fafc;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #48bb78;
        }
        .checkin-name { font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .checkin-details { font-size: 14px; color: #666; margin-bottom: 8px; }
        .checkin-time { font-size: 12px; color: #48bb78; margin-bottom: 15px; }
        .signout-btn {
            width: 100%;
            padding: 10px;
            background: #f56565;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-member { background: #4299e1; color: white; }
        .badge-guest { background: #ed8936; color: white; }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
        }
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
        }
        .loading { text-align: center; padding: 40px; color: #666; }
        .empty-state { text-align: center; padding: 60px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Attendance Management System</h1>
            <div>
                <button class="btn-primary" onclick="showMemberGuestPopup()">➕ Check In</button>
                <button class="btn-secondary" onclick="refreshCheckins()">🔄 Refresh</button>
            </div>
        </div>
        <div class="checkins-section">
            <div class="section-title">Currently Checked In</div>
            <div id="checkinsList">
                <div class="loading">Loading check-ins...</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        let currentMemberData = null;

        window.onload = function() {
            console.log("Page loaded");
            refreshCheckins();
            setInterval(refreshCheckins, 30000);
        };

        function refreshCheckins() {
            google.script.run
                .withSuccessHandler(displayCheckins)
                .withFailureHandler(showError)
                .getTodayCheckins();
        }

        function displayCheckins(result) {
            const container = document.getElementById('checkinsList');
            if (!result.success) {
                container.innerHTML = `<div class="error-message">Error: ${result.error}</div>`;
                return;
            }
            const checkins = result.checkins;
            if (checkins.length === 0) {
                container.innerHTML = '<div class="empty-state">No one is currently checked in 🤔</div>';
                return;
            }
            let html = '<div class="checkins-grid">';
            checkins.forEach(checkin => {
                let checkinTime = checkin.checkinTime;
                if (checkinTime && checkinTime.includes('T')) {
                    checkinTime = new Date(checkinTime).toLocaleString();
                }
                html += `
                    <div class="checkin-card">
                        <div class="checkin-name">${escapeHtml(checkin.name)}</div>
                        <div class="checkin-details">📞 ${escapeHtml(checkin.phone)}</div>
                        <div class="checkin-details">
                            <span class="badge ${checkin.type === 'Member' ? 'badge-member' : 'badge-guest'}">${checkin.type}</span>
                        </div>
                        ${checkin.purpose ? `<div class="checkin-details">🎯 Purpose: ${escapeHtml(checkin.purpose)}</div>` : ''}
                        ${checkin.regNo ? `<div class="checkin-details">🆔 Reg ID: ${escapeHtml(checkin.regNo)}</div>` : ''}
                        <div class="checkin-time">⏰ Checked in: ${checkinTime}</div>
                        <button class="signout-btn" onclick="signOut('${escapeHtml(checkin.regNo || '')}', '${escapeHtml(checkin.phone)}', ${checkin.rowIndex})">🚪 Sign Out</button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function showMemberGuestPopup() {
            const modal = document.getElementById('modal');
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">Who is checking in?</div>
                <div class="option-buttons">
                    <button class="option-btn" onclick="showMemberOptions()">👤 Member</button>
                    <button class="option-btn" onclick="showGuestForm()">🚶 Guest</button>
                </div>
                <button onclick="closeModal()" style="margin-top:20px; width:100%; padding:10px;">Cancel</button>
            `;
            modal.style.display = 'block';
        }

        function showMemberOptions() {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">Member Check-in</div>
                <div class="option-buttons">
                    <button class="option-btn" onclick="showMemberSearchForm('name')">📝 Search by Name</button>
                    <button class="option-btn" onclick="showMemberSearchForm('regid')">🆔 Search by Reg ID</button>
                    <button class="option-btn" onclick="showMemberSearchForm('qrcode')">📱 Enter Reg ID</button>
                </div>
                <button onclick="showMemberGuestPopup()" style="margin-top:20px; width:100%; padding:10px;">Back</button>
            `;
        }

        function showMemberSearchForm(searchType) {
            const modalContent = document.getElementById('modalContent');
            let label, placeholder;
            if (searchType === 'name') {
                label = 'Enter Member Name'; placeholder = 'e.g., Harinandan B';
            } else if (searchType === 'regid') {
                label = 'Enter Registration ID'; placeholder = 'e.g., IH2602007';
            } else {
                label = 'Enter Registration ID from QR Code'; placeholder = 'e.g., IH2602007';
            }
            modalContent.innerHTML = `
                <div class="modal-header">${label}</div>
                <div class="form-group">
                    <input type="text" id="searchValue" placeholder="${placeholder}" autocomplete="off">
                </div>
                <button class="btn-primary" onclick="fetchMember('${searchType}', document.getElementById('searchValue').value)" style="width:100%;">🔍 Search</button>
                <button onclick="showMemberOptions()" style="margin-top:10px; width:100%; padding:10px;">Back</button>
            `;
        }

        function fetchMember(searchType, searchValue) {
            if (!searchValue) { showError('Please enter a value'); return; }
            showLoading('Searching for member...');
            google.script.run
                .withSuccessHandler(function(result) {
                    if (result.success) {
                        currentMemberData = result.member;
                        showMemberCheckinForm(result.member);
                    } else {
                        closeModal();
                        showError(result.error);
                    }
                })
                .withFailureHandler(function(error) {
                    closeModal();
                    showError(error.message);
                })
                .getMemberDetails(searchType, searchValue);
        }

        function showMemberCheckinForm(member) {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">Member Details</div>
                <div class="form-group"><label>Name</label><input type="text" value="${escapeHtml(member.name)}" readonly style="background:#f7fafc;"></div>
                <div class="form-group"><label>Phone Number</label><input type="text" value="${escapeHtml(member.phone)}" readonly style="background:#f7fafc;"></div>
                <div class="form-group"><label>Registration ID</label><input type="text" value="${escapeHtml(member.regNo)}" readonly style="background:#f7fafc;"></div>
                <div class="form-group"><label>Validity</label><input type="text" value="${escapeHtml(member.validity)}" readonly style="background:#f7fafc;"></div>
                <button class="btn-primary" onclick="confirmCheckIn('member')" style="width:100%;">✅ Confirm Check-in</button>
                <button onclick="showMemberOptions()" style="margin-top:10px; width:100%; padding:10px;">Back</button>
            `;
        }

        function showGuestForm() {
            const modalContent = document.getElementById('modalContent');
            modalContent.innerHTML = `
                <div class="modal-header">Guest Check-in</div>
                <div class="form-group"><label>Full Name *</label><input type="text" id="guestName" placeholder="Enter full name"></div>
                <div class="form-group"><label>Phone Number *</label><input type="tel" id="guestPhone" placeholder="Enter phone number"></div>
                <div class="form-group"><label>Purpose of Visit *</label><input type="text" id="guestPurpose" placeholder="e.g., Meeting, Interview"></div>
                <button class="btn-primary" onclick="validateGuestForm()" style="width:100%;">Continue</button>
                <button onclick="showMemberGuestPopup()" style="margin-top:10px; width:100%; padding:10px;">Back</button>
            `;
        }

        function validateGuestForm() {
            const name = document.getElementById('guestName')?.value.trim();
            const phone = document.getElementById('guestPhone')?.value.trim();
            const purpose = document.getElementById('guestPurpose')?.value.trim();
            if (!name || !phone || !purpose) { showError('Please fill all fields'); return; }
            if (!/^\d{10}$/.test(phone)) { showError('Please enter a valid 10-digit phone number'); return; }
            currentMemberData = { name: name, phone: phone, purpose: purpose, type: 'Guest' };
            confirmCheckIn('guest');
        }

        function confirmCheckIn(type) {
            let data = {};
            if (type === 'member') {
                data = { type: 'Member', name: currentMemberData.name, phone: currentMemberData.phone, regNo: currentMemberData.regNo, purpose: '' };
            } else {
                data = { type: 'Guest', name: currentMemberData.name, phone: currentMemberData.phone, regNo: '', purpose: currentMemberData.purpose };
            }
            showLoading('Processing check-in...');
            google.script.run
                .withSuccessHandler(function(result) {
                    closeModal();
                    if (result.success) {
                        showSuccess(result.message);
                        refreshCheckins();
                    } else {
                        showError(result.error);
                    }
                })
                .withFailureHandler(function(error) {
                    closeModal();
                    showError(error.message);
                })
                .recordCheckIn(data);
        }

        function signOut(regNo, phone, rowIndex) {
            if (!confirm('Are you sure you want to sign out this person?')) return;
            google.script.run
                .withSuccessHandler(function(result) {
                    if (result.success) {
                        showSuccess(result.message);
                        refreshCheckins();
                    } else {
                        showError(result.error);
                    }
                })
                .withFailureHandler(function(error) { showError(error.message); })
                .recordSignOut(regNo, phone, rowIndex);
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; currentMemberData = null; }
        function showLoading(message) { const mc = document.getElementById('modalContent'); if (mc) mc.innerHTML = `<div class="loading">${message}</div>`; }
        function showError(message) {
            const div = document.createElement('div');
            div.className = 'error-message';
            div.innerHTML = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 4000);
        }
        function showSuccess(message) {
            const div = document.createElement('div');
            div.className = 'success-message';
            div.innerHTML = message;
            document.body.appendChild(div);
            setTimeout(() => div.remove(), 3000);
        }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
        window.onclick = function(event) { const modal = document.getElementById('modal'); if (event.target === modal) closeModal(); };
    </script>
</body>
</html>
