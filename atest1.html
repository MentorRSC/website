<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Innovation Hub - Attendance System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 25px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header h1 { color: #667eea; font-size: 28px; }
        .header p { color: #666; margin-top: 5px; }
        .options-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .option-card { background: white; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .option-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .option-card.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .option-card .icon { font-size: 40px; margin-bottom: 10px; }
        .option-card h3 { font-size: 16px; }
        .form-container { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; }
        .form-container.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: #333; margin-bottom: 8px; }
        input, select { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; transition: all 0.3s; }
        input:focus, select:focus { outline: none; border-color: #667eea; }
        button { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .member-info { background: #f8f9fa; border-radius: 15px; padding: 20px; margin-top: 20px; border-left: 4px solid #28a745; }
        .member-info.expired { border-left-color: #dc3545; background: #fef2f2; }
        .member-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        .detail-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; color: #666; font-size: 14px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 10px; }
        .badge-active { background: #28a74520; color: #155724; }
        .badge-expired { background: #dc354520; color: #721c24; }
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .action-buttons button { flex: 1; }
        .btn-checkin { background: #28a745; }
        .btn-checkout { background: #dc3545; }
        .message { padding: 12px; border-radius: 10px; margin: 15px 0; text-align: center; font-size: 14px; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .message.warning { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
        .report-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .report-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 12px; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        .stat-label { font-size: 12px; color: #666; margin-top: 5px; }
        .member-list { margin-top: 20px; }
        .member-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #e0e0e0; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 500px) { .options-grid { gap: 10px; } .option-card { padding: 15px; } .option-card .icon { font-size: 30px; } }
    </style>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏢 Innovation Hub</h1>
            <p>Attendance Management System</p>
        </div>
        
        <div class="options-grid">
            <div class="option-card" data-option="regNo"><div class="icon">🆔</div><h3>Enter Reg ID</h3></div>
            <div class="option-card" data-option="name"><div class="icon">👤</div><h3>Enter Name</h3></div>
            <div class="option-card" data-option="qr"><div class="icon">📱</div><h3>Scan QR Code</h3></div>
            <div class="option-card" data-option="guest"><div class="icon">👋</div><h3>Guest Login</h3></div>
        </div>
        
        <div id="regNoForm" class="form-container">
            <h3>📇 Enter Registration Number</h3>
            <div class="input-group"><label>Registration Number</label><input type="text" id="regInput" placeholder="e.g., IH2511053"></div>
            <button onclick="verifyByRegNo()">Verify & Proceed</button>
            <div id="regResult"></div>
        </div>
        
        <div id="nameForm" class="form-container">
            <h3>🔍 Search by Name</h3>
            <div class="input-group"><label>Full Name</label><input type="text" id="nameInput" placeholder="Enter your full name"></div>
            <button onclick="verifyByName()">Search & Verify</button>
            <div id="nameResult"></div>
        </div>
        
        <div id="qrForm" class="form-container">
            <h3>📱 Scan QR Code</h3>
            <div id="qr-reader" style="width: 100%;"></div>
            <button onclick="stopQRScanner()" style="margin-top: 10px; background: #dc3545;">Stop Scanner</button>
            <div id="qrResult"></div>
        </div>
        
        <div id="guestForm" class="form-container">
            <h3>👋 Guest Check-in</h3>
            <div class="input-group"><label>Full Name *</label><input type="text" id="guestName" placeholder="Enter your full name"></div>
            <div class="input-group"><label>Mobile Number *</label><input type="tel" id="guestMobile" placeholder="Enter mobile number"></div>
            <div class="input-group"><label>Purpose of Visit (Optional)</label><input type="text" id="guestPurpose" placeholder="e.g., Meeting, Workshop, Tour"></div>
            <button onclick="guestCheckIn()">Guest Check-in</button>
            <div id="guestResult"></div>
        </div>
        
        <div class="report-card" id="reportSection">
            <h3>📊 Today's Report</h3>
            <div id="reportContent">Loading...</div>
        </div>
    </div>

    <script>
        // ⚠️ REPLACE WITH YOUR WEB APP URL
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwjE0Sjpsr7EB-ZxSjueYBpfq1EuZ8Aq_w7VRYKGnzA6l1ivyc01dVZWu3UANuGoBP0/exec';
        
        let currentMember = null;
        let currentAction = null;
        let html5QrCode = null;
        
        // Use Google Apps Script Web App as a proxy (using GET with JSONP for all requests)
        async function callAPI(action, params = {}) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                let url = `${WEB_APP_URL}?action=${action}&callback=${callbackName}`;
                for (let key in params) {
                    url += `&${key}=${encodeURIComponent(params[key])}`;
                }
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                
                const script = document.createElement('script');
                script.src = url;
                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('JSONP request failed'));
                };
                document.body.appendChild(script);
            });
        }
        
        async function postAction(type, data) {
            // For POST actions, we use GET with a special parameter (since Apps Script has CORS limitations)
            // We'll use JSONP for all requests
            const params = {
                action: 'post',
                postType: type,
                postData: JSON.stringify(data),
                timestamp: new Date().toISOString()
            };
            
            // Add all data as parameters
            for (let key in data) {
                params[`data_${key}`] = data[key];
            }
            params[`post_type`] = type;
            
            return await callAPI('post', params);
        }
        
        function showMessage(containerId, text, type = 'info') {
            const container = document.getElementById(containerId);
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = text;
            const existingMsgs = container.querySelectorAll('.message');
            existingMsgs.forEach(msg => msg.remove());
            container.insertBefore(msgDiv, container.firstChild);
            setTimeout(() => { if (msgDiv.parentNode) msgDiv.remove(); }, 5000);
        }
        
        async function verifyByRegNo() {
            const regNo = document.getElementById('regInput').value.trim();
            if (!regNo) { showMessage('regResult', 'Please enter Registration Number', 'error'); return; }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Verifying...';
            
            try {
                const result = await callAPI('getMemberByReg', { regNo: regNo });
                if (result.status === 'found') {
                    currentMember = result;
                    displayMemberCard('regResult', result);
                } else {
                    showMessage('regResult', `❌ Registration number ${regNo} not found`, 'error');
                }
            } catch(e) {
                showMessage('regResult', 'Server error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Verify & Proceed';
            }
        }
        
        async function verifyByName() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) { showMessage('nameResult', 'Please enter Name', 'error'); return; }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Searching...';
            
            try {
                const result = await callAPI('getMemberByName', { name: name });
                if (result.status === 'found') {
                    currentMember = result;
                    displayMemberCard('nameResult', result);
                } else if (result.status === 'multiple') {
                    let html = '<div class="member-info"><h4>Multiple members found:</h4>';
                    result.matches.forEach(m => {
                        html += `<div class="detail-row">📇 ${m.name} (${m.regNo}) - ${m.isValid ? '✅ Active' : '❌ Expired'}</div>`;
                    });
                    html += '<button onclick="showNameSearch()" style="margin-top:10px;">Try with Reg Number</button></div>';
                    document.getElementById('nameResult').innerHTML = html;
                } else {
                    showMessage('nameResult', `❌ No member found with name "${name}"`, 'error');
                }
            } catch(e) {
                showMessage('nameResult', 'Server error. Please try again.', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Search & Verify';
            }
        }
        
        async function displayMemberCard(containerId, member) {
            const isValid = member.isValid;
            const statusClass = isValid ? 'badge-active' : 'badge-expired';
            const statusText = isValid ? 'ACTIVE' : 'EXPIRED';
            const cardClass = isValid ? '' : 'expired';
            
            const status = await checkCurrentStatus(member.regNo);
            const isCheckedIn = status === 'checked-in';
            
            const html = `
                <div class="member-info ${cardClass}">
                    <div class="member-name">
                        ${escapeHtml(member.name)}
                        <span class="badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="detail-row">🆔 ${escapeHtml(member.regNo)}</div>
                    <div class="detail-row">📞 ${escapeHtml(member.phone) || 'N/A'}</div>
                    <div class="detail-row">📅 Valid until: ${escapeHtml(member.validity) || 'N/A'}</div>
                    <div class="detail-row">⏰ ${member.validityMessage || ''}</div>
                    ${isValid ? `<div class="action-buttons">
                        ${!isCheckedIn ? '<button class="btn-checkin" onclick="memberCheckIn()">✅ Check In</button>' : ''}
                        ${isCheckedIn ? '<button class="btn-checkout" onclick="memberCheckOut()">🚪 Check Out</button>' : ''}
                    </div>` : '<div style="color:#dc3545; margin-top:10px;">⚠️ Membership expired. Please renew.</div>'}
                </div>
            `;
            document.getElementById(containerId).innerHTML = html;
        }
        
        async function checkCurrentStatus(regNo) {
            try {
                const report = await callAPI('getTodayReport');
                if (report.activeMembers) {
                    const active = report.activeMembers.find(m => m.regNo === regNo);
                    return active ? 'checked-in' : 'not-checked-in';
                }
                return 'not-checked-in';
            } catch(e) { return 'not-checked-in'; }
        }
        
        async function memberCheckIn() {
            if (!currentMember) return;
            const result = await callAPI('memberCheckin', {
                regNo: currentMember.regNo,
                name: currentMember.name,
                phone: currentMember.phone,
                validity: currentMember.validity,
                timestamp: new Date().toISOString()
            });
            
            if (result.status === 'success') {
                showMessage(currentAction === 'regNo' ? 'regResult' : 'nameResult', result.message, 'success');
                if (currentAction === 'regNo') await verifyByRegNo();
                else await verifyByName();
                await loadTodayReport();
            } else {
                showMessage(currentAction === 'regNo' ? 'regResult' : 'nameResult', result.message || 'Check-in failed', result.status === 'warning' ? 'warning' : 'error');
            }
        }
        
        async function memberCheckOut() {
            if (!currentMember) return;
            const result = await callAPI('memberCheckout', {
                regNo: currentMember.regNo,
                name: currentMember.name,
                timestamp: new Date().toISOString()
            });
            
            if (result.status === 'success') {
                showMessage(currentAction === 'regNo' ? 'regResult' : 'nameResult', result.message, 'success');
                if (currentAction === 'regNo') await verifyByRegNo();
                else await verifyByName();
                await loadTodayReport();
            } else {
                showMessage(currentAction === 'regNo' ? 'regResult' : 'nameResult', result.message || 'Check-out failed', 'warning');
            }
        }
        
        async function guestCheckIn() {
            const name = document.getElementById('guestName').value.trim();
            const mobile = document.getElementById('guestMobile').value.trim();
            const purpose = document.getElementById('guestPurpose').value.trim();
            
            if (!name || !mobile) { showMessage('guestResult', 'Please enter Name and Mobile Number', 'error'); return; }
            if (!/^\d{10}$/.test(mobile)) { showMessage('guestResult', 'Please enter valid 10-digit mobile number', 'error'); return; }
            
            const btn = event.target;
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Processing...';
            
            const result = await callAPI('guestCheckin', {
                name: name,
                mobile: mobile,
                purpose: purpose || 'Visit',
                timestamp: new Date().toISOString()
            });
            
            if (result.status === 'success') {
                showMessage('guestResult', result.message, 'success');
                document.getElementById('guestName').value = '';
                document.getElementById('guestMobile').value = '';
                document.getElementById('guestPurpose').value = '';
                await loadTodayReport();
                if (confirm('Would you like to check out now?')) {
                    await guestCheckOut(name);
                }
            } else {
                showMessage('guestResult', 'Check-in failed: ' + result.message, 'error');
            }
            btn.disabled = false;
            btn.innerHTML = 'Guest Check-in';
        }
        
        async function guestCheckOut(name) {
            const result = await callAPI('guestCheckout', { name: name, timestamp: new Date().toISOString() });
            if (result.status === 'success') {
                showMessage('guestResult', result.message, 'success');
                await loadTodayReport();
            } else {
                showMessage('guestResult', result.message, 'warning');
            }
        }
        
        async function loadTodayReport() {
            try {
                const report = await callAPI('getTodayReport');
                if (report.status === 'success') {
                    let activeHtml = '', completedHtml = '', guestsHtml = '';
                    report.activeMembers.forEach(m => { activeHtml += `<div class="member-item"><span>👤 ${escapeHtml(m.name)}</span><span>⏰ ${m.checkIn}</span></div>`; });
                    report.completedMembers.forEach(m => { completedHtml += `<div class="member-item"><span>✅ ${escapeHtml(m.name)}</span><span>${m.checkIn} → ${m.checkOut}</span></div>`; });
                    report.guests.forEach(g => { guestsHtml += `<div class="member-item"><span>👋 ${escapeHtml(g.name)}</span><span>${g.status === 'ACTIVE' ? '⏰ ' + g.checkIn : '✅ Checked out'}</span></div>`; });
                    
                    document.getElementById('reportContent').innerHTML = `
                        <div class="report-stats">
                            <div class="stat"><div class="stat-number">${report.activeCount}</div><div class="stat-label">Currently Inside</div></div>
                            <div class="stat"><div class="stat-number">${report.completedCount}</div><div class="stat-label">Completed Today</div></div>
                            <div class="stat"><div class="stat-number">${report.guestCount}</div><div class="stat-label">Guest Visitors</div></div>
                        </div>
                        <div class="stat"><div class="stat-number">${report.totalVisitors}</div><div class="stat-label">Total Visitors Today</div></div>
                        ${report.activeCount > 0 ? `<h4>🟢 Currently Inside (${report.activeCount})</h4>${activeHtml}` : ''}
                        ${report.completedCount > 0 ? `<h4>✅ Completed (${report.completedCount})</h4>${completedHtml}` : ''}
                        ${report.guestCount > 0 ? `<h4>👋 Guests (${report.guestCount})</h4>${guestsHtml}` : ''}
                        ${report.totalVisitors === 0 ? '<p style="text-align:center; color:#666;">No visitors yet today</p>' : ''}
                    `;
                }
            } catch(e) { document.getElementById('reportContent').innerHTML = '<p>Error loading report</p>'; }
        }
        
        // Option selection
        document.querySelectorAll('.option-card').forEach(card => {
            card.addEventListener('click', () => {
                const option = card.dataset.option;
                currentAction = option;
                document.querySelectorAll('.form-container').forEach(form => form.classList.remove('active'));
                document.getElementById(`${option}Form`).classList.add('active');
                document.querySelectorAll('[id$="Result"]').forEach(el => el.innerHTML = '');
                if (option === 'qr') startQRScanner();
                else if (html5QrCode) stopQRScanner();
            });
        });
        
        function startQRScanner() {
            if (html5QrCode) { html5QrCode.stop().then(() => startNewScanner()).catch(() => startNewScanner()); }
            else { startNewScanner(); }
        }
        
        function startNewScanner() {
            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, 
                async (decodedText) => {
                    html5QrCode.stop();
                    const result = await callAPI('getMemberByReg', { regNo: decodedText });
                    if (result.status === 'found') {
                        currentMember = result;
                        displayMemberCard('qrResult', result);
                    } else {
                        document.getElementById('qrResult').innerHTML = `<div class="message error">❌ Not a valid member QR code.</div>`;
                    }
                }, (error) => { console.log("Scanning..."); });
        }
        
        function stopQRScanner() { if (html5QrCode) { html5QrCode.stop(); html5QrCode = null; } }
        function showNameSearch() { document.getElementById('nameInput').value = ''; document.getElementById('nameResult').innerHTML = ''; document.getElementById('nameInput').focus(); }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
        
        loadTodayReport();
        setInterval(loadTodayReport, 30000);
    </script>
</body>
</html>
