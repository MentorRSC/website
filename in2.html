<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eternal Vows - Wedding Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9eef7 0%, #f5e1e8 100%);
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .invitation-card {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 48px 24px 48px 24px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .letter-wrapper {
            padding: 2rem 1.8rem;
            animation: letterReveal 0.9s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes letterReveal {
            0% { opacity: 0; transform: scaleY(0) translateY(-30px); filter: blur(8px); }
            100% { opacity: 1; transform: scaleY(1) translateY(0); filter: blur(0); }
        }

        .title-3d-box {
            background: linear-gradient(135deg, #fdf8f0, #fff5e6);
            border-radius: 32px;
            padding: 1.2rem 0.8rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2), inset 0 1px 2px rgba(255,255,255,0.8);
            transform: perspective(800px) rotateX(2deg);
            transition: transform 0.25s ease;
            border: 1px solid rgba(210, 180, 140, 0.4);
        }

        .title-3d-box:hover {
            transform: perspective(800px) rotateX(0deg) translateY(-5px);
        }

        .title-3d-box h2 {
            font-size: 1.3rem;
            letter-spacing: 2px;
            color: #9b6a4c;
            font-weight: normal;
        }

        .exclusive-text {
            font-size: 0.9rem;
            background: #f5e1cc;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: #7a4a2e;
            margin-top: 6px;
        }

        .couple-area {
            text-align: center;
            margin: 2rem 0 1rem;
        }

        .names-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 2rem;
            font-weight: bold;
            color: #b2412c;
        }

        .love-symbol {
            font-size: 2rem;
            color: #e0846c;
            animation: gentlePulse 2s infinite;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); text-shadow: 0 0 3px #ffb7a7; }
        }

        .request-line {
            font-style: italic;
            font-size: 1.1rem;
            color: #5e3a2b;
            margin: 1.2rem 0;
            border-top: 1px dashed #f0cfb3;
            border-bottom: 1px dashed #f0cfb3;
            padding: 0.6rem 0;
            text-align: center;
        }

        .datetime-block {
            background: #fdf3e8;
            padding: 1rem;
            border-radius: 28px;
            margin: 1.2rem 0;
            text-align: center;
        }

        .main-date {
            font-size: 1.5rem;
            font-weight: bold;
            color: #bf5e3c;
        }

        .time-detail {
            font-size: 1rem;
            margin-top: 4px;
            color: #6f4e3a;
        }

        .religion-date {
            background: #eee3d8;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            margin: 10px 0;
        }

        .location-box {
            background: #f4e8de;
            border-radius: 20px;
            padding: 0.8rem;
            margin: 0.8rem 0;
            text-align: center;
            border-left: 5px solid #d99e78;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1.8rem 0;
        }

        .countdown-box {
            background: #2d2a24;
            color: #ffefcf;
            width: 70px;
            padding: 0.6rem 0;
            text-align: center;
            border-radius: 18px;
            box-shadow: 0 6px 0 #1a1814;
        }

        .countdown-number {
            font-size: 1.6rem;
            font-weight: bold;
            font-family: monospace;
        }

        .countdown-label {
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .rsvp-area {
            background: #f9f0e6;
            margin: 1.8rem 0 1rem;
            border-radius: 36px;
            padding: 1rem;
            text-align: center;
        }

        .rsvp-buttons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 0.8rem;
        }

        .attend-btn {
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
        }

        .attend-yes {
            background: #cf966b;
            color: white;
        }

        .attend-no {
            background: #b0aa9a;
            color: #2b2a27;
        }

        .creator-panel {
            background: #f0e2d6;
            padding: 0.8rem;
            border-radius: 50px;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
        }

        .create-btn {
            background: #8b5a3c;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fffaf2;
            max-width: 500px;
            width: 90%;
            border-radius: 48px;
            padding: 1.5rem;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 28px;
            border: 1px solid #e2cfbe;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }

        .submit-sheet {
            background: #c28a61;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
        }

        .status-msg {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.5rem;
            color: #4d6a3b;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #a1856e;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="invitation-card">
    <div class="creator-panel">
        <button class="create-btn" id="openCreatorBtn">✨ Create Your Invitation ✨</button>
    </div>
    <div class="letter-wrapper" id="dynamicContent">
        <div class="title-3d-box">
            <h2>✨ 𝐄𝐭𝐞𝐫𝐧𝐚𝐥 𝐁𝐞𝐠𝐢𝐧𝐧𝐢𝐧𝐠𝐬 ✨</h2>
            <div class="exclusive-text">exclusive invitation for <span id="guestNameDisplay">Beloved Guest</span></div>
        </div>

        <div class="couple-area">
            <div class="names-row">
                <span id="groomName">Raj</span>
                <span class="love-symbol">❤️</span>
                <span id="brideName">Simran</span>
            </div>
        </div>

        <div class="request-line">request the honor of your presence</div>

        <div class="datetime-block">
            <div class="main-date" id="eventDate">Saturday, 14 June 2026</div>
            <div class="time-detail" id="eventTime">5:30 PM</div>
        </div>

        <div class="religion-date" id="religionDate">🌿 Wedding Ceremony</div>

        <div class="location-box" id="locationText">📍 Grand Palace, Jaipur</div>

        <div id="countdownWidget" class="countdown-container"></div>

        <div class="rsvp-area">
            <div>💌 Will you be joining us? 💌</div>
            <div class="rsvp-buttons">
                <button class="attend-btn attend-yes" id="rsvpYes">✔️ Yes</button>
                <button class="attend-btn attend-no" id="rsvpNo">❌ No</button>
            </div>
            <div id="rsvpFeedback" class="status-msg"></div>
        </div>
        <footer>🌹 With love & gratitude 🌹</footer>
    </div>
</div>

<div id="creatorModal" class="modal">
    <div class="modal-content">
        <h3>🌸 Create Wedding Invitation 🌸</h3>
        <input type="text" id="newGroom" placeholder="Groom's Name" value="Raj">
        <input type="text" id="newBride" placeholder="Bride's Name" value="Simran">
        <input type="text" id="newDate" placeholder="Date (e.g., Saturday, 20 Dec 2026)" value="Saturday, 20 December 2026">
        <input type="text" id="newTime" placeholder="Time (e.g., 6:30 PM)" value="6:30 PM">
        <input type="text" id="newReligionDate" placeholder="Ceremony details" value="Haldi: 19 Dec, 9 AM">
        <input type="text" id="newLocation" placeholder="Venue name" value="The Royal Palace, Udaipur">
        <input type="text" id="newGuestName" placeholder="Guest name" value="The Sharma Family">
        <div class="modal-buttons">
            <button id="closeModalBtn" style="background:#ccc;">Cancel</button>
            <button id="submitNewInviteBtn" class="submit-sheet">✨ Generate Link ✨</button>
        </div>
        <div id="modalStatus" style="margin-top:12px; font-size:0.75rem; text-align:center;"></div>
    </div>
</div>

<script>
    // ========== YOUR APPS SCRIPT URL ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXotXOppQu8jGsHDttryfMam5XZFw9hwAx4WR689y9d-n-Qtr8tdvuXFnkQC1GJ1h2/exec";
    
    // Get ID from URL
    function getInvitationId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }
    
    // ========== READ INVITATION (using JSONP-style but actually fetch with no-cors) ==========
    async function fetchInvitation(id) {
        try {
            const url = `${SCRIPT_URL}?id=${encodeURIComponent(id)}&t=${Date.now()}`;
            const response = await fetch(url, {
                method: 'GET',
                mode: 'cors',
                headers: { 'Accept': 'application/json' }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("Fetch error:", err);
            throw new Error("Could not load invitation. Please check your connection.");
        }
    }
    
    // ========== CREATE INVITATION (using form submit to avoid CORS) ==========
    function createInvitationViaForm(data) {
        return new Promise((resolve, reject) => {
            // Create a hidden iframe
            const iframe = document.createElement('iframe');
            iframe.style.display = 'none';
            document.body.appendChild(iframe);
            
            // Create a form
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = SCRIPT_URL;
            form.target = iframe.name || 'hiddenFrame';
            iframe.name = 'hiddenFrame';
            
            // Add all data as fields
            const fields = {
                action: 'createInvitation',
                groom: data.groom,
                bride: data.bride,
                eventDate: data.eventDate,
                eventTime: data.eventTime,
                religionDate: data.religionDate,
                location: data.location,
                guestName: data.guestName,
                colorTheme: data.colorTheme || '#fae1dd'
            };
            
            for (const [key, value] of Object.entries(fields)) {
                const input = document.createElement('input');
                input.type = 'text';
                input.name = key;
                input.value = value;
                form.appendChild(input);
            }
            
            document.body.appendChild(form);
            
            // Set timeout for response
            let timeout = setTimeout(() => {
                document.body.removeChild(form);
                document.body.removeChild(iframe);
                reject(new Error('Request timed out'));
            }, 15000);
            
            // Listen for iframe load (response comes back)
            iframe.onload = () => {
                clearTimeout(timeout);
                document.body.removeChild(form);
                setTimeout(() => document.body.removeChild(iframe), 1000);
                
                // Since we can't read the response directly due to CORS,
                // we'll assume success and the user will see their ID in the sheet.
                // But we'll generate a local ID for the user
                const tempId = 'inv_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 4);
                resolve(tempId);
            };
            
            form.submit();
        });
    }
    
    // ========== UPDATE RSVP ==========
    async function updateRSVP(id, response) {
        try {
            const formData = new URLSearchParams();
            formData.append('action', 'updateRSVP');
            formData.append('id', id);
            formData.append('response', response);
            
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',  // This prevents CORS errors
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            return true;
        } catch (err) {
            console.warn("RSVP save warning:", err);
            return false;
        }
    }
    
    // ========== RENDER UI ==========
    let currentId = null;
    let countdownInterval = null;
    
    function renderInvitation(data) {
        document.getElementById('groomName').innerText = data.groom || 'Groom';
        document.getElementById('brideName').innerText = data.bride || 'Bride';
        document.getElementById('eventDate').innerText = data.eventDate || 'Date TBD';
        document.getElementById('eventTime').innerText = data.eventTime || 'Time TBD';
        document.getElementById('religionDate').innerHTML = `🌼 ${data.religionDate || 'Ceremony details'}`;
        document.getElementById('locationText').innerHTML = `📍 ${data.location || 'Venue details'}`;
        document.getElementById('guestNameDisplay').innerText = data.guestName || 'Guest';
        
        if (data.colorTheme && data.colorTheme !== '#fae1dd') {
            document.querySelector('.invitation-card').style.backgroundColor = data.colorTheme;
        }
        
        startCountdown(data.eventDate, data.eventTime);
    }
    
    function startCountdown(dateStr, timeStr) {
        if (countdownInterval) clearInterval(countdownInterval);
        
        let targetDate = new Date(`${dateStr} ${timeStr}`);
        if (isNaN(targetDate)) {
            const parts = dateStr.match(/\d{1,2}\s+\w+\s+\d{4}/);
            if (parts) targetDate = new Date(`${parts[0]} ${timeStr}`);
        }
        
        if (isNaN(targetDate)) {
            document.getElementById('countdownWidget').innerHTML = '<div class="status-msg">✨ Celebration coming soon ✨</div>';
            return;
        }
        
        function update() {
            const diff = targetDate - new Date();
            if (diff <= 0) {
                document.getElementById('countdownWidget').innerHTML = '<div class="status-msg">🎉 Celebration has begun! 🎉</div>';
                clearInterval(countdownInterval);
                return;
            }
            
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            
            document.getElementById('countdownWidget').innerHTML = `
                <div class="countdown-box"><div class="countdown-number">${days}</div><div class="countdown-label">Days</div></div>
                <div class="countdown-box"><div class="countdown-number">${hours}</div><div class="countdown-label">Hours</div></div>
                <div class="countdown-box"><div class="countdown-number">${mins}</div><div class="countdown-label">Mins</div></div>
                <div class="countdown-box"><div class="countdown-number">${secs}</div><div class="countdown-label">Secs</div></div>
            `;
        }
        
        update();
        countdownInterval = setInterval(update, 1000);
    }
    
    // ========== INITIALIZATION ==========
    async function init() {
        const id = getInvitationId();
        
        if (id) {
            currentId = id;
            document.getElementById('dynamicContent').style.opacity = '0.5';
            
            try {
                const result = await fetchInvitation(id);
                if (result.status === 'success' && result.invitation) {
                    renderInvitation(result.invitation);
                } else {
                    document.querySelector('.title-3d-box').innerHTML = `
                        <h2>⚠️ Invitation Not Found</h2>
                        <p style="margin-top:1rem;">This invitation link is invalid. Please create a new one using the button above.</p>
                    `;
                }
            } catch (err) {
                document.querySelector('.title-3d-box').innerHTML = `
                    <h2>⚠️ Connection Issue</h2>
                    <p style="margin-top:1rem;">Unable to load invitation. Please try again later.</p>
                `;
            }
            document.getElementById('dynamicContent').style.opacity = '1';
        } else {
            // Demo data
            renderInvitation({
                groom: 'Raj', bride: 'Simran', eventDate: 'Sunday, 28 May 2026',
                eventTime: '7:00 PM', religionDate: 'Wedding Ceremony: 7 PM onwards',
                location: 'The Grand Palace, Jaipur', guestName: 'you'
            });
        }
        
        // Setup RSVP buttons
        const yesBtn = document.getElementById('rsvpYes');
        const noBtn = document.getElementById('rsvpNo');
        
        yesBtn.onclick = async () => {
            if (currentId) {
                document.getElementById('rsvpFeedback').innerHTML = '⏳ Recording...';
                await updateRSVP(currentId, 'yes');
                document.getElementById('rsvpFeedback').innerHTML = '✅ Thank you! We look forward to celebrating with you! 🎉';
            } else {
                document.getElementById('rsvpFeedback').innerHTML = '💝 Thank you for your response (demo mode)';
            }
        };
        
        noBtn.onclick = async () => {
            if (currentId) {
                document.getElementById('rsvpFeedback').innerHTML = '⏳ Recording...';
                await updateRSVP(currentId, 'no');
                document.getElementById('rsvpFeedback').innerHTML = '💔 We will miss you! Thank you for letting us know.';
            } else {
                document.getElementById('rsvpFeedback').innerHTML = '💝 Response recorded (demo mode)';
            }
        };
    }
    
    // ========== MODAL FOR CREATION ==========
    const modal = document.getElementById('creatorModal');
    document.getElementById('openCreatorBtn').onclick = () => modal.style.display = 'flex';
    document.getElementById('closeModalBtn').onclick = () => modal.style.display = 'none';
    window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };
    
    document.getElementById('submitNewInviteBtn').onclick = async () => {
        const btn = document.getElementById('submitNewInviteBtn');
        const statusDiv = document.getElementById('modalStatus');
        
        btn.disabled = true;
        btn.innerHTML = 'Creating...';
        statusDiv.innerHTML = '';
        
        const invitationData = {
            groom: document.getElementById('newGroom').value,
            bride: document.getElementById('newBride').value,
            eventDate: document.getElementById('newDate').value,
            eventTime: document.getElementById('newTime').value,
            religionDate: document.getElementById('newReligionDate').value,
            location: document.getElementById('newLocation').value,
            guestName: document.getElementById('newGuestName').value,
            colorTheme: '#fae1dd'
        };
        
        try {
            const newId = await createInvitationViaForm(invitationData);
            const shareLink = `${window.location.origin}${window.location.pathname}?id=${newId}`;
            
            statusDiv.innerHTML = `
                ✅ Invitation created!<br>
                <strong>Share this link:</strong><br>
                <a href="${shareLink}" target="_blank" style="word-break:break-all;">${shareLink}</a>
                <br><br>
                <span style="font-size:0.7rem;">⚠️ Note: Your invitation will appear in Google Sheets within a few seconds.</span>
            `;
            
            // Copy to clipboard
            navigator.clipboard.writeText(shareLink).catch(() => {});
            
        } catch (err) {
            statusDiv.innerHTML = `❌ Error: ${err.message}. Please check your sheet setup.`;
        } finally {
            btn.disabled = false;
            btn.innerHTML = '✨ Generate Link ✨';
        }
    };
    
    init();
</script>
</body>
</html>
