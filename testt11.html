<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Project Explorer | Dropdown Viewer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4361ee;
            --primary-dark: #3a0ca3;
            --accent: #f72585;
            --success: #4cc9f0;
            --dark: #1e293b;
            --light: #f8fafc;
            --text: #334155;
            --border: #e2e8f0;
            --completed: #10b981;
            --ongoing: #f59e0b;
            --planning: #8b5cf6;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f1f5f9 0%, #e6edf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text);
        }

        /* Main widget container - clean standalone interface */
        .explorer-widget {
            max-width: 680px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* hero section inside widget (compact) */
        .widget-hero {
            background: linear-gradient(115deg, var(--primary), var(--primary-dark));
            padding: 1.8rem 2rem;
            color: white;
            text-align: center;
        }

        .widget-hero i {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: inline-block;
        }

        .widget-hero h2 {
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .widget-hero p {
            opacity: 0.9;
            margin-top: 0.4rem;
            font-size: 0.9rem;
        }

        /* dropdown panel area */
        .dropdown-panel {
            padding: 1.8rem 2rem 2rem;
        }

        /* search + filter row */
        .search-section {
            margin-bottom: 1.5rem;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--light);
            border-radius: 60px;
            padding: 0.7rem 1.2rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15);
        }

        .search-box i {
            color: #94a3b8;
            margin-right: 0.7rem;
            font-size: 1rem;
        }

        .search-box input {
            border: none;
            background: transparent;
            width: 100%;
            outline: none;
            font-size: 0.95rem;
            font-weight: 500;
        }

        .filter-row {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .filter-select {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            background: white;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--dark);
            transition: 0.2s;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* stats mini bar */
        .stats-mini {
            background: #f8fafc;
            border-radius: 1.2rem;
            padding: 0.9rem 1rem;
            margin-bottom: 1.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.8rem;
            border: 1px solid var(--border);
        }

        .stat-badge {
            background: white;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
        }

        .stat-badge i {
            margin-right: 0.4rem;
            color: var(--primary);
        }

        /* custom dropdown (styled select) */
        .project-selector {
            margin-bottom: 1.5rem;
        }

        .dropdown-label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            color: var(--dark);
        }

        .custom-select {
            position: relative;
            width: 100%;
        }

        .select-trigger {
            background: white;
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            padding: 0.9rem 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }

        .select-trigger:hover {
            border-color: var(--primary);
            background: #fefefe;
        }

        .select-trigger span {
            color: var(--dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .select-trigger i {
            color: #94a3b8;
            transition: transform 0.2s;
        }

        .dropdown-options {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 1.2rem;
            max-height: 280px;
            overflow-y: auto;
            z-index: 100;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.12);
            display: none;
            list-style: none;
            padding: 0.5rem 0;
        }

        .dropdown-options.show {
            display: block;
        }

        .dropdown-option {
            padding: 0.75rem 1.2rem;
            cursor: pointer;
            transition: background 0.15s;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
        }

        .dropdown-option:last-child {
            border-bottom: none;
        }

        .dropdown-option:hover {
            background: #eef2ff;
        }

        .option-title {
            font-weight: 500;
            color: var(--dark);
        }

        .option-badge {
            font-size: 0.7rem;
            background: #e2e8f0;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            color: #1e293b;
        }

        /* DETAIL CARD - clean project details panel */
        .project-detail-card {
            background: var(--light);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            overflow: hidden;
            margin-top: 1rem;
            transition: 0.2s;
        }

        .detail-header {
            background: white;
            padding: 1.2rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .detail-header h3 {
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .status-chip {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            background: #e2e8f0;
        }

        .status-completed { background: var(--completed); color: white; }
        .status-ongoing { background: var(--ongoing); color: white; }
        .status-planning { background: var(--planning); color: white; }

        .detail-body {
            padding: 1.5rem;
        }

        .info-row {
            display: flex;
            margin-bottom: 1rem;
            align-items: flex-start;
            gap: 0.8rem;
            flex-wrap: wrap;
        }

        .info-icon {
            width: 28px;
            color: var(--primary);
            font-size: 1rem;
            margin-top: 0.1rem;
        }

        .info-content {
            flex: 1;
            font-size: 0.9rem;
            line-height: 1.45;
            color: var(--text);
        }

        .info-content strong {
            color: var(--dark);
        }

        .progress-wrapper {
            margin: 1rem 0;
        }

        .progress-bar-bg {
            background: #e2e8f0;
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            margin-top: 0.3rem;
        }

        .progress-fill {
            background: var(--success);
            height: 100%;
            width: 0%;
            border-radius: 20px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }

        .tag {
            background: #eef2ff;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 500;
        }

        .members-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.3rem;
        }

        .member-badge {
            background: white;
            padding: 0.2rem 0.7rem;
            border-radius: 30px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }

        .action-links {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.2rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            text-decoration: none;
            transition: 0.2s;
            background: white;
            border: 1px solid var(--border);
            color: var(--dark);
        }

        .action-btn i {
            font-size: 0.9rem;
        }

        .action-btn.primary-btn {
            background: var(--primary);
            border: none;
            color: white;
        }

        .action-btn.primary-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .action-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .empty-state {
            text-align: center;
            padding: 2rem 1rem;
            color: #64748b;
        }

        .loading-indicator {
            text-align: center;
            padding: 2rem;
        }

        hr {
            margin: 0.5rem 0;
            border-color: var(--border);
        }

        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .dropdown-panel {
                padding: 1.2rem;
            }
            .widget-hero {
                padding: 1.2rem;
            }
        }
    </style>
</head>
<body>
<div class="explorer-widget">
    <div class="widget-hero">
        <i class="fas fa-microscope"></i>
        <h2>Project Explorer</h2>
        <p>Browse innovation projects — powered by live data</p>
    </div>
    <div class="dropdown-panel">
        <!-- search + filters -->
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by name, team, or description...">
            </div>
            <div class="filter-row">
                <select id="statusFilter" class="filter-select">
                    <option value="all">All Status</option>
                    <option value="completed">Completed</option>
                    <option value="ongoing">In Progress</option>
                    <option value="planning">Planning</option>
                </select>
                <select id="categoryFilter" class="filter-select">
                    <option value="all">All Categories</option>
                    <option value="Web Development">Web Dev</option>
                    <option value="Chemistry">Chemistry</option>
                    <option value="Education">Education</option>
                    <option value="AI/ML">AI/ML</option>
                    <option value="Environment">Environment</option>
                    <option value="Robotics">Robotics</option>
                </select>
            </div>
        </div>

        <!-- mini stats -->
        <div class="stats-mini" id="statsMini">
            <span class="stat-badge"><i class="fas fa-layer-group"></i> <span id="statTotal">0</span> projects</span>
            <span class="stat-badge"><i class="fas fa-check-circle"></i> <span id="statCompleted">0</span> done</span>
            <span class="stat-badge"><i class="fas fa-chart-line"></i> <span id="statOngoing">0</span> in progress</span>
        </div>

        <!-- Custom Dropdown (styled combobox) -->
        <div class="project-selector">
            <div class="dropdown-label">
                <i class="fas fa-chevron-circle-down"></i> Select project from list
            </div>
            <div class="custom-select" id="customSelect">
                <div class="select-trigger" id="selectTrigger">
                    <span id="selectedProjectName">— Choose a project —</span>
                    <i class="fas fa-angle-down"></i>
                </div>
                <ul class="dropdown-options" id="dropdownOptions"></ul>
            </div>
        </div>

        <!-- dynamic detail panel: shows selected project info -->
        <div id="detailPanel" class="project-detail-card">
            <div class="detail-header">
                <h3><i class="fas fa-info-circle"></i> Project Snapshot</h3>
                <div style="font-size:0.75rem; color:#64748b;">Pick a project from the dropdown</div>
            </div>
            <div class="detail-body" id="detailBody">
                <div class="empty-state">
                    <i class="fas fa-folder-open" style="font-size: 2rem; opacity: 0.5;"></i>
                    <p style="margin-top: 0.6rem;">No project selected. Use the dropdown to view details.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Google Sheet Config (reading data from column 2 onward, exactly as original)
    const SHEET_ID = '1kAdm80nruqyRdq_vl94_TvAGdq5nslAfrymIL1zwxhM';
    const SHEET_NAME = 'Sheet1';
    const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

    let projects = [];           // full array of projects
    let filteredProjects = [];   // filtered list based on search/status/category
    let currentSearch = '';
    let currentStatus = 'all';
    let currentCategory = 'all';

    // Helper functions (compatible with original column mapping)
    function parseMembers(str) { 
        if (!str) return []; 
        try { 
            let arr = JSON.parse(str); 
            if(Array.isArray(arr)) return arr; 
            else return [str]; 
        } catch(e) { 
            return str.split(/[,;]/).map(s=>s.trim()).filter(s=>s); 
        } 
    }
    function parseTags(str) { 
        if (!str) return []; 
        try { 
            let arr = JSON.parse(str); 
            if(Array.isArray(arr)) return arr; 
            else return [str]; 
        } catch(e) { 
            return str.split(/[,;]/).map(s=>s.trim()).filter(s=>s); 
        } 
    }
    function parseAchievements(str) { 
        if (!str) return []; 
        try { 
            let arr = JSON.parse(str); 
            return Array.isArray(arr)?arr:[str]; 
        } catch(e) { 
            return str.split(/[,;]/).map(s=>s.trim()); 
        } 
    }

    // fetch data from spreadsheet - columns starting from column 2 (index 1 in zero-based)
    async function fetchProjects() {
        const detailBody = document.getElementById('detailBody');
        if(detailBody) detailBody.innerHTML = `<div class="loading-indicator"><i class="fas fa-spinner fa-spin"></i> Loading project data...</div>`;
        try {
            const resp = await fetch(SHEET_URL);
            if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const text = await resp.text();
            const json = JSON.parse(text.substring(47, text.length-2));
            const rows = json.table.rows;
            if(!rows || rows.length < 2) {
                projects = [];
            } else {
                // Map columns according to original schema: 
                // col0: ID (optional), col1: Project Name, col2: Category, col3: Description, col4: StartDate, col5: EndDate,
                // col6: Members, col7: Status, col8: Progress, col9: Budget, col10: Priority, col11: Resources, col12: Milestones,
                // col13: Results, col14: Achievements, col15: CompletionDate, col16: Rating, col17: Tags, col18: DetailsLink, col19: GitHubLink, col20: TeamName
                const rawProjects = rows.slice(1).map((row, idx) => {
                    const c = row.c || [];
                    return {
                        id: c[0]?.v ?? idx+1,
                        name: c[1]?.v ?? 'Unnamed Project',
                        category: c[2]?.v ?? 'General',
                        description: c[3]?.v ?? '',
                        startDate: c[4]?.v ?? '',
                        endDate: c[5]?.v ?? '',
                        members: parseMembers(c[6]?.v),
                        status: (c[7]?.v ?? 'planning').toLowerCase(),
                        progress: c[8]?.v ? parseInt(c[8].v) : 0,
                        budget: c[9]?.v ? parseFloat(c[9].v) : 0,
                        priority: c[10]?.v ?? 'medium',
                        resources: c[11]?.v ?? '',
                        milestones: c[12]?.v ?? '',
                        results: c[13]?.v ?? '',
                        achievements: parseAchievements(c[14]?.v),
                        completionDate: c[15]?.v ?? '',
                        rating: c[16]?.v ? parseFloat(c[16].v) : 0,
                        tags: parseTags(c[17]?.v),
                        detailsLink: c[18]?.v ?? '#',
                        githubLink: c[19]?.v ?? '#',
                        teamName: c[20]?.v ?? ''
                    };
                });
                projects = rawProjects.filter(p => p.name && p.name.trim().length > 0);
            }
            applyFiltersAndRefresh();
        } catch(err) {
            console.error("Sheet fetch error:", err);
            projects = [];
            applyFiltersAndRefresh();
            const detailContainer = document.getElementById('detailBody');
            if(detailContainer) detailContainer.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>⚠️ Could not load data. Make sure sheet is public.<br>Using empty fallback.</p></div>`;
        }
    }

    // apply filters and update dropdown + stats + clear selection
    function applyFiltersAndRefresh() {
        // filter based on search, status, category
        filteredProjects = projects.filter(proj => {
            const matchSearch = currentSearch === '' || 
                proj.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                (proj.description && proj.description.toLowerCase().includes(currentSearch.toLowerCase())) ||
                (proj.teamName && proj.teamName.toLowerCase().includes(currentSearch.toLowerCase()));
            const matchStatus = currentStatus === 'all' || proj.status === currentStatus;
            const matchCat = currentCategory === 'all' || proj.category === currentCategory;
            return matchSearch && matchStatus && matchCat;
        });
        
        // update stats
        const total = filteredProjects.length;
        const completed = filteredProjects.filter(p => p.status === 'completed').length;
        const ongoing = filteredProjects.filter(p => p.status === 'ongoing').length;
        document.getElementById('statTotal').innerText = total;
        document.getElementById('statCompleted').innerText = completed;
        document.getElementById('statOngoing').innerText = ongoing;
        
        // populate dropdown options
        renderDropdownOptions();
        
        // reset selected project display and detail panel to placeholder
        const selectedSpan = document.getElementById('selectedProjectName');
        if(selectedSpan) selectedSpan.innerText = '— Choose a project —';
        const detailBodyDiv = document.getElementById('detailBody');
        if(detailBodyDiv) {
            detailBodyDiv.innerHTML = `<div class="empty-state"><i class="fas fa-folder-open" style="font-size: 2rem; opacity: 0.5;"></i><p style="margin-top: 0.6rem;">No project selected. Use the dropdown to view details.</p></div>`;
        }
        // close dropdown if open
        closeDropdown();
    }

    // Render custom dropdown options from filteredProjects
    function renderDropdownOptions() {
        const optionsContainer = document.getElementById('dropdownOptions');
        if(!optionsContainer) return;
        if(filteredProjects.length === 0) {
            optionsContainer.innerHTML = `<li class="dropdown-option" style="justify-content:center; color:#94a3b8;">✨ No matching projects</li>`;
            return;
        }
        optionsContainer.innerHTML = filteredProjects.map(proj => {
            let statusShort = proj.status === 'completed' ? '✓' : (proj.status === 'ongoing' ? '⚡' : '📋');
            let statusText = proj.status === 'completed' ? 'Done' : (proj.status === 'ongoing' ? 'Active' : 'Plan');
            return `
                <li class="dropdown-option" data-project-id="${proj.id}">
                    <span class="option-title">${escapeHtml(proj.name)}</span>
                    <span class="option-badge">${statusShort} ${statusText}</span>
                </li>
            `;
        }).join('');
        
        // attach click event to each option
        document.querySelectorAll('.dropdown-option[data-project-id]').forEach(option => {
            option.removeEventListener('click', handleOptionClick);
            option.addEventListener('click', handleOptionClick);
        });
    }
    
    function handleOptionClick(e) {
        const li = e.currentTarget;
        const projId = li.getAttribute('data-project-id');
        const project = filteredProjects.find(p => String(p.id) === projId);
        if(project) {
            updateSelectedProject(project);
        }
        closeDropdown();
    }
    
    function updateSelectedProject(project) {
        const selectedSpan = document.getElementById('selectedProjectName');
        if(selectedSpan) selectedSpan.innerText = project.name;
        renderProjectDetails(project);
    }
    
    function renderProjectDetails(project) {
        const detailBodyDiv = document.getElementById('detailBody');
        if(!detailBodyDiv) return;
        
        const statusClass = project.status === 'completed' ? 'status-completed' : (project.status === 'ongoing' ? 'status-ongoing' : 'status-planning');
        const statusText = project.status === 'completed' ? 'Completed' : (project.status === 'ongoing' ? 'In Progress' : 'Planning');
        const ratingStars = project.rating > 0 ? project.rating.toFixed(1) + ' / 5' : 'Not rated';
        
        const membersHtml = (project.members && project.members.length) ? 
            `<div class="members-list">${project.members.map(m => `<span class="member-badge">${escapeHtml(m)}</span>`).join('')}</div>` : 
            `<span style="font-size:0.85rem;">— No members listed —</span>`;
        
        const tagsHtml = (project.tags && project.tags.length) ? 
            `<div class="tags-container">${project.tags.map(t => `<span class="tag">#${escapeHtml(t)}</span>`).join('')}</div>` : '';
        
        const achievementsHtml = (project.achievements && project.achievements.length) ? 
            `<ul style="margin-left: 1.2rem; margin-top: 0.3rem;">${project.achievements.map(a => `<li style="margin-bottom: 0.2rem;"><i class="fas fa-trophy" style="color:#f59e0b; width:1rem;"></i> ${escapeHtml(a)}</li>`).join('')}</ul>` : 
            `<span>— No achievements recorded —</span>`;
        
        const progressPercent = project.progress || 0;
        
        detailBodyDiv.innerHTML = `
            <div class="detail-header" style="background: transparent; padding: 0 0 0.5rem 0; border-bottom: 1px solid var(--border); margin-bottom: 1rem;">
                <h3 style="font-size:1.35rem;">${escapeHtml(project.name)} <span class="status-chip ${statusClass}">${statusText}</span></h3>
                ${project.teamName ? `<div style="margin-top: 0.25rem;"><i class="fas fa-users"></i> Team: ${escapeHtml(project.teamName)}</div>` : ''}
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-align-left"></i></div>
                <div class="info-content"><strong>Description</strong><br>${escapeHtml(project.description || 'No description provided.')}</div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-tag"></i></div>
                <div class="info-content"><strong>Category</strong><br>${escapeHtml(project.category)} • Priority: ${escapeHtml(project.priority)}</div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-chart-simple"></i></div>
                <div class="info-content">
                    <strong>Progress</strong>
                    <div class="progress-wrapper">
                        <div style="display: flex; justify-content: space-between;"><span>${progressPercent}%</span><span>Completion</span></div>
                        <div class="progress-bar-bg"><div class="progress-fill" style="width: ${progressPercent}%;"></div></div>
                    </div>
                </div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-calendar-alt"></i></div>
                <div class="info-content"><strong>Timeline</strong><br>Start: ${formatDate(project.startDate)} | End: ${formatDate(project.endDate)}<br>Completion: ${formatDate(project.completionDate)}</div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-users"></i></div>
                <div class="info-content"><strong>Members / Contributors</strong><br>${membersHtml}</div>
            </div>
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-star"></i></div>
                <div class="info-content"><strong>Rating & Achievements</strong><br>⭐ ${ratingStars}<br>${achievementsHtml}</div>
            </div>
            ${project.resources ? `<div class="info-row"><div class="info-icon"><i class="fas fa-cogs"></i></div><div class="info-content"><strong>Resources</strong><br>${escapeHtml(project.resources)}</div></div>` : ''}
            ${project.milestones ? `<div class="info-row"><div class="info-icon"><i class="fas fa-flag-checkered"></i></div><div class="info-content"><strong>Milestones</strong><br>${escapeHtml(project.milestones)}</div></div>` : ''}
            ${project.results ? `<div class="info-row"><div class="info-icon"><i class="fas fa-chart-line"></i></div><div class="info-content"><strong>Results / Outcomes</strong><br>${escapeHtml(project.results)}</div></div>` : ''}
            <div class="info-row">
                <div class="info-icon"><i class="fas fa-coins"></i></div>
                <div class="info-content"><strong>Budget</strong><br>${project.budget ? `₹${project.budget.toLocaleString()}` : 'Not specified'}</div>
            </div>
            ${tagsHtml ? `<div class="info-row"><div class="info-icon"><i class="fas fa-hashtag"></i></div><div class="info-content"><strong>Tags</strong>${tagsHtml}</div></div>` : ''}
            <div class="action-links">
                <a href="${project.detailsLink && project.detailsLink !== '#' ? project.detailsLink : '#'}" target="_blank" class="action-btn primary-btn" ${(!project.detailsLink || project.detailsLink === '#') ? 'style="opacity:0.6; pointer-events:none;"' : ''}><i class="fas fa-globe"></i> Live Site</a>
                <a href="${project.githubLink && project.githubLink !== '#' ? project.githubLink : '#'}" target="_blank" class="action-btn" ${(!project.githubLink || project.githubLink === '#') ? 'style="opacity:0.6; pointer-events:none;"' : ''}><i class="fab fa-github"></i> GitHub</a>
            </div>
        `;
    }
    
    // Helper utilities
    function escapeHtml(str) {
        if(!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    function formatDate(dateStr) {
        if(!dateStr) return 'TBD';
        try {
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr;
            return d.toLocaleDateString('en-IN');
        } catch(e) { return dateStr; }
    }
    
    // dropdown open/close logic
    function closeDropdown() {
        const optionsDiv = document.getElementById('dropdownOptions');
        if(optionsDiv) optionsDiv.classList.remove('show');
    }
    
    function toggleDropdown() {
        const optionsDiv = document.getElementById('dropdownOptions');
        if(optionsDiv) {
            optionsDiv.classList.toggle('show');
        }
    }
    
    // event listeners
    document.getElementById('selectTrigger')?.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleDropdown();
    });
    
    document.addEventListener('click', function(e) {
        const container = document.getElementById('customSelect');
        if(container && !container.contains(e.target)) {
            closeDropdown();
        }
    });
    
    document.getElementById('searchInput')?.addEventListener('input', (e) => {
        currentSearch = e.target.value;
        applyFiltersAndRefresh();
    });
    document.getElementById('statusFilter')?.addEventListener('change', (e) => {
        currentStatus = e.target.value;
        applyFiltersAndRefresh();
    });
    document.getElementById('categoryFilter')?.addEventListener('change', (e) => {
        currentCategory = e.target.value;
        applyFiltersAndRefresh();
    });
    
    // initial load
    fetchProjects();
</script>
</body>
</html>
