<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Cinzel:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5a3;
            --gold-dark: #9a7040;
            --cream: #faf6ef;
            --cream-deep: #f2ead9;
            --ink: #2c2118;
            --ink-mid: #5a4030;
            --ink-light: #8b6f5a;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, var(--cream-deep) 0%, #e8dfd1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .invitation-card {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            position: relative;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .invitation-card::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 1px solid rgba(201,169,110,0.3);
            pointer-events: none;
            border-radius: 2px;
        }

        .content {
            padding: 50px 40px;
            text-align: center;
        }

        .ornament {
            font-size: 1.5rem;
            color: var(--gold);
            letter-spacing: 0.3em;
            margin-bottom: 1rem;
        }

        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.1em;
            color: var(--ink);
            margin-bottom: 0.5rem;
        }

        .couple {
            font-size: 2.5rem;
            font-weight: 300;
            color: var(--ink);
            margin: 1rem 0;
        }

        .divider {
            width: 80px;
            height: 1px;
            background: var(--gold);
            margin: 1.5rem auto;
        }

        .guest-name {
            font-size: 1.3rem;
            font-style: italic;
            color: var(--ink-light);
            margin: 1rem 0;
        }

        .details {
            background: var(--cream);
            padding: 1.8rem;
            margin: 1.8rem 0;
            border-radius: 4px;
        }

        .date {
            font-size: 1.4rem;
            font-weight: 500;
            color: var(--ink);
        }

        .time {
            font-size: 1.1rem;
            color: var(--ink-mid);
            margin-top: 0.3rem;
        }

        .location {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.8rem;
            color: var(--gold-dark);
        }

        .rsvp-section {
            margin-top: 2rem;
        }

        .rsvp-section h3 {
            font-family: 'Cinzel', serif;
            color: var(--ink);
            margin-bottom: 1rem;
        }

        .rsvp-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .btn {
            padding: 0.8rem 2rem;
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            border: 1px solid;
            transition: all 0.3s;
        }

        .btn-yes {
            background: var(--ink);
            color: var(--gold-light);
            border-color: var(--ink);
        }

        .btn-yes:hover {
            background: var(--ink-mid);
            transform: translateY(-2px);
        }

        .btn-no {
            background: transparent;
            color: var(--ink-light);
            border-color: var(--gold);
        }

        .btn-no:hover {
            border-color: var(--ink-mid);
            color: var(--ink);
        }

        .message {
            margin-top: 1rem;
            padding: 0.8rem;
            border-radius: 4px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }

        footer {
            margin-top: 2rem;
            font-style: italic;
            color: var(--gold);
            font-size: 0.8rem;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loader.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gold-light);
            border-top-color: var(--ink);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .content { padding: 30px 20px; }
            .couple { font-size: 1.8rem; }
            .date { font-size: 1.1rem; }
            .rsvp-buttons { flex-direction: column; align-items: center; }
            .btn { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="invitation-card" id="invitationCard">
        <div class="loader show" id="loader">
            <div class="spinner"></div>
        </div>
        <div id="content" style="display:none;"></div>
    </div>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwr3JCvNDAQsBkwlF1U9DsYfngVaJsrW7CskFfpxmJEQ8D4VWTSlH-UAdN4NSOpMd91/exec';
        
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const guestId = urlParams.get('guestId');
        const thankyou = urlParams.get('thankyou');

        if (thankyou === '1') {
            document.getElementById('invitationCard').innerHTML = `
                <div class="content">
                    <div class="ornament">✦ ✦ ✦</div>
                    <h1>Thank You!</h1>
                    <div class="divider"></div>
                    <p style="font-size:1.2rem; margin: 2rem 0;">Your response has been recorded.</p>
                    <p>We look forward to celebrating with you! ❤️</p>
                    <footer>With gratitude and blessings</footer>
                </div>
            `;
        } else if (userId && guestId) {
            loadInvitation();
        } else {
            document.getElementById('invitationCard').innerHTML = `
                <div class="content">
                    <div class="ornament">✦ ✦ ✦</div>
                    <h1>Invalid Link</h1>
                    <div class="divider"></div>
                    <p style="margin: 2rem 0;">This invitation link appears to be invalid.</p>
                    <p>Please check the link or contact the host.</p>
                </div>
            `;
        }

        async function loadInvitation() {
            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?userId=${userId}&guestId=${guestId}`, {
                    method: 'GET'
                });
                const html = await response.text();
                
                // Extract invitation data from the HTML response
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // Alternatively, we can call the API to get JSON data
                const jsonResponse = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        action: 'getGuestInfo', 
                        userId: userId, 
                        guestId: guestId 
                    })
                });
                const data = await jsonResponse.json();
                
                if (data.status === 'success') {
                    renderInvitation(data);
                } else {
                    showError();
                }
            } catch (error) {
                console.error('Error loading invitation:', error);
                showError();
            }
        }

        function renderInvitation(data) {
            const guest = data.guest;
            const user = data.user;
            
            document.getElementById('loader').classList.remove('show');
            document.getElementById('content').style.display = 'block';
            
            document.getElementById('content').innerHTML = `
                <div class="content">
                    <div class="ornament">✦ ✦ ✦</div>
                    <h1>You're Invited</h1>
                    <div class="couple">
                        <span>${escapeHtml(user.username)}</span> & <span>❤️</span>
                    </div>
                    <div class="divider"></div>
                    <div class="guest-name">Dear ${escapeHtml(guest.guestName)}</div>
                    <div class="details">
                        <div class="date">${escapeHtml(user.eventDate || 'Saturday, 14 June 2026')}</div>
                        <div class="time">${escapeHtml(user.eventTime || '5:30 PM')}</div>
                        <div class="location">${escapeHtml(user.location || 'Grand Venue')}</div>
                    </div>
                    <div class="rsvp-section">
                        <h3>Kindly Respond</h3>
                        <div class="rsvp-buttons">
                            <button class="btn btn-yes" onclick="submitRSVP('attending')">🎉 Joyfully Accept</button>
                            <button class="btn btn-no" onclick="submitRSVP('declined')">💔 Regretfully Decline</button>
                        </div>
                        <div id="messageContainer" class="message"></div>
                    </div>
                    <footer>With gratitude and blessings</footer>
                </div>
            `;
        }

        async function submitRSVP(response) {
            const messageDiv = document.getElementById('messageContainer');
            const buttons = document.querySelectorAll('.btn');
            
            buttons.forEach(btn => btn.disabled = true);
            messageDiv.className = 'message';
            messageDiv.textContent = 'Submitting your response...';
            messageDiv.style.display = 'block';
            
            try {
                const result = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'guestRSVP',
                        userId: userId,
                        guestId: guestId,
                        response: response
                    })
                });
                const data = await result.json();
                
                if (data.status === 'updated') {
                    messageDiv.textContent = '✓ Thank you! Your response has been recorded.';
                    messageDiv.className = 'message success';
                    setTimeout(() => {
                        window.location.href = window.location.pathname + `?userId=${userId}&guestId=${guestId}&thankyou=1`;
                    }, 2000);
                } else {
                    messageDiv.textContent = '❌ ' + (data.message || 'Something went wrong');
                    messageDiv.className = 'message error';
                    buttons.forEach(btn => btn.disabled = false);
                }
            } catch (error) {
                messageDiv.textContent = '❌ Network error. Please try again.';
                messageDiv.className = 'message error';
                buttons.forEach(btn => btn.disabled = false);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m));
        }

        function showError() {
            document.getElementById('loader').classList.remove('show');
            document.getElementById('content').style.display = 'block';
            document.getElementById('content').innerHTML = `
                <div class="content">
                    <div class="ornament">✦ ✦ ✦</div>
                    <h1>Invitation Not Found</h1>
                    <div class="divider"></div>
                    <p style="margin: 2rem 0;">We couldn't find this invitation.</p>
                    <p>Please check the link or contact the host.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
