<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    font-family: system-ui;
    background: #f1f5f9;
    padding: 20px;
}

.container {
    max-width: 900px;
    margin: auto;
    background: #fff;
    border-radius: 20px;
    padding: 20px;
}

.status-msg {
    padding: 10px;
    border-radius: 10px;
    background: #eef2ff;
    margin-bottom: 15px;
}

.error-text { background: #ffe4e4; }
.success-text { background: #e6f7ee; }

.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
    gap: 15px;
}

.card {
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 10px;
    background: white;
}

.select {
    padding: 10px;
    width: 100%;
    margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

    <div id="infoMessage" class="status-msg">Loading...</div>

    <div>
        Total Rows: <b id="statTotal">0</b> |
        States: <b id="statUnique">0</b>
    </div>

    <select id="stateSelect" class="select"></select>

    <div id="cardsSection"></div>

</div>

<script>
const MASTER_ID = "15jmoWAF-Lb-N1STfLdmkYNghmZ1jvaCZqCdTokjpqnc";
const MASTER_URL = `https://docs.google.com/spreadsheets/d/${MASTER_ID}/gviz/tq?tqx=out:csv`;

let masterRows = [];
let cache = new Map();

const info = document.getElementById("infoMessage");
const select = document.getElementById("stateSelect");
const cards = document.getElementById("cardsSection");

function updateStatus(msg,type="info"){
    info.className = "status-msg";
    if(type==="error") info.classList.add("error-text");
    if(type==="success") info.classList.add("success-text");
    info.innerHTML = msg;
}

function parseCSV(text){
    return text.split("\n").map(r=>r.split(","));
}

async function loadMaster(){
    try{
        updateStatus("Loading master...");
        const res = await fetch(MASTER_URL);
        const txt = await res.text();

        const rows = parseCSV(txt);

        masterRows = rows.map(r=>({
            state:r[1],
            sheet:r[2]
        })).filter(r=>r.state);

        const states=[...new Set(masterRows.map(r=>r.state))].sort();

        document.getElementById("statTotal").innerText = masterRows.length;
        document.getElementById("statUnique").innerText = states.length;

        select.innerHTML = `<option>Select state</option>` +
            states.map(s=>`<option>${s}</option>`).join("");

        updateStatus("Loaded successfully","success");

    }catch(e){
        updateStatus(e.message,"error");
    }
}

select.addEventListener("change", async ()=>{
    const state = select.value;

    cards.innerHTML = "Loading...";

    const entries = masterRows.filter(r=>r.state===state);

    let html = `<div class="cards-grid">`;

    for(const entry of entries){

        if(!entry.sheet){
            html+=`<div class="card">Missing Sheet ID</div>`;
            continue;
        }

        if(!cache.has(entry.sheet)){
            try{
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${entry.sheet}/gviz/tq?tqx=out:csv`);
                const txt = await res.text();
                const data = parseCSV(txt);
                cache.set(entry.sheet,data);
            }catch(e){
                cache.set(entry.sheet,null);
            }
        }

        const data = cache.get(entry.sheet);

        if(!data){
            html+=`<div class="card">Error loading sheet</div>`;
            continue;
        }

        data.forEach((row,i)=>{
            if(!row.length) return;

            html+=`<div class="card"><b>Card ${i+1}</b><br>`;
            row.forEach((cell,idx)=>{
                html+=`<div><b>Col ${idx+1}:</b> ${cell || "-"}</div>`;
            });
            html+=`</div>`;
        });
    }

    html += `</div>`;
    cards.innerHTML = html;
});

loadMaster();
</script>

</body>
</html>
