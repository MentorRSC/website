<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Selector | Simple Dropdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #e9f0fc 0%, #f5f7fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        .widget {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 520px;
            padding: 2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
            border-left: 4px solid #2c7da0;
            padding-left: 1rem;
        }

        .title i {
            font-size: 1.8rem;
            color: #2c7da0;
        }

        .title h2 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            color: #1e2f3e;
        }

        .title p {
            font-size: 0.8rem;
            color: #5e7a93;
            margin-top: 0.2rem;
            font-weight: normal;
        }

        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1f3b4c;
            margin-bottom: 0.6rem;
            letter-spacing: -0.2px;
        }

        label i {
            color: #2c7da0;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            background-color: #ffffff;
            border: 1px solid #cfdfed;
            border-radius: 1.4rem;
            color: #0a2a3b;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23365e7e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.2rem;
        }

        select:hover {
            border-color: #7cafcf;
            background-color: #fefefe;
        }

        select:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.2);
        }

        .status-msg {
            background: #f2f6fc;
            border-radius: 1.2rem;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            color: #2c5f8a;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-top: 1.6rem;
            border: 1px solid #e2edf7;
        }

        .status-msg i {
            font-size: 1.1rem;
            color: #2c7da0;
        }

        .error-text {
            color: #c23b22;
            background: #fff5f2;
            border-color: #ffd9ce;
        }

        .success-text {
            background: #e8f3ed;
            border-color: #c2e0d0;
        }

        .footer-note {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #84a7c1;
            border-top: 1px solid #e9f0f5;
            padding-top: 1.2rem;
        }

        .selected-value {
            margin-top: 1rem;
            font-size: 0.85rem;
            background: #eef4fa;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            color: #134b6b;
        }

        @media (max-width: 480px) {
            .widget { padding: 1.5rem; }
            .title h2 { font-size: 1.3rem; }
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="widget">
    <div class="title">
        <i class="fas fa-layer-group"></i>
        <div>
            <h2>State Selector</h2>
            <p>fetch column 2 from spreadsheet</p>
        </div>
    </div>

    <div class="field">
        <label><i class="fas fa-chevron-circle-down"></i> Select an option</label>
        <select id="dynamicDropdown">
            <option value="" disabled selected>— Loading states —</option>
        </select>
    </div>

    <div id="infoMessage" class="status-msg">
        <i class="fas fa-cloud-download-alt"></i>
        <span>Fetching data from Google Sheet ...</span>
    </div>
    <div class="footer-note">
        <i class="far fa-file-excel"></i> Data from column B · live spreadsheet
    </div>
</div>

<script>
    const SPREADSHEET_ID = '15jmoWAF-Lb-N1STfLdmkYNghmZ1jvaCZqCdTokjpqnc';
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:csv`;

    const dropdown = document.getElementById('dynamicDropdown');
    const infoDiv = document.getElementById('infoMessage');

    async function fetchColumn2() {
        try {
            infoDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> <span>Loading spreadsheet data ...</span>`;
            dropdown.disabled = true;
            dropdown.innerHTML = '<option value="" disabled>— refreshing —</option>';

            const response = await fetch(DATA_URL);
            if (!response.ok) {
                throw new Error(`HTTP error ${response.status}: ${response.statusText}`);
            }

            const csvText = await response.text();
            
            // Parse CSV manually to get column 2
            const lines = csvText.split(/\r?\n/);
            if (lines.length === 0) {
                throw new Error('No data found in spreadsheet');
            }

            const column2Values = [];
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                
                // Parse CSV line (handles quoted values)
                let cells = [];
                let inQuotes = false;
                let currentCell = '';
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        cells.push(currentCell.trim());
                        currentCell = '';
                    } else {
                        currentCell += char;
                    }
                }
                cells.push(currentCell.trim());
                
                // Remove quotes from cells if present
                cells = cells.map(cell => {
                    if (cell.startsWith('"') && cell.endsWith('"')) {
                        return cell.slice(1, -1);
                    }
                    return cell;
                });
                
                // Get column 2 (index 1, second column)
                if (cells.length >= 2) {
                    let value = cells[1];
                    if (value && value !== '' && value !== 'NULL' && value !== 'null') {
                        column2Values.push(value);
                    }
                }
            }

            if (column2Values.length === 0) {
                throw new Error('Column 2 appears to be empty. No valid entries found.');
            }

            // Get unique values
            const uniqueValues = [];
            const seen = new Set();
            for (const val of column2Values) {
                if (!seen.has(val)) {
                    seen.add(val);
                    uniqueValues.push(val);
                }
            }
            
            // Build dropdown options
            dropdown.innerHTML = '';
            
            const placeholderOption = document.createElement('option');
            placeholderOption.value = '';
            placeholderOption.disabled = true;
            placeholderOption.selected = true;
            placeholderOption.textContent = '— Select a state —';
            dropdown.appendChild(placeholderOption);
            
            uniqueValues.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                dropdown.appendChild(option);
            });
            
            dropdown.disabled = false;
            
            infoDiv.innerHTML = `<i class="fas fa-check-circle"></i> <span>✅ Loaded ${uniqueValues.length} unique entries from column 2. Ready.</span>`;
            infoDiv.classList.remove('error-text');
            infoDiv.classList.add('success-text');
            
            // Show selected value when user picks
            dropdown.addEventListener('change', (e) => {
                const selected = e.target.value;
                if (selected) {
                    const existingSelectedDiv = document.querySelector('.selected-value');
                    if(existingSelectedDiv) existingSelectedDiv.remove();
                    const selectedDiv = document.createElement('div');
                    selectedDiv.className = 'selected-value';
                    selectedDiv.innerHTML = `<i class="fas fa-map-marker-alt"></i> Currently selected: <strong>${escapeHtml(selected)}</strong>`;
                    document.querySelector('.widget').appendChild(selectedDiv);
                    
                    const allSelected = document.querySelectorAll('.selected-value');
                    if(allSelected.length > 1) {
                        allSelected[0].remove();
                    }
                }
            });
            
        } catch (error) {
            console.error('Error fetching spreadsheet:', error);
            dropdown.disabled = true;
            dropdown.innerHTML = '<option value="" disabled>⚠️ Failed to load</option>';
            infoDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <span>Error: ${escapeHtml(error.message)}. Make sure the spreadsheet is shared publicly (File → Share → "Anyone with the link can view").</span>`;
            infoDiv.classList.add('error-text');
            infoDiv.classList.remove('success-text');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    fetchColumn2();
</script>
</body>
</html>
