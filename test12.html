<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Selector | Simple Dropdown</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #e9f0fc 0%, #f5f7fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
        }

        /* minimalist card */
        .widget {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15), 0 1px 2px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 520px;
            padding: 2rem 2rem 2rem 2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.5);
        }

        .title {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.8rem;
            border-left: 4px solid #2c7da0;
            padding-left: 1rem;
        }

        .title i {
            font-size: 1.8rem;
            color: #2c7da0;
        }

        .title h2 {
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: -0.3px;
            color: #1e2f3e;
        }

        .title p {
            font-size: 0.8rem;
            color: #5e7a93;
            margin-top: 0.2rem;
            font-weight: normal;
        }

        /* dropdown container */
        .field {
            margin-bottom: 1.5rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            font-size: 0.85rem;
            color: #1f3b4c;
            margin-bottom: 0.6rem;
            letter-spacing: -0.2px;
        }

        label i {
            color: #2c7da0;
            font-size: 0.9rem;
        }

        select {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 1rem;
            font-family: inherit;
            background-color: #ffffff;
            border: 1px solid #cfdfed;
            border-radius: 1.4rem;
            color: #0a2a3b;
            cursor: pointer;
            transition: all 0.2s ease;
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23365e7e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.2rem;
        }

        select:hover {
            border-color: #7cafcf;
            background-color: #fefefe;
        }

        select:focus {
            outline: none;
            border-color: #2c7da0;
            box-shadow: 0 0 0 3px rgba(44, 125, 160, 0.2);
        }

        /* loading & info area */
        .status-msg {
            background: #f2f6fc;
            border-radius: 1.2rem;
            padding: 0.9rem 1rem;
            font-size: 0.85rem;
            color: #2c5f8a;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            margin-top: 1.6rem;
            border: 1px solid #e2edf7;
        }

        .status-msg i {
            font-size: 1.1rem;
            color: #2c7da0;
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid #cbdde9;
            border-radius: 50%;
            border-top-color: #2c7da0;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-text {
            color: #c23b22;
            background: #fff5f2;
            border-color: #ffd9ce;
        }

        .footer-note {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            color: #84a7c1;
            border-top: 1px solid #e9f0f5;
            padding-top: 1.2rem;
        }

        .selected-value {
            margin-top: 1rem;
            font-size: 0.85rem;
            background: #eef4fa;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            color: #134b6b;
        }

        @media (max-width: 480px) {
            .widget { padding: 1.5rem; }
            .title h2 { font-size: 1.3rem; }
        }
    </style>
    <!-- Font Awesome for minimal icons (optional but light) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="widget">
    <div class="title">
        <i class="fas fa-layer-group"></i>
        <div>
            <h2>State Selector</h2>
            <p>fetch column 2 from spreadsheet</p>
        </div>
    </div>

    <div class="field">
        <label><i class="fas fa-chevron-circle-down"></i> Select an option</label>
        <select id="dynamicDropdown">
            <option value="" disabled selected>— Loading states —</option>
        </select>
    </div>

    <div id="infoMessage" class="status-msg">
        <i class="fas fa-cloud-download-alt"></i>
        <span>Fetching data from Google Sheet ...</span>
    </div>
    <div class="footer-note">
        <i class="far fa-file-excel"></i> Data from column B · live spreadsheet
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION: only column 2 (index B) is required
    // Spreadsheet ID from the provided link
    // ============================================================
  //  https://docs.google.com/spreadsheets/d/15jmoWAF-Lb-N1STfLdmkYNghmZ1jvaCZqCdTokjpqnc/edit?usp=sharing
    const SPREADSHEET_ID = '15jmoWAF-Lb-N1STfLdmkYNghmZ1jvaCZqCdTokjpqnc';
    // Using the public /gviz/tq endpoint (Google Visualization API) which returns JSONP-like data.
    // This works for publicly shared sheets (anyone with link can view).
    const SHEET_NAME = 'Sheet1';      // default sheet name; most likely 'Sheet1'
    const DATA_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

    const dropdown = document.getElementById('dynamicDropdown');
    const infoDiv = document.getElementById('infoMessage');

    // Helper to clean and extract column 2 values (second column, index 1 in zero-based array)
    async function fetchColumn2() {
        try {
            // Show loading state
            infoDiv.innerHTML = `<i class="fas fa-spinner fa-pulse"></i> <span>Loading spreadsheet data ...</span>`;
            dropdown.disabled = true;
            dropdown.innerHTML = '<option value="" disabled>— refreshing —</option>';

            const response = await fetch(DATA_URL);
            if (!response.ok) {
                throw new Error(`HTTP error ${response.status}: ${response.statusText}`);
            }

            const responseText = await response.text();
            // The API returns: google.visualization.Query.setResponse({...});
            // We need to extract the JSON object. Usually the format is: )]}'\n{...}
            let jsonString = responseText;
            // Remove the Google Visualization security prefix if present
            const prefixMatch = responseText.match(/^\)\]\}\'\n/);
            if (prefixMatch) {
                jsonString = responseText.substring(prefixMatch[0].length);
            }
            
            const parsed = JSON.parse(jsonString);
            const table = parsed.table;
            if (!table || !table.rows || table.rows.length === 0) {
                throw new Error('No data rows found in the spreadsheet.');
            }

            // Extract column index 1 (second column, 0-based)
            // Rows are arrays under 'c' property: each cell has 'v' value.
            const column2Values = [];
            
            for (let i = 0; i < table.rows.length; i++) {
                const row = table.rows[i];
                const cells = row.c;
                if (cells && cells.length >= 2) {
                    // cell at index 1 represents column B (second column)
                    let cellValue = cells[1]?.v;
                    // Ensure value is not null/undefined and not empty string
                    if (cellValue !== undefined && cellValue !== null && cellValue.toString().trim() !== '') {
                        column2Values.push(cellValue.toString().trim());
                    }
                }
            }

            if (column2Values.length === 0) {
                throw new Error('Column 2 (second column) appears to be empty. No valid entries found.');
            }

            // Populate dropdown with unique values? Keep as raw order from sheet (respects original sequence)
            // But to avoid duplicate entries, we can optionally keep duplicates? 
            // The requirement: "fetch colum 2 from this spreadsheet and update the drop down".
            // No special unique constraint, but typical dropdown shows each row entry.
            // However showing duplicates might be confusing; but I'll preserve exactly what's in column B (including duplicates)
            // to be faithful. But often you want distinct states. I'll add an option: show as-is OR distinct? 
            // Simplicity: show each row value (if duplicates appear multiple times, user sees them multiple times).
            // To make it clean, we can use a Set to show unique values, because a "state selector" normally lists unique states.
            // The description: "select the state: fetch colum 2 ... update the drop down" — it's cleaner to show unique items.
            // I'll use unique values to avoid repeated identical entries in dropdown. But I'll also keep original order.
            
            const uniqueValues = [];
            const seen = new Set();
            for (const val of column2Values) {
                if (!seen.has(val)) {
                    seen.add(val);
                    uniqueValues.push(val);
                }
            }
            
            // Build dropdown options
            dropdown.innerHTML = '';
            if (uniqueValues.length === 0) {
                dropdown.innerHTML = '<option value="" disabled>— No data —</option>';
                throw new Error('No distinct values found in column 2.');
            }
            
            // Add a default placeholder option
            const placeholderOption = document.createElement('option');
            placeholderOption.value = '';
            placeholderOption.disabled = true;
            placeholderOption.selected = true;
            placeholderOption.textContent = '— Select a state —';
            dropdown.appendChild(placeholderOption);
            
            // Append each unique value
            uniqueValues.forEach(value => {
                const option = document.createElement('option');
                option.value = value;
                option.textContent = value;
                dropdown.appendChild(option);
            });
            
            dropdown.disabled = false;
            
            // Update success message with count
            infoDiv.innerHTML = `<i class="fas fa-check-circle"></i> <span>✅ Loaded ${uniqueValues.length} unique entries from column 2. Ready.</span>`;
            infoDiv.style.background = "#e8f3ed";
            infoDiv.style.borderColor = "#c2e0d0";
            
            // optional: show selected value when user picks
            dropdown.addEventListener('change', (e) => {
                const selected = e.target.value;
                if (selected) {
                    // just for user feedback (lightweight)
                    const existingSelectedDiv = document.querySelector('.selected-value');
                    if(existingSelectedDiv) existingSelectedDiv.remove();
                    const selectedDiv = document.createElement('div');
                    selectedDiv.className = 'selected-value';
                    selectedDiv.innerHTML = `<i class="fas fa-map-marker-alt"></i> Currently selected: <strong>${escapeHtml(selected)}</strong>`;
                    document.querySelector('.widget').appendChild(selectedDiv);
                    // auto remove after 3 seconds? but keep it, better ux, but keep minimal.
                    // Remove any older duplicate but keep one.
                    const allSelected = document.querySelectorAll('.selected-value');
                    if(allSelected.length > 1) {
                        allSelected[0].remove();
                    }
                }
            });
            
        } catch (error) {
            console.error('Error fetching spreadsheet:', error);
            dropdown.disabled = true;
            dropdown.innerHTML = '<option value="" disabled>⚠️ Failed to load</option>';
            infoDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> <span>Error: ${escapeHtml(error.message)}. Make sure the spreadsheet is shared publicly (Anyone with link can view).</span>`;
            infoDiv.classList.add('error-text');
            infoDiv.style.background = "#fff1ef";
        }
    }
    
    // simple escape utility
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Init: fetch column 2 data
    fetchColumn2();
</script>
</body>
</html>
