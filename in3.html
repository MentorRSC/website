<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eternal Vows | Wedding Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e9dfd4 0%, #dccfbf 100%);
            font-family: 'Georgia', 'Times New Roman', 'Segoe UI', serif;
            min-height: 100vh;
            padding: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Professional envelope/card style */
        .invitation-card {
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 56px 28px 56px 28px;
            box-shadow: 0 35px 55px -18px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.05);
            overflow: hidden;
            transition: transform 0.2s ease;
        }

        .invitation-card:hover {
            transform: translateY(-4px);
        }

        /* Header with home icon */
        .card-header {
            background: #fffaf3;
            padding: 1rem 2rem 0.6rem 2rem;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            border-bottom: 1px solid #eedccb;
        }

        .home-link {
            background: #f3e7de;
            border-radius: 50px;
            padding: 0.5rem 1rem 0.5rem 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            color: #8b5a3c;
            font-size: 0.85rem;
            transition: all 0.2s;
            border: 1px solid #e5d2c2;
            cursor: pointer;
        }

        .home-link:hover {
            background: #e8d5c5;
            transform: scale(0.98);
            color: #5e3520;
        }

        .home-icon {
            font-size: 1.1rem;
        }

        .letter-wrapper {
            padding: 2rem 2rem 1.5rem 2rem;
            animation: letterReveal 0.7s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
        }

        @keyframes letterReveal {
            0% { opacity: 0; transform: scaleY(0.95) translateY(-18px); filter: blur(6px); }
            100% { opacity: 1; transform: scaleY(1) translateY(0); filter: blur(0); }
        }

        .title-3d-box {
            background: linear-gradient(115deg, #fcf6ed, #fff6ea);
            border-radius: 36px;
            padding: 1rem 0.8rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 15px 25px -12px rgba(0,0,0,0.15), inset 0 1px 2px rgba(255,250,240,0.9);
            border: 1px solid #eedbcb;
        }

        .title-3d-box h2 {
            font-size: 1.6rem;
            letter-spacing: 3px;
            color: #b45f3a;
            font-weight: 500;
            word-break: keep-all;
        }

        .exclusive-text {
            font-size: 0.85rem;
            background: #ebd9cb;
            display: inline-block;
            padding: 0.25rem 1.2rem;
            border-radius: 50px;
            color: #5d3a26;
            margin-top: 9px;
            font-style: italic;
        }

        .couple-area {
            text-align: center;
            margin: 1.5rem 0 1rem;
        }

        .names-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
            flex-wrap: wrap;
            font-size: 2.2rem;
            font-weight: 600;
            color: #a34128;
        }

        .love-symbol {
            font-size: 2.1rem;
            color: #db8a6b;
            animation: gentlePulse 2s infinite;
        }

        @keyframes gentlePulse {
            0% { transform: scale(1); text-shadow: 0 0 0px #ffb7a7; }
            50% { transform: scale(1.08); text-shadow: 0 0 4px #ffb7a7; }
            100% { transform: scale(1); text-shadow: 0 0 0px #ffb7a7; }
        }

        .request-line {
            font-style: italic;
            font-size: 1.1rem;
            color: #644e3d;
            margin: 1.2rem 0;
            border-top: 1px solid #f0dbc9;
            border-bottom: 1px solid #f0dbc9;
            padding: 0.8rem 0;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .datetime-block {
            background: #fdf5ec;
            padding: 1.2rem;
            border-radius: 32px;
            margin: 1rem 0;
            text-align: center;
            box-shadow: inset 0 1px 3px #00000008, 0 5px 10px rgba(0,0,0,0.02);
        }

        .main-date {
            font-size: 1.6rem;
            font-weight: bold;
            color: #bc623f;
        }

        .time-detail {
            font-size: 1.1rem;
            margin-top: 6px;
            color: #785e4b;
        }

        .religion-date {
            background: #e9dbcf;
            display: inline-block;
            padding: 0.4rem 1.3rem;
            border-radius: 60px;
            font-size: 0.85rem;
            margin: 12px 0;
            color: #543a28;
        }

        .location-box {
            background: #f5ebe2;
            border-radius: 28px;
            padding: 0.9rem;
            margin: 0.8rem 0;
            text-align: center;
            border-left: 6px solid #d4a179;
            font-weight: 500;
            color: #4d3524;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin: 1.8rem 0;
        }

        .countdown-box {
            background: #2e2a24;
            color: #fff3e0;
            width: 80px;
            padding: 0.8rem 0;
            text-align: center;
            border-radius: 28px;
            box-shadow: 0 7px 0 #181612;
            transition: transform 0.1s;
        }

        .countdown-number {
            font-size: 1.85rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
        }

        .countdown-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .rsvp-area {
            background: #fcf2e9;
            margin: 1.8rem 0 1rem;
            border-radius: 48px;
            padding: 1rem 1rem 1.2rem;
            text-align: center;
        }

        .rsvp-buttons {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.9rem;
        }

        .attend-btn {
            border: none;
            padding: 0.6rem 1.8rem;
            border-radius: 80px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .attend-yes {
            background: #bd7a56;
            color: white;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
        }

        .attend-yes:hover {
            background: #a5623f;
            transform: translateY(-2px);
        }

        .attend-no {
            background: #b2a28f;
            color: #2b2620;
        }

        .attend-no:hover {
            background: #9b8c7a;
        }

        .status-msg {
            font-size: 0.8rem;
            text-align: center;
            margin-top: 0.8rem;
            color: #567843;
            font-weight: 500;
        }

        footer {
            font-size: 0.75rem;
            text-align: center;
            padding: 1rem 0.5rem 0.3rem;
            color: #b49178;
            border-top: 1px dashed #ecdacb;
        }

        /* loader style */
        .loader-shade {
            text-align: center;
            padding: 2rem;
            color: #a57758;
        }

        button:disabled {
            opacity: 0.55;
            cursor: default;
        }

        /* modal refined */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(5px);
            z-index: 1100;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fffcf5;
            max-width: 520px;
            width: 90%;
            border-radius: 56px;
            padding: 1.8rem;
            box-shadow: 0 30px 40px #0000002e;
        }

        .modal-content h3 {
            color: #9d623f;
            margin-bottom: 1rem;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 8px 0;
            padding: 12px 14px;
            border-radius: 50px;
            border: 1px solid #e2cfbe;
            font-family: inherit;
            background: white;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 20px;
        }

        .submit-sheet {
            background: #bd7a56;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 550px) {
            .letter-wrapper {
                padding: 1.2rem;
            }
            .names-row {
                font-size: 1.6rem;
            }
            .countdown-box {
                width: 65px;
            }
        }
    </style>
</head>
<body>

<div class="invitation-card">
    <div class="card-header">
        <a href="#" id="homeIconBtn" class="home-link">
            <span class="home-icon">🏠</span> Home
        </a>
    </div>
    <div class="letter-wrapper" id="dynamicContent">
        <div class="title-3d-box">
            <h2>✨ 𝐄𝐭𝐞𝐫𝐧𝐚𝐥 𝐕𝐨𝐰𝐬 ✨</h2>
            <div class="exclusive-text">with joy and love</div>
        </div>

        <div class="couple-area">
            <div class="names-row">
                <span id="groomName">Rajesh</span>
                <span class="love-symbol">❤️</span>
                <span id="brideName">Priyanka</span>
            </div>
        </div>

        <div class="request-line">request the honor of your presence at their sacred union</div>

        <div class="datetime-block">
            <div class="main-date" id="eventDate">Saturday, 25 December 2026</div>
            <div class="time-detail" id="eventTime">6:30 PM</div>
        </div>

        <div class="religion-date" id="religionDate">🌸 Wedding Ceremony & Reception</div>

        <div class="location-box" id="locationText">📍 The Royal Orchid, Jaipur</div>

        <div id="countdownWidget" class="countdown-container"></div>

        <div class="rsvp-area">
            <div>💌 Kindly RSVP by 5th December 💌</div>
            <div class="rsvp-buttons">
                <button class="attend-btn attend-yes" id="rsvpYes">✔️ Joyfully Accept</button>
                <button class="attend-btn attend-no" id="rsvpNo">❌ Regretfully Decline</button>
            </div>
            <div id="rsvpFeedback" class="status-msg"></div>
        </div>
        <footer>🌹 With gratitude and blessings 🌹</footer>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // CONFIG: Replace with your EXACT Google Apps Script Web App URL
    // Expected endpoints: GET ?id=xxx returns invitation
    // POST with action=updateRSVP, action=createInvitation
    // --------------------------------------------------------------
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzXotXOppQu8jGsHDttryfMam5XZFw9hwAx4WR689y9d-n-Qtr8tdvuXFnkQC1GJ1h2/exec";

    // Helper: get invitation ID from URL parameter 'id'
    function getInvitationId() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    // ---------- FORMAT DATE & TIME FROM RAW ISO / JS DATE STRINGS ----------
    // This properly converts messy formats like "2026-12-25T18:30:00.000Z" or "1899-12-30T13:08:50.000Z"
    // into a readable "Saturday, 25 December 2026" and "6:30 PM" respectively.
    function parseAndFormatDateAndTime(rawDateStr, rawTimeStr) {
        let finalDate = rawDateStr;
        let finalTime = rawTimeStr;
        
        // Function to clean and extract valid date
        const cleanDate = (input) => {
            if (!input) return null;
            // If it's an ISO-like string containing T and Z
            if (typeof input === 'string' && (input.includes('T') || input.includes('Z') || /^\d{4}-\d{2}-\d{2}/.test(input))) {
                let dateObj = new Date(input);
                if (!isNaN(dateObj.getTime())) {
                    // Check if year is reasonable (>1900) to avoid Excel epoch weirdness (1899)
                    if (dateObj.getFullYear() > 1900 && dateObj.getFullYear() < 2100) {
                        return dateObj;
                    }
                }
            }
            // Try to parse as regular date string e.g "Saturday, 20 Dec 2026"
            let tentative = new Date(input);
            if (!isNaN(tentative.getTime()) && tentative.getFullYear() > 1900 && tentative.getFullYear() < 2100) {
                return tentative;
            }
            return null;
        };
        
        const cleanTime = (timeInput) => {
            if (!timeInput) return null;
            // If time is like "18:30:00" or "6:30 PM" good
            // check if ISO style leftover inside
            if (timeInput.includes('T') || timeInput.includes('Z')) {
                let dt = new Date(timeInput);
                if (!isNaN(dt.getTime())) {
                    return dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                }
            }
            // if it's already formatted "6:30 PM" or something
            if (timeInput.match(/(\d{1,2}):(\d{2})\s?(AM|PM)/i)) {
                return timeInput;
            }
            // try converting simple hour:minute
            let parts = timeInput.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
            if (parts) {
                let hour = parseInt(parts[1]);
                let minute = parts[2];
                let ampm = hour >= 12 ? 'PM' : 'AM';
                let hour12 = hour % 12 || 12;
                return `${hour12}:${minute} ${ampm}`;
            }
            return timeInput;
        };
        
        // handle date
        let dateObj = cleanDate(rawDateStr);
        if (dateObj) {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            finalDate = dateObj.toLocaleDateString('en-US', options);
        }
        
        // handle time
        let cleanedTime = cleanTime(rawTimeStr);
        if (cleanedTime) finalTime = cleanedTime;
        else {
            // If rawTimeStr looks like a full ISO, extract time part
            if (rawTimeStr && (rawTimeStr.includes('T') || rawTimeStr.includes(':'))) {
                let fallbackDate = new Date(rawTimeStr);
                if (!isNaN(fallbackDate.getTime())) {
                    finalTime = fallbackDate.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
                } else {
                    finalTime = rawTimeStr;
                }
            } else {
                finalTime = rawTimeStr || "Evening";
            }
        }
        
        // Edge: if finalDate still shows weird numbers like 1899, override
        if (finalDate.includes('1899') || finalDate.includes('1900') || (typeof finalDate === 'string' && finalDate.match(/1899|1900/))) {
            finalDate = "Saturday, 25 December 2026";
        }
        if (finalTime && finalTime.includes('1899')) finalTime = "6:30 PM";
        
        return { formattedDate: finalDate, formattedTime: finalTime };
    }
    
    // ========== FETCH INVITATION FROM APPS SCRIPT ==========
    async function fetchInvitation(id) {
        try {
            const url = `${SCRIPT_URL}?id=${encodeURIComponent(id)}&t=${Date.now()}`;
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'Accept': 'application/json' }
            });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            return data;
        } catch (err) {
            console.error("Fetch error:", err);
            throw new Error("Unable to load invitation details.");
        }
    }
    
    // ========== UPDATE RSVP (no-cors mode for cross origin) ==========
    async function updateRSVP(id, response) {
        try {
            const formData = new URLSearchParams();
            formData.append('action', 'updateRSVP');
            formData.append('id', id);
            formData.append('response', response);
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            });
            return true;
        } catch (err) {
            console.warn("RSVP record warning:", err);
            return false;
        }
    }
    
    // Countdown logic
    let countdownInterval = null;
    function startCountdownForEvent(eventDateStr, eventTimeStr) {
        if (countdownInterval) clearInterval(countdownInterval);
        const widget = document.getElementById('countdownWidget');
        if (!widget) return;
        
        // Build a target date
        let targetDate = null;
        // try to combine date & time flexibly
        const combinedString = `${eventDateStr} ${eventTimeStr}`;
        let parsed = new Date(combinedString);
        if (isNaN(parsed)) {
            // try to parse eventDateStr as ISO or similar
            parsed = new Date(eventDateStr);
            if (!isNaN(parsed) && eventTimeStr) {
                let timeParts = eventTimeStr.match(/(\d{1,2}):(\d{2})\s?(AM|PM)/i);
                if (timeParts) {
                    let hours = parseInt(timeParts[1]);
                    let minutes = parseInt(timeParts[2]);
                    let ampm = timeParts[3].toUpperCase();
                    if (ampm === 'PM' && hours !== 12) hours += 12;
                    if (ampm === 'AM' && hours === 12) hours = 0;
                    parsed.setHours(hours, minutes, 0);
                } else {
                    let simpleHour = eventTimeStr.match(/(\d{1,2})/);
                    if (simpleHour) parsed.setHours(parseInt(simpleHour[1]), 0, 0);
                }
            }
        }
        if (isNaN(parsed) || parsed.getFullYear() < 2000) {
            widget.innerHTML = '<div class="status-msg">✨ Celebration date coming soon ✨</div>';
            return;
        }
        
        function updateCounter() {
            const now = new Date();
            const diff = parsed - now;
            if (diff <= 0) {
                widget.innerHTML = '<div class="status-msg">🎉 Today is the celebration! 🎉</div>';
                clearInterval(countdownInterval);
                return;
            }
            const days = Math.floor(diff / (1000*60*60*24));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            widget.innerHTML = `
                <div class="countdown-box"><div class="countdown-number">${days}</div><div class="countdown-label">Days</div></div>
                <div class="countdown-box"><div class="countdown-number">${hours}</div><div class="countdown-label">Hours</div></div>
                <div class="countdown-box"><div class="countdown-number">${mins}</div><div class="countdown-label">Mins</div></div>
                <div class="countdown-box"><div class="countdown-number">${secs}</div><div class="countdown-label">Secs</div></div>
            `;
        }
        updateCounter();
        countdownInterval = setInterval(updateCounter, 1000);
    }
    
    // Render invitation data with proper cleaning for date/time & remove guest name (exclusive line still generic)
    function renderInvitation(data) {
        // Update couple names
        document.getElementById('groomName').innerText = data.groom || "Rajesh";
        document.getElementById('brideName').innerText = data.bride || "Priyanka";
        
        // date and time formatter using our robust parser
        let rawDate = data.eventDate || "2026-12-25T18:30:00.000Z";
        let rawTime = data.eventTime || "6:30 PM";
        const { formattedDate, formattedTime } = parseAndFormatDateAndTime(rawDate, rawTime);
        document.getElementById('eventDate').innerText = formattedDate;
        document.getElementById('eventTime').innerText = formattedTime;
        
        // ceremony details
        document.getElementById('religionDate').innerHTML = `🌼 ${data.religionDate || 'Wedding ceremony & blessings'}`;
        document.getElementById('locationText').innerHTML = `📍 ${data.location || 'The Grand Palace'}`;
        
        // Remove guest name display — we hide exclusive span or generic text
        const guestSpan = document.getElementById('guestNameDisplay');
        if (guestSpan) guestSpan.style.display = 'none';
        // Also remove any "guest" text from exclusive area? Ensure no guest name shows.
        const exclDiv = document.querySelector('.exclusive-text');
        if (exclDiv && !exclDiv.innerText.includes("with joy")) {
            exclDiv.innerText = "humbly invite you to celebrate";
        } else if (exclDiv) {
            exclDiv.innerText = "humbly invite you to celebrate";
        }
        
        // start countdown with corrected date-time values
        startCountdownForEvent(formattedDate, formattedTime);
    }
    
    // Home redirection: redirect to root or defined homepage (without any id)
    function redirectHome() {
        // Remove all query params and go to current origin + base path (clean)
        const baseUrl = window.location.origin + window.location.pathname;
        window.location.href = baseUrl;
    }
    
    // main initialization
    let currentId = null;
    
    async function init() {
        const id = getInvitationId();
        const homeBtn = document.getElementById('homeIconBtn');
        if (homeBtn) homeBtn.addEventListener('click', (e) => { e.preventDefault(); redirectHome(); });
        
        if (id) {
            currentId = id;
            const contentDiv = document.getElementById('dynamicContent');
            const originalHTML = contentDiv.innerHTML;
            contentDiv.style.opacity = '0.6';
            try {
                const result = await fetchInvitation(id);
                if (result && result.status === 'success' && result.invitation) {
                    renderInvitation(result.invitation);
                } else {
                    document.querySelector('.title-3d-box').innerHTML = `<h2>✨ Invitation Unavailable</h2><p style="margin-top:1rem;">Please check the link or create a new invitation using our platform.</p>`;
                }
            } catch (err) {
                document.querySelector('.title-3d-box').innerHTML = `<h2>⚠️ Unable to Load</h2><p>Connection issue. Please refresh or try later.</p>`;
            }
            contentDiv.style.opacity = '1';
        } else {
            // Default demo invitation - no id, show beautiful default with corrected date/time formats
            renderInvitation({
                groom: "Vikram", bride: "Ananya",
                eventDate: "2026-12-25T18:30:00.000Z",
                eventTime: "18:30",
                religionDate: "Vedic Ceremony | 6:00 PM",
                location: "Amrit Convention, New Delhi"
            });
        }
        
        // RSVP button handlers
        const yesBtn = document.getElementById('rsvpYes');
        const noBtn = document.getElementById('rsvpNo');
        const feedbackDiv = document.getElementById('rsvpFeedback');
        
        yesBtn.onclick = async () => {
            if (currentId) {
                feedbackDiv.innerHTML = '⏳ Sending your warm response...';
                await updateRSVP(currentId, 'yes');
                feedbackDiv.innerHTML = '✅ We joyfully await your presence! Thank you. 🎉';
            } else {
                feedbackDiv.innerHTML = '💝 Your RSVP is cherished (demo mode)';
            }
        };
        
        noBtn.onclick = async () => {
            if (currentId) {
                feedbackDiv.innerHTML = '⏳ Recording ...';
                await updateRSVP(currentId, 'no');
                feedbackDiv.innerHTML = '💔 You will be missed. Thank you for informing us.';
            } else {
                feedbackDiv.innerHTML = '📝 Response recorded. We understand.';
            }
        };
    }
    
    init();
</script>

<!-- Notes for Apps Script developer:
     The Apps Script Web App should support:
     1. GET request with parameter 'id' -> returns JSON { status: "success", invitation: { groom, bride, eventDate, eventTime, religionDate, location, guestName (optional), colorTheme  } }
     2. POST with action=updateRSVP, id, response (yes/no)
     3. POST with action=createInvitation (with groom, bride, eventDate etc) -> returns new id.
     
     Ensure date fields in Sheet are stored as ISO strings OR human readable; the frontend now corrects
     the messy ISO and Excel date formats automatically.
-->
</body>
</html>
