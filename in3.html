<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Wedding Invitations - Eternal Vows</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #f9eef7 0%, #f5e1e8 100%);
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            padding: 1.5rem;
        }

        /* Navigation */
        .nav-bar {
            max-width: 700px;
            margin: 0 auto 1.5rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #9b6a4c;
            background: white;
            padding: 0.5rem 1.2rem;
            border-radius: 50px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .create-btn {
            background: #8b5a3c;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        /* Invitation Card */
        .invitation-card {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
            background: #fffef7;
            border-radius: 48px 24px 48px 24px;
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.25);
            overflow: hidden;
        }

        .letter-wrapper {
            padding: 2rem 1.8rem;
            animation: letterReveal 0.8s ease-out;
        }

        @keyframes letterReveal {
            from { opacity: 0; transform: scaleY(0) translateY(-30px); }
            to { opacity: 1; transform: scaleY(1) translateY(0); }
        }

        .title-3d-box {
            background: linear-gradient(135deg, #fdf8f0, #fff5e6);
            border-radius: 32px;
            padding: 1.2rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: 0 20px 30px -12px rgba(0,0,0,0.2);
            transform: perspective(800px) rotateX(2deg);
            transition: transform 0.3s;
        }

        .title-3d-box:hover {
            transform: perspective(800px) rotateX(0deg) translateY(-5px);
        }

        .title-3d-box h2 {
            font-size: 1.3rem;
            color: #9b6a4c;
        }

        .exclusive-text {
            background: #f5e1cc;
            display: inline-block;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            color: #7a4a2e;
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .couple-area {
            text-align: center;
            margin: 2rem 0;
        }

        .names-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            font-size: 2rem;
            font-weight: bold;
            color: #b2412c;
        }

        .love-symbol {
            font-size: 2rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); text-shadow: 0 0 5px #ffb7a7; }
        }

        .request-line {
            font-style: italic;
            text-align: center;
            color: #5e3a2b;
            margin: 1.2rem 0;
            padding: 0.6rem 0;
            border-top: 1px dashed #f0cfb3;
            border-bottom: 1px dashed #f0cfb3;
        }

        .datetime-block {
            background: #fdf3e8;
            padding: 1rem;
            border-radius: 28px;
            margin: 1.2rem 0;
            text-align: center;
        }

        .main-date {
            font-size: 1.5rem;
            font-weight: bold;
            color: #bf5e3c;
        }

        .religion-date {
            background: #eee3d8;
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            margin: 10px 0;
        }

        .location-box {
            background: #f4e8de;
            border-radius: 20px;
            padding: 0.8rem;
            text-align: center;
            border-left: 5px solid #d99e78;
            margin: 0.8rem 0;
        }

        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin: 1.5rem 0;
        }

        .countdown-box {
            background: #2d2a24;
            color: #ffefcf;
            width: 70px;
            padding: 0.6rem 0;
            text-align: center;
            border-radius: 18px;
        }

        .countdown-number {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .countdown-label {
            font-size: 0.65rem;
            text-transform: uppercase;
        }

        .rsvp-area {
            background: #f9f0e6;
            margin: 1.5rem 0 1rem;
            border-radius: 36px;
            padding: 1rem;
            text-align: center;
        }

        .rsvp-buttons {
            display: flex;
            justify-content: center;
            gap: 1.2rem;
            margin-top: 0.8rem;
        }

        .attend-btn {
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.1s;
        }

        .attend-btn:active {
            transform: scale(0.95);
        }

        .attend-yes {
            background: #cf966b;
            color: white;
        }

        .attend-no {
            background: #b0aa9a;
            color: #2b2a27;
        }

        .status-msg {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 0.5rem;
            color: #4d6a3b;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #a1856e;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fffaf2;
            max-width: 500px;
            width: 90%;
            border-radius: 48px;
            padding: 1.5rem;
            max-height: 85vh;
            overflow-y: auto;
        }

        .modal-content input {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 28px;
            border: 1px solid #e2cfbe;
            font-family: inherit;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 16px;
        }

        .submit-sheet {
            background: #c28a61;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
        }

        /* Index/Homepage Styles */
        .index-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .hero h1 {
            font-size: 2.2rem;
            color: #9b6a4c;
        }

        .invitations-list {
            background: white;
            border-radius: 32px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .invitation-item {
            background: #fdf8f0;
            border-radius: 24px;
            padding: 1rem;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            border-left: 5px solid #cf966b;
        }

        .invitation-info h3 {
            color: #b2412c;
            margin-bottom: 0.3rem;
        }

        .invitation-info p {
            color: #7a6a5a;
            font-size: 0.8rem;
        }

        .invitation-link {
            background: #8b5a3c;
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.8rem;
            transition: background 0.2s;
        }

        .invitation-link:hover {
            background: #6b442a;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #9b6a4c;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #a1856e;
        }
    </style>
</head>
<body>

<div id="app"></div>

<script>
    // ========== CONFIGURATION ==========
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxDBw4hMv7ivVoK8E-NuGXKzSoH_gbFyqcZgWNaeGA63F3LsmbleIO8qCVKAyhR998s/exec";
    
    let currentId = null;
    let countdownInterval = null;

    // Helper: Get ID from URL
    function getIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get('id');
    }

    // ========== API CALLS ==========
    async function fetchInvitation(id) {
        const url = `${SCRIPT_URL}?id=${encodeURIComponent(id)}&_=${Date.now()}`;
        const response = await fetch(url);
        return await response.json();
    }

    async function fetchAllInvitations() {
        const url = `${SCRIPT_URL}?action=getAll&_=${Date.now()}`;
        const response = await fetch(url);
        return await response.json();
    }

    async function createInvitation(data) {
        const formData = new URLSearchParams();
        formData.append('action', 'createInvitation');
        formData.append('groom', data.groom);
        formData.append('bride', data.bride);
        formData.append('eventDate', data.eventDate);
        formData.append('eventTime', data.eventTime);
        formData.append('religionDate', data.religionDate);
        formData.append('location', data.location);
        formData.append('guestName', data.guestName);
        
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        return await response.json();
    }

    async function updateRSVP(id, response) {
        const formData = new URLSearchParams();
        formData.append('action', 'updateRSVP');
        formData.append('id', id);
        formData.append('response', response);
        
        await fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
    }

    // ========== COUNTDOWN TIMER (FIXED) ==========
    function startCountdown(dateStr, timeStr) {
        if (countdownInterval) clearInterval(countdownInterval);
        
        // Parse date properly
        let targetDate = new Date(`${dateStr} ${timeStr}`);
        
        if (isNaN(targetDate)) {
            // Try to extract date parts
            const dateMatch = dateStr.match(/(\d{1,2})\s+(\w+)\s+(\d{4})/);
            if (dateMatch) {
                const months = { 'January':0, 'February':1, 'March':2, 'April':3, 'May':4, 'June':5, 
                                 'July':6, 'August':7, 'September':8, 'October':9, 'November':10, 'December':11 };
                const month = months[dateMatch[2]] || 0;
                targetDate = new Date(parseInt(dateMatch[3]), month, parseInt(dateMatch[1]));
                
                // Add time
                if (timeStr) {
                    const timeMatch = timeStr.match(/(\d{1,2}):(\d{2})\s*(AM|PM)/i);
                    if (timeMatch) {
                        let hours = parseInt(timeMatch[1]);
                        if (timeMatch[3].toUpperCase() === 'PM' && hours !== 12) hours += 12;
                        if (timeMatch[3].toUpperCase() === 'AM' && hours === 12) hours = 0;
                        targetDate.setHours(hours, parseInt(timeMatch[2]), 0);
                    }
                }
            }
        }
        
        if (isNaN(targetDate) || targetDate.toString() === 'Invalid Date') {
            document.getElementById('countdownWidget').innerHTML = '<div class="status-msg">✨ Celebration coming soon ✨</div>';
            return;
        }
        
        function update() {
            const now = new Date();
            const diff = targetDate - now;
            
            if (diff <= 0) {
                document.getElementById('countdownWidget').innerHTML = '<div class="status-msg">🎉 Today is the Celebration Day! 🎉</div>';
                if (countdownInterval) clearInterval(countdownInterval);
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (3600000)) / (1000 * 60));
            const seconds = Math.floor((diff % (60000)) / 1000);
            
            document.getElementById('countdownWidget').innerHTML = `
                <div class="countdown-box"><div class="countdown-number">${days}</div><div class="countdown-label">Days</div></div>
                <div class="countdown-box"><div class="countdown-number">${hours}</div><div class="countdown-label">Hours</div></div>
                <div class="countdown-box"><div class="countdown-number">${minutes}</div><div class="countdown-label">Mins</div></div>
                <div class="countdown-box"><div class="countdown-number">${seconds}</div><div class="countdown-label">Secs</div></div>
            `;
        }
        
        update();
        countdownInterval = setInterval(update, 1000);
    }

    // ========== RENDER INVITATION VIEW ==========
    function renderInvitation(data) {
        document.getElementById('groomName').innerText = data.groom || 'Groom';
        document.getElementById('brideName').innerText = data.bride || 'Bride';
        document.getElementById('eventDate').innerText = data.eventDate || 'Date TBD';
        document.getElementById('eventTime').innerHTML = data.eventTime || 'Time TBD';
        document.getElementById('religionDate').innerHTML = `🌼 ${data.religionDate || 'Ceremony details'}`;
        document.getElementById('locationText').innerHTML = `📍 ${data.location || 'Venue details'}`;
        document.getElementById('guestNameDisplay').innerText = data.guestName || 'Guest';
        
        if (data.eventDate && data.eventTime) {
            startCountdown(data.eventDate, data.eventTime);
        } else {
            document.getElementById('countdownWidget').innerHTML = '<div class="status-msg">✨ Save the Date ✨</div>';
        }
    }

    // ========== RENDER HOMEPAGE (INDEX) ==========
    function renderHomepage(invitations) {
        const html = `
            <div class="index-container">
                <div class="nav-bar">
                    <div class="logo">💒 Eternal Vows</div>
                    <button class="create-btn" id="openCreatorBtnIndex">✨ New Invitation</button>
                </div>
                
                <div class="hero">
                    <h1>Wedding Invitations</h1>
                    <p style="color:#7a6a5a;">Click any link to view or share an invitation</p>
                </div>
                
                <div class="invitations-list">
                    ${invitations.length === 0 ? 
                        `<div class="empty-state">✨ No invitations yet. Click "New Invitation" to create your first wedding invitation! ✨</div>` :
                        invitations.map(inv => `
                            <div class="invitation-item">
                                <div class="invitation-info">
                                    <h3>${escapeHtml(inv.groom)} ❤️ ${escapeHtml(inv.bride)}</h3>
                                    <p>📅 ${escapeHtml(inv.eventDate)} | 📍 ${escapeHtml(inv.location)}</p>
                                    <p style="font-size:0.7rem; color:#a1887a;">ID: ${escapeHtml(inv.id)}</p>
                                </div>
                                <a href="?id=${encodeURIComponent(inv.id)}" class="invitation-link">🔗 View Invitation →</a>
                            </div>
                        `).join('')
                    }
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Re-attach button event
        document.getElementById('openCreatorBtnIndex')?.addEventListener('click', showCreateModal);
    }

    // ========== RENDER INVITATION PAGE ==========
    function renderInvitationPage(data, id) {
        const html = `
            <div class="invitation-card">
                <div class="nav-bar" style="padding: 1rem 1rem 0 1rem;">
                    <a href="." style="text-decoration: none; color: #9b6a4c; background: white; padding: 0.4rem 1rem; border-radius: 50px;">← All Invitations</a>
                    <button class="create-btn" id="openCreatorBtnInv">✨ New</button>
                </div>
                <div class="letter-wrapper" id="dynamicContent">
                    <div class="title-3d-box">
                        <h2>✨ 𝐄𝐭𝐞𝐫𝐧𝐚𝐥 𝐕𝐨𝐰𝐬 ✨</h2>
                        <div class="exclusive-text">exclusive invitation for <span id="guestNameDisplay">${escapeHtml(data.guestName || 'Guest')}</span></div>
                    </div>

                    <div class="couple-area">
                        <div class="names-row">
                            <span id="groomName">${escapeHtml(data.groom || 'Groom')}</span>
                            <span class="love-symbol">❤️</span>
                            <span id="brideName">${escapeHtml(data.bride || 'Bride')}</span>
                        </div>
                    </div>

                    <div class="request-line">request the honor of your presence</div>

                    <div class="datetime-block">
                        <div class="main-date" id="eventDate">${escapeHtml(data.eventDate || 'Date TBD')}</div>
                        <div class="time-detail" id="eventTime">${escapeHtml(data.eventTime || 'Time TBD')}</div>
                    </div>

                    <div class="religion-date" id="religionDate">🌼 ${escapeHtml(data.religionDate || 'Ceremony details')}</div>

                    <div class="location-box" id="locationText">📍 ${escapeHtml(data.location || 'Venue details')}</div>

                    <div id="countdownWidget" class="countdown-container"></div>

                    <div class="rsvp-area">
                        <div>💌 Will you be joining us? 💌</div>
                        <div class="rsvp-buttons">
                            <button class="attend-btn attend-yes" id="rsvpYes">✔️ Yes, I'll be there</button>
                            <button class="attend-btn attend-no" id="rsvpNo">❌ Sadly, cannot attend</button>
                        </div>
                        <div id="rsvpFeedback" class="status-msg"></div>
                    </div>
                    <footer>🌹 With love & gratitude 🌹</footer>
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Set the data and start countdown
        startCountdown(data.eventDate, data.eventTime);
        
        // RSVP buttons
        document.getElementById('rsvpYes')?.addEventListener('click', async () => {
            const feedback = document.getElementById('rsvpFeedback');
            feedback.innerHTML = '⏳ Recording...';
            await updateRSVP(id, 'yes');
            feedback.innerHTML = '✅ Thank you! We look forward to celebrating with you! 🎉';
        });
        
        document.getElementById('rsvpNo')?.addEventListener('click', async () => {
            const feedback = document.getElementById('rsvpFeedback');
            feedback.innerHTML = '⏳ Recording...';
            await updateRSVP(id, 'no');
            feedback.innerHTML = '💔 We will miss you! Thank you for letting us know.';
        });
        
        document.getElementById('openCreatorBtnInv')?.addEventListener('click', showCreateModal);
    }

    // ========== SHOW CREATE MODAL ==========
    function showCreateModal() {
        const modalHtml = `
            <div id="creatorModal" class="modal" style="display: flex;">
                <div class="modal-content">
                    <h3>🌸 Create Wedding Invitation 🌸</h3>
                    <p style="font-size:0.8rem; margin-bottom:10px;">Fill in the details below</p>
                    
                    <input type="text" id="newGroom" placeholder="Groom's Name" value="">
                    <input type="text" id="newBride" placeholder="Bride's Name" value="">
                    <input type="text" id="newDate" placeholder="Date (e.g., Saturday, 20 December 2026)" value="Saturday, 20 December 2026">
                    <input type="text" id="newTime" placeholder="Time (e.g., 6:30 PM)" value="6:30 PM">
                    <input type="text" id="newReligionDate" placeholder="Ceremony details" value="Wedding Ceremony">
                    <input type="text" id="newLocation" placeholder="Venue name" value="The Royal Palace">
                    <input type="text" id="newGuestName" placeholder="Default guest name" value="Beloved Guest">
                    
                    <div class="modal-buttons">
                        <button id="closeModalBtn" style="background:#ccc;">Cancel</button>
                        <button id="submitNewInviteBtn" class="submit-sheet">✨ Generate Link ✨</button>
                    </div>
                    <div id="modalStatus" style="margin-top:12px; font-size:0.75rem; text-align:center;"></div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        const modal = document.getElementById('creatorModal');
        const closeBtn = document.getElementById('closeModalBtn');
        const submitBtn = document.getElementById('submitNewInviteBtn');
        const statusDiv = document.getElementById('modalStatus');
        
        closeBtn.onclick = () => modal.remove();
        modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
        
        submitBtn.onclick = async () => {
            submitBtn.disabled = true;
            submitBtn.innerHTML = 'Creating...';
            statusDiv.innerHTML = '';
            
            const data = {
                groom: document.getElementById('newGroom').value.trim() || 'Groom',
                bride: document.getElementById('newBride').value.trim() || 'Bride',
                eventDate: document.getElementById('newDate').value.trim(),
                eventTime: document.getElementById('newTime').value.trim(),
                religionDate: document.getElementById('newReligionDate').value.trim(),
                location: document.getElementById('newLocation').value.trim(),
                guestName: document.getElementById('newGuestName').value.trim()
            };
            
            try {
                const result = await createInvitation(data);
                if (result.status === 'created' && result.newId) {
                    const shareLink = `${window.location.origin}${window.location.pathname}?id=${result.newId}`;
                    statusDiv.innerHTML = `
                        ✅ Invitation Created!<br>
                        <strong>Share this link:</strong><br>
                        <a href="${shareLink}" target="_blank" style="word-break:break-all;">${shareLink}</a>
                        <br><br>
                        <button onclick="navigator.clipboard.writeText('${shareLink}')" style="background:#8b5a3c; color:white; border:none; padding:5px 12px; border-radius:50px;">📋 Copy Link</button>
                        <br><br>
                        <button id="refreshPageBtn" style="background:#cf966b; color:white; border:none; padding:5px 12px; border-radius:50px;">🔄 View All Invitations</button>
                    `;
                    
                    document.getElementById('refreshPageBtn')?.addEventListener('click', () => {
                        modal.remove();
                        window.location.href = '.';
                    });
                } else {
                    statusDiv.innerHTML = '❌ Error: ' + (result.message || 'Unknown error');
                }
            } catch (err) {
                statusDiv.innerHTML = '❌ Error: ' + err.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✨ Generate Link ✨';
            }
        };
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== ROUTER ==========
    async function init() {
        const id = getIdFromURL();
        
        if (id) {
            // Show invitation page
            try {
                const result = await fetchInvitation(id);
                if (result.status === 'success' && result.invitation) {
                    renderInvitationPage(result.invitation, id);
                } else {
                    document.getElementById('app').innerHTML = `
                        <div class="invitation-card" style="padding: 2rem; text-align: center;">
                            <h2>⚠️ Invitation Not Found</h2>
                            <p>Please check the link or <a href="." style="color:#8b5a3c;">create a new invitation</a>.</p>
                            <button class="create-btn" id="backBtn" style="margin-top: 1rem;">Create New Invitation</button>
                        </div>
                    `;
                    document.getElementById('backBtn')?.addEventListener('click', showCreateModal);
                }
            } catch (err) {
                document.getElementById('app').innerHTML = `<div class="invitation-card" style="padding: 2rem;"><h2>⚠️ Error Loading</h2><p>${err.message}</p></div>`;
            }
        } else {
            // Show homepage with all invitations
            document.getElementById('app').innerHTML = '<div class="loading">✨ Loading invitations... ✨</div>';
            
            try {
                const result = await fetchAllInvitations();
                if (result.status === 'success' && result.invitations) {
                    renderHomepage(result.invitations);
                } else {
                    renderHomepage([]);
                }
            } catch (err) {
                renderHomepage([]);
            }
        }
    }
    
    init();
</script>
</body>
</html>
