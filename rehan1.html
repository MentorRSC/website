<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jigsaw Slide Puzzle | Classic Sliding Puzzle</title>
<!-- Header loader (external) -->
<script src="header-loader.js"></script>
<!-- Consolidated styles for puzzle and responsive design -->
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

body {
  background: linear-gradient(135deg, #1e2b3c 0%, #0f2c3b 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px 16px;
  font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
}

/* Adjust main container to account for site-header (if header adds spacing) */
body > site-header {
  display: block;
  width: 100%;
}

.container {
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(2px);
  padding: 20px 18px 24px;
  border-radius: 56px;
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255,255,255,0.2);
  text-align: center;
  max-width: 550px;
  width: 100%;
  transition: all 0.2s ease;
  margin: 20px auto;
}

h1 {
  font-size: 1.9rem;
  font-weight: 800;
  background: linear-gradient(135deg, #1E2F5A, #4B2E6E);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.sub {
  font-size: 0.8rem;
  color: #5b6e8c;
  margin-bottom: 18px;
  font-weight: 500;
  background: #eef2ff;
  display: inline-block;
  padding: 4px 16px;
  border-radius: 40px;
}

.stats {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  margin: 18px 0 20px;
  flex-wrap: wrap;
}

.stat-card {
  background: linear-gradient(115deg, #fbfdff, #f0f4fa);
  padding: 10px 8px;
  border-radius: 32px;
  flex: 1;
  text-align: center;
  font-weight: 700;
  color: #1e293b;
  box-shadow: 0 5px 12px rgba(0, 0, 0, 0.05);
  border: 1px solid rgba(148, 163, 184, 0.3);
  font-size: 0.85rem;
}

.stat-card span {
  display: block;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(145deg, #2563eb, #7c3aed);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  margin-top: 5px;
  letter-spacing: 1px;
}

.button-group {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin: 15px 0 12px;
  flex-wrap: wrap;
}

.btn {
  background: #3b82f6;
  color: white;
  border: none;
  padding: 12px 16px;
  border-radius: 48px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 0 5px 12px rgba(0, 0, 0, 0.15);
  flex: 1;
  min-width: 100px;
  letter-spacing: 0.3px;
}

.btn:active {
  transform: scale(0.94);
}

.btn-secondary {
  background: #475569;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}
.btn-secondary:hover { background: #334155; }

.btn-danger {
  background: #dc2626;
}
.btn-danger:hover { background: #b91c1c; }

.puzzle-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
  background: #a1a9bb;
  padding: 10px;
  border-radius: 36px;
  margin: 18px 0 12px;
  aspect-ratio: 1 / 1;
  width: 100%;
  box-shadow: inset 0 0 0 2px #cbd5e1, 0 18px 28px rgba(0, 0, 0, 0.25);
}

.tile {
  background: #fef9e8;
  border-radius: 24px;
  cursor: pointer;
  transition: all 0.05s linear;
  background-size: 300% 300%;
  background-repeat: no-repeat;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  will-change: transform;
}

.tile:active {
  transform: scale(0.96);
}

.tile.blank {
  background: #d9e2ef !important;
  background-image: none !important;
  box-shadow: inset 0 0 0 3px #6c7a91;
  backdrop-filter: brightness(0.96);
  cursor: pointer;
}

.popup {
  position: fixed;
  inset: 0;
  background: rgba(18, 25, 45, 0.85);
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  padding: 24px;
}

.popup-content {
  background: white;
  padding: 32px 24px;
  border-radius: 64px;
  text-align: center;
  max-width: 340px;
  width: 85%;
  animation: popIn 0.25s ease;
  box-shadow: 0 35px 45px rgba(0,0,0,0.3);
}

@keyframes popIn {
  from {
    transform: scale(0.85);
    opacity: 0;
  }
  to {
    transform: scale(1);
    opacity: 1;
  }
}

.popup-content h2 {
  font-size: 1.9rem;
  margin-bottom: 16px;
  font-weight: 800;
}

.popup-content p {
  margin: 14px 0;
  color: #334155;
  font-weight: 500;
}

.popup-content button {
  background: linear-gradient(95deg, #2563eb, #4f46e5);
  color: white;
  border: none;
  padding: 14px 26px;
  border-radius: 60px;
  font-size: 1.05rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 8px;
  transition: 0.15s;
}

.popup-content button:active {
  transform: scale(0.96);
}

.hidden {
  display: none;
}

.tip-text {
  font-size: 11px;
  background: #eef2ff80;
  display: inline-block;
  padding: 5px 12px;
  border-radius: 60px;
  color: #2c3e66;
  font-weight: 500;
}

@media (max-width: 480px) {
  .container {
    padding: 14px;
  }
  .stat-card span {
    font-size: 1.6rem;
  }
  .btn {
    padding: 10px 12px;
    font-size: 0.8rem;
  }
  .tile {
    border-radius: 16px;
  }
  .puzzle-grid {
    gap: 6px;
    padding: 8px;
  }
}
</style>
</head>
<body>
    <!-- Site header integrated via external loader -->
    <site-header></site-header>

    <!-- Start modal -->
    <div class="popup" id="startPopup">
      <div class="popup-content">
        <h2>🧩 SLIDE & SOLVE</h2>
        <p>✨ Tap any tile adjacent to the empty slot to slide it.</p>
        <p>⏱️ <strong>60 seconds per level</strong> — earn 100+ pts & advance!</p>
        <p>🖼️ The image changes each level for fresh challenge.</p>
        <button id="startGameBtn">🚀 Start Puzzle</button>
      </div>
    </div>

    <!-- Win / Timeout / Check result popup -->
    <div class="popup hidden" id="resultPopup">
      <div class="popup-content">
        <h2 id="resultTitle"></h2>
        <p id="resultMessage"></p>
        <button id="resultContinueBtn">Continue ➡️</button>
      </div>
    </div>

    <div class="container">
      <h1>🧩 Jigsaw Slide</h1>
      <div class="sub">slide → match → master</div>
      
      <div class="stats">
        <div class="stat-card">⭐ SCORE<br><span id="score">0</span></div>
        <div class="stat-card">🏆 LEVEL<br><span id="level">1</span></div>
        <div class="stat-card">⏰ TIME<br><span id="timer">60</span>s</div>
      </div>
      
      <div class="button-group">
        <button class="btn btn-secondary" id="changePicBtn">🎨 Change Image</button>
        <button class="btn" id="submitBtn">✅ Submit</button>
        <button class="btn btn-danger" id="restartBtn">🔄 Restart</button>
      </div>
      
      <div class="puzzle-grid" id="puzzleGrid"></div>
      <div class="tip-text">💡 Tip: Tiles adjacent to empty space will slide</div>
    </div>

    <script>
      // --- PUZZLE CONFIGURATION (3x3 classic sliding puzzle with levels & timer)
      const SIZE = 3;
      const TOTAL_TILES = 9;
      let board = [];            // value at each index: 0..7 or -1 for blank
      let blankPosition = 8;     // start with blank at bottom-right
      let score = 0;
      let level = 1;
      let timeLeft = 60;
      let timerInterval = null;
      let gameActive = false;
      let currentImageIndex = 0;
      
      // High-quality scenic images (Unsplash collection)
      const images = [
        "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1426604966848-d7adac402bff?w=600&h=600&fit=crop",
        "https://images.unsplash.com/photo-1418065460487-3e41a6c84dc5?w=600&h=600&fit=crop"
      ];
      
      // DOM elements
      const puzzleGrid = document.getElementById('puzzleGrid');
      const scoreElement = document.getElementById('score');
      const levelElement = document.getElementById('level');
      const timerElement = document.getElementById('timer');
      const startPopupDiv = document.getElementById('startPopup');
      const resultPopupDiv = document.getElementById('resultPopup');
      const resultTitle = document.getElementById('resultTitle');
      const resultMessage = document.getElementById('resultMessage');
      
      // Helper: return indices adjacent to blank (up, down, left, right)
      function getAdjacentToBlank(blankIdx) {
        const row = Math.floor(blankIdx / SIZE);
        const col = blankIdx % SIZE;
        const neighbors = [];
        if (row > 0) neighbors.push(blankIdx - SIZE);
        if (row < SIZE - 1) neighbors.push(blankIdx + SIZE);
        if (col > 0) neighbors.push(blankIdx - 1);
        if (col < SIZE - 1) neighbors.push(blankIdx + 1);
        return neighbors;
      }
      
      // Move tile if it's neighbor of blank (swap)
      function tryMoveTile(tileIndex) {
        if (!gameActive) return false;
        const adjacent = getAdjacentToBlank(blankPosition);
        if (adjacent.includes(tileIndex)) {
          // swap the clicked tile with blank
          const temp = board[tileIndex];
          board[tileIndex] = board[blankPosition];
          board[blankPosition] = temp;
          blankPosition = tileIndex;
          renderBoard();
          return true;
        }
        return false;
      }
      
      // Generate solved configuration: [0,1,2,3,4,5,6,7,-1]
      function getSolvedBoard() {
        const solved = [];
        for (let i = 0; i < TOTAL_TILES - 1; i++) solved.push(i);
        solved.push(-1);
        return solved;
      }
      
      // Shuffle using random valid moves (ensures solvable puzzle)
      function shuffleBoard(movesCount = 200) {
        for (let step = 0; step < movesCount; step++) {
          const adj = getAdjacentToBlank(blankPosition);
          if (adj.length > 0) {
            const randNeighbor = adj[Math.floor(Math.random() * adj.length)];
            const temp = board[randNeighbor];
            board[randNeighbor] = board[blankPosition];
            board[blankPosition] = temp;
            blankPosition = randNeighbor;
          }
        }
        renderBoard();
      }
      
      // Check if all tiles are in correct positions, blank at last index
      function isPuzzleSolved() {
        for (let i = 0; i < TOTAL_TILES - 1; i++) {
          if (board[i] !== i) return false;
        }
        return board[8] === -1;
      }
      
      // Timer management
      function stopTimer() {
        if (timerInterval) {
          clearInterval(timerInterval);
          timerInterval = null;
        }
      }
      
      function startTimer() {
        stopTimer();
        if (!gameActive) return;
        timerInterval = setInterval(() => {
          if (!gameActive) return;
          if (timeLeft <= 1) {
            // TIME OUT
            stopTimer();
            gameActive = false;
            timerElement.textContent = "0";
            showResultModal("⏰ TIME'S UP", "You ran out of time! Press continue to restart the level.");
          } else {
            timeLeft--;
            timerElement.textContent = timeLeft;
          }
        }, 1000);
      }
      
      function resetAndStartTimer() {
        timeLeft = 60;
        timerElement.textContent = timeLeft;
        if (gameActive) {
          stopTimer();
          startTimer();
        }
      }
      
      // Advance to next level (after winning)
      function advanceToNextLevel() {
        level++;
        levelElement.textContent = level;
        // rotate image for freshness
        currentImageIndex = (currentImageIndex + 1) % images.length;
        // reset board to solved then shuffle with increasing difficulty
        board = getSolvedBoard();
        blankPosition = 8;
        const shuffleIntensity = Math.min(220, 140 + level * 4);
        shuffleBoard(shuffleIntensity);
        gameActive = true;
        stopTimer();
        timeLeft = 60;
        timerElement.textContent = timeLeft;
        startTimer();
        renderBoard();
      }
      
      // Win handler (score, popup)
      function handleWin() {
        if (!gameActive) return false;
        if (isPuzzleSolved()) {
          stopTimer();
          gameActive = false;
          const pointsEarned = 100 + Math.floor(level * 5);
          score += pointsEarned;
          scoreElement.textContent = score;
          showResultModal("🎉 LEVEL COMPLETE!", `You solved level ${level} and earned ${pointsEarned} pts! Next level → new image.`);
          return true;
        }
        return false;
      }
      
      // Submit check
      function checkWinAndHandle() {
        if (!gameActive) {
          showResultModal("⏸️ Game Inactive", "Start or restart the game first.");
          return;
        }
        if (isPuzzleSolved()) {
          handleWin();
        } else {
          showResultModal("❌ Not Solved", "The puzzle is not yet complete. Keep sliding tiles to match the full image.");
        }
      }
      
      // Cycle image (visual only, doesn't affect puzzle state)
      function cycleImage() {
        if (!gameActive) {
          showResultModal("Game not active", "Start the game to change images.");
          return;
        }
        currentImageIndex = (currentImageIndex + 1) % images.length;
        renderBoard();
        const tipDiv = document.querySelector('.tip-text');
        tipDiv.style.opacity = '0.7';
        setTimeout(() => { tipDiv.style.opacity = '1'; }, 200);
      }
      
      // Full game restart (reset score, level, board, timer)
      function fullRestart() {
        stopTimer();
        gameActive = true;
        score = 0;
        level = 1;
        currentImageIndex = 0;
        scoreElement.textContent = score;
        levelElement.textContent = level;
        board = getSolvedBoard();
        blankPosition = 8;
        shuffleBoard(180); // initial shuffle
        timeLeft = 60;
        timerElement.textContent = timeLeft;
        stopTimer();
        startTimer();
        renderBoard();
        resultPopupDiv.classList.add('hidden');
      }
      
      // Render the puzzle with proper background positioning based on correct piece location
      function renderBoard() {
        puzzleGrid.innerHTML = '';
        const activeImageUrl = images[currentImageIndex];
        
        for (let i = 0; i < TOTAL_TILES; i++) {
          const tile = document.createElement('div');
          tile.className = 'tile';
          const tileValue = board[i];
          
          if (tileValue === -1) {
            tile.classList.add('blank');
            tile.style.backgroundImage = 'none';
          } else {
            const correctRow = Math.floor(tileValue / SIZE);
            const correctCol = tileValue % SIZE;
            // background-position: 3x3 grid mapping (0,1,2) to percentage positions
            const posX = (correctCol / (SIZE - 1)) * 100;
            const posY = (correctRow / (SIZE - 1)) * 100;
            tile.style.backgroundImage = `url('${activeImageUrl}')`;
            tile.style.backgroundSize = `${SIZE * 100}% ${SIZE * 100}%`;
            tile.style.backgroundPosition = `${posX}% ${posY}%`;
          }
          
          // attach click/touch handlers
          tile.addEventListener('click', (function(idx) {
            return function() { tryMoveTile(idx); };
          })(i));
          
          tile.addEventListener('touchstart', (function(idx) {
            return function(e) { 
              e.preventDefault();
              tryMoveTile(idx); 
            };
          })(i), { passive: false });
          
          puzzleGrid.appendChild(tile);
        }
      }
      
      // Popup modal helpers
      function showResultModal(title, msg) {
        resultTitle.textContent = title;
        resultMessage.textContent = msg;
        resultPopupDiv.classList.remove('hidden');
      }
      
      function closeResultAndContinue() {
        resultPopupDiv.classList.add('hidden');
        // Determine appropriate action: win condition or timeout
        if (!gameActive) {
          if (isPuzzleSolved()) {
            // Puzzle solved but game set inactive -> means we are coming from win popup
            advanceToNextLevel();
          } else {
            // timeout or inactive without win -> restart fresh
            fullRestart();
          }
        } else {
          // game is active (for example "Not Solved" popup) -> just continue playing
          if (isPuzzleSolved()) {
            // rare edge: solved while popup closed but gameActive might be true? ensure win flow
            stopTimer();
            gameActive = false;
            const pointsEarned = 100 + Math.floor(level * 5);
            score += pointsEarned;
            scoreElement.textContent = score;
            advanceToNextLevel();
          }
        }
        // ensure timer consistency
        if (gameActive && !timerInterval) {
          startTimer();
        }
      }
      
      // Start fresh from welcome popup
      function initialGameStart() {
        startPopupDiv.classList.add('hidden');
        fullRestart();
      }
      
      // Restart button handler
      function restartButtonHandler() {
        if (timerInterval) stopTimer();
        fullRestart();
      }
      
      // --- ATTACH EVENT LISTENERS ---
      document.getElementById('startGameBtn').addEventListener('click', initialGameStart);
      document.getElementById('changePicBtn').addEventListener('click', cycleImage);
      document.getElementById('submitBtn').addEventListener('click', checkWinAndHandle);
      document.getElementById('restartBtn').addEventListener('click', restartButtonHandler);
      document.getElementById('resultContinueBtn').addEventListener('click', closeResultAndContinue);
      
      // Initial preload (board ready but game not active until start)
      board = getSolvedBoard();
      blankPosition = 8;
      shuffleBoard(50); // mild pre-shuffle just for visual preview (start popup active)
      renderBoard();
      gameActive = false;
      stopTimer();
      timerElement.textContent = "60";
      
      // Ensure that if any external header-loader tries to interact, it's safe
      console.log("Jigsaw Puzzle Ready — header integration active");
    </script>
</body>
</html>
