<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ID Card System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body { font-family: Arial; text-align:center; }
button { padding:10px 20px; margin:5px; cursor:pointer; }
#popup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#0008; justify-content:center; align-items:center; }
.card { background:#fff; padding:20px; border-radius:10px; }
img { max-width:100%; }
</style>
</head>
<body>

<h2>Student ID System</h2>
<button onclick="openPopup()">Generate ID</button>

<div id="popup">
  <div class="card">
    <h3>Select ID Type</h3>
    <button onclick="generateCard('photo')">With Photo</button>
    <button onclick="generateCard('qr')">QR Only</button>
    <br><br>
    <img id="preview">
    <br><br>
    <button onclick="downloadCard()">Download</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
const CARD_W = 400;
const CARD_H = 600;
let activeBlob = null;

const member = {
  name: "John Doe",
  reg: "IH001",
  photo: "https://ui-avatars.com/api/?name=John+Doe",
  validity: "Valid"
};

function openPopup() {
  document.getElementById("popup").style.display = "flex";
}

function closePopup() {
  document.getElementById("popup").style.display = "none";
}

function generateQR(text, size) {
  return new Promise(resolve => {
    const div = document.createElement("div");
    new QRCode(div, { text, width:size, height:size });
    setTimeout(() => {
      const canvas = div.querySelector("canvas");
      resolve(canvas);
    }, 200);
  });
}

async function generateCard(type) {
  const qr = await generateQR("ID:"+member.reg, 200);

  const canvas = document.createElement("canvas");
  canvas.width = CARD_W;
  canvas.height = CARD_H;
  const ctx = canvas.getContext("2d");

  ctx.fillStyle = "#fff";
  ctx.fillRect(0,0,CARD_W,CARD_H);

  if(type === 'photo'){
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.src = member.photo;
    await new Promise(r=>img.onload=r);

    ctx.drawImage(img, 50, 150, 120,120);
    ctx.drawImage(qr, 200,150,120,120);
  } else {
    ctx.drawImage(qr, 100,150,200,200);
  }

  ctx.textAlign = "center";
  ctx.fillStyle = "#000";
  ctx.font = "20px Arial";
  ctx.fillText(member.name, CARD_W/2, 400);
  ctx.fillText(member.reg, CARD_W/2, 430);

  canvas.toBlob(blob=>{
    activeBlob = blob;
    document.getElementById("preview").src = URL.createObjectURL(blob);
  });
}

function downloadCard(){
  if(!activeBlob) return;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(activeBlob);
  a.download = "id.png";
  a.click();
}
</script>

</body>
</html>
