<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Text To Speech</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:700px;
    margin:30px auto;
    padding:20px;
}

textarea{
    width:100%;
    height:150px;
    padding:10px;
    font-size:16px;
}

select,
input[type=range]{
    width:100%;
    margin:10px 0;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<h2>Text To Speech</h2>

<textarea id="text"
placeholder="Type text here"></textarea>

<h3>Language</h3>

<button onclick="setLanguage('en-IN')">
English
</button>

<button onclick="setLanguage('ml-IN')">
Malayalam
</button>

<button onclick="setLanguage('hi-IN')">
Hindi
</button>

<p>
Selected:
<span id="currentLang">
English
</span>
</p>

<label>Voice</label>
<select id="voiceSelect"></select>

<label>
Pitch:
<span id="pitchValue">1</span>
</label>

<input
type="range"
id="pitch"
min="0"
max="2"
step="0.1"
value="1">

<label>
Speed:
<span id="rateValue">1</span>
</label>

<input
type="range"
id="rate"
min="0.5"
max="2"
step="0.1"
value="1">

<br>

<button onclick="speakText()">
🔊 Speak
</button>

<button onclick="speechSynthesis.cancel()">
⏹ Stop
</button>

<script>

let selectedLanguage = "en-IN";

const voiceSelect =
document.getElementById("voiceSelect");

function setLanguage(lang){

    selectedLanguage = lang;

    let label = "English";

    if(lang === "ml-IN")
        label = "Malayalam";

    if(lang === "hi-IN")
        label = "Hindi";

    document.getElementById(
        "currentLang"
    ).innerText = label;

    loadVoices();
}

function loadVoices(){

    const voices =
        speechSynthesis.getVoices();

    voiceSelect.innerHTML = "";

    const filtered =
        voices.filter(v =>
            v.lang.toLowerCase()
            .startsWith(
                selectedLanguage
                .substring(0,2)
                .toLowerCase()
            )
        );

    const list =
        filtered.length
        ? filtered
        : voices;

    list.forEach(v=>{

        const option =
            document.createElement(
                "option"
            );

        option.value = v.name;

        option.textContent =
            `${v.name} (${v.lang})`;

        voiceSelect.appendChild(
            option
        );
    });
}

speechSynthesis.onvoiceschanged =
loadVoices;

loadVoices();

document
.getElementById("pitch")
.oninput = function(){

    document
    .getElementById("pitchValue")
    .innerText = this.value;
};

document
.getElementById("rate")
.oninput = function(){

    document
    .getElementById("rateValue")
    .innerText = this.value;
};

function speakText(){

    const text =
        document
        .getElementById("text")
        .value;

    if(!text.trim()){
        alert("Enter text");
        return;
    }

    speechSynthesis.cancel();

    const utterance =
        new SpeechSynthesisUtterance(
            text
        );

    utterance.lang =
        selectedLanguage;

    utterance.pitch =
        parseFloat(
            document
            .getElementById("pitch")
            .value
        );

    utterance.rate =
        parseFloat(
            document
            .getElementById("rate")
            .value
        );

    const voices =
        speechSynthesis.getVoices();

    const selectedVoice =
        voices.find(
            v =>
            v.name ===
            voiceSelect.value
        );

    if(selectedVoice)
        utterance.voice =
            selectedVoice;

    speechSynthesis.speak(
        utterance
    );
}

</script>

</body>
</html>
