<!DOCTYPE html>
<html>
<head>
  <title>Drive Image Gallery</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      height: auto;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<h2>My Google Drive Images</h2>

<div class="gallery">
  <img src="https://drive.google.com/uc?export=view&id=1Y2cKzYdGZ0-NJRr6MezRY3k8QMNmP-Xr">
  <img src="https://drive.google.com/uc?export=view&id=FILE_ID_2">
  <img src="https://drive.google.com/uc?export=view&id=FILE_ID_3">
</div>

</body>
</html>
