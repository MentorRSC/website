<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
text-align:center;
}

/* popup background */
.popup{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

/* popup box */
.popup-content{
position:relative;
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
width:90%;
}

/* image */
.gallery-img{
width:100%;
border-radius:10px;
}

/* buttons */
.btn{
padding:10px 20px;
margin:10px;
cursor:pointer;
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:25px;
cursor:pointer;
}

</style>
</head>


<body>

<h2>Project Gallery</h2>

<button onclick="openPopup()" class="btn">Open Gallery</button>

<div id="popup" class="popup">

<div class="popup-content">

<span class="close" onclick="closePopup()">✖</span>

<img id="galleryImage" class="gallery-img"
src="https://picsum.photos/600/350?1">

<br>

<button onclick="prevImage()" class="btn">⬅ Prev</button>
<button onclick="nextImage()" class="btn">Next ➡</button>

</div>
</div>


<script>

let images=[
"https://picsum.photos/600/350?1",
"https://picsum.photos/600/350?2",
"https://picsum.photos/600/350?3",
"https://picsum.photos/600/350?4"
]

let index=0

function openPopup(){
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

function nextImage(){
index++
if(index>=images.length) index=0
document.getElementById("galleryImage").src=images[index]
}

function prevImage(){
index--
if(index<0) index=images.length-1
document.getElementById("galleryImage").src=images[index]
}

</script>

</body>
</html>
