<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Multilingual Text To Speech</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    font-family:Arial,Helvetica,sans-serif;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#111827;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:8px;
    font-weight:bold;
    color:#374151;
}

textarea{
    width:100%;
    height:180px;
    resize:vertical;
    border:2px solid #d1d5db;
    border-radius:12px;
    padding:15px;
    font-size:16px;
}

textarea:focus,
select:focus{
    outline:none;
    border-color:#2563eb;
}

select{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:2px solid #d1d5db;
    font-size:15px;
}

.slider-row{
    margin-top:20px;
}

.slider-value{
    font-weight:bold;
    margin-left:8px;
}

input[type="range"]{
    width:100%;
}

.button-group{
    display:flex;
    gap:10px;
    margin-top:25px;
}

button{
    flex:1;
    border:none;
    padding:14px;
    border-radius:12px;
    cursor:pointer;
    font-size:16px;
    font-weight:bold;
    transition:.2s;
}

.speak-btn{
    background:#2563eb;
    color:white;
}

.stop-btn{
    background:#dc2626;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

.info{
    margin-top:20px;
    background:#f3f4f6;
    padding:12px;
    border-radius:12px;
    font-size:14px;
    color:#4b5563;
}

@media(max-width:600px){
    .button-group{
        flex-direction:column;
    }
}
</style>
</head>
<body>

<div class="container">

<h1>🔊 Multilingual Text To Speech</h1>

<label>Language</label>
<select id="language">
    <option value="en">English</option>
    <option value="hi">Hindi</option>
    <option value="ml">Malayalam</option>
</select>

<label>Voice</label>
<select id="voiceSelect"></select>

<label>Text</label>
<textarea id="text">
Hello! Type your text here.
</textarea>

<div class="slider-row">
    <label>
        Pitch
        <span class="slider-value" id="pitchValue">1</span>
    </label>

    <input
        type="range"
        id="pitch"
        min="0"
        max="2"
        step="0.1"
        value="1">
</div>

<div class="slider-row">
    <label>
        Speed
        <span class="slider-value" id="rateValue">1</span>
    </label>

    <input
        type="range"
        id="rate"
        min="0.5"
        max="2"
        step="0.1"
        value="1">
</div>

<div class="button-group">
    <button class="speak-btn" onclick="speakText()">
        Speak
    </button>

    <button class="stop-btn" onclick="stopSpeech()">
        Stop
    </button>
</div>

<div class="info">
    Supports English, Hindi and Malayalam.
    Available voices depend on your browser and operating system.
</div>

</div>

<script>

const voiceSelect = document.getElementById("voiceSelect");
const languageSelect = document.getElementById("language");

const pitchSlider = document.getElementById("pitch");
const rateSlider = document.getElementById("rate");

const pitchValue = document.getElementById("pitchValue");
const rateValue = document.getElementById("rateValue");

pitchSlider.addEventListener("input",()=>{
    pitchValue.textContent = pitchSlider.value;
});

rateSlider.addEventListener("input",()=>{
    rateValue.textContent = rateSlider.value;
});

function loadVoices(){

    const voices = speechSynthesis.getVoices();

    voiceSelect.innerHTML = "";

    const selectedLang = languageSelect.value;

    const filteredVoices = voices.filter(v =>
        v.lang.toLowerCase().startsWith(selectedLang)
    );

    const finalVoices =
        filteredVoices.length > 0
        ? filteredVoices
        : voices;

    finalVoices.forEach((voice,index)=>{

        const option =
            document.createElement("option");

        option.value = voice.name;

        option.textContent =
            `${voice.name} (${voice.lang})`;

        voiceSelect.appendChild(option);
    });
}

languageSelect.addEventListener(
    "change",
    loadVoices
);

speechSynthesis.onvoiceschanged =
    loadVoices;

loadVoices();

function speakText(){

    speechSynthesis.cancel();

    const text =
        document.getElementById("text").value;

    if(!text.trim()){
        alert("Enter some text.");
        return;
    }

    const utterance =
        new SpeechSynthesisUtterance(text);

    const selectedVoice =
        speechSynthesis
        .getVoices()
        .find(
            v => v.name ===
            voiceSelect.value
        );

    if(selectedVoice){
        utterance.voice = selectedVoice;
        utterance.lang = selectedVoice.lang;
    }

    utterance.pitch =
        parseFloat(pitchSlider.value);

    utterance.rate =
        parseFloat(rateSlider.value);

    speechSynthesis.speak(utterance);
}

function stopSpeech(){
    speechSynthesis.cancel();
}

</script>

</body>
</html>
