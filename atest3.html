<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 20px 30px;
        }
        .header h1 {
            margin-bottom: 10px;
        }
        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #dee2e6;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .date-filter {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-filter input {
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 14px;
        }
        button {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        button:hover {
            background: #5a67d8;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-left: auto;
            font-size: 14px;
        }
        .stat-card {
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            color: #2c3e50;
        }
        .table-wrapper {
            overflow-x: auto;
            padding: 20px 30px;
            max-height: 600px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #34495e;
            color: white;
            padding: 12px 8px;
            text-align: left;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        td {
            padding: 10px 8px;
            border-bottom: 1px solid #e2e8f0;
        }
        tr:hover {
            background: #f7fafc;
        }
        .status-present {
            background: #c6f6d5;
            color: #22543d;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
        }
        .status-absent {
            background: #fed7d7;
            color: #742a2a;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
        }
        .status-late {
            background: #feebc8;
            color: #7b341e;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            font-size: 12px;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 18px;
            color: #718096;
        }
        .error {
            background: #fed7d7;
            color: #742a2a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            th, td {
                font-size: 12px;
                padding: 6px 4px;
            }
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            .stats {
                margin-left: 0;
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📋 Attendance Register</h1>
        <p>Staff Attendance Tracking System</p>
    </div>
    <div class="controls">
        <div class="date-filter">
            <label>📅 Filter by Date:</label>
            <input type="date" id="dateFilter">
        </div>
        <button onclick="filterByDate()">Apply Filter</button>
        <button onclick="resetFilter()">Reset</button>
        <div class="stats">
            <div class="stat-card">👥 Total: <span id="totalCount">0</span></div>
            <div class="stat-card">✅ Present: <span id="presentCount">0</span></div>
            <div class="stat-card">❌ Absent: <span id="absentCount">0</span></div>
        </div>
    </div>
    <div class="table-wrapper">
        <div id="attendanceTable">
            <div class="loading">Loading attendance data...</div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION - REPLACE WITH YOUR ACTUAL DATA SOURCE
    // ============================================================
    
    // OPTION A: If you publish your sheet as CSV (Easiest)
    // Go to File → Share → Publish to web → Link (CSV)
    // Then uncomment and use the URL below:
    // const DATA_URL = 'https://docs.google.com/spreadsheets/d/e/YOUR_SHEET_ID/pub?output=csv';
    
    // OPTION B: Sample data for demonstration
    // Replace this with your actual data fetch code
    const SAMPLE_DATA = [
        { date: '2026-04-26', regId: 'EMP001', name: 'John Doe', signIn: '09:00 AM', signOut: '05:30 PM', type: 'Office', phone: '9876543210', day: 'Monday', status: 'Present', report: 'Full Day' },
        { date: '2026-04-26', regId: 'EMP002', name: 'Jane Smith', signIn: '09:15 AM', signOut: '05:30 PM', type: 'Office', phone: '9876543211', day: 'Monday', status: 'Late', report: 'Full Day' },
        { date: '2026-04-26', regId: 'EMP003', name: 'Mike Johnson', signIn: '--', signOut: '--', type: 'Office', phone: '9876543212', day: 'Monday', status: 'Absent', report: '--' },
        { date: '2026-04-25', regId: 'EMP001', name: 'John Doe', signIn: '08:55 AM', signOut: '05:25 PM', type: 'Office', phone: '9876543210', day: 'Sunday', status: 'Present', report: 'Full Day' },
        { date: '2026-04-25', regId: 'EMP002', name: 'Jane Smith', signIn: '08:50 AM', signOut: '05:30 PM', type: 'Office', phone: '9876543211', day: 'Sunday', status: 'Present', report: 'Full Day' },
        { date: '2026-04-24', regId: 'EMP001', name: 'John Doe', signIn: '09:10 AM', signOut: '05:20 PM', type: 'WFH', phone: '9876543210', day: 'Saturday', status: 'Present', report: 'Full Day' },
        { date: '2026-04-24', regId: 'EMP002', name: 'Jane Smith', signIn: '09:30 AM', signOut: '06:00 PM', type: 'Office', phone: '9876543211', day: 'Saturday', status: 'Late', report: 'Full Day' },
        { date: '2026-04-24', regId: 'EMP003', name: 'Mike Johnson', signIn: '09:00 AM', signOut: '05:30 PM', type: 'Office', phone: '9876543212', day: 'Saturday', status: 'Present', report: 'Full Day' },
    ];

    let attendanceData = [];

    // Function to fetch data from Google Sheet (if published as CSV)
    async function fetchFromGoogleSheet() {
        try {
            // Uncomment and set your published CSV URL
            // const response = await fetch(DATA_URL);
            // const csvText = await response.text();
            // const parsedData = parseCSV(csvText);
            // return parsedData;
            
            // For now, using sample data
            return SAMPLE_DATA;
        } catch (error) {
            console.error('Error fetching data:', error);
            throw new Error('Failed to load attendance data');
        }
    }

    // CSV parser helper (if using CSV method)
    function parseCSV(csvText) {
        const lines = csvText.split('\n');
        const headers = lines[0].split(',');
        const result = [];
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const values = lines[i].split(',');
            const row = {};
            headers.forEach((header, index) => {
                let key = header.trim().toLowerCase();
                if (key === 'date') row.date = values[index];
                else if (key === 'reg id') row.regId = values[index];
                else if (key === 'name') row.name = values[index];
                else if (key === 'sign in time') row.signIn = values[index];
                else if (key === 'sign out time') row.signOut = values[index];
                else if (key === 'type') row.type = values[index];
                else if (key === 'phone') row.phone = values[index];
                else if (key === 'day') row.day = values[index];
                else if (key === 'status') row.status = values[index];
                else if (key === 'report') row.report = values[index];
                else row[header.trim()] = values[index];
            });
            result.push(row);
        }
        return result;
    }

    // Display table with optional date filter
    function displayTable(filterDate = '') {
        const container = document.getElementById('attendanceTable');
        let filteredData = attendanceData;
        
        if (filterDate) {
            filteredData = attendanceData.filter(row => row.date === filterDate);
        }
        
        if (filteredData.length === 0) {
            container.innerHTML = '<div class="error">No attendance records found for the selected date.</div>';
            document.getElementById('totalCount').textContent = '0';
            document.getElementById('presentCount').textContent = '0';
            document.getElementById('absentCount').textContent = '0';
            return;
        }
        
        // Update stats
        const total = filteredData.length;
        const present = filteredData.filter(row => row.status === 'Present').length;
        const absent = filteredData.filter(row => row.status === 'Absent').length;
        
        document.getElementById('totalCount').textContent = total;
        document.getElementById('presentCount').textContent = present;
        document.getElementById('absentCount').textContent = absent;
        
        // Build table HTML
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Reg ID</th>
                        <th>Name</th>
                        <th>Sign In Time</th>
                        <th>Sign Out Time</th>
                        <th>Type</th>
                        <th>Phone</th>
                        <th>Day</th>
                        <th>Status</th>
                        <th>Report</th>
                    </tr>
                </thead>
                <tbody>
        `;
        
        filteredData.forEach(row => {
            let statusClass = '';
            if (row.status === 'Present') statusClass = 'status-present';
            else if (row.status === 'Absent') statusClass = 'status-absent';
            else if (row.status === 'Late') statusClass = 'status-late';
            
            html += `
                <tr>
                    <td>${row.date || '--'}</td>
                    <td>${row.regId || '--'}</td>
                    <td>${row.name || '--'}</td>
                    <td>${row.signIn || '--'}</td>
                    <td>${row.signOut || '--'}</td>
                    <td>${row.type || '--'}</td>
                    <td>${row.phone || '--'}</td>
                    <td>${row.day || '--'}</td>
                    <td><span class="${statusClass}">${row.status || '--'}</span></td>
                    <td>${row.report || '--'}</td>
                </tr>
            `;
        });
        
        html += `
                </tbody>
            </table>
        `;
        
        container.innerHTML = html;
    }
    
    function filterByDate() {
        const dateInput = document.getElementById('dateFilter').value;
        displayTable(dateInput);
    }
    
    function resetFilter() {
        document.getElementById('dateFilter').value = '';
        displayTable('');
    }
    
    // Initialize the page
    async function init() {
        try {
            attendanceData = await fetchFromGoogleSheet();
            displayTable('');
        } catch (error) {
            document.getElementById('attendanceTable').innerHTML = 
                '<div class="error">⚠️ Error loading attendance data. Please check your data source configuration.</div>';
            console.error(error);
        }
    }
    
    init();
</script>
</body>
</html>
