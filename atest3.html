<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Innovation Hub - Live Attendance with Popup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .header h1 {
            color: #667eea;
            font-size: 26px;
        }

        .header p {
            color: #666;
            font-size: 13px;
            margin-top: 5px;
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 18px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 13px;
            color: #666;
        }

        /* Search Box */
        .search-section {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-box button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Table */
        .table-container {
            background: white;
            border-radius: 20px;
            overflow-x: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th {
            background: linear-gradient(135deg, #667eea20 0%, #764ba220 100%);
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-in {
            background: #28a74520;
            color: #155724;
        }

        .status-out {
            background: #dc354520;
            color: #721c24;
        }

        .btn-action {
            padding: 6px 16px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            transition: all 0.2s;
        }

        .btn-checkin {
            background: #28a745;
            color: white;
        }

        .btn-checkout {
            background: #dc3545;
            color: white;
        }

        .btn-action:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        /* Modal Popup */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
            animation: slideIn 0.3s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 20px 20px 10px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            color: #333;
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
        }

        .close-modal:hover {
            color: #333;
        }

        .modal-body {
            padding: 20px;
        }

        .detail-row {
            display: flex;
            margin-bottom: 12px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .detail-label {
            width: 100px;
            font-weight: 600;
            color: #555;
        }

        .detail-value {
            flex: 1;
            color: #333;
            word-break: break-word;
        }

        .modal-footer {
            padding: 15px 20px 20px 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 12px;
        }

        .modal-footer button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .modal-footer button:hover {
            transform: translateY(-2px);
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top-color: #667eea;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-row td {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .refresh-btn {
            background: white;
            border: 2px solid #667eea;
            color: #667eea;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }

        @media (max-width: 700px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .search-box {
                flex-direction: column;
            }
            td, th {
                padding: 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏢 Innovation Hub - Attendance Dashboard</h1>
            <p>Live Tracking | Today's Records Only</p>
            <button class="refresh-btn" onclick="fetchAndDisplayData()" style="margin-top: 12px;">⟳ Refresh Data</button>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">-</div>
                <div class="stat-label">Total Visitors Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="checkedInCount">-</div>
                <div class="stat-label">Currently Inside</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="completedCount">-</div>
                <div class="stat-label">Checked Out Today</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search by Name, Reg ID, or Phone..." autocomplete="off">
                <button onclick="searchAttendance()">Search</button>
                <button onclick="clearSearch()" style="background: #6c757d;">Clear</button>
            </div>
        </div>

        <!-- Table -->
        <div class="table-container">
            <table id="attendanceTable">
                <thead>
                    <tr>
                        <th>SL No</th>
                        <th>Reg ID</th>
                        <th>Name</th>
                        <th>Sign In Time</th>
                        <th>Phone</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr class="empty-row">
                        <td colspan="7">Loading today's attendance data...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Popup -->
    <div id="memberModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>👤 Member Details</h3>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content will be inserted here -->
            </div>
            <div class="modal-footer" id="modalFooter">
                <!-- Dynamic button will be inserted here -->
            </div>
        </div>
    </div>

    <script>
        // ---------- CONFIGURATION ----------
        // Google Sheets Web App URL (replace with your deployed URL)
        const SHEET_ID = '1dlcXpacMoKbk-T4ice9TCr99FxKkT0bvgRDfNK07_rY';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxpvw7_VOAsx0Qkwjuuj9ynS9VmJju5dRszFpHlX4ntwtQWKZRfem0fiakneQNrpb0V/exec';
        
        let currentAttendanceData = []; // Store current day's data
        let currentSelectedRecord = null; // Store selected record for modal
        
        // ---------- HELPER: Fetch data from Google Sheets via JSONP ----------
        async function fetchSheetData() {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_callback_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
                let url = `${WEB_APP_URL}?action=getTodayAttendance&sheetId=${SHEET_ID}&callback=${callbackName}`;
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                
                const script = document.createElement('script');
                script.src = url;
                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('Failed to fetch data from server'));
                };
                document.body.appendChild(script);
            });
        }
        
        // ---------- Process and Display Data ----------
        async function fetchAndDisplayData() {
            showLoadingState();
            try {
                const result = await fetchSheetData();
                if (result && result.status === 'success') {
                    currentAttendanceData = result.data || [];
                    renderStats(currentAttendanceData);
                    renderTable(currentAttendanceData);
                } else {
                    throw new Error(result?.message || 'Failed to load data');
                }
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tableBody').innerHTML = '<tr class="empty-row"><td colspan="7">❌ Error loading data. Please check connection and try again.</td></tr>';
                document.getElementById('totalCount').innerText = '0';
                document.getElementById('checkedInCount').innerText = '0';
                document.getElementById('completedCount').innerText = '0';
            }
        }
        
        function showLoadingState() {
            document.getElementById('tableBody').innerHTML = '<tr class="empty-row"><td colspan="7"><span class="loading-spinner"></span> Loading today\'s records...</td></tr>';
        }
        
        function renderStats(data) {
            const total = data.length;
            // Currently inside = checked in but not checked out (Sign Out Time is empty)
            const checkedIn = data.filter(record => record.signInTime && (!record.signOutTime || record.signOutTime === '')).length;
            const completed = data.filter(record => record.signOutTime && record.signOutTime !== '').length;
            
            document.getElementById('totalCount').innerText = total;
            document.getElementById('checkedInCount').innerText = checkedIn;
            document.getElementById('completedCount').innerText = completed;
        }
        
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr class="empty-row"><td colspan="7">📭 No attendance records for today.</td></tr>';
                return;
            }
            
            let html = '';
            data.forEach((record, index) => {
                const isCheckedIn = record.signInTime && (!record.signOutTime || record.signOutTime === '');
                const statusText = isCheckedIn ? 'Inside' : 'Completed';
                const statusClass = isCheckedIn ? 'status-in' : 'status-out';
                const actionText = isCheckedIn ? 'Check Out' : 'Check In';
                const actionClass = isCheckedIn ? 'btn-checkout' : 'btn-checkin';
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${escapeHtml(record.regId || '-')}</td>
                        <td><strong>${escapeHtml(record.name || 'Guest')}</strong></td>
                        <td>${escapeHtml(record.signInTime || '-')}</td>
                        <td>${escapeHtml(record.phone || '-')}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <button class="btn-action ${actionClass}" onclick="openMemberModal(${index})">
                                ${actionText}
                            </button>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }
        
        // ---------- Search Functionality ----------
        function searchAttendance() {
            const searchTerm = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!searchTerm) {
                renderTable(currentAttendanceData);
                return;
            }
            
            const filtered = currentAttendanceData.filter(record => {
                return (record.name && record.name.toLowerCase().includes(searchTerm)) ||
                       (record.regId && record.regId.toLowerCase().includes(searchTerm)) ||
                       (record.phone && record.phone.includes(searchTerm));
            });
            renderTable(filtered);
            
            // Update stats for filtered view? Optional: We'll keep original stats, but show filtered count in a small note
            const statsGrid = document.getElementById('statsGrid');
            let note = document.getElementById('searchNote');
            if (!note) {
                note = document.createElement('div');
                note.id = 'searchNote';
                note.style.fontSize = '12px';
                note.style.marginTop = '8px';
                note.style.textAlign = 'center';
                statsGrid.parentNode.insertBefore(note, statsGrid.nextSibling);
            }
            if (filtered.length !== currentAttendanceData.length) {
                note.innerHTML = `🔍 Showing ${filtered.length} of ${currentAttendanceData.length} records`;
                note.style.display = 'block';
            } else {
                note.style.display = 'none';
            }
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            renderTable(currentAttendanceData);
            const note = document.getElementById('searchNote');
            if (note) note.style.display = 'none';
        }
        
        // ---------- Modal Functions (Popup with Details & Toggle Action) ----------
        function openMemberModal(index) {
            const record = currentAttendanceData[index];
            if (!record) return;
            currentSelectedRecord = record;
            currentSelectedRecord.originalIndex = index;
            
            const isCheckedIn = record.signInTime && (!record.signOutTime || record.signOutTime === '');
            
            // Build modal body with details
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-row">
                    <div class="detail-label">SL No:</div>
                    <div class="detail-value">${index + 1}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Reg ID:</div>
                    <div class="detail-value">${escapeHtml(record.regId || 'Guest')}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Name:</div>
                    <div class="detail-value"><strong>${escapeHtml(record.name || 'Guest User')}</strong></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Phone:</div>
                    <div class="detail-value">${escapeHtml(record.phone || 'Not provided')}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Sign In Time:</div>
                    <div class="detail-value">${escapeHtml(record.signInTime || '-')}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Sign Out Time:</div>
                    <div class="detail-value">${escapeHtml(record.signOutTime || 'Not checked out')}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Type:</div>
                    <div class="detail-value">${escapeHtml(record.type || 'Member')}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Day:</div>
                    <div class="detail-value">${escapeHtml(record.day || new Date().toLocaleDateString())}</div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Status:</div>
                    <div class="detail-value">${isCheckedIn ? '✅ Currently Inside' : '🏁 Completed Visit'}</div>
                </div>
            `;
            
            // Build footer with appropriate action button
            const modalFooter = document.getElementById('modalFooter');
            const actionButton = isCheckedIn 
                ? `<button class="btn-checkout" style="background:#dc3545; color:white;" onclick="performCheckOut()">🚪 Check Out</button>`
                : `<button class="btn-checkin" style="background:#28a745; color:white;" onclick="performCheckIn()">✅ Check In</button>`;
            
            modalFooter.innerHTML = `
                ${actionButton}
                <button onclick="closeModal()" style="background:#6c757d; color:white;">Cancel</button>
            `;
            
            // Show modal
            document.getElementById('memberModal').classList.add('active');
        }
        
        // ---------- Perform Check In / Check Out actions (Updates UI & Simulates backend) ----------
        async function performCheckIn() {
            if (!currentSelectedRecord) return;
            
            // Disable button during operation
            const footerBtns = document.querySelectorAll('#modalFooter button');
            footerBtns.forEach(btn => btn.disabled = true);
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const dateString = now.toLocaleDateString('en-CA'); // YYYY-MM-DD
            
            // Prepare updated record
            const updatedRecord = {
                ...currentSelectedRecord,
                signInTime: timeString,
                signOutTime: '',
                day: dateString,
                status: 'Inside'
            };
            
            try {
                // Call backend to update (simulate or real API)
                const result = await updateAttendanceInSheet(currentSelectedRecord, 'checkin', timeString);
                if (result && result.status === 'success') {
                    // Update local data
                    const index = currentSelectedRecord.originalIndex;
                    currentAttendanceData[index] = updatedRecord;
                    currentSelectedRecord = updatedRecord;
                    
                    // Re-render UI
                    renderStats(currentAttendanceData);
                    renderTable(currentAttendanceData);
                    closeModal();
                    showToast('✅ Check-in successful!', 'success');
                } else {
                    throw new Error(result?.message || 'Check-in failed');
                }
            } catch (error) {
                console.error('Check-in error:', error);
                showToast('❌ Check-in failed: ' + error.message, 'error');
                footerBtns.forEach(btn => btn.disabled = false);
                closeModal();
            }
        }
        
        async function performCheckOut() {
            if (!currentSelectedRecord) return;
            
            // Disable buttons
            const footerBtns = document.querySelectorAll('#modalFooter button');
            footerBtns.forEach(btn => btn.disabled = true);
            
            const now = new Date();
            const timeString = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            
            const updatedRecord = {
                ...currentSelectedRecord,
                signOutTime: timeString,
                status: 'Completed'
            };
            
            try {
                const result = await updateAttendanceInSheet(currentSelectedRecord, 'checkout', timeString);
                if (result && result.status === 'success') {
                    const index = currentSelectedRecord.originalIndex;
                    currentAttendanceData[index] = updatedRecord;
                    currentSelectedRecord = updatedRecord;
                    
                    renderStats(currentAttendanceData);
                    renderTable(currentAttendanceData);
                    closeModal();
                    showToast('🚪 Check-out successful!', 'success');
                } else {
                    throw new Error(result?.message || 'Check-out failed');
                }
            } catch (error) {
                console.error('Check-out error:', error);
                showToast('❌ Check-out failed: ' + error.message, 'error');
                footerBtns.forEach(btn => btn.disabled = false);
                closeModal();
            }
        }
        
        // Backend communication (update sheet via JSONP)
        async function updateAttendanceInSheet(record, action, timeValue) {
            return new Promise((resolve, reject) => {
                const callbackName = 'jsonp_update_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                let url = `${WEB_APP_URL}?action=updateAttendance&sheetId=${SHEET_ID}&regId=${encodeURIComponent(record.regId || '')}&name=${encodeURIComponent(record.name || '')}&actionType=${action}&time=${encodeURIComponent(timeValue)}&callback=${callbackName}`;
                
                // Add phone if exists
                if (record.phone) url += `&phone=${encodeURIComponent(record.phone)}`;
                if (record.type) url += `&type=${encodeURIComponent(record.type)}`;
                
                window[callbackName] = function(data) {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    resolve(data);
                };
                
                const script = document.createElement('script');
                script.src = url;
                script.onerror = function() {
                    delete window[callbackName];
                    document.body.removeChild(script);
                    reject(new Error('Network error while updating'));
                };
                document.body.appendChild(script);
            });
        }
        
        // ---------- Utility Functions ----------
        function closeModal() {
            document.getElementById('memberModal').classList.remove('active');
            currentSelectedRecord = null;
        }
        
        function showToast(message, type = 'info') {
            // Create temporary toast element
            const toast = document.createElement('div');
            toast.className = `toast-message ${type}`;
            toast.innerHTML = message;
            toast.style.position = 'fixed';
            toast.style.bottom = '20px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = type === 'success' ? '#28a745' : '#dc3545';
            toast.style.color = 'white';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '30px';
            toast.style.fontWeight = 'bold';
            toast.style.zIndex = '3000';
            toast.style.boxShadow = '0 5px 15px rgba(0,0,0,0.3)';
            toast.style.fontSize = '14px';
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => {
                    if (toast.parentNode) toast.parentNode.removeChild(toast);
                }, 300);
            }, 2500);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // ---------- Auto Refresh Every 15 Seconds ----------
        let autoRefreshInterval = null;
        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                fetchAndDisplayData();
            }, 15000);
        }
        
        // Close modal when clicking outside content
        document.getElementById('memberModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // Initialize
        fetchAndDisplayData();
        startAutoRefresh();
        
        // Add search on Enter key
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') searchAttendance();
        });
    </script>
</body>
</html>
