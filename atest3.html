<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Sheet Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .controls {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            color: #666;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            background: #5a67d8;
        }

        .table-wrapper {
            overflow-x: auto;
            padding: 20px 30px;
            max-height: 70vh;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        th {
            background: #667eea;
            color: white;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #666;
        }

        .error {
            text-align: center;
            padding: 40px;
            color: #dc3545;
            background: #fff3f3;
            border-radius: 8px;
            margin: 20px;
        }

        .stats {
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
            color: #666;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        @media (max-width: 768px) {
            .controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            th, td {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Attendance Sheet Viewer</h1>
            <p>View and search attendance data from Google Sheets</p>
        </div>

        <div class="controls">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔍 Search in any column...">
            </div>
            <div class="status">
                <span id="rowCount">Loading...</span>
                <button class="refresh-btn" onclick="loadData()">🔄 Refresh</button>
            </div>
        </div>

        <div class="table-wrapper">
            <div id="tableContainer">
                <div class="loading">Loading data from Google Sheet...</div>
            </div>
        </div>

        <div class="stats">
            <span>📅 Last updated: <span id="lastUpdated">-</span></span>
            <span>💡 Tip: Data updates when you refresh the page</span>
        </div>
    </div>

    <script>
        // REPLACE THIS URL WITH YOUR PUBLISHED GOOGLE SHEET CSV URL
        // After publishing, get the CSV link from File → Publish to web
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1dlcXpacMoKbk-T4ice9TCr99FxKkT0bvgRDfNK07_rY/export?format=csv&gid=0';
        
        let originalData = [];
        let headers = [];

        async function loadData() {
            const container = document.getElementById('tableContainer');
            container.innerHTML = '<div class="loading">Loading data from Google Sheet...</div>';
            
            try {
                // Add cache-busting parameter
                const url = `${GOOGLE_SHEET_CSV_URL}&_=${Date.now()}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csvText = await response.text();
                parseAndDisplayCSV(csvText);
                
                document.getElementById('lastUpdated').innerText = new Date().toLocaleString();
            } catch (error) {
                console.error('Error loading data:', error);
                container.innerHTML = `
                    <div class="error">
                        <strong>⚠️ Error loading data</strong><br><br>
                        Make sure you have:<br>
                        1. Published your Google Sheet to the web (File → Share → Publish to web)<br>
                        2. Used the correct CSV export URL<br>
                        3. Set sheet sharing to "Anyone with link can view"<br><br>
                        Technical details: ${error.message}
                    </div>
                `;
            }
        }

        function parseAndDisplayCSV(csvText) {
            // Parse CSV (handles quoted fields properly)
            const rows = [];
            const regex = /(?:,|^)(?:"([^"]*(?:""[^"]*)*)"|([^",]*))/g;
            const lines = csvText.split(/\r?\n/);
            
            if (lines.length === 0) {
                throw new Error('Empty CSV data');
            }
            
            // Parse headers
            headers = parseCSVLine(lines[0]);
            
            // Parse data rows
            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim()) {
                    const row = parseCSVLine(lines[i]);
                    if (row.length > 0) {
                        rows.push(row);
                    }
                }
            }
            
            originalData = rows;
            displayTable(originalData);
            document.getElementById('rowCount').innerText = `📊 ${rows.length} rows`;
        }

        function parseCSVLine(line) {
            const result = [];
            let inQuotes = false;
            let currentField = '';
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                
                if (char === '"') {
                    if (inQuotes && line[i+1] === '"') {
                        currentField += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(currentField.trim());
                    currentField = '';
                } else {
                    currentField += char;
                }
            }
            result.push(currentField.trim());
            return result;
        }

        function displayTable(data) {
            const container = document.getElementById('tableContainer');
            
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="error">No data found in the sheet</div>';
                return;
            }
            
            let html = '<table>';
            
            // Create header
            html += '<thead><tr>';
            headers.forEach(header => {
                html += `<th>${escapeHtml(header || '')}</th>`;
            });
            html += '</tr></thead>';
            
            // Create body
            html += '<tbody>';
            data.forEach(row => {
                html += '<tr>';
                for (let i = 0; i < headers.length; i++) {
                    const cellValue = row[i] || '';
                    html += `<td>${escapeHtml(cellValue)}</td>`;
                }
                html += '</tr>';
            });
            html += '</tbody></table>';
            
            container.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function filterData() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                displayTable(originalData);
                document.getElementById('rowCount').innerText = `📊 ${originalData.length} rows`;
                return;
            }
            
            const filtered = originalData.filter(row => {
                return row.some(cell => 
                    cell && cell.toString().toLowerCase().includes(searchTerm)
                );
            });
            
            displayTable(filtered);
            document.getElementById('rowCount').innerText = `🔍 ${filtered.length} of ${originalData.length} rows`;
        }

        // Add search event listener
        document.getElementById('searchInput').addEventListener('input', filterData);
        
        // Load data when page loads
        loadData();
    </script>
</body>
</html>
