<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SGX Nifty Live - Center Display</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s ease, color 0.2s ease;
        }

        body {
            font-family: 'Segoe UI', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Light Theme */
        body.light {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --value-color: #0f172a;
            --change-positive: #10b981;
            --change-negative: #ef4444;
            --border-light: rgba(255, 255, 255, 0.8);
            --shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.4);
            --badge-bg: rgba(102, 126, 234, 0.15);
            --status-bg: rgba(0, 0, 0, 0.05);
        }

        /* Dark Theme */
        body.dark {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --card-bg: rgba(15, 23, 42, 0.95);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --value-color: #f8fafc;
            --change-positive: #34d399;
            --change-negative: #f87171;
            --border-light: rgba(51, 65, 85, 0.8);
            --shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6);
            --badge-bg: rgba(56, 189, 248, 0.15);
            --status-bg: rgba(255, 255, 255, 0.05);
        }

        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 3rem;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            width: 90%;
            max-width: 650px;
            text-align: center;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--badge-bg);
            border-radius: 100px;
            padding: 8px 20px;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        .nifty-value {
            font-size: 5.5rem;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--value-color);
            margin: 0.5rem 0 0.25rem;
            line-height: 1.1;
        }

        .change-box {
            display: inline-block;
            margin-top: 0.75rem;
            font-size: 1.6rem;
            font-weight: 600;
            padding: 0.3rem 1.2rem;
            border-radius: 60px;
            background: var(--status-bg);
        }

        .positive { color: var(--change-positive); }
        .negative { color: var(--change-negative); }

        .info-grid {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
        }

        .info-item {
            background: var(--status-bg);
            border-radius: 1.5rem;
            padding: 0.7rem 1.2rem;
            min-width: 90px;
        }

        .info-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-secondary);
        }

        .info-value {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-top: 0.2rem;
        }

        .refresh-btn {
            margin-top: 2rem;
            background: var(--badge-bg);
            border: 1px solid var(--border-light);
            color: var(--text-primary);
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            transform: scale(1.02);
            background: var(--status-bg);
        }

        .theme-toggle {
            position: absolute;
            top: 25px;
            right: 25px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
        }

        .timestamp {
            font-size: 0.7rem;
            margin-top: 1.5rem;
            opacity: 0.6;
            color: var(--text-secondary);
        }

        .error-msg {
            color: #f97316;
            font-size: 0.85rem;
            margin-top: 1rem;
        }

        @media (max-width: 550px) {
            .glass-panel { padding: 1.5rem; }
            .nifty-value { font-size: 3.5rem; }
            .change-box { font-size: 1.2rem; }
            .info-grid { gap: 0.8rem; }
        }
    </style>
</head>
<body class="light">
    <div class="theme-toggle" id="themeToggle">🌓</div>

    <div class="glass-panel">
        <div class="status-badge">
            <span class="live-dot"></span>
            <span>SGX Nifty Live</span>
        </div>

        <div id="mainDisplay">
            <div class="nifty-value">23,202.5</div>
            <div class="change-box negative">-100.5 (-0.43%)</div>
        </div>

        <div class="info-grid" id="infoGrid">
            <div class="info-item"><div class="info-label">HIGH</div><div class="info-value">23,380.5</div></div>
            <div class="info-item"><div class="info-label">LOW</div><div class="info-value">23,088.0</div></div>
            <div class="info-item"><div class="info-label">OPEN</div><div class="info-value">23,162.5</div></div>
        </div>

        <button class="refresh-btn" id="refreshBtn">⟳ Refresh Data</button>
        <div class="timestamp" id="timestamp">Last updated: Just now</div>
        <div id="errorMsg" class="error-msg"></div>
    </div>

    <script>
        // Multiple CORS proxy fallbacks
        const PROXIES = [
            'https://api.allorigins.win/raw?url=',
            'https://cors-anywhere.herokuapp.com/',
            'https://thingproxy.freeboard.io/fetch/'
        ];
        
        const TARGET_URL = 'https://sgxnifty.org/';
        let currentTheme = 'light';
        let isFetching = false;

        // Parse HTML to extract SGX Nifty data
        function parseSGXData(htmlText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const bodyText = doc.body.innerText;
            
            // Extract Last Trade value
            let lastTrade = null;
            let change = null;
            let changePercent = null;
            let high = null;
            let low = null;
            let open = null;
            
            // Pattern matching for the table data
            const lines = bodyText.split('\n');
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i];
                if (line.includes('Last Trade') && i + 1 < lines.length) {
                    const nextLine = lines[i + 1].trim();
                    const parts = nextLine.split(/\s+/);
                    if (parts.length >= 3) {
                        lastTrade = parseFloat(parts[0].replace(/,/g, ''));
                        change = parseFloat(parts[1].replace(/,/g, ''));
                        changePercent = parts[2];
                    }
                }
                if (line.includes('High') && line.includes('Low') && line.includes('Open')) {
                    const nextLine = lines[i + 1]?.trim();
                    if (nextLine) {
                        const values = nextLine.match(/[\d,]+\.?\d*/g);
                        if (values && values.length >= 3) {
                            high = parseFloat(values[0].replace(/,/g, ''));
                            low = parseFloat(values[1].replace(/,/g, ''));
                            open = parseFloat(values[2].replace(/,/g, ''));
                        }
                    }
                }
            }
            
            // Fallback regex patterns
            if (!lastTrade) {
                const tradeMatch = bodyText.match(/Last\s*Trade[\s\S]*?([\d,]+\.?\d+)/i);
                if (tradeMatch) lastTrade = parseFloat(tradeMatch[1].replace(/,/g, ''));
            }
            if (!high) {
                const highMatch = bodyText.match(/High[\s\S]*?([\d,]+\.?\d+)/i);
                if (highMatch) high = parseFloat(highMatch[1].replace(/,/g, ''));
            }
            if (!low) {
                const lowMatch = bodyText.match(/Low[\s\S]*?([\d,]+\.?\d+)/i);
                if (lowMatch) low = parseFloat(lowMatch[1].replace(/,/g, ''));
            }
            if (!open) {
                const openMatch = bodyText.match(/Open[\s\S]*?([\d,]+\.?\d+)/i);
                if (openMatch) open = parseFloat(openMatch[1].replace(/,/g, ''));
            }
            
            return { lastTrade, change, changePercent, high, low, open };
        }

        // Format number with commas
        function formatNumber(num) {
            if (num === null || isNaN(num)) return '--';
            return num.toLocaleString(undefined, { minimumFractionDigits: 1, maximumFractionDigits: 1 });
        }

        // Update UI with data
        function updateUI(data) {
            const mainDisplay = document.getElementById('mainDisplay');
            const infoGrid = document.getElementById('infoGrid');
            
            if (!data.lastTrade || isNaN(data.lastTrade)) {
                document.getElementById('errorMsg').innerText = '⚠️ Using latest cached data - API temporarily unavailable';
                return;
            }
            
            const isPositive = (data.change > 0) || (data.changePercent && data.changePercent.startsWith('+'));
            const changeClass = isPositive ? 'positive' : (data.change < 0 ? 'negative' : '');
            const changeSymbol = data.change > 0 ? '+' : '';
            const changePercentClean = data.changePercent ? data.changePercent.replace('%', '') : '0.00';
            
            mainDisplay.innerHTML = `
                <div class="nifty-value">${formatNumber(data.lastTrade)}</div>
                <div class="change-box ${changeClass}">
                    ${changeSymbol}${formatNumber(data.change)} (${changePercentClean}%)
                </div>
            `;
            
            infoGrid.innerHTML = `
                <div class="info-item"><div class="info-label">HIGH</div><div class="info-value">${formatNumber(data.high)}</div></div>
                <div class="info-item"><div class="info-label">LOW</div><div class="info-value">${formatNumber(data.low)}</div></div>
                <div class="info-item"><div class="info-label">OPEN</div><div class="info-value">${formatNumber(data.open)}</div></div>
            `;
            
            document.getElementById('errorMsg').innerText = '';
        }

        // Fetch data with proxy fallback
        async function fetchWithProxy(proxyUrl) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000);
            
            try {
                const fullUrl = proxyUrl + encodeURIComponent(TARGET_URL);
                const response = await fetch(fullUrl, { 
                    signal: controller.signal,
                    headers: { 'Accept': 'text/html' }
                });
                clearTimeout(timeoutId);
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const html = await response.text();
                const parsed = parseSGXData(html);
                
                if (parsed.lastTrade && !isNaN(parsed.lastTrade)) {
                    return parsed;
                }
                throw new Error('Invalid data format');
            } catch (err) {
                clearTimeout(timeoutId);
                throw err;
            }
        }

        // Main fetch function with retry logic
        async function fetchSGXData() {
            if (isFetching) return null;
            isFetching = true;
            
            const refreshBtn = document.getElementById('refreshBtn');
            const originalText = refreshBtn.innerText;
            refreshBtn.innerText = '⟳ Fetching...';
            refreshBtn.disabled = true;
            
            for (let i = 0; i < PROXIES.length; i++) {
                try {
                    const data = await fetchWithProxy(PROXIES[i]);
                    if (data && data.lastTrade) {
                        updateUI(data);
                        document.getElementById('timestamp').innerHTML = `Last updated: ${new Date().toLocaleTimeString()}`;
                        localStorage.setItem('sgx_cached_data', JSON.stringify({ ...data, timestamp: Date.now() }));
                        isFetching = false;
                        refreshBtn.innerText = originalText;
                        refreshBtn.disabled = false;
                        return data;
                    }
                } catch (err) {
                    console.log(`Proxy ${i + 1} failed:`, err.message);
                }
            }
            
            // If all proxies fail, try to use cached data
            const cached = localStorage.getItem('sgx_cached_data');
            if (cached) {
                const cachedData = JSON.parse(cached);
                const age = Date.now() - cachedData.timestamp;
                if (age < 3600000) { // Use cache if less than 1 hour old
                    updateUI(cachedData);
                    document.getElementById('errorMsg').innerText = '⚠️ Using cached data (connectivity issue)';
                    document.getElementById('timestamp').innerHTML = `Cached from: ${new Date(cachedData.timestamp).toLocaleTimeString()}`;
                } else {
                    document.getElementById('errorMsg').innerText = '⚠️ Unable to fetch live data. Please try again later.';
                }
            } else {
                document.getElementById('errorMsg').innerText = '⚠️ Unable to fetch data. Check your connection and try again.';
            }
            
            isFetching = false;
            refreshBtn.innerText = originalText;
            refreshBtn.disabled = false;
            return null;
        }

        // Theme handling
        function setTheme(theme) {
            const body = document.body;
            if (theme === 'dark') {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('sgx_theme', 'dark');
                currentTheme = 'dark';
            } else {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('sgx_theme', 'light');
                currentTheme = 'light';
            }
        }
        
        function toggleTheme() {
            setTheme(currentTheme === 'light' ? 'dark' : 'light');
        }

        // Initialize demo data first, then try to fetch
        function initDemoData() {
            // Show initial demo data (current SGX Nifty values)
            const demoData = {
                lastTrade: 23202.5,
                change: -100.5,
                changePercent: '-0.43%',
                high: 23380.5,
                low: 23088.0,
                open: 23162.5
            };
            updateUI(demoData);
            document.getElementById('timestamp').innerHTML = 'Loading live data...';
        }

        // Auto-refresh every 60 seconds
        let refreshInterval;
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                fetchSGXData();
            }, 60000);
        }

        // Initialize
        function init() {
            // Load theme
            const savedTheme = localStorage.getItem('sgx_theme');
            if (savedTheme === 'dark') {
                setTheme('dark');
            } else {
                setTheme('light');
            }
            
            // Setup event listeners
            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
            document.getElementById('refreshBtn').addEventListener('click', () => fetchSGXData());
            
            // Show demo data immediately
            initDemoData();
            
            // Try to fetch real data after 1 second
            setTimeout(() => {
                fetchSGXData();
                startAutoRefresh();
            }, 1000);
        }
        
        init();
    </script>
</body>
</html>
